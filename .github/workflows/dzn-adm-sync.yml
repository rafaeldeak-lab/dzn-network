name: DZN ADM Sync

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  adm-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled metadata and ADM sync
        env:
          SYNC_CRON_SECRET: ${{ secrets.SYNC_CRON_SECRET }}
        run: |
          if [ -z "$SYNC_CRON_SECRET" ]; then
            echo "SYNC_CRON_SECRET is not configured."
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            -X POST "https://dzn-network.pages.dev/api/sync/metadata/run" \
            -H "Authorization: Bearer ${SYNC_CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --data '{"cron":"github-actions","max_servers":25}'

          curl --fail-with-body --silent --show-error \
            -X POST "https://dzn-network.pages.dev/api/sync/adm/run" \
            -H "Authorization: Bearer ${SYNC_CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --data '{"cron":"github-actions","max_servers":25,"max_lines_per_server":50000}'

          curl --fail-with-body --silent --show-error \
            -X POST "https://dzn-network.pages.dev/api/sync/discord-posts/run" \
            -H "Authorization: Bearer ${SYNC_CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --data '{"cron":"github-actions","max_jobs":25}'
