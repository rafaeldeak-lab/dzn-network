          SQL

          npx wrangler d1 execute DB --config wrangler.server-lifecycle-preview.toml --remote --file server-lifecycle-preview-data.sql
          echo "Preview-only lifecycle seed applied."

      - name: Deploy preview Pages project
        if: ${{ inputs.mode == 'deploy-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          if [ "${PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
            echo "::error::Refusing to deploy lifecycle preview to production Pages project."
            exit 1
          fi
          if [ "${PREVIEW_D1_DATABASE_ID}" = "${PRODUCTION_D1_DATABASE_ID}" ]; then
            echo "::error::Refusing preview deploy because preview D1 id equals production D1 id."
            exit 1
          fi

          node <<'NODE'
          const fs = require("node:fs");
          const projectName = process.env.PREVIEW_PROJECT_NAME;
          const previewBaseUrl = process.env.PREVIEW_BASE_URL;
          const d1Id = process.env.PREVIEW_D1_DATABASE_ID;
          const previewDbName = process.env.PREVIEW_DB_NAME;
          const wranglerToml = [
            `name = ${JSON.stringify(projectName)}`,
            'compatibility_date = "2026-05-13"',
            'pages_build_output_dir = "out"',
            "",
            "[vars]",
            'DZN_PULSE_ENABLED = "true"',
            'DZN_DISCORD_NOTIFICATIONS_ENABLED = "false"',
            `DZN_APP_URL = ${JSON.stringify(previewBaseUrl)}`,
            `NEXT_PUBLIC_APP_URL = ${JSON.stringify(previewBaseUrl)}`,
            'MOCK_AUTH = "true"',
            "",
            "[[d1_databases]]",
            'binding = "DB"',
            `database_name = ${JSON.stringify(previewDbName)}`,
            `database_id = ${JSON.stringify(d1Id)}`,
            "",
          ].join("\n");
          fs.writeFileSync("wrangler.toml", wranglerToml);
          console.log(`Configured preview Pages project: ${projectName}`);
          console.log(`Configured preview D1 binding DB id: ${d1Id}`);
          console.log("Configured DZN_DISCORD_NOTIFICATIONS_ENABLED=false");
          console.log("Configured MOCK_AUTH=true for preview only");
          NODE

          DZN_PULSE_ENABLED=true \
          DZN_DISCORD_NOTIFICATIONS_ENABLED=false \
          MOCK_AUTH=true \
          npm run build
          npx wrangler pages deploy out \
            --project-name "${PREVIEW_PROJECT_NAME}" \
            --branch "${INPUT_BRANCH}" \
            --commit-dirty=true \
            | tee server-lifecycle-pages-deploy.txt

          node <<'NODE'
          const fs = require("node:fs");
          const deployText = fs.readFileSync("server-lifecycle-pages-deploy.txt", "utf8");
          const immutableUrl = deployText.match(/https:\/\/[^\s]+\.pages\.dev/)?.[0] ?? "";
          const stableUrl = `https://${process.env.PREVIEW_PROJECT_NAME}.pages.dev`;
          fs.writeFileSync("server-lifecycle-preview-url.txt", `${stableUrl}\n`);
          if (immutableUrl) fs.writeFileSync("server-lifecycle-preview-immutable-url.txt", `${immutableUrl}\n`);
          console.log(`Preview URL: ${stableUrl}`);
          if (immutableUrl) console.log(`Immutable preview URL: ${immutableUrl}`);
          NODE

      - name: Verify preview deployment
        if: ${{ inputs.mode == 'verify-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          npx wrangler d1 execute DB --config wrangler.server-lifecycle-preview.toml --remote --json --command "SELECT id, lifecycle_status, status, listing_visibility, owner_action_required FROM linked_servers WHERE id LIKE 'lifecycle-%' ORDER BY id;" > lifecycle-preview-servers.json
          npx wrangler d1 execute DB --config wrangler.server-lifecycle-preview.toml --remote --json --command "SELECT linked_server_id, next_retry_after, last_skip_reason FROM server_sync_state WHERE linked_server_id LIKE 'lifecycle-%' ORDER BY linked_server_id;" > lifecycle-preview-sync-state.json

          node <<'NODE'
          const fs = require("node:fs");
          const base = process.env.PREVIEW_BASE_URL;
          const forbiddenText = [
            "Request failed: 503",
            "SERVER UNAVAILABLE",
            "Error 1102",
            "Worker exceeded resource limits",
            "Minified React error #",
          ];
          function assert(condition, message) {
            if (!condition) {
              console.error(message);
              process.exit(1);
            }
          }
          function rowsFromWranglerJson(path) {
            const parsed = JSON.parse(fs.readFileSync(path, "utf8"));
            const containers = Array.isArray(parsed) ? parsed : [parsed];
            return containers.flatMap((item) => item?.results ?? item?.result?.[0]?.results ?? item?.result?.results ?? []);
          }
          async function fetchWithTimeout(url, init = {}) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 45000);
            try {
              return await fetch(url, { ...init, signal: controller.signal });
            } finally {
              clearTimeout(timeout);
            }
          }
          async function expectStatus(path, expected, options = {}) {
            const response = await fetchWithTimeout(`${base}${path}`, { redirect: "manual", ...options });
            const body = await response.text();
            assert(response.status === expected, `${path} returned HTTP ${response.status}, expected ${expected}.`);
            for (const snippet of forbiddenText) {
              assert(!body.includes(snippet), `${path} contains forbidden runtime text: ${snippet}`);
            }
            return { response, body };
          }
          async function jsonRequest(path, init = {}) {
            const response = await fetchWithTimeout(`${base}${path}`, init);
            const text = await response.text();
            let parsed = null;
            try {
              parsed = text ? JSON.parse(text) : null;
            } catch {
              parsed = null;
            }
            return { response, parsed, text };
          }
          void (async () => {
            const rows = rowsFromWranglerJson("lifecycle-preview-servers.json");
            const byId = new Map(rows.map((row) => [row.id, row]));
            assert(byId.get("lifecycle-active-server")?.lifecycle_status === "active_live", "Active preview server should be active_live.");
            assert(byId.get("lifecycle-archived-server")?.lifecycle_status === "archived_hidden", "Archived preview server should be archived_hidden.");
            assert(byId.get("lifecycle-legacy-server")?.lifecycle_status === "legacy_offline", "Legacy preview server should be legacy_offline.");
            assert(byId.get("lifecycle-token-server")?.owner_action_required === 1, "Token preview server should require owner action.");
            assert(byId.get("lifecycle-final-server")?.lifecycle_status === "final_sync_pending", "Final sync preview server should be final_sync_pending.");
            assert(byId.get("lifecycle-degraded-server")?.lifecycle_status === "active_degraded", "Degraded preview server should be active_degraded.");
            assert(byId.get("lifecycle-upstream-server")?.lifecycle_status === "nitrado_upstream_down", "Upstream preview server should be nitrado_upstream_down.");
            assert(byId.get("lifecycle-stale-server")?.lifecycle_status === "stale_monitoring", "Stale preview server should be stale_monitoring.");
            assert(byId.get("lifecycle-final-complete-server")?.lifecycle_status === "final_sync_complete", "Final-complete preview server should be final_sync_complete.");
            assert(byId.get("lifecycle-nuketown-server")?.lifecycle_status === "active_live", "NukeTown preview server should remain active_live.");
            assert(byId.get("lifecycle-pandora-server")?.lifecycle_status === "nitrado_upstream_down", "PANDORA preview server should use recoverable upstream-down classification.");
            assert(byId.get("lifecycle-warlords-server")?.lifecycle_status === "archived_hidden", "Warlords preview server should remain archived_hidden.");

            const syncRows = rowsFromWranglerJson("lifecycle-preview-sync-state.json");
            const syncById = new Map(syncRows.map((row) => [row.linked_server_id, row]));
            assert(syncById.get("lifecycle-token-server")?.last_skip_reason === "skipped_token_needs_resave", "Token server should be skipped for token re-save.");
            assert(syncById.get("lifecycle-archived-server")?.last_skip_reason === "skipped_archived", "Archived server should be skipped.");
            assert(syncById.get("lifecycle-legacy-server")?.last_skip_reason === "skipped_legacy", "Legacy server should be skipped.");
            assert(syncById.get("lifecycle-degraded-server")?.last_skip_reason === "skipped_backoff", "Degraded server should respect backoff.");
            assert(syncById.get("lifecycle-upstream-server")?.last_skip_reason === "skipped_backoff", "Upstream-down server should respect retry backoff.");
            assert(syncById.get("lifecycle-stale-server")?.last_skip_reason === "skipped_no_due_work", "Stale server should move to reduced no-due-work cadence.");
            assert(syncById.get("lifecycle-final-complete-server")?.last_skip_reason === "skipped_final_sync_complete", "Final-complete server should stop recurring ADM sync.");
            assert(syncById.get("lifecycle-nuketown-server")?.last_skip_reason == null, "NukeTown active_live preview server should remain selectable.");
            assert(syncById.get("lifecycle-pandora-server")?.last_skip_reason === "skipped_backoff", "PANDORA recoverable preview path should use backoff.");
            assert(syncById.get("lifecycle-warlords-server")?.last_skip_reason === "skipped_archived", "Warlords archived_hidden preview server should not hard-fail health.");

            await expectStatus("/", 200);
            await expectStatus("/servers", 200);
            await expectStatus("/api/public/servers", 200);
            await expectStatus("/api/public/home-stats", 200);
            await expectStatus("/api/public/server-rail", 200);
            await expectStatus("/api/public/leaderboards", 200);
            await expectStatus("/api/public/server-wars", 200);
            const servers = await jsonRequest("/api/public/servers");
            assert(servers.response.status === 200, "/api/public/servers should return 200.");
            const serversText = JSON.stringify(servers.parsed ?? {});
            assert(serversText.includes("lifecycle-active"), "Public servers should include active lifecycle server.");
            assert(serversText.includes("lifecycle-nuketown"), "Public servers should include NukeTown active_live preview server.");
            assert(!serversText.includes("lifecycle-archived"), "Public servers should exclude archived_hidden server.");
            assert(!serversText.includes("lifecycle-warlords"), "Public servers should exclude Warlords archived_hidden preview server.");
            assert(!serversText.includes("lifecycle-token"), "Public servers should exclude token_needs_resave from active surfaces.");

            const rail = await jsonRequest("/api/public/server-rail");
            assert(rail.response.status === 200, "/api/public/server-rail should return 200.");
            const railText = JSON.stringify(rail.parsed ?? {});
            assert(!railText.includes("lifecycle-archived"), "Server rail should exclude archived_hidden server.");
            assert(!railText.includes("lifecycle-warlords"), "Server rail should exclude Warlords archived_hidden server.");

            const dashboard = await fetchWithTimeout(`${base}/api/auth/mock/start?returnTo=%2Fdashboard`, { redirect: "manual" });
            assert(dashboard.status === 302, `Mock auth returned ${dashboard.status}.`);
            const cookie = (dashboard.headers.get("set-cookie") ?? "").split(";")[0];
            assert(cookie.startsWith("dzn_session="), "Mock auth did not set dzn_session cookie.");
            await expectStatus("/dashboard", 200, { headers: { cookie } });
            await expectStatus("/dashboard/server-settings", 200, { headers: { cookie } });

            const automation = fs.readFileSync("functions/_lib/automation.ts", "utf8");
            assert(automation.includes("skipped_token_needs_resave"), "Automation reports skipped_token_needs_resave.");
            assert(automation.includes("skipped_backoff"), "Automation reports skipped_backoff.");
            assert(automation.includes("skipped_final_sync_complete"), "Automation reports skipped_final_sync_complete.");
            assert(automation.includes("final_sync_pending"), "Automation supports final_sync_pending.");
            assert(automation.includes("recordServerLifecycleOutcome"), "Automation records lifecycle outcomes.");
            assert(automation.includes("SERVER_LIFECYCLE_ACTIVE_ADM_STATUSES"), "Automation uses lifecycle ADM candidate policy.");
            const health = fs.readFileSync("functions/api/autodev/adm-health.ts", "utf8");
            assert(health.includes("lifecycleWarningOnly"), "ADM health should warn/ignore classified lifecycle states.");
            const dashboardSource = fs.readFileSync("components/onboarding/dashboard.tsx", "utf8");
            for (const copy of ["Token needs re-save", "Nitrado temporarily unavailable", "Legacy offline", "Archived / hidden"]) {
              assert(dashboardSource.includes(copy), `Dashboard lifecycle owner-action copy missing: ${copy}`);
            }
            assert(dashboardSource.includes("getLifecycleDisplay"), "Dashboard should map lifecycle keys to owner-facing display copy.");
            assert(dashboardSource.includes("formatLifecycleSkipReason"), "Dashboard should map lifecycle skip keys to owner-facing copy.");

            console.log("Preview lifecycle resource-control checks passed.");
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

          {
            echo "## DZN Server Lifecycle Preview Result"
            echo ""
            echo "- Preview URL: ${PREVIEW_BASE_URL}"
            echo "- Preview D1 database name: ${PREVIEW_DB_NAME}"
            echo "- Preview D1 database id: ${PREVIEW_D1_DATABASE_ID}"
            echo "- Migration 0054: applied to preview only"
            echo "- Archived/legacy exclusion: passed"
            echo "- Token-needs-resave skip: passed"
            echo "- Final sync pending seed/checkpoint: passed"
            echo "- Public route lifecycle filtering: passed"
            echo "- Dashboard/settings load: passed"
            echo "- DZN_DISCORD_NOTIFICATIONS_ENABLED: false"
          } >> "$GITHUB_STEP_SUMMARY"
