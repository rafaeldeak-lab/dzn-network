              internalModerationReasonNotPublic: authMatrix.moderationPrivacy.privateArchiveClearedCreatorResponse && authMatrix.moderationPrivacy.restoreClearedCreatorResponse && authMatrix.moderationPrivacy.approveAfterRestoreBlankResponse,
              privateDraftPublicEventDetailExcluded: authMatrix.conversion.publicEventDetailStatus === 404,
              unknownPublicEventDetailExcluded: authMatrix.conversion.unknownPublicEventDetailStatus === 404,
              knownPublicEventDetailAvailable: authMatrix.conversion.knownPublicEventDetailStatus === 200,
              privateDraftReviewCreatorOnly: authMatrix.conversion.ownerReviewPage.anonymous === 302 && authMatrix.conversion.ownerReviewPage.nonCreatorOwner === 403 && authMatrix.conversion.ownerReviewPage.creator === 200,
              privateDraftApiCreatorOnly: authMatrix.conversion.ownerDraftApi.anonymous === 401 && authMatrix.conversion.ownerDraftApi.nonCreatorOwner === 403 && authMatrix.conversion.ownerDraftApi.creator === 200 && authMatrix.conversion.ownerDraftApi.privateNoStore === true,
              eventListSessionCacheIsolated: cacheVerification.eventApi.anonymousFullNoStore && cacheVerification.eventApi.authenticatedFullNoStore && cacheVerification.eventApi.invalidSessionNoStore,
              eventDetailSessionCacheIsolated: cacheVerification.eventApi.publicDetailFullNoStore && cacheVerification.eventApi.authenticatedDetailNoStore && cacheVerification.eventApi.invalidSessionDetailNoStore,
              publicEventListVaryCookie: cacheVerification.eventApi.publicListVaryCookie,
              publicEventDetailVaryCookie: cacheVerification.eventApi.publicDetailVaryCookie,
              publicEventDraftsExcluded: cacheVerification.eventApi.publicDraftAbsent && cacheVerification.eventApi.unlistedDraftAbsent && cacheVerification.eventApi.privateDraftAbsent,
              publicStatusFiltersOmitDraft: cacheVerification.eventApi.statusFiltersOmitDraft,
              publicStatusDraftRejected: cacheVerification.eventApi.statusDraftRejected === 400,
              creatorDraftOwnerApiOnly: cacheVerification.eventApi.creatorOwnerDraftApiStatus === 200 && cacheVerification.eventApi.creatorPublicDraftPublicDetailStatus === 404,
            };
            writeJsonArtifact("privacy-checks.json", privacyChecks, "privacyChecks");
            updateProgress("pagination", "running");
            const paginationChecks = await verifyPagination(stableUrl);
            writeJsonArtifact("pagination-checks.json", paginationChecks, "pagination");
            updateProgress("d1FinalVerification", "running");
            const d1Rows = {
              migration0057: await d1Query("SELECT name FROM d1_migrations WHERE name = '0057_event_suggestions_phase_2a.sql';"),
              deterministicRows: await d1Query("SELECT COUNT(*) AS count FROM event_suggestions WHERE id LIKE 'phase2a-preview-%';"),
              apiVerifierRows: await d1Query("SELECT COUNT(*) AS count FROM event_suggestions WHERE submitted_by_user_id = ?;", [apiMemberUserId]),
              apiVerifierConvertedRows: await d1Query("SELECT COUNT(*) AS count FROM event_suggestions WHERE submitted_by_user_id = ? AND converted_event_id IS NOT NULL;", [apiMemberUserId]),
              reportRows: await d1Query("SELECT COUNT(*) AS count FROM event_suggestion_reports WHERE suggestion_id LIKE 'phase2a-preview-%' AND status = 'open';"),
              voteRows: await d1Query("SELECT COUNT(*) AS count FROM event_suggestion_votes WHERE suggestion_id LIKE 'phase2a-preview-%';"),
              canonicalDrafts: await d1Query("SELECT COUNT(*) AS count FROM competitive_events WHERE id LIKE 'phase2a-preview-%' AND status = 'draft' AND visibility = 'private';"),
              conversionTargetDrafts: await d1Query("SELECT COUNT(*) AS count FROM competitive_events WHERE id = 'suggestion-draft-phase2a-preview-conversion-target' AND status = 'draft' AND visibility = 'private';"),
              conversionActivity: await d1Query("SELECT COUNT(*) AS count FROM competitive_event_activity WHERE event_id LIKE 'phase2a-preview-%' OR event_id = 'suggestion-draft-phase2a-preview-conversion-target';"),
              conversionTargetActivity: await d1Query("SELECT COUNT(*) AS count FROM competitive_event_activity WHERE event_id = 'suggestion-draft-phase2a-preview-conversion-target' AND activity_type = 'suggestion_converted_to_draft';"),
              conversionActions: await d1Query("SELECT COUNT(*) AS count FROM event_suggestion_moderation_actions WHERE suggestion_id LIKE 'phase2a-preview-%' AND action = 'convert_to_event_draft';"),
              conversionTargetActions: await d1Query("SELECT COUNT(*) AS count FROM event_suggestion_moderation_actions WHERE suggestion_id = 'phase2a-preview-conversion-target' AND action = 'convert_to_event_draft';"),
              conversionTargetPointer: await d1Query("SELECT converted_event_id AS convertedEventId FROM event_suggestions WHERE id = 'phase2a-preview-conversion-target' LIMIT 1;"),
              orphanConversionEvents: await d1Query("SELECT COUNT(*) AS count FROM competitive_events WHERE id = 'suggestion-draft-phase2a-preview-conversion-target' AND NOT EXISTS (SELECT 1 FROM event_suggestions WHERE converted_event_id = competitive_events.id);"),
              foreignKeys: await d1Query("PRAGMA foreign_key_check;"),
            };
            if (
              d1Rows.migration0057.length !== 1 ||
              d1Rows.foreignKeys.length !== 0 ||
              Number(d1Rows.apiVerifierConvertedRows[0]?.count || 0) !== 0 ||
              Number(d1Rows.conversionTargetDrafts[0]?.count || 0) !== 1 ||
              Number(d1Rows.conversionTargetActivity[0]?.count || 0) !== 1 ||
              Number(d1Rows.conversionTargetActions[0]?.count || 0) !== 1 ||
              d1Rows.conversionTargetPointer[0]?.convertedEventId !== "suggestion-draft-phase2a-preview-conversion-target" ||
              Number(d1Rows.orphanConversionEvents[0]?.count || 0) !== 0
            ) {
              fail("Final Phase 2A preview D1 verification failed.", { category: "PHASE2A_D1_FINAL_VERIFICATION_FAILED", stage: "d1FinalVerification" });
            }
            writeJsonArtifact("d1-final-verification.json", {
              previewDatabase: previewDbName,
              migration0057Recorded: d1Rows.migration0057.length === 1,
              deterministicSuggestionCount: Number(d1Rows.deterministicRows[0]?.count || 0),
              apiVerifierSuggestionRows: Number(d1Rows.apiVerifierRows[0]?.count || 0),
              apiVerifierConvertedRows: Number(d1Rows.apiVerifierConvertedRows[0]?.count || 0),
              openReportRows: Number(d1Rows.reportRows[0]?.count || 0),
              voteRows: Number(d1Rows.voteRows[0]?.count || 0),
              canonicalPrivateDraftRows: Number(d1Rows.canonicalDrafts[0]?.count || 0),
              conversionTargetPrivateDraftRows: Number(d1Rows.conversionTargetDrafts[0]?.count || 0),
              conversionActivityRows: Number(d1Rows.conversionActivity[0]?.count || 0),
              conversionTargetActivityRows: Number(d1Rows.conversionTargetActivity[0]?.count || 0),
              conversionActionRows: Number(d1Rows.conversionActions[0]?.count || 0),
              conversionTargetActionRows: Number(d1Rows.conversionTargetActions[0]?.count || 0),
              conversionTargetEventId: d1Rows.conversionTargetPointer[0]?.convertedEventId || null,
              orphanConversionEvents: Number(d1Rows.orphanConversionEvents[0]?.count || 0),
              foreignKeyCheckRows: d1Rows.foreignKeys.length,
            }, "d1FinalVerification");
            updateProgress("finalReport", "running");
            fs.writeFileSync(`${artifacts}/final-report.md`, [
              "# DZN Event Platform Performance Preview",
              "",
              `- Project: ${projectName}`,
              `- Preview D1: ${previewDbName}`,
              `- Immutable URL: ${immutableUrl}`,
              `- Stable URL: ${stableUrl}`,
              "- Public report counts exposed: false",
              "- Private draft event identifiers exposed publicly: false",
              "- Discord notifications enabled: false",
              "- Discord server announcements enabled: false",
              "- Production operations: none",
              "",
            ].join("\n"));
            updateProgress("finalReport", "passed");
            console.log("Phase 2A performance preview verification passed.");
          })().catch((error) => fail(error instanceof Error ? error.message : String(error)));
          NODE

      - name: Upload Phase 2A preview artifact
        if: ${{ always() && inputs.mode == 'event-platform-performance-preview' }}
        uses: actions/upload-artifact@v4
        with:
          name: dzn-event-platform-performance-preview
          path: dzn-event-platform-performance-preview
          if-no-files-found: warn

      - name: Validate branch
        if: ${{ inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail
          npm run lint
          npm run build
          npm run test
          npm run test:owner-console
          npm run test:creator-event-governance
          npm run test:public-access-gating
          npm run test:server-lifecycle-resource-control
          npm run test:server-advertising-packages
          npm run test:github-workflows
          git diff --check

      - name: Diagnose Cloudflare preview auth
        if: ${{ inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail
          echo "Wrangler version: $(npx wrangler --version)"
          echo "Selected workflow ref: ${CANDIDATE_REF}"
          echo "Selected branch: ${CANDIDATE_BRANCH}"
          echo "Selected commit: ${CANDIDATE_SHA}"
          echo "Preview D1 database name: ${PREVIEW_DB_NAME}"
          echo "Preview Pages project name: ${PREVIEW_PROJECT_NAME}"
          echo "Cloudflare preview token present: yes"

          node <<'NODE'
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.OWNER_CONSOLE_CF_TOKEN;
          function maskId(id) {
            return typeof id === "string" && id.length > 12 ? `${id.slice(0, 8)}...${id.slice(-4)}` : "unavailable";
          }
          function category(errors) {
            const first = Array.isArray(errors) ? errors[0] : null;
            return {
              code: first?.code ?? "unknown",
              message: first?.message ? String(first.message).replace(/[A-Za-z0-9_-]{20,}/g, "[redacted]") : "unknown",
            };
          }
          async function cloudflare(path) {
            const response = await fetch(`https://api.cloudflare.com/client/v4${path}`, {
              headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
            });
            const text = await response.text();
            let parsed;
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = { success: false, errors: [{ code: `http_${response.status}`, message: "non_json_response" }] };
            }
            return { response, parsed };
          }
          void (async () => {
            const verify = await cloudflare("/user/tokens/verify");
            if (!verify.response.ok || verify.parsed.success !== true) {
              const error = category(verify.parsed.errors);
              console.log(`Cloudflare token verify success=false code=${error.code} category=${error.message}`);
              console.error("Cloudflare token invalid or expired.");
              process.exit(1);
            }
            console.log("Cloudflare token verify success=true");
            const d1 = await cloudflare(`/accounts/${accountId}/d1/database?per_page=100`);
            if (!d1.response.ok || d1.parsed.success !== true) {
              const error = category(d1.parsed.errors);
              console.log(`Cloudflare D1 list success=false code=${error.code} category=${error.message}`);
              console.error("Cloudflare token lacks D1/account permission.");
              process.exit(1);
            }
            const databases = Array.isArray(d1.parsed.result) ? d1.parsed.result : d1.parsed.result?.databases ?? [];
            console.log("Cloudflare D1 list success=true");
            for (const database of databases) {
              console.log(`D1 database: ${database?.name ?? "unnamed"} id=${maskId(database?.uuid ?? database?.id ?? "")}`);
            }
          })().catch((error) => {
            console.error(error?.message ?? "Cloudflare auth diagnostic failed.");
            process.exit(1);
          });
          NODE

      - name: Guarded preview D1 cleanup
        if: ${{ inputs.mode == 'cleanup-preview-d1' }}
        run: |
          set -euo pipefail

          if [ "${CONFIRM_PREVIEW_DB_CLEANUP}" != "APPROVE_STALE_PREVIEW_D1_CLEANUP" ]; then
            echo "::error::confirm_preview_db_cleanup must equal APPROVE_STALE_PREVIEW_D1_CLEANUP."
            exit 1
          fi
          if [ "${PREVIEW_DB_NAME_TO_DELETE}" = "${PRODUCTION_D1_DATABASE_NAME}" ]; then
            echo "::error::Refusing cleanup for production D1 database name."
            exit 1
          fi
          if [ "${PREVIEW_DB_NAME_TO_DELETE}" = "${DETECTED_PRODUCTION_D1_DATABASE_NAME}" ]; then
            echo "::error::Refusing cleanup for detected production D1 database name."
            exit 1
          fi
          case "${PREVIEW_DB_NAME_TO_DELETE}" in
            dzn_network_db_owner_console_preview_*|dzn_network_db_discord_announcements_preview_*|dzn_network_db_discord_control_preview|dzn_network_db_discord_phase_2a_preview|dzn_network_db_server_lifecycle_preview|dzn_network_db_server_advertising_preview|dzn_network_db_dzn_pulse_preview) ;;
            *)
              echo "::error::Refusing cleanup for database name without an approved DZN preview prefix."
              exit 1
              ;;
          esac
          case "${PREVIEW_DB_NAME_TO_DELETE}" in
            *"*"*|*"?"*|*"["*|*"]"*|*" "*|*,*)
              echo "::error::Refusing wildcard, pattern, list, or space-containing cleanup target."
              exit 1
              ;;
          esac

          git fetch origin "main:refs/remotes/origin/main" "${CANDIDATE_BRANCH}:refs/remotes/origin/${CANDIDATE_BRANCH}" --depth=1
          CHECKED_OUT_HEAD="$(git rev-parse HEAD)"
          REMOTE_FEATURE_HEAD="$(git rev-parse "origin/${CANDIDATE_BRANCH}")"
          if [ "${CHECKED_OUT_HEAD}" != "${REMOTE_FEATURE_HEAD}" ]; then
            echo "::error::Checked-out cleanup branch is not the current remote feature branch head."
            exit 1
          fi

          node <<'NODE'
          const fs = require("node:fs");
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const githubToken = process.env.GITHUB_TOKEN;
          const repository = process.env.GITHUB_REPOSITORY;
          const targetName = process.env.PREVIEW_DB_NAME_TO_DELETE;
          const cleanupAction = process.env.CLEANUP_ACTION || "dry-run";
          const reviewedMask = process.env.REVIEWED_PREVIEW_DB_ID_MASK || "";
          const productionName = process.env.DETECTED_PRODUCTION_D1_DATABASE_NAME || process.env.PRODUCTION_D1_DATABASE_NAME;
          const productionId = process.env.DETECTED_PRODUCTION_D1_DATABASE_ID || "";
          const productionPagesProject = process.env.PRODUCTION_PAGES_PROJECT_NAME;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const currentRunId = String(process.env.GITHUB_RUN_ID ?? "");
          const tokenSources = [
            { name: "CLOUDFLARE_PREVIEW_D1_CLEANUP_TOKEN", token: process.env.CLOUDFLARE_PREVIEW_D1_CLEANUP_TOKEN || "" },
            { name: "CLOUDFLARE_PULSE_PREVIEW_TOKEN", token: process.env.CLOUDFLARE_PULSE_PREVIEW_TOKEN || "" },
            { name: "CLOUDFLARE_API_TOKEN", token: process.env.CLOUDFLARE_API_TOKEN || "" },
          ].filter((source) => source.token.length > 20);

          function maskId(id) {
            return typeof id === "string" && id.length > 12 ? `${id.slice(0, 8)}...${id.slice(-4)}` : "unavailable";
          }

          function sanitize(value) {
            let text = String(value ?? "");
            if (accountId) text = text.split(accountId).join("[redacted-account]");
            if (productionId) text = text.split(productionId).join("[redacted-id]");
            text = text
              .replace(/Bearer\s+[A-Za-z0-9._~+/=-]+/gi, "Bearer [redacted-token]")
              .replace(/\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b/gi, "[redacted-id]")
              .replace(/\b[0-9a-f]{32}\b/gi, "[redacted-id]")
              .replace(/[A-Za-z0-9_-]{48,}/g, "[redacted-token]")
              .replace(/(authorization|cookie|session|secret|token)\s*[:=]\s*[^\s,;]+/gi, "$1=[redacted]");
            return text.slice(0, 1000);
          }

          function fail(message) {
            console.error(sanitize(message));
            process.exit(1);
          }

          function appendSummary(lines) {
            if (summaryPath) fs.appendFileSync(summaryPath, `${lines.join("\n")}\n`);
          }

          function isApprovedPreviewName(name) {
            return /^dzn_network_db_owner_console_preview_/.test(name)
              || /^dzn_network_db_discord_announcements_preview_/.test(name)
              || name === "dzn_network_db_discord_announcements_preview"
              || name === "dzn_network_db_discord_control_preview"
              || name === "dzn_network_db_discord_phase_2a_preview"
              || name === "dzn_network_db_server_lifecycle_preview"
              || name === "dzn_network_db_server_advertising_preview"
              || name === "dzn_network_db_dzn_pulse_preview";
          }

          function databaseId(database) {
            return String(database?.uuid ?? database?.id ?? database?.database_id ?? "");
          }

          function firstCloudflareError(parsed) {
            const first = Array.isArray(parsed?.errors) ? parsed.errors[0] : null;
            return {
              code: first?.code ?? "unknown",
              message: sanitize(first?.message ?? "unknown"),
            };
          }

          function classifyCloudflareFailure(operationName, result) {
            const error = firstCloudflareError(result?.parsed);
            if (result?.status === 400 && String(error.code) === "8000024") {
              return "PREVIEW_D1_API_REQUEST_INVALID";
            }
            if (operationName.startsWith("pages") && (result?.status === 401 || result?.status === 403)) {
              return "PREVIEW_D1_PAGES_PERMISSION_MISSING";
            }
            if (operationName.startsWith("pages")) {
              return "PREVIEW_D1_PAGES_INVENTORY_UNAVAILABLE";
            }
            if (operationName.startsWith("worker")) {
              return "PREVIEW_D1_WORKER_BINDING_AUDIT_UNAVAILABLE";
            }
            return "PREVIEW_D1_BINDING_AUDIT_INCOMPLETE";
          }

          function success(result) {
            return Boolean(result?.ok && result?.parsed?.success !== false);
          }

          async function cloudflare(source, endpointCategory, apiPath, init = {}, accountScoped = true) {
            const base = accountScoped
              ? `https://api.cloudflare.com/client/v4/accounts/${accountId}`
              : "https://api.cloudflare.com/client/v4";
            const response = await fetch(`${base}${apiPath}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${source.token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const contentType = response.headers.get("content-type") || "unknown";
            const text = await response.text();
            let parsed;
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = { success: false, errors: [{ code: `http_${response.status}`, message: "non_json_response" }] };
            }
            return {
              ok: response.ok,
              status: response.status,
              parsed,
              endpointCategory,
              contentType,
              bodyLength: text.length,
            };
          }

          function printCloudflareDiagnostic(code, operationName, result, tokenSourceName) {
            const error = firstCloudflareError(result?.parsed);
            console.log(`${code}: operation=${operationName}`);
            console.log(`  endpoint_category=${result?.endpointCategory ?? "unknown"}`);
            console.log(`  http_status=${result?.status ?? "unavailable"}`);
            console.log(`  cloudflare_success=${String(result?.parsed?.success === true)}`);
            console.log(`  cloudflare_error_code=${sanitize(error.code)}`);
            console.log(`  sanitized_error=${error.message}`);
            console.log(`  token_source=${tokenSourceName}`);
            console.log(`  response_content_type=${sanitize(result?.contentType ?? "unknown")}`);
            console.log(`  response_body_length=${Number(result?.bodyLength ?? 0)}`);
          }

          function itemsFromResult(parsed, keys) {
            const result = parsed?.result;
            if (Array.isArray(result)) return result;
            for (const key of keys) {
              if (Array.isArray(result?.[key])) return result[key];
              if (Array.isArray(parsed?.[key])) return parsed[key];
            }
            return [];
          }

          function resultInfo(parsed) {
            return parsed?.result_info ?? parsed?.result?.result_info ?? {};
          }

          async function listPaginated(source, endpointCategory, basePath, keys) {
            const items = [];
            const perPage = 50;
            let lastResult = null;
            for (let page = 1; page <= 50; page += 1) {
              const result = await cloudflare(source, endpointCategory, `${basePath}?per_page=${perPage}&page=${page}`);
              lastResult = result;
              if (!success(result)) return { ok: false, items, result };
              const pageItems = itemsFromResult(result.parsed, keys);
              items.push(...pageItems);
              const info = resultInfo(result.parsed);
              const totalPages = Number(info.total_pages ?? 0);
              if (totalPages > 0 && page >= totalPages) break;
              if (pageItems.length < perPage) break;
            }
            return { ok: true, items, result: lastResult };
          }

          async function listPagesProjects(source) {
            const items = [];
            const first = await cloudflare(source, "pages-project-list", "/pages/projects");
            if (!success(first)) return { ok: false, items, result: first };
            items.push(...itemsFromResult(first.parsed, ["projects"]));
            const info = resultInfo(first.parsed);
            const currentPage = Number(info.page ?? 1);
            const totalPages = Number(info.total_pages ?? 1);
            const returnedPerPage = Number(info.per_page ?? 0);
            const safePerPage = returnedPerPage > 0 && returnedPerPage <= 20 ? returnedPerPage : 20;
            if (totalPages > currentPage) {
              for (let page = currentPage + 1; page <= totalPages && page <= 50; page += 1) {
                const result = await cloudflare(source, "pages-project-list", `/pages/projects?page=${page}&per_page=${safePerPage}`);
                if (!success(result)) return { ok: false, items, result };
                items.push(...itemsFromResult(result.parsed, ["projects"]));
              }
            }
            return { ok: true, items, result: first };
          }

          async function testTokenSource(source) {
            const capability = {
              source,
              verify: false,
              d1Read: false,
              pagesList: false,
              pagesDetail: false,
              workerBindingRead: false,
              d1DeleteEligible: source.name === "CLOUDFLARE_PREVIEW_D1_CLEANUP_TOKEN",
              failures: [],
            };

            const verify = await cloudflare(source, "token-verify", "/user/tokens/verify", {}, false);
            capability.verify = success(verify);
            if (!capability.verify) {
              capability.failures.push(["token_verify", verify]);
              return capability;
            }

            const d1 = await cloudflare(source, "d1-database-list", "/d1/database?per_page=50&page=1");
            capability.d1Read = success(d1);
            if (!capability.d1Read) capability.failures.push(["d1_database_list", d1]);

            const pages = await cloudflare(source, "pages-project-list", "/pages/projects");
            capability.pagesList = success(pages);
            if (!capability.pagesList) {
              capability.failures.push(["pages_project_list", pages]);
            } else {
              const projects = itemsFromResult(pages.parsed, ["projects"]);
              if (projects.length === 0) {
                capability.pagesDetail = true;
              } else {
                const projectName = projects.find((project) => project?.name)?.name;
                const detail = projectName
                  ? await cloudflare(source, "pages-project-detail", `/pages/projects/${encodeURIComponent(projectName)}`)
                  : { ok: true, parsed: { success: true }, status: 200, endpointCategory: "pages-project-detail", contentType: "none", bodyLength: 0 };
                capability.pagesDetail = success(detail);
                if (!capability.pagesDetail) capability.failures.push(["pages_project_detail", detail]);
              }
            }

            const workers = await cloudflare(source, "worker-script-list", "/workers/scripts?per_page=50&page=1");
            const workerListOk = success(workers);
            if (!workerListOk) {
              capability.failures.push(["worker_script_list", workers]);
            } else {
              const scripts = itemsFromResult(workers.parsed, ["scripts"]);
              if (scripts.length === 0) {
                capability.workerBindingRead = true;
              } else {
                const scriptName = scripts.find((script) => script?.id || script?.name)?.id ?? scripts.find((script) => script?.name)?.name;
                const settings = scriptName
                  ? await cloudflare(source, "worker-script-settings", `/workers/scripts/${encodeURIComponent(scriptName)}/settings`)
                  : { ok: true, parsed: { success: true }, status: 200, endpointCategory: "worker-script-settings", contentType: "none", bodyLength: 0 };
                capability.workerBindingRead = success(settings);
                if (!capability.workerBindingRead) capability.failures.push(["worker_script_settings", settings]);
              }
            }

            return capability;
          }

          async function selectCleanupToken() {
            if (tokenSources.length === 0) {
              fail("PREVIEW_D1_BINDING_AUDIT_INCOMPLETE: no Cloudflare token sources are configured for cleanup mode.");
            }
            const capabilities = [];
            for (const source of tokenSources) {
              capabilities.push(await testTokenSource(source));
            }
            console.log("Cloudflare cleanup token capability matrix");
            console.log("token source | verify | D1 read | Pages list | Pages detail | Worker binding read | D1 delete eligible source");
            const diagnosticCodes = new Set();
            for (const capability of capabilities) {
              console.log(`${capability.source.name} | ${capability.verify ? "yes" : "no"} | ${capability.d1Read ? "yes" : "no"} | ${capability.pagesList ? "yes" : "no"} | ${capability.pagesDetail ? "yes" : "no"} | ${capability.workerBindingRead ? "yes" : "no"} | ${capability.d1DeleteEligible ? "yes" : "no"}`);
              for (const [operation, result] of capability.failures) {
                const diagnosticCode = classifyCloudflareFailure(operation, result);
                diagnosticCodes.add(diagnosticCode);
                printCloudflareDiagnostic(diagnosticCode, operation, result, capability.source.name);
              }
            }
            const selected = capabilities.find((capability) => (
              capability.verify
              && capability.d1Read
              && capability.pagesList
              && capability.pagesDetail
              && capability.workerBindingRead
            ));
            if (!selected) {
              if (diagnosticCodes.has("PREVIEW_D1_API_REQUEST_INVALID")) {
                fail("PREVIEW_D1_API_REQUEST_INVALID: Cloudflare rejected a cleanup audit request as invalid. Fix the workflow request before changing token permissions.");
              }
              if (diagnosticCodes.has("PREVIEW_D1_PAGES_PERMISSION_MISSING")) {
                fail("PREVIEW_D1_PAGES_PERMISSION_MISSING: corrected Pages read request returned 401/403 for all existing token sources.");
              }
              fail("PREVIEW_D1_BINDING_AUDIT_INCOMPLETE: no existing Cloudflare token source has D1 read, Pages list/detail read, and Worker binding read. Configure CLOUDFLARE_PREVIEW_D1_CLEANUP_TOKEN with the missing read capabilities before rerunning.");
            }
            if (cleanupAction === "delete" && !selected.d1DeleteEligible) {
              fail("PREVIEW_D1_BINDING_AUDIT_INCOMPLETE: delete mode requires CLOUDFLARE_PREVIEW_D1_CLEANUP_TOKEN so D1 delete permission is explicit and reviewable.");
            }
            console.log(`Selected cleanup token source: ${selected.source.name}`);
            return selected.source;
          }

          function collectD1Bindings(configValue, context) {
            const bindings = [];
            if (!configValue || typeof configValue !== "object") return bindings;
            if (Array.isArray(configValue)) {
              for (const value of configValue) {
                const bindingName = value?.binding ?? value?.name ?? "unnamed";
                const id = String(value?.id ?? value?.database_id ?? "");
                const name = String(value?.database_name ?? value?.name ?? "");
                if (id || name) bindings.push({ ...context, binding: bindingName, id, name });
              }
              return bindings;
            }
            for (const [binding, value] of Object.entries(configValue)) {
              if (typeof value === "string") {
                bindings.push({ ...context, binding, id: value, name: "" });
                continue;
              }
              if (value && typeof value === "object") {
                bindings.push({
                  ...context,
                  binding,
                  id: String(value.id ?? value.database_id ?? ""),
                  name: String(value.database_name ?? value.name ?? ""),
                });
              }
            }
            return bindings.filter((binding) => binding.id || binding.name);
          }

          function extractPagesD1Bindings(project) {
            const bindings = [];
            for (const environment of ["production", "preview"]) {
              const config = project?.deployment_configs?.[environment] ?? {};
              bindings.push(...collectD1Bindings(config.d1_databases, {
                source: "pages",
                project: project?.name ?? "unknown",
                environment,
              }));
            }
            return bindings;
          }

          async function auditPagesBindings(source, databasesById) {
            const projectsResult = await listPagesProjects(source);
            const bindings = [];
            const projects = [];
            const incomplete = [];
            if (!projectsResult.ok) {
              printCloudflareDiagnostic(classifyCloudflareFailure("pages_project_list", projectsResult.result), "pages_project_list", projectsResult.result, source.name);
              return { complete: false, projects, bindings, incomplete: ["pages_project_list"] };
            }
            for (const project of projectsResult.items) {
              const projectName = project?.name;
              if (!projectName) continue;
              const detail = await cloudflare(source, "pages-project-detail", `/pages/projects/${encodeURIComponent(projectName)}`);
              if (!success(detail)) {
                printCloudflareDiagnostic(classifyCloudflareFailure("pages_project_detail", detail), `pages_project_detail:${projectName}`, detail, source.name);
                incomplete.push(`pages_project_detail:${projectName}`);
                continue;
              }
              const fullProject = detail.parsed?.result ?? project;
              projects.push(fullProject);
              for (const binding of extractPagesD1Bindings(fullProject)) {
                const resolvedName = binding.name || databasesById.get(binding.id) || "unknown";
                bindings.push({ ...binding, resolvedName });
              }
            }
            return { complete: incomplete.length === 0, projects, bindings, incomplete };
          }

          function extractWorkerBindingsFromValue(value, context, output = [], path = []) {
            if (!value || typeof value !== "object") return output;
            if (Array.isArray(value)) {
              value.forEach((item, index) => extractWorkerBindingsFromValue(item, context, output, [...path, String(index)]));
              return output;
            }
            const type = String(value.type ?? value.binding_type ?? "").toLowerCase();
            const pathText = path.join(".").toLowerCase();
            const hasD1Signal = type.includes("d1")
              || pathText.includes("d1")
              || Object.prototype.hasOwnProperty.call(value, "database_id")
              || Object.prototype.hasOwnProperty.call(value, "database_name");
            if (hasD1Signal) {
              const id = String(value.database_id ?? value.id ?? "");
              const name = String(value.database_name ?? value.name ?? "");
              const binding = String(value.binding ?? value.name ?? path[path.length - 1] ?? "unnamed");
              if (id || name) output.push({ ...context, binding, id, name });
            }
            for (const [key, child] of Object.entries(value)) {
              if (child && typeof child === "object") {
                extractWorkerBindingsFromValue(child, context, output, [...path, key]);
              }
            }
            return output;
          }

          function repositoryWranglerBindings() {
            const bindings = [];
            const files = fs.readdirSync(".").filter((name) => /^wrangler.*\.toml$/.test(name));
            for (const file of files) {
              const text = fs.readFileSync(file, "utf8");
              const databaseNames = [...text.matchAll(/database_name\s*=\s*"([^"]+)"/g)].map((match) => match[1]);
              const databaseIds = [...text.matchAll(/database_id\s*=\s*"([^"]+)"/g)].map((match) => match[1]);
              for (const name of databaseNames) {
                bindings.push({ source: "repository-wrangler", project: file, environment: "config", binding: "database_name", id: "", name });
              }
              for (const id of databaseIds) {
                bindings.push({ source: "repository-wrangler", project: file, environment: "config", binding: "database_id", id, name: "" });
              }
            }
            return bindings;
          }

          async function auditWorkerBindings(source, databasesById) {
            const deployed = [];
            const incomplete = [];
            const scriptsResult = await listPaginated(source, "worker-script-list", "/workers/scripts", ["scripts"]);
            if (!scriptsResult.ok) {
              printCloudflareDiagnostic("PREVIEW_D1_WORKER_BINDING_AUDIT_UNAVAILABLE", "worker_script_list", scriptsResult.result, source.name);
              return {
                complete: false,
                deployed,
                repository: repositoryWranglerBindings(),
                incomplete: ["worker_script_list"],
              };
            }
            for (const script of scriptsResult.items) {
              const scriptName = script?.id ?? script?.name;
              if (!scriptName) continue;
              const settings = await cloudflare(source, "worker-script-settings", `/workers/scripts/${encodeURIComponent(scriptName)}/settings`);
              if (!success(settings)) {
                printCloudflareDiagnostic("PREVIEW_D1_WORKER_BINDING_AUDIT_UNAVAILABLE", `worker_script_settings:${scriptName}`, settings, source.name);
                incomplete.push(`worker_script_settings:${scriptName}`);
                continue;
              }
              const bindings = extractWorkerBindingsFromValue(settings.parsed?.result ?? {}, {
                source: "worker",
                project: scriptName,
                environment: "deployed",
              });
              for (const binding of bindings) {
                deployed.push({ ...binding, resolvedName: binding.name || databasesById.get(binding.id) || "unknown" });
              }
            }
            const repository = repositoryWranglerBindings().map((binding) => ({
              ...binding,
              resolvedName: binding.name || databasesById.get(binding.id) || "unknown",
            }));
            return { complete: incomplete.length === 0, deployed, repository, incomplete };
          }

          async function github(path) {
            const response = await fetch(`https://api.github.com/repos/${repository}${path}`, {
              headers: {
                Authorization: `Bearer ${githubToken}`,
                Accept: "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            });
            const text = await response.text();
            let parsed = {};
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = {};
            }
            if (!response.ok) fail(`GitHub active-run check failed with HTTP ${response.status}.`);
            return parsed;
          }

          async function activePreviewRuns() {
            const statuses = ["queued", "in_progress"];
            const runs = [];
            for (const status of statuses) {
              const parsed = await github(`/actions/runs?status=${status}&per_page=100`);
              for (const run of parsed.workflow_runs ?? []) {
                if (String(run.id ?? "") === currentRunId) continue;
                const name = String(run.name ?? "");
                if (
                  name === "DZN Owner Console Preview"
                  || name === "DZN Discord Server Announcements Preview"
                  || name === "DZN Production Read-Only Diagnostics"
                  || /Preview/i.test(name)
                ) {
                  const serialized = JSON.stringify({
                    name,
                    display_title: run.display_title,
                    head_branch: run.head_branch,
                    path: run.path,
                    event: run.event,
                  });
                  runs.push({
                    name,
                    status: run.status,
                    event: run.event,
                    branch: run.head_branch,
                    url: run.html_url,
                    created_at: run.created_at,
                    definitelyUsesTarget: serialized.includes(targetName),
                    databaseUnknown: !serialized.includes(targetName),
                  });
                }
              }
            }
            return runs;
          }

          function bindingMatchesTarget(binding, targetId) {
            return binding.id === targetId || binding.name === targetName || binding.resolvedName === targetName;
          }

          function bindingMatchesDatabase(binding, databaseName, databaseIdValue) {
            return binding.id === databaseIdValue || binding.name === databaseName || binding.resolvedName === databaseName;
          }

          function bindingLabel(binding) {
            const id = binding.id ? maskId(binding.id) : "unavailable";
            return `source=${binding.source} project=${binding.project} environment=${binding.environment} binding=${binding.binding} database=${binding.resolvedName || binding.name || "unknown"} id=${id}`;
          }

          void (async () => {
            if (cleanupAction !== "dry-run" && cleanupAction !== "delete") {
              fail("cleanup_action must be dry-run or delete.");
            }
            if (targetName === productionName) fail("Refusing to delete production D1 database by name.");
            if (!isApprovedPreviewName(targetName)) fail("Refusing cleanup for non-preview D1 database name.");

            const selectedSource = await selectCleanupToken();
            const d1List = await listPaginated(selectedSource, "d1-database-list", "/d1/database", ["databases"]);
            if (!d1List.ok) {
              printCloudflareDiagnostic("PREVIEW_D1_BINDING_AUDIT_INCOMPLETE", "d1_database_list", d1List.result, selectedSource.name);
              fail("PREVIEW_D1_BINDING_AUDIT_INCOMPLETE: could not list D1 databases before cleanup.");
            }
            const databases = d1List.items;
            const databasesById = new Map(databases.map((database) => [databaseId(database), String(database?.name ?? "unnamed")]));
            const pagesAudit = await auditPagesBindings(selectedSource, databasesById);
            const workerAudit = await auditWorkerBindings(selectedSource, databasesById);
            const allBindings = [...pagesAudit.bindings, ...workerAudit.deployed, ...workerAudit.repository];

            console.log(`D1 inventory count: ${databases.length}`);
            for (const database of databases) {
              const name = String(database?.name ?? "unnamed");
              const id = databaseId(database);
              const masked = maskId(id);
              const classification = name === productionName || id === productionId
                ? "production-protected"
                : isApprovedPreviewName(name)
                  ? "preview-candidate"
                  : "unknown-retain";
              const created = database?.created_at ?? database?.created_on ?? "unknown";
              const modified = database?.modified_at ?? database?.modified_on ?? "unknown";
              const bindings = allBindings
                .filter((binding) => bindingMatchesDatabase(binding, name, id))
                .map((binding) => `${binding.source}:${binding.project}/${binding.environment}/${binding.binding}`)
                .join(", ") || "none";
              console.log(`D1 inventory: name=${name} id=${masked} classification=${classification} created=${created} modified=${modified} pages_bindings=${bindings}`);
            }

            console.log(`Pages projects inventoried: ${pagesAudit.projects.length}`);
            for (const binding of pagesAudit.bindings) {
              console.log(`Pages D1 binding: ${bindingLabel(binding)}`);
            }
            console.log(`Deployed Worker D1 bindings inventoried: ${workerAudit.deployed.length}`);
            for (const binding of workerAudit.deployed) {
              console.log(`Worker D1 binding: ${bindingLabel(binding)}`);
            }
            console.log(`Repository Wrangler D1 bindings inventoried: ${workerAudit.repository.length}`);
            for (const binding of workerAudit.repository) {
              console.log(`Repository Wrangler D1 binding: ${bindingLabel(binding)}`);
            }

            const target = databases.find((database) => database?.name === targetName);
            if (!target) {
              console.log(`Preview D1 cleanup target not found: ${targetName}`);
              if (cleanupAction === "delete") fail("Cannot delete a preview D1 database that no longer exists.");
              appendSummary([
                "## Preview D1 Cleanup Dry Run",
                "",
                `- Target: ${targetName}`,
                "- Exists: no",
                "- Deleted: no",
                "- Binding audit completed: yes",
              ]);
              return;
            }

            const targetId = databaseId(target);
            const targetMask = maskId(targetId);
            if (!targetId) fail("Cleanup target has no resolvable D1 database ID.");
            if (targetId === productionId) fail("Refusing to delete production D1 database by ID.");
            if (targetName === productionName) fail("Refusing to delete production D1 database by detected name.");
            if (cleanupAction === "delete" && reviewedMask !== targetMask) {
              fail("reviewed_preview_db_id_mask does not match the current cleanup target ID mask.");
            }

            const targetPagesBindings = pagesAudit.bindings.filter((binding) => bindingMatchesTarget(binding, targetId));
            const targetWorkerBindings = workerAudit.deployed.filter((binding) => bindingMatchesTarget(binding, targetId));
            const targetRepositoryBindings = workerAudit.repository.filter((binding) => bindingMatchesTarget(binding, targetId));
            const productionBindings = targetPagesBindings.filter((binding) => binding.project === productionPagesProject || binding.environment === "production");
            const activeRuns = await activePreviewRuns();
            const activeTargetRuns = activeRuns.filter((run) => run.definitelyUsesTarget);
            const uncertainActivePreviewRuns = activeRuns.filter((run) => run.databaseUnknown);
            const blockedReasons = [];
            if (!pagesAudit.complete) blockedReasons.push("Pages binding audit incomplete");
            if (!workerAudit.complete) blockedReasons.push("Worker binding audit incomplete");
            if (productionBindings.length > 0) blockedReasons.push("target is bound to the production Pages project");
            if (targetPagesBindings.length > 0) blockedReasons.push("target remains bound to Pages");
            if (targetWorkerBindings.length > 0) blockedReasons.push("target remains bound to a deployed Worker");
            if (targetRepositoryBindings.length > 0) blockedReasons.push("target remains referenced by repository Wrangler config");
            if (activeTargetRuns.length > 0) blockedReasons.push("active preview workflow is definitely using target");
            if (uncertainActivePreviewRuns.length > 0) blockedReasons.push("active preview workflow database use is uncertain");

            console.log(`Preview D1 cleanup target: ${targetName} id=${targetMask}`);
            console.log(`Cleanup action: ${cleanupAction}`);
            console.log(`Target exists: yes`);
            console.log(`Target created: ${target.created_at ?? target.created_on ?? "unknown"}`);
            console.log(`Target modified: ${target.modified_at ?? target.modified_on ?? "unknown"}`);
            console.log(`Associated completed preview: ${targetName.endsWith("_alignment_ee8c812") ? "main-runtime alignment preview ee8c812" : "unknown"}`);
            console.log(`Pages bindings for target: ${targetPagesBindings.length}`);
            for (const binding of targetPagesBindings) console.log(`Target Pages binding: ${bindingLabel(binding)}`);
            console.log(`Worker bindings for target: ${targetWorkerBindings.length}`);
            for (const binding of targetWorkerBindings) console.log(`Target Worker binding: ${bindingLabel(binding)}`);
            console.log(`Repository Wrangler references for target: ${targetRepositoryBindings.length}`);
            for (const binding of targetRepositoryBindings) console.log(`Target repository Wrangler reference: ${bindingLabel(binding)}`);
            console.log(`Active preview workflow runs: ${activeRuns.length}`);
            console.log(`Active runs definitely using target: ${activeTargetRuns.length}`);
            console.log(`Active runs with unknown preview database: ${uncertainActivePreviewRuns.length}`);
            for (const run of activeRuns.slice(0, 10)) {
              console.log(`Active preview run: ${run.name} status=${run.status} branch=${run.branch ?? "unknown"} target=${run.definitelyUsesTarget ? "definite" : "unknown"} created=${run.created_at ?? "unknown"} url=${run.url ?? "unknown"}`);
            }

            const deletionStatus = blockedReasons.length > 0
              ? `BLOCKED FOR DELETION: ${blockedReasons.join("; ")}`
              : "ELIGIBLE FOR EXPLICIT DELETION APPROVAL: no bindings and no active use detected";
            console.log(deletionStatus);
            appendSummary([
              "## Preview D1 Cleanup",
              "",
              `- Target database: ${targetName}`,
              `- Target database ID: ${targetMask}`,
              `- Cleanup action: ${cleanupAction}`,
              `- Selected token source: ${selectedSource.name}`,
              `- Target exists: yes`,
              `- Production name check: passed`,
              `- Production ID check: passed`,
              `- Pages audit complete: ${pagesAudit.complete ? "yes" : "no"}`,
              `- Worker audit complete: ${workerAudit.complete ? "yes" : "no"}`,
              `- Pages bindings for target: ${targetPagesBindings.length}`,
              `- Worker bindings for target: ${targetWorkerBindings.length}`,
              `- Repository Wrangler references for target: ${targetRepositoryBindings.length}`,
              `- Active preview runs definitely using target: ${activeTargetRuns.length}`,
              `- Active preview runs with unknown database: ${uncertainActivePreviewRuns.length}`,
              `- Deletion status: ${deletionStatus}`,
              "- Dry-run deletes databases: no",
              "- Pages binding changes: not performed",
              "- Full D1 IDs and tokens printed: no",
            ]);

            if (cleanupAction === "dry-run") {
              console.log("Preview D1 cleanup dry-run completed. No database was deleted.");
              return;
            }

            if (blockedReasons.length > 0) {
              fail(`PREVIEW_D1_BINDING_AUDIT_INCOMPLETE: delete mode blocked: ${blockedReasons.join("; ")}.`);
            }
            console.log(`Final sanitized deletion summary: database=${targetName} id=${targetMask} token_source=${selectedSource.name}`);
            const deleted = await cloudflare(selectedSource, "d1-database-delete", `/d1/database/${encodeURIComponent(targetId)}`, { method: "DELETE" });
            if (!success(deleted)) {
              printCloudflareDiagnostic("PREVIEW_D1_BINDING_AUDIT_INCOMPLETE", "d1_database_delete", deleted, selectedSource.name);
              fail("Cloudflare preview D1 deletion failed.");
            }
            console.log(`Preview D1 deletion result: success database=${targetName} id=${targetMask}`);
            appendSummary(["", "- Deletion result: success"]);
          })().catch((error) => fail(error instanceof Error ? error.message : String(error)));
          NODE

      - name: Guarded Discord preview D1 rebind
        if: ${{ inputs.mode == 'rebind-preview-d1' }}
        run: |
          set -euo pipefail

          if [ "${CONFIRM_PREVIEW_D1_REBIND}" != "APPROVE_PREVIEW_D1_REBIND" ]; then
            echo "::error::confirm_preview_d1_rebind must equal APPROVE_PREVIEW_D1_REBIND."
            exit 1
          fi
          case "${REBIND_ACTION}" in
            dry-run|apply) ;;
            *)
              echo "::error::rebind_action must be dry-run or apply."
              exit 1
              ;;
          esac

          node <<'NODE'
          const fs = require("node:fs");
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const githubToken = process.env.GITHUB_TOKEN;
          const repository = process.env.GITHUB_REPOSITORY;
          const rebindAction = process.env.REBIND_ACTION || "dry-run";
          const fixedProject = process.env.REBIND_PREVIEW_PROJECT_NAME;
          const oldName = process.env.REBIND_OLD_PREVIEW_DB_NAME;
          const expectedOldMask = process.env.REBIND_OLD_PREVIEW_DB_ID_MASK;
          const replacementName = process.env.REBIND_REPLACEMENT_PREVIEW_DB_NAME;
          const productionName = process.env.DETECTED_PRODUCTION_D1_DATABASE_NAME || process.env.PRODUCTION_D1_DATABASE_NAME;
          const productionId = process.env.DETECTED_PRODUCTION_D1_DATABASE_ID || "";
          const productionPagesProject = process.env.PRODUCTION_PAGES_PROJECT_NAME;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const currentRunId = String(process.env.GITHUB_RUN_ID ?? "");
          const tokenSources = [
            { name: "CLOUDFLARE_PREVIEW_D1_CLEANUP_TOKEN", token: process.env.CLOUDFLARE_PREVIEW_D1_CLEANUP_TOKEN || "" },
            { name: "CLOUDFLARE_PULSE_PREVIEW_TOKEN", token: process.env.CLOUDFLARE_PULSE_PREVIEW_TOKEN || "" },
            { name: "CLOUDFLARE_API_TOKEN", token: process.env.CLOUDFLARE_API_TOKEN || "" },
          ].filter((source) => source.token.length > 20);

          function maskId(id) {
            return typeof id === "string" && id.length > 12 ? `${id.slice(0, 8)}...${id.slice(-4)}` : "unavailable";
          }

          function sanitize(value) {
            let text = String(value ?? "");
            for (const sensitive of [accountId, productionId]) {
              if (sensitive) text = text.split(sensitive).join("[redacted-id]");
            }
            text = text
              .replace(/Bearer\s+[A-Za-z0-9._~+/=-]+/gi, "Bearer [redacted-token]")
              .replace(/\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b/gi, "[redacted-id]")
              .replace(/\b[0-9a-f]{32}\b/gi, "[redacted-id]")
              .replace(/[A-Za-z0-9_-]{48,}/g, "[redacted-token]")
              .replace(/(authorization|cookie|session|secret|token)\s*[:=]\s*[^\s,;]+/gi, "$1=[redacted]");
            return text.slice(0, 1000);
          }

          function fail(message) {
            console.error(sanitize(message));
            process.exit(1);
          }

          function appendSummary(lines) {
            if (summaryPath) fs.appendFileSync(summaryPath, `${lines.join("\n")}\n`);
          }

          function databaseId(database) {
            return String(database?.uuid ?? database?.id ?? database?.database_id ?? "");
          }

          function firstCloudflareError(parsed) {
            const first = Array.isArray(parsed?.errors) ? parsed.errors[0] : null;
            return {
              code: first?.code ?? "unknown",
              message: sanitize(first?.message ?? "unknown"),
            };
          }

          function success(result) {
            return Boolean(result?.ok && result?.parsed?.success !== false);
          }

          async function cloudflare(source, endpointCategory, apiPath, init = {}, accountScoped = true) {
            const base = accountScoped
              ? `https://api.cloudflare.com/client/v4/accounts/${accountId}`
              : "https://api.cloudflare.com/client/v4";
            const response = await fetch(`${base}${apiPath}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${source.token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const contentType = response.headers.get("content-type") || "unknown";
            const text = await response.text();
            let parsed;
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = { success: false, errors: [{ code: `http_${response.status}`, message: "non_json_response" }] };
            }
            return { ok: response.ok, status: response.status, parsed, endpointCategory, contentType, bodyLength: text.length };
          }

          function printCloudflareDiagnostic(code, operationName, result, tokenSourceName) {
            const error = firstCloudflareError(result?.parsed);
            console.log(`${code}: operation=${operationName}`);
            console.log(`  endpoint_category=${result?.endpointCategory ?? "unknown"}`);
            console.log(`  http_status=${result?.status ?? "unavailable"}`);
            console.log(`  cloudflare_success=${String(result?.parsed?.success === true)}`);
            console.log(`  cloudflare_error_code=${sanitize(error.code)}`);
            console.log(`  sanitized_error=${error.message}`);
            console.log(`  token_source=${tokenSourceName}`);
            console.log(`  response_content_type=${sanitize(result?.contentType ?? "unknown")}`);
            console.log(`  response_body_length=${Number(result?.bodyLength ?? 0)}`);
          }

          function itemsFromResult(parsed, keys) {
            const result = parsed?.result;
            if (Array.isArray(result)) return result;
            for (const key of keys) {
              if (Array.isArray(result?.[key])) return result[key];
              if (Array.isArray(parsed?.[key])) return parsed[key];
            }
            return [];
          }

          function resultInfo(parsed) {
            return parsed?.result_info ?? parsed?.result?.result_info ?? {};
          }

          async function listPaginated(source, endpointCategory, basePath, keys) {
            const items = [];
            const perPage = 50;
            let lastResult = null;
            for (let page = 1; page <= 50; page += 1) {
              const result = await cloudflare(source, endpointCategory, `${basePath}?per_page=${perPage}&page=${page}`);
              lastResult = result;
              if (!success(result)) return { ok: false, items, result };
              const pageItems = itemsFromResult(result.parsed, keys);
              items.push(...pageItems);
              const info = resultInfo(result.parsed);
              const totalPages = Number(info.total_pages ?? 0);
              if (totalPages > 0 && page >= totalPages) break;
              if (pageItems.length < perPage) break;
            }
            return { ok: true, items, result: lastResult };
          }

          async function listPagesProjects(source) {
            const items = [];
            const first = await cloudflare(source, "pages-project-list", "/pages/projects");
            if (!success(first)) return { ok: false, items, result: first };
            items.push(...itemsFromResult(first.parsed, ["projects"]));
            const info = resultInfo(first.parsed);
            const currentPage = Number(info.page ?? 1);
            const totalPages = Number(info.total_pages ?? 1);
            const returnedPerPage = Number(info.per_page ?? 0);
            const safePerPage = returnedPerPage > 0 && returnedPerPage <= 20 ? returnedPerPage : 20;
            for (let page = currentPage + 1; page <= totalPages && page <= 50; page += 1) {
              const result = await cloudflare(source, "pages-project-list", `/pages/projects?page=${page}&per_page=${safePerPage}`);
              if (!success(result)) return { ok: false, items, result };
              items.push(...itemsFromResult(result.parsed, ["projects"]));
            }
            return { ok: true, items, result: first };
          }

          async function testTokenSource(source) {
            const capability = { source, verify: false, d1Read: false, pagesList: false, pagesDetail: false, workerBindingRead: false, failures: [] };
            const verify = await cloudflare(source, "token-verify", "/user/tokens/verify", {}, false);
            capability.verify = success(verify);
            if (!capability.verify) {
              capability.failures.push(["token_verify", verify]);
              return capability;
            }
            const d1 = await cloudflare(source, "d1-database-list", "/d1/database?per_page=50&page=1");
            capability.d1Read = success(d1);
            if (!capability.d1Read) capability.failures.push(["d1_database_list", d1]);
            const pages = await cloudflare(source, "pages-project-list", "/pages/projects");
            capability.pagesList = success(pages);
            if (!capability.pagesList) {
              capability.failures.push(["pages_project_list", pages]);
            } else {
              const projects = itemsFromResult(pages.parsed, ["projects"]);
              const projectName = projects.find((project) => project?.name)?.name;
              const detail = projectName
                ? await cloudflare(source, "pages-project-detail", `/pages/projects/${encodeURIComponent(projectName)}`)
                : { ok: true, parsed: { success: true }, status: 200, endpointCategory: "pages-project-detail", contentType: "none", bodyLength: 0 };
              capability.pagesDetail = success(detail);
              if (!capability.pagesDetail) capability.failures.push(["pages_project_detail", detail]);
            }
            const workers = await cloudflare(source, "worker-script-list", "/workers/scripts?per_page=50&page=1");
            if (!success(workers)) {
              capability.failures.push(["worker_script_list", workers]);
            } else {
              const scripts = itemsFromResult(workers.parsed, ["scripts"]);
              const scriptName = scripts.find((script) => script?.id || script?.name)?.id ?? scripts.find((script) => script?.name)?.name;
              const settings = scriptName
                ? await cloudflare(source, "worker-script-settings", `/workers/scripts/${encodeURIComponent(scriptName)}/settings`)
                : { ok: true, parsed: { success: true }, status: 200, endpointCategory: "worker-script-settings", contentType: "none", bodyLength: 0 };
              capability.workerBindingRead = success(settings);
              if (!capability.workerBindingRead) capability.failures.push(["worker_script_settings", settings]);
            }
            return capability;
          }

          async function selectRebindToken() {
            if (tokenSources.length === 0) fail("PREVIEW_D1_REBIND_AUDIT_INCOMPLETE: no Cloudflare token sources are configured for rebind mode.");
            const capabilities = [];
            for (const source of tokenSources) capabilities.push(await testTokenSource(source));
            console.log("Cloudflare preview D1 rebind token capability matrix");
            console.log("token source | verify | D1 read | Pages list | Pages detail | Worker binding read");
            for (const capability of capabilities) {
              console.log(`${capability.source.name} | ${capability.verify ? "yes" : "no"} | ${capability.d1Read ? "yes" : "no"} | ${capability.pagesList ? "yes" : "no"} | ${capability.pagesDetail ? "yes" : "no"} | ${capability.workerBindingRead ? "yes" : "no"}`);
              for (const [operation, result] of capability.failures) {
                printCloudflareDiagnostic("PREVIEW_D1_REBIND_AUDIT_INCOMPLETE", operation, result, capability.source.name);
              }
            }
            const selected = capabilities.find((capability) => capability.verify && capability.d1Read && capability.pagesList && capability.pagesDetail && capability.workerBindingRead);
            if (!selected) fail("PREVIEW_D1_REBIND_AUDIT_INCOMPLETE: no existing token has D1 read, Pages list/detail read, and Worker binding read.");
            console.log(`Selected rebind token source: ${selected.source.name}`);
            return selected.source;
          }

          function collectD1Bindings(configValue, context) {
            const bindings = [];
            if (!configValue || typeof configValue !== "object") return bindings;
            if (Array.isArray(configValue)) {
              for (const value of configValue) {
                const bindingName = value?.binding ?? value?.name ?? "unnamed";
                const id = String(value?.id ?? value?.database_id ?? "");
                const name = String(value?.database_name ?? value?.name ?? "");
                if (id || name) bindings.push({ ...context, binding: bindingName, id, name });
              }
              return bindings;
            }
            for (const [binding, value] of Object.entries(configValue)) {
              if (typeof value === "string") {
                bindings.push({ ...context, binding, id: value, name: "" });
              } else if (value && typeof value === "object") {
                bindings.push({
                  ...context,
                  binding,
                  id: String(value.id ?? value.database_id ?? ""),
                  name: String(value.database_name ?? value.name ?? ""),
                });
              }
            }
            return bindings.filter((binding) => binding.id || binding.name);
          }

          function extractPagesD1Bindings(project) {
            const bindings = [];
            for (const environment of ["production", "preview"]) {
              const config = project?.deployment_configs?.[environment] ?? {};
              bindings.push(...collectD1Bindings(config.d1_databases, {
                source: "pages",
                project: project?.name ?? "unknown",
                environment,
              }));
            }
            return bindings;
          }

          async function auditPagesBindings(source, databasesById) {
            const projectsResult = await listPagesProjects(source);
            const bindings = [];
            const projects = [];
            const incomplete = [];
            if (!projectsResult.ok) {
              printCloudflareDiagnostic("PREVIEW_D1_REBIND_AUDIT_INCOMPLETE", "pages_project_list", projectsResult.result, source.name);
              return { complete: false, projects, bindings, incomplete: ["pages_project_list"] };
            }
            for (const project of projectsResult.items) {
              const projectName = project?.name;
              if (!projectName) continue;
              const detail = await cloudflare(source, "pages-project-detail", `/pages/projects/${encodeURIComponent(projectName)}`);
              if (!success(detail)) {
                printCloudflareDiagnostic("PREVIEW_D1_REBIND_AUDIT_INCOMPLETE", `pages_project_detail:${projectName}`, detail, source.name);
                incomplete.push(`pages_project_detail:${projectName}`);
                continue;
              }
              const fullProject = detail.parsed?.result ?? project;
              projects.push(fullProject);
              for (const binding of extractPagesD1Bindings(fullProject)) {
                const resolvedName = binding.name || databasesById.get(binding.id) || "unknown";
                bindings.push({ ...binding, resolvedName });
              }
            }
            return { complete: incomplete.length === 0, projects, bindings, incomplete };
          }

          function extractWorkerBindingsFromValue(value, context, output = [], path = []) {
            if (!value || typeof value !== "object") return output;
            if (Array.isArray(value)) {
              value.forEach((item, index) => extractWorkerBindingsFromValue(item, context, output, [...path, String(index)]));
              return output;
            }
            const type = String(value.type ?? value.binding_type ?? "").toLowerCase();
            const pathText = path.join(".").toLowerCase();
            const hasD1Signal = type.includes("d1")
              || pathText.includes("d1")
              || Object.prototype.hasOwnProperty.call(value, "database_id")
              || Object.prototype.hasOwnProperty.call(value, "database_name");
            if (hasD1Signal) {
              const id = String(value.database_id ?? value.id ?? "");
              const name = String(value.database_name ?? value.name ?? "");
              const binding = String(value.binding ?? value.name ?? path[path.length - 1] ?? "unnamed");
              if (id || name) output.push({ ...context, binding, id, name });
            }
            for (const [key, child] of Object.entries(value)) {
              if (child && typeof child === "object") extractWorkerBindingsFromValue(child, context, output, [...path, key]);
            }
            return output;
          }

          function repositoryWranglerBindings() {
            const bindings = [];
            const files = fs.readdirSync(".").filter((name) => /^wrangler.*\.toml$/.test(name));
            for (const file of files) {
              const text = fs.readFileSync(file, "utf8");
              for (const match of text.matchAll(/database_name\s*=\s*"([^"]+)"/g)) {
                bindings.push({ source: "repository-wrangler", project: file, environment: "config", binding: "database_name", id: "", name: match[1] });
              }
              for (const match of text.matchAll(/database_id\s*=\s*"([^"]+)"/g)) {
                bindings.push({ source: "repository-wrangler", project: file, environment: "config", binding: "database_id", id: match[1], name: "" });
              }
            }
            return bindings;
          }

          async function auditWorkerBindings(source, databasesById) {
            const deployed = [];
            const incomplete = [];
            const scriptsResult = await listPaginated(source, "worker-script-list", "/workers/scripts", ["scripts"]);
            if (!scriptsResult.ok) {
              printCloudflareDiagnostic("PREVIEW_D1_REBIND_AUDIT_INCOMPLETE", "worker_script_list", scriptsResult.result, source.name);
              return { complete: false, deployed, repository: repositoryWranglerBindings(), incomplete: ["worker_script_list"] };
            }
            for (const script of scriptsResult.items) {
              const scriptName = script?.id ?? script?.name;
              if (!scriptName) continue;
              const settings = await cloudflare(source, "worker-script-settings", `/workers/scripts/${encodeURIComponent(scriptName)}/settings`);
              if (!success(settings)) {
                printCloudflareDiagnostic("PREVIEW_D1_REBIND_AUDIT_INCOMPLETE", `worker_script_settings:${scriptName}`, settings, source.name);
                incomplete.push(`worker_script_settings:${scriptName}`);
                continue;
              }
              const bindings = extractWorkerBindingsFromValue(settings.parsed?.result ?? {}, { source: "worker", project: scriptName, environment: "deployed" });
              for (const binding of bindings) deployed.push({ ...binding, resolvedName: binding.name || databasesById.get(binding.id) || "unknown" });
            }
            const repository = repositoryWranglerBindings().map((binding) => ({
              ...binding,
              resolvedName: binding.name || databasesById.get(binding.id) || "unknown",
            }));
            return { complete: incomplete.length === 0, deployed, repository, incomplete };
          }

          async function github(path) {
            const response = await fetch(`https://api.github.com/repos/${repository}${path}`, {
              headers: {
                Authorization: `Bearer ${githubToken}`,
                Accept: "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            });
            const text = await response.text();
            let parsed = {};
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = {};
            }
            if (!response.ok) fail(`GitHub active-run check failed with HTTP ${response.status}.`);
            return parsed;
          }

          async function activePreviewRuns() {
            const statuses = ["queued", "in_progress"];
            const runs = [];
            for (const status of statuses) {
              const parsed = await github(`/actions/runs?status=${status}&per_page=100`);
              for (const run of parsed.workflow_runs ?? []) {
                if (String(run.id ?? "") === currentRunId) continue;
                const name = String(run.name ?? "");
                if (name === "DZN Owner Console Preview" || name === "DZN Discord Server Announcements Preview" || /Preview/i.test(name)) {
                  const serialized = JSON.stringify({
                    name,
                    display_title: run.display_title,
                    head_branch: run.head_branch,
                    path: run.path,
                    event: run.event,
                  });
                  runs.push({
                    name,
                    status: run.status,
                    event: run.event,
                    branch: run.head_branch,
                    url: run.html_url,
                    created_at: run.created_at,
                    usesOld: serialized.includes(oldName),
                    usesReplacement: serialized.includes(replacementName),
                    databaseUnknown: !serialized.includes(oldName) && !serialized.includes(replacementName),
                  });
                }
              }
            }
            return runs;
          }

          function bindingMatchesDatabase(binding, databaseName, databaseIdValue) {
            return binding.id === databaseIdValue || binding.name === databaseName || binding.resolvedName === databaseName;
          }

          function bindingLabel(binding) {
            const id = binding.id ? maskId(binding.id) : "unavailable";
            return `source=${binding.source} project=${binding.project} environment=${binding.environment} binding=${binding.binding} database=${binding.resolvedName || binding.name || "unknown"} id=${id}`;
          }

          async function d1Query(source, databaseIdValue, sql) {
            if (!/^\s*(SELECT|PRAGMA)\b/i.test(sql)) fail("Refusing non-read-only D1 query in rebind audit.");
            const result = await cloudflare(source, "d1-database-query", `/d1/database/${encodeURIComponent(databaseIdValue)}/query`, {
              method: "POST",
              body: JSON.stringify({ sql }),
            });
            if (!success(result)) {
              printCloudflareDiagnostic("PREVIEW_D1_REBIND_AUDIT_INCOMPLETE", "d1_database_query", result, source.name);
              throw new Error("Read-only replacement D1 schema query failed.");
            }
            const payload = Array.isArray(result.parsed?.result) ? result.parsed.result : [result.parsed?.result];
            return payload.flatMap((item) => item?.results ?? []);
          }

          async function auditReplacementSchema(source, replacementId) {
            const requiredColumns = [
              "id",
              "server_id",
              "event_type",
              "channel_id",
              "message_id",
              "thread_id",
              "dedupe_key",
              "status",
              "failure_reason",
              "created_at",
              "updated_at",
            ];
            const requiredIndexes = [
              "idx_discord_announcement_posts_server_event_created",
              "idx_discord_announcement_posts_event_status_created",
              "idx_discord_announcement_posts_status_updated",
            ];
            const blocked = [];
            let migrations = [];
            try {
              migrations = (await d1Query(source, replacementId, "SELECT name FROM d1_migrations ORDER BY id;")).map((row) => String(row.name ?? "")).filter(Boolean);
            } catch (error) {
              blocked.push("d1_migrations table could not be queried");
            }
            const migration0056Applied = migrations.includes("0056_discord_server_announcements.sql");
            if (!migration0056Applied) blocked.push("migration 0056 is not applied");

            const tableRows = await d1Query(source, replacementId, "PRAGMA table_info(discord_announcement_posts);");
            const columns = new Set(tableRows.map((row) => String(row.name ?? "")).filter(Boolean));
            const missingColumns = requiredColumns.filter((column) => !columns.has(column));
            if (missingColumns.length > 0) blocked.push(`discord_announcement_posts missing columns: ${missingColumns.join(", ")}`);

            let indexes = [];
            let rowCount = null;
            if (missingColumns.length === 0) {
              indexes = (await d1Query(source, replacementId, "SELECT name FROM sqlite_master WHERE type = 'index' AND name LIKE 'idx_discord_announcement_posts_%' ORDER BY name;")).map((row) => String(row.name ?? "")).filter(Boolean);
              const missingIndexes = requiredIndexes.filter((indexName) => !indexes.includes(indexName));
              if (missingIndexes.length > 0) blocked.push(`discord_announcement_posts missing indexes: ${missingIndexes.join(", ")}`);
              const rowCountRows = await d1Query(source, replacementId, "SELECT COUNT(*) AS row_count FROM discord_announcement_posts;");
              rowCount = Number(rowCountRows[0]?.row_count ?? NaN);
              if (!Number.isFinite(rowCount)) blocked.push("discord_announcement_posts row count could not be read");
              if (Number.isFinite(rowCount) && rowCount !== 0) blocked.push(`discord_announcement_posts row count is ${rowCount}, expected 0`);
            }
            const foreignKeyRows = await d1Query(source, replacementId, "PRAGMA foreign_key_check;");
            if (foreignKeyRows.length > 0) blocked.push(`foreign_key_check returned ${foreignKeyRows.length} rows`);
            return {
              healthy: blocked.length === 0,
              blocked,
              migrations,
              migration0056Applied,
              columns: [...columns],
              indexes,
              rowCount,
              foreignKeyRows,
              requiredIndexes,
            };
          }

          function envValue(config, key) {
            const value = config?.env_vars?.[key];
            if (value && typeof value === "object") return String(value.value ?? "");
            return String(value ?? "");
          }

          function assertDiscordFlagsFalse(project) {
            for (const environment of ["production", "preview"]) {
              const config = project?.deployment_configs?.[environment] ?? {};
              if (envValue(config, "DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED") !== "false") {
                fail(`Discord server announcements flag is not false in ${fixedProject}/${environment}.`);
              }
              if (envValue(config, "DZN_DISCORD_NOTIFICATIONS_ENABLED") !== "false") {
                fail(`Discord notifications flag is not false in ${fixedProject}/${environment}.`);
              }
            }
          }

          function mergeD1BindingOnly(config, replacementId) {
            const currentD1 = config?.d1_databases && typeof config.d1_databases === "object" ? config.d1_databases : {};
            return {
              ...config,
              d1_databases: {
                ...currentD1,
                DB: { id: replacementId },
              },
            };
          }

          function projectD1Bindings(project) {
            return extractPagesD1Bindings(project).map((binding) => ({
              ...binding,
              resolvedName: binding.name,
            }));
          }

          void (async () => {
            if (rebindAction !== "dry-run" && rebindAction !== "apply") fail("rebind_action must be dry-run or apply.");
            if (fixedProject !== "dzn-network-discord-announcements-preview") fail("Rebind project constant mismatch.");
            if (oldName !== "dzn_network_db_discord_announcements_preview_alignment_ee8c812") fail("Old preview database constant mismatch.");
            if (replacementName !== "dzn_network_db_discord_announcements_preview") fail("Replacement preview database constant mismatch.");
            if (fixedProject === productionPagesProject) fail("Refusing to rebind production Pages project.");
            if (oldName === productionName || replacementName === productionName) fail("Refusing to rebind a production D1 database name.");

            const selectedSource = await selectRebindToken();
            const d1List = await listPaginated(selectedSource, "d1-database-list", "/d1/database", ["databases"]);
            if (!d1List.ok) {
              printCloudflareDiagnostic("PREVIEW_D1_REBIND_AUDIT_INCOMPLETE", "d1_database_list", d1List.result, selectedSource.name);
              fail("PREVIEW_D1_REBIND_AUDIT_INCOMPLETE: could not list D1 databases before rebind.");
            }
            const databases = d1List.items;
            const databasesById = new Map(databases.map((database) => [databaseId(database), String(database?.name ?? "unnamed")]));
            const oldDatabase = databases.find((database) => database?.name === oldName);
            const replacementDatabase = databases.find((database) => database?.name === replacementName);
            if (!oldDatabase) fail("BLOCKED FOR PREVIEW D1 REBIND: old stale preview database no longer exists.");
            if (!replacementDatabase) fail("BLOCKED FOR PREVIEW D1 REBIND: replacement preview database does not exist.");
            const oldId = databaseId(oldDatabase);
            const replacementId = databaseId(replacementDatabase);
            const oldMask = maskId(oldId);
            const replacementMask = maskId(replacementId);
            if (oldMask !== expectedOldMask) fail(`BLOCKED FOR PREVIEW D1 REBIND: old database masked ID changed; expected ${expectedOldMask}, got ${oldMask}.`);
            if (oldId === productionId || replacementId === productionId) fail("BLOCKED FOR PREVIEW D1 REBIND: production D1 ID detected.");

            const pagesAudit = await auditPagesBindings(selectedSource, databasesById);
            const workerAudit = await auditWorkerBindings(selectedSource, databasesById);
            const fixedProjectRecord = pagesAudit.projects.find((project) => project?.name === fixedProject);
            if (!fixedProjectRecord) fail("BLOCKED FOR PREVIEW D1 REBIND: fixed preview Pages project was not found.");
            assertDiscordFlagsFalse(fixedProjectRecord);

            const oldPagesBindings = pagesAudit.bindings.filter((binding) => bindingMatchesDatabase(binding, oldName, oldId));
            const replacementPagesBindings = pagesAudit.bindings.filter((binding) => bindingMatchesDatabase(binding, replacementName, replacementId));
            const oldWorkerBindings = workerAudit.deployed.filter((binding) => bindingMatchesDatabase(binding, oldName, oldId));
            const replacementWorkerBindings = workerAudit.deployed.filter((binding) => bindingMatchesDatabase(binding, replacementName, replacementId));
            const oldRepositoryBindings = workerAudit.repository.filter((binding) => bindingMatchesDatabase(binding, oldName, oldId));
            const replacementRepositoryBindings = workerAudit.repository.filter((binding) => bindingMatchesDatabase(binding, replacementName, replacementId));
            const activeRuns = await activePreviewRuns();
            const activeOldRuns = activeRuns.filter((run) => run.usesOld);
            const activeReplacementRuns = activeRuns.filter((run) => run.usesReplacement);
            const uncertainActiveRuns = activeRuns.filter((run) => run.databaseUnknown);
            const schema = await auditReplacementSchema(selectedSource, replacementId);

            const oldProductionBinding = oldPagesBindings.find((binding) => binding.project === fixedProject && binding.environment === "production" && binding.binding === "DB");
            const oldPreviewBinding = oldPagesBindings.find((binding) => binding.project === fixedProject && binding.environment === "preview" && binding.binding === "DB");
            const blockedReasons = [];
            if (!pagesAudit.complete) blockedReasons.push("Pages binding audit incomplete");
            if (!workerAudit.complete) blockedReasons.push("Worker binding audit incomplete");
            if (oldPagesBindings.length !== 2) blockedReasons.push(`old database Pages binding count is ${oldPagesBindings.length}, expected 2`);
            if (!oldProductionBinding) blockedReasons.push("old database production environment DB binding missing on preview project");
            if (!oldPreviewBinding) blockedReasons.push("old database preview environment DB binding missing on preview project");
            if (oldPagesBindings.some((binding) => binding.project !== fixedProject)) blockedReasons.push("old database is bound outside the fixed preview project");
            if (oldPagesBindings.some((binding) => binding.project === productionPagesProject)) blockedReasons.push("old database is bound to real production Pages project");
            if (replacementPagesBindings.some((binding) => binding.project === productionPagesProject)) blockedReasons.push("replacement database is bound to real production Pages project");
            if (replacementPagesBindings.length > 0) blockedReasons.push(`replacement database already has ${replacementPagesBindings.length} Pages bindings`);
            if (oldWorkerBindings.length > 0) blockedReasons.push("old database has deployed Worker bindings");
            if (replacementWorkerBindings.length > 0) blockedReasons.push("replacement database has deployed Worker bindings");
            if (oldRepositoryBindings.length > 0) blockedReasons.push("old database has repository Wrangler references");
            if (replacementRepositoryBindings.length > 0) blockedReasons.push("replacement database has repository Wrangler references");
            if (activeOldRuns.length > 0) blockedReasons.push("active workflow uses old database");
            if (activeReplacementRuns.length > 0) blockedReasons.push("active workflow uses replacement database");
            if (uncertainActiveRuns.length > 0) blockedReasons.push("active preview workflow database use is uncertain");
            if (!schema.healthy) blockedReasons.push(...schema.blocked);

            console.log(`Preview D1 rebind action: ${rebindAction}`);
            console.log(`Preview D1 rebind project: ${fixedProject}`);
            console.log(`Old preview D1: ${oldName} id=${oldMask}`);
            console.log(`Replacement preview D1: ${replacementName} id=${replacementMask}`);
            console.log(`Pages deployment required after config patch: yes`);
            console.log(`Old database Pages bindings: ${oldPagesBindings.length}`);
            for (const binding of oldPagesBindings) console.log(`Old database Pages binding: ${bindingLabel(binding)}`);
            console.log(`Replacement database Pages bindings: ${replacementPagesBindings.length}`);
            for (const binding of replacementPagesBindings) console.log(`Replacement database Pages binding: ${bindingLabel(binding)}`);
            console.log(`Old database Worker bindings: ${oldWorkerBindings.length}`);
            console.log(`Replacement database Worker bindings: ${replacementWorkerBindings.length}`);
            console.log(`Old database repository Wrangler references: ${oldRepositoryBindings.length}`);
            console.log(`Replacement database repository Wrangler references: ${replacementRepositoryBindings.length}`);
            console.log(`Active preview runs definitely using old database: ${activeOldRuns.length}`);
            console.log(`Active preview runs definitely using replacement database: ${activeReplacementRuns.length}`);
            console.log(`Active preview runs with unknown database: ${uncertainActiveRuns.length}`);
            console.log(`Replacement migration 0056 applied: ${schema.migration0056Applied ? "yes" : "no"}`);
            console.log(`Replacement discord_announcement_posts columns: ${schema.columns.join(", ") || "none"}`);
            console.log(`Replacement required indexes: ${schema.requiredIndexes.join(", ")}`);
            console.log(`Replacement indexes present: ${schema.indexes.join(", ") || "none"}`);
            console.log(`Replacement discord_announcement_posts row count: ${schema.rowCount ?? "unavailable"}`);
            console.log(`Replacement foreign_key_check rows: ${schema.foreignKeyRows.length}`);

            const rebindStatus = blockedReasons.length > 0
              ? `BLOCKED FOR PREVIEW D1 REBIND: ${blockedReasons.join("; ")}`
              : "ELIGIBLE FOR EXPLICIT PREVIEW D1 REBIND APPROVAL";
            console.log(rebindStatus);
            appendSummary([
              "## Preview D1 Rebind",
              "",
              `- Preview Pages project: ${fixedProject}`,
              `- Rebind action: ${rebindAction}`,
              `- Old database: ${oldName}`,
              `- Old database ID: ${oldMask}`,
              `- Replacement database: ${replacementName}`,
              `- Replacement database ID: ${replacementMask}`,
              `- Old production config DB binding: ${oldProductionBinding ? "verified" : "missing"}`,
              `- Old preview config DB binding: ${oldPreviewBinding ? "verified" : "missing"}`,
              `- Replacement migration 0056 applied: ${schema.migration0056Applied ? "yes" : "no"}`,
              `- Replacement announcement row count: ${schema.rowCount ?? "unavailable"}`,
              `- Pages deployment required after config patch: yes`,
              `- Worker audit complete: ${workerAudit.complete ? "yes" : "no"}`,
              `- Active preview runs using old/replacement: ${activeOldRuns.length + activeReplacementRuns.length}`,
              `- Rebind status: ${rebindStatus}`,
              "- Dry-run patches Pages: no",
              "- Dry-run creates/deletes D1: no",
              "- Dry-run deploys Pages: no",
              "- Discord messages sent: false",
            ]);

            if (rebindAction === "dry-run") {
              console.log("Preview D1 rebind dry-run completed. No Pages binding changed.");
              return;
            }

            if (blockedReasons.length > 0) fail(`PREVIEW_D1_REBIND_AUDIT_INCOMPLETE: apply blocked: ${blockedReasons.join("; ")}.`);
            const patchedProductionConfig = mergeD1BindingOnly(fixedProjectRecord.deployment_configs?.production ?? {}, replacementId);
            const patchedPreviewConfig = mergeD1BindingOnly(fixedProjectRecord.deployment_configs?.preview ?? {}, replacementId);
            const patchPayload = {
              deployment_configs: {
                production: patchedProductionConfig,
                preview: patchedPreviewConfig,
              },
            };
            console.log(`Applying preview-only Pages D1 rebind: project=${fixedProject} old=${oldMask} replacement=${replacementMask}`);
            const patchResult = await cloudflare(selectedSource, "pages-project-patch", `/pages/projects/${encodeURIComponent(fixedProject)}`, {
              method: "PATCH",
              body: JSON.stringify(patchPayload),
            });
            if (!success(patchResult)) {
              printCloudflareDiagnostic("PREVIEW_D1_REBIND_AUDIT_INCOMPLETE", "pages_project_patch", patchResult, selectedSource.name);
              fail("Preview-only Pages D1 rebind patch failed.");
            }
            const afterDetail = await cloudflare(selectedSource, "pages-project-detail", `/pages/projects/${encodeURIComponent(fixedProject)}`);
            if (!success(afterDetail)) {
              printCloudflareDiagnostic("PREVIEW_D1_REBIND_AUDIT_INCOMPLETE", "pages_project_detail_after_rebind", afterDetail, selectedSource.name);
              fail("Could not verify preview Pages project after rebind.");
            }
            const afterProject = afterDetail.parsed?.result;
            const afterBindings = projectD1Bindings(afterProject);
            const afterOldBindings = afterBindings.filter((binding) => bindingMatchesDatabase({ ...binding, resolvedName: databasesById.get(binding.id) || binding.name }, oldName, oldId));
            const afterReplacementBindings = afterBindings.filter((binding) => bindingMatchesDatabase({ ...binding, resolvedName: databasesById.get(binding.id) || binding.name }, replacementName, replacementId));
            if (afterOldBindings.length !== 0) fail("Old stale preview D1 still has bindings on the preview project after rebind.");
            if (afterReplacementBindings.length !== 2) fail(`Replacement preview D1 should have 2 bindings after rebind, got ${afterReplacementBindings.length}.`);
            console.log("Preview-only Pages D1 rebind applied and verified. Pages deployment is still required for active runtime binding changes.");
            appendSummary(["", "- Rebind apply result: success", "- Active runtime deployment required: yes"]);
          })().catch((error) => fail(error instanceof Error ? error.message : String(error)));
          NODE

      - name: Prepare pinned main runtime for Discord preview activation
        if: ${{ inputs.mode == 'activate-rebound-discord-preview' }}
        run: |
          set -euo pipefail

          git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main" --depth=1
          CURRENT_MAIN_SHA="$(git rev-parse origin/main)"
          if [ "${CURRENT_MAIN_SHA}" != "${APPROVED_MAIN_RUNTIME_SHA}" ]; then
            echo "::error::origin/main moved. Expected ${APPROVED_MAIN_RUNTIME_SHA}, got ${CURRENT_MAIN_SHA}."
            exit 1
          fi
          if [ -e runtime-main ]; then
            echo "::error::runtime-main checkout path already exists."
            exit 1
          fi
          git worktree add --detach runtime-main "${APPROVED_MAIN_RUNTIME_SHA}"
          RUNTIME_HEAD="$(git -C runtime-main rev-parse HEAD)"
          RUNTIME_TREE="$(git -C runtime-main rev-parse "HEAD^{tree}")"
          if [ "${RUNTIME_HEAD}" != "${APPROVED_MAIN_RUNTIME_SHA}" ]; then
            echo "::error::Pinned runtime checkout does not match approved main SHA."
            exit 1
          fi
          {
            printf "ACTIVATE_RUNTIME_TREE_SHA=%s\n" "${RUNTIME_TREE}"
          } >> "$GITHUB_ENV"
          {
            echo "## Rebound Discord Preview Runtime"
            echo ""
            echo "- Workflow source branch: ${CANDIDATE_BRANCH}"
            echo "- Workflow source SHA: ${CANDIDATE_SHA}"
            echo "- Runtime source SHA: ${RUNTIME_HEAD}"
            echo "- Runtime source tree: ${RUNTIME_TREE}"
            echo "- Runtime source approved main unchanged: true"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Preflight rebound Discord preview activation
        if: ${{ inputs.mode == 'activate-rebound-discord-preview' }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.OWNER_CONSOLE_CF_TOKEN || process.env.CLOUDFLARE_API_TOKEN;
          const githubToken = process.env.GITHUB_TOKEN;
          const repository = process.env.GITHUB_REPOSITORY;
          const projectName = process.env.ACTIVATE_PREVIEW_PROJECT_NAME;
          const oldName = process.env.ACTIVATE_OLD_PREVIEW_DB_NAME;
          const oldExpectedMask = process.env.ACTIVATE_OLD_PREVIEW_DB_ID_MASK;
          const replacementName = process.env.ACTIVATE_REPLACEMENT_PREVIEW_DB_NAME;
          const productionName = process.env.DETECTED_PRODUCTION_D1_DATABASE_NAME || process.env.PRODUCTION_D1_DATABASE_NAME;
          const productionId = process.env.DETECTED_PRODUCTION_D1_DATABASE_ID || "";
          const productionPagesProject = process.env.PRODUCTION_PAGES_PROJECT_NAME;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const currentRunId = String(process.env.GITHUB_RUN_ID ?? "");

          const source = { name: "OWNER_CONSOLE_CF_TOKEN", token };
          if (!source.token || source.token.length <= 20) {
            throw new Error("Missing Cloudflare preview token for activation mode.");
          }

          function maskId(id) {
            return typeof id === "string" && id.length > 12 ? `${id.slice(0, 8)}...${id.slice(-4)}` : "unavailable";
          }

          function sanitize(value) {
            let text = String(value ?? "");
            for (const sensitive of [accountId, productionId, source.token]) {
              if (sensitive) text = text.split(sensitive).join("[redacted]");
            }
            return text
              .replace(/Bearer\s+[A-Za-z0-9._~+/=-]+/gi, "Bearer [redacted-token]")
              .replace(/\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b/gi, "[redacted-id]")
              .replace(/\b[0-9a-f]{32}\b/gi, "[redacted-id]")
              .replace(/[A-Za-z0-9_-]{48,}/g, "[redacted-token]")
              .replace(/(authorization|cookie|session|secret|token)\s*[:=]\s*[^\s,;]+/gi, "$1=[redacted]")
              .slice(0, 1000);
          }

          function fail(message) {
            console.error(sanitize(message));
            process.exit(1);
          }

          function appendSummary(lines) {
            if (summaryPath) fs.appendFileSync(summaryPath, `${lines.join("\n")}\n`);
          }

          function databaseId(database) {
            return String(database?.uuid ?? database?.id ?? database?.database_id ?? "");
          }

          function success(result) {
            return Boolean(result?.ok && result?.parsed?.success !== false);
          }

          function firstCloudflareError(parsed) {
            const first = Array.isArray(parsed?.errors) ? parsed.errors[0] : null;
            return {
              code: first?.code ?? "unknown",
              message: sanitize(first?.message ?? "unknown"),
            };
          }

          async function cloudflare(endpointCategory, apiPath, init = {}, accountScoped = true) {
            const base = accountScoped
              ? `https://api.cloudflare.com/client/v4/accounts/${accountId}`
              : "https://api.cloudflare.com/client/v4";
            const response = await fetch(`${base}${apiPath}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${source.token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const contentType = response.headers.get("content-type") || "unknown";
            const text = await response.text();
            let parsed;
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = { success: false, errors: [{ code: `http_${response.status}`, message: "non_json_response" }] };
            }
            return { ok: response.ok, status: response.status, parsed, endpointCategory, contentType, bodyLength: text.length };
          }

          function printCloudflareDiagnostic(operationName, result) {
            const error = firstCloudflareError(result?.parsed);
            console.log(`ACTIVATE_REBOUND_DISCORD_PREVIEW_AUDIT_FAILED: operation=${operationName}`);
            console.log(`  endpoint_category=${result?.endpointCategory ?? "unknown"}`);
            console.log(`  http_status=${result?.status ?? "unavailable"}`);
            console.log(`  cloudflare_error_code=${sanitize(error.code)}`);
            console.log(`  sanitized_error=${error.message}`);
            console.log(`  response_content_type=${sanitize(result?.contentType ?? "unknown")}`);
            console.log(`  response_body_length=${Number(result?.bodyLength ?? 0)}`);
          }

          function itemsFromResult(parsed, keys) {
            const result = parsed?.result;
            if (Array.isArray(result)) return result;
            for (const key of keys) {
              if (Array.isArray(result?.[key])) return result[key];
              if (Array.isArray(parsed?.[key])) return parsed[key];
            }
            return [];
          }

          function resultInfo(parsed) {
            return parsed?.result_info ?? parsed?.result?.result_info ?? {};
          }

          async function listPaginated(endpointCategory, basePath, keys) {
            const items = [];
            const perPage = 50;
            let lastResult = null;
            for (let page = 1; page <= 50; page += 1) {
              const result = await cloudflare(endpointCategory, `${basePath}?per_page=${perPage}&page=${page}`);
              lastResult = result;
              if (!success(result)) return { ok: false, items, result };
              const pageItems = itemsFromResult(result.parsed, keys);
              items.push(...pageItems);
              const info = resultInfo(result.parsed);
              const totalPages = Number(info.total_pages ?? 0);
              if (totalPages > 0 && page >= totalPages) break;
              if (pageItems.length < perPage) break;
            }
            return { ok: true, items, result: lastResult };
          }

          async function listPagesProjects() {
            const items = [];
            const first = await cloudflare("pages-project-list", "/pages/projects");
            if (!success(first)) return { ok: false, items, result: first };
            items.push(...itemsFromResult(first.parsed, ["projects"]));
            const info = resultInfo(first.parsed);
            const currentPage = Number(info.page ?? 1);
            const totalPages = Number(info.total_pages ?? 1);
            const returnedPerPage = Number(info.per_page ?? 0);
            const safePerPage = returnedPerPage > 0 && returnedPerPage <= 20 ? returnedPerPage : 20;
            for (let page = currentPage + 1; page <= totalPages && page <= 50; page += 1) {
              const result = await cloudflare("pages-project-list", `/pages/projects?page=${page}&per_page=${safePerPage}`);
              if (!success(result)) return { ok: false, items, result };
              items.push(...itemsFromResult(result.parsed, ["projects"]));
            }
            return { ok: true, items, result: first };
          }

          function collectD1Bindings(configValue, context) {
            const bindings = [];
            if (!configValue || typeof configValue !== "object") return bindings;
            if (Array.isArray(configValue)) {
              for (const value of configValue) {
                const bindingName = value?.binding ?? value?.name ?? "unnamed";
                const id = String(value?.id ?? value?.database_id ?? "");
                const name = String(value?.database_name ?? value?.name ?? "");
                if (id || name) bindings.push({ ...context, binding: bindingName, id, name });
              }
              return bindings;
            }
            for (const [binding, value] of Object.entries(configValue)) {
              if (typeof value === "string") {
                bindings.push({ ...context, binding, id: value, name: "" });
              } else if (value && typeof value === "object") {
                bindings.push({
                  ...context,
                  binding,
                  id: String(value.id ?? value.database_id ?? ""),
                  name: String(value.database_name ?? value.name ?? ""),
                });
              }
            }
            return bindings.filter((binding) => binding.id || binding.name);
          }

          function extractPagesD1Bindings(project) {
            const bindings = [];
            for (const environment of ["production", "preview"]) {
              const config = project?.deployment_configs?.[environment] ?? {};
              bindings.push(...collectD1Bindings(config.d1_databases, {
                source: "pages",
                project: project?.name ?? "unknown",
                environment,
              }));
            }
            return bindings;
          }

          function extractWorkerBindingsFromValue(value, context, output = [], path = []) {
            if (!value || typeof value !== "object") return output;
            if (Array.isArray(value)) {
              value.forEach((item, index) => extractWorkerBindingsFromValue(item, context, output, [...path, String(index)]));
              return output;
            }
            const type = String(value.type ?? value.binding_type ?? "").toLowerCase();
            const pathText = path.join(".").toLowerCase();
            const hasD1Signal = type.includes("d1")
              || pathText.includes("d1")
              || Object.prototype.hasOwnProperty.call(value, "database_id")
              || Object.prototype.hasOwnProperty.call(value, "database_name");
            if (hasD1Signal) {
              const id = String(value.database_id ?? value.id ?? "");
              const name = String(value.database_name ?? value.name ?? "");
              const binding = String(value.binding ?? value.name ?? path[path.length - 1] ?? "unnamed");
              if (id || name) output.push({ ...context, binding, id, name });
            }
            for (const [key, child] of Object.entries(value)) {
              if (child && typeof child === "object") extractWorkerBindingsFromValue(child, context, output, [...path, key]);
            }
            return output;
          }

          async function auditWorkerBindings(databasesById) {
            const deployed = [];
            const scriptsResult = await listPaginated("worker-script-list", "/workers/scripts", ["scripts"]);
            if (!scriptsResult.ok) {
              printCloudflareDiagnostic("worker_script_list", scriptsResult.result);
              return { complete: false, deployed };
            }
            for (const script of scriptsResult.items) {
              const scriptName = script?.id ?? script?.name;
              if (!scriptName) continue;
              const settings = await cloudflare("worker-script-settings", `/workers/scripts/${encodeURIComponent(scriptName)}/settings`);
              if (!success(settings)) {
                printCloudflareDiagnostic(`worker_script_settings:${scriptName}`, settings);
                return { complete: false, deployed };
              }
              const bindings = extractWorkerBindingsFromValue(settings.parsed?.result ?? {}, {
                source: "worker",
                project: scriptName,
                environment: "deployed",
              });
              for (const binding of bindings) deployed.push({ ...binding, resolvedName: binding.name || databasesById.get(binding.id) || "unknown" });
            }
            return { complete: true, deployed };
          }

          function bindingMatchesDatabase(binding, databaseName, databaseIdValue) {
            return binding.id === databaseIdValue || binding.name === databaseName || binding.resolvedName === databaseName;
          }

          function envValue(config, key) {
            const value = config?.env_vars?.[key];
            if (value && typeof value === "object") return String(value.value ?? "");
            return String(value ?? "");
          }

          async function d1Query(databaseIdValue, sql) {
            if (!/^\s*(SELECT|PRAGMA)\b/i.test(sql)) fail("Refusing non-read-only D1 query in activation audit.");
            const result = await cloudflare("d1-database-query", `/d1/database/${encodeURIComponent(databaseIdValue)}/query`, {
              method: "POST",
              body: JSON.stringify({ sql }),
            });
            if (!success(result)) {
              printCloudflareDiagnostic("d1_database_query", result);
              throw new Error("Read-only replacement D1 query failed.");
            }
            const payload = Array.isArray(result.parsed?.result) ? result.parsed.result : [result.parsed?.result];
            return payload.flatMap((item) => item?.results ?? []);
          }

          async function github(path) {
            const response = await fetch(`https://api.github.com/repos/${repository}${path}`, {
              headers: {
                Authorization: `Bearer ${githubToken}`,
                Accept: "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            });
            const text = await response.text();
            let parsed = {};
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = {};
            }
            if (!response.ok) fail(`GitHub active-run check failed with HTTP ${response.status}.`);
            return parsed;
          }

          async function activePreviewRuns() {
            const runs = [];
            for (const status of ["queued", "in_progress"]) {
              const parsed = await github(`/actions/runs?status=${status}&per_page=100`);
              for (const run of parsed.workflow_runs ?? []) {
                if (String(run.id ?? "") === String(process.env.GITHUB_RUN_ID ?? "")) continue;
                const name = String(run.name ?? "");
                if (name === "DZN Owner Console Preview" || name === "DZN Discord Server Announcements Preview" || /Preview/i.test(name)) {
                  const serialized = JSON.stringify({
                    name,
                    display_title: run.display_title,
                    head_branch: run.head_branch,
                    path: run.path,
                    event: run.event,
                  });
                  runs.push({
                    name,
                    status: run.status,
                    branch: run.head_branch,
                    url: run.html_url,
                    created_at: run.created_at,
                    usesOld: serialized.includes(oldName),
                    databaseUnknown: !serialized.includes(oldName) && !serialized.includes(replacementName),
                  });
                }
              }
            }
            return runs;
          }

          async function auditReplacementSchema(replacementId) {
            const localMigrations = fs.readdirSync("runtime-main/migrations")
              .filter((name) => name.endsWith(".sql"))
              .sort();
            const requiredTables = [
              "sessions",
              "users",
              "linked_servers",
              "discord_guilds",
              "server_subscriptions",
              "competitive_events",
              "discord_announcement_posts",
            ];
            const requiredColumns = [
              "id",
              "server_id",
              "event_type",
              "channel_id",
              "message_id",
              "thread_id",
              "dedupe_key",
              "status",
              "failure_reason",
              "created_at",
              "updated_at",
            ];
            const requiredIndexes = [
              "idx_discord_announcement_posts_server_event_created",
              "idx_discord_announcement_posts_event_status_created",
              "idx_discord_announcement_posts_status_updated",
            ];
            const blocked = [];
            const migrations = (await d1Query(replacementId, "SELECT name FROM d1_migrations ORDER BY id;")).map((row) => String(row.name ?? "")).filter(Boolean);
            const pending = localMigrations.filter((name) => !migrations.includes(name));
            if (pending.length > 0) blocked.push(`required migrations pending: ${pending.join(", ")}`);
            if (!migrations.includes("0056_discord_server_announcements.sql")) blocked.push("migration 0056 is not applied");
            const tableRows = await d1Query(replacementId, `SELECT name FROM sqlite_master WHERE type = 'table' AND name IN (${requiredTables.map((name) => `'${name}'`).join(", ")});`);
            const tables = new Set(tableRows.map((row) => String(row.name ?? "")));
            const missingTables = requiredTables.filter((name) => !tables.has(name));
            if (missingTables.length > 0) blocked.push(`missing required tables: ${missingTables.join(", ")}`);
            const columnRows = await d1Query(replacementId, "PRAGMA table_info(discord_announcement_posts);");
            const columns = new Set(columnRows.map((row) => String(row.name ?? "")));
            const missingColumns = requiredColumns.filter((name) => !columns.has(name));
            if (missingColumns.length > 0) blocked.push(`discord_announcement_posts missing columns: ${missingColumns.join(", ")}`);
            const indexRows = await d1Query(replacementId, "SELECT name FROM sqlite_master WHERE type = 'index' AND name LIKE 'idx_discord_announcement_posts_%' ORDER BY name;");
            const indexes = indexRows.map((row) => String(row.name ?? "")).filter(Boolean);
            const missingIndexes = requiredIndexes.filter((name) => !indexes.includes(name));
            if (missingIndexes.length > 0) blocked.push(`discord_announcement_posts missing indexes: ${missingIndexes.join(", ")}`);
            const rowCountRows = await d1Query(replacementId, "SELECT COUNT(*) AS row_count FROM discord_announcement_posts;");
            const rowCount = Number(rowCountRows[0]?.row_count ?? NaN);
            if (!Number.isFinite(rowCount)) blocked.push("discord_announcement_posts row count could not be read");
            if (Number.isFinite(rowCount) && rowCount !== 0) blocked.push(`discord_announcement_posts row count is ${rowCount}, expected 0`);
            const foreignKeyRows = await d1Query(replacementId, "PRAGMA foreign_key_check;");
            if (foreignKeyRows.length > 0) blocked.push(`foreign_key_check returned ${foreignKeyRows.length} rows`);
            return { blocked, migrations, pending, tables: [...tables], columns: [...columns], indexes, rowCount, foreignKeyRows };
          }

          void (async () => {
            if (projectName !== "dzn-network-discord-announcements-preview") fail("Activation preview project constant mismatch.");
            if (projectName === productionPagesProject) fail("Refusing activation against production Pages project.");
            if (oldName === productionName || replacementName === productionName) fail("Refusing activation against production D1 name.");
            const verify = await cloudflare("token-verify", "/user/tokens/verify", {}, false);
            if (!success(verify)) {
              printCloudflareDiagnostic("token_verify", verify);
              fail("Cloudflare preview token failed verification.");
            }
            const d1List = await listPaginated("d1-database-list", "/d1/database", ["databases"]);
            if (!d1List.ok) {
              printCloudflareDiagnostic("d1_database_list", d1List.result);
              fail("Could not list D1 databases before activation.");
            }
            const databases = d1List.items;
            const databasesById = new Map(databases.map((database) => [databaseId(database), String(database?.name ?? "unnamed")]));
            const oldDatabase = databases.find((database) => database?.name === oldName);
            const replacementDatabase = databases.find((database) => database?.name === replacementName);
            if (!oldDatabase) fail("Former stale preview D1 was not found.");
            if (!replacementDatabase) fail("Replacement preview D1 was not found.");
            const oldId = databaseId(oldDatabase);
            const replacementId = databaseId(replacementDatabase);
            const oldMask = maskId(oldId);
            const replacementMask = maskId(replacementId);
            if (oldMask !== oldExpectedMask) fail(`Old preview D1 masked ID changed; expected ${oldExpectedMask}, got ${oldMask}.`);
            if (oldId === productionId || replacementId === productionId) fail("Production D1 ID detected in activation path.");

            const projectDetail = await cloudflare("pages-project-detail", `/pages/projects/${encodeURIComponent(projectName)}`);
            if (!success(projectDetail)) {
              printCloudflareDiagnostic("pages_project_detail", projectDetail);
              fail("Could not read Discord preview Pages project before activation.");
            }
            const project = projectDetail.parsed?.result;
            if (project?.name !== projectName) fail("Resolved Pages project name mismatch.");
            if (projectName === productionPagesProject) fail("Resolved Pages project is production.");
            const productionBranch = String(project?.production_branch ?? "");
            if (!productionBranch) fail("Discord preview Pages project production_branch is not configured.");
            for (const environment of ["production", "preview"]) {
              const config = project?.deployment_configs?.[environment] ?? {};
              if (envValue(config, "DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED") !== "false") fail(`Server announcements flag is not false in ${environment}.`);
              if (envValue(config, "DZN_DISCORD_NOTIFICATIONS_ENABLED") !== "false") fail(`Discord notifications flag is not false in ${environment}.`);
              const db = config?.d1_databases?.DB;
              const dbId = String(db?.id ?? db?.database_id ?? db ?? "");
              if (dbId !== replacementId) fail(`${environment} DB binding does not point to replacement preview D1.`);
            }

            const pagesProjects = await listPagesProjects();
            if (!pagesProjects.ok) {
              printCloudflareDiagnostic("pages_project_list", pagesProjects.result);
              fail("Could not complete Pages inventory before activation.");
            }
            const pagesBindings = [];
            for (const item of pagesProjects.items) {
              const name = item?.name;
              if (!name) continue;
              const detail = await cloudflare("pages-project-detail", `/pages/projects/${encodeURIComponent(name)}`);
              if (!success(detail)) {
                printCloudflareDiagnostic(`pages_project_detail:${name}`, detail);
                fail("Could not complete Pages binding audit before activation.");
              }
              const fullProject = detail.parsed?.result ?? item;
              for (const binding of extractPagesD1Bindings(fullProject)) {
                pagesBindings.push({ ...binding, resolvedName: binding.name || databasesById.get(binding.id) || "unknown" });
              }
            }
            const oldPagesBindings = pagesBindings.filter((binding) => bindingMatchesDatabase(binding, oldName, oldId));
            const replacementPagesBindings = pagesBindings.filter((binding) => bindingMatchesDatabase(binding, replacementName, replacementId));
            if (oldPagesBindings.length !== 0) fail(`Old preview D1 still has ${oldPagesBindings.length} Pages project-configuration bindings.`);
            if (replacementPagesBindings.filter((binding) => binding.project === projectName && binding.binding === "DB").length !== 2) {
              fail("Replacement preview D1 does not have exactly two DB bindings on the Discord preview Pages project.");
            }
            if (replacementPagesBindings.some((binding) => binding.project === productionPagesProject)) {
              fail("Replacement preview D1 is bound to the real production Pages project.");
            }

            const workerAudit = await auditWorkerBindings(databasesById);
            if (!workerAudit.complete) fail("Worker binding audit incomplete before activation.");
            const oldWorkerBindings = workerAudit.deployed.filter((binding) => bindingMatchesDatabase(binding, oldName, oldId));
            const replacementWorkerBindings = workerAudit.deployed.filter((binding) => bindingMatchesDatabase(binding, replacementName, replacementId));
            if (oldWorkerBindings.length > 0) fail("Old preview D1 has deployed Worker bindings before activation.");
            if (replacementWorkerBindings.length > 0) fail("Replacement preview D1 has deployed Worker bindings.");
            const activeRuns = await activePreviewRuns();
            const activeOldRuns = activeRuns.filter((run) => run.usesOld);
            const uncertainRuns = activeRuns.filter((run) => run.databaseUnknown);
            if (activeOldRuns.length > 0) fail("Active preview workflow is using the old stale preview D1.");
            if (uncertainRuns.length > 0) fail("Active preview workflow database use is uncertain.");

            const schema = await auditReplacementSchema(replacementId);
            if (schema.blocked.length > 0) fail(`Replacement preview D1 schema is not activation-ready: ${schema.blocked.join("; ")}.`);

            fs.appendFileSync(process.env.GITHUB_ENV, `ACTIVATE_REPLACEMENT_D1_DATABASE_ID=${replacementId}\n`);
            fs.appendFileSync(process.env.GITHUB_ENV, `ACTIVATE_PREVIEW_PROJECT_BRANCH=${productionBranch}\n`);
            fs.appendFileSync(process.env.GITHUB_ENV, `ACTIVATE_STABLE_URL=https://${projectName}.pages.dev\n`);
            console.log(`Activation preflight project: ${projectName}`);
            console.log(`Activation preview project branch: ${productionBranch}`);
            console.log(`Former preview D1: ${oldName} id=${oldMask}`);
            console.log(`Replacement preview D1: ${replacementName} id=${replacementMask}`);
            console.log(`Replacement migrations applied: ${schema.migrations.length}`);
            console.log(`Replacement pending migrations: ${schema.pending.length}`);
            console.log(`Replacement discord_announcement_posts row count: ${schema.rowCount}`);
            console.log(`Replacement foreign_key_check rows: ${schema.foreignKeyRows.length}`);
            appendSummary([
              "",
              "## Rebound Discord Preview Activation Preflight",
              "",
              `- Preview Pages project: ${projectName}`,
              `- Preview project production branch: ${productionBranch}`,
              `- Runtime source SHA: ${process.env.APPROVED_MAIN_RUNTIME_SHA}`,
              `- Replacement D1: ${replacementName}`,
              `- Replacement D1 ID: ${replacementMask}`,
              `- Old D1 project-config bindings: ${oldPagesBindings.length}`,
              `- Replacement D1 project-config bindings: ${replacementPagesBindings.length}`,
              `- Replacement migration 0056 applied: ${schema.migrations.includes("0056_discord_server_announcements.sql") ? "yes" : "no"}`,
              `- Replacement announcement row count: ${schema.rowCount}`,
              "- Discord flags false before deploy: yes",
              "- Activation preflight status: passed",
            ]);
          })().catch((error) => fail(error instanceof Error ? error.message : String(error)));
          NODE

      - name: Build pinned main runtime for rebound Discord preview
        if: ${{ inputs.mode == 'activate-rebound-discord-preview' }}
        working-directory: runtime-main
        env:
          DZN_PULSE_ENABLED: "true"
          DZN_DISCORD_NOTIFICATIONS_ENABLED: "false"
          DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED: "false"
          DZN_APP_URL: https://dzn-network-discord-announcements-preview.pages.dev
          NEXT_PUBLIC_APP_URL: https://dzn-network-discord-announcements-preview.pages.dev
        run: |
          set -euo pipefail

          npm ci
          npm run test:github-workflows
          npm run test:discord-server-announcements
          npm run test:owner-console
          npm run test
          npm run lint
          npm run build
          rm -rf .pages-functions
          mkdir -p .pages-functions
          ./node_modules/.bin/wrangler pages functions build functions \
            --outdir .pages-functions \
            --build-output-directory out \
            --output-routes-path out/_routes.json \
            --minify
          node scripts/patch-pages-routes.mjs
          test -s .pages-functions/index.js
          cp .pages-functions/index.js out/_worker.js
          test -s out/_worker.js
          cmp -s .pages-functions/index.js out/_worker.js
          git diff --check

          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const workerPath = "out/_worker.js";
          const functionsWorkerPath = ".pages-functions/index.js";
          const routes = JSON.parse(fs.readFileSync("out/_routes.json", "utf8"));
          const include = Array.isArray(routes.include) ? routes.include : [];
          const exclude = Array.isArray(routes.exclude) ? routes.exclude : [];
          function isSplat(route) {
            return typeof route === "string" && route.endsWith("/*");
          }
          function splatPrefix(route) {
            return route.slice(0, -1);
          }
          for (const route of ["/api/*", "/owner", "/owner/*"]) {
            if (!include.includes(route)) throw new Error(`out/_routes.json missing ${route}.`);
          }
          for (const splat of include.filter(isSplat)) {
            const prefix = splatPrefix(splat);
            const overlap = include.find((route) => route !== splat && route.startsWith(prefix));
            if (overlap) throw new Error(`include route overlap: ${splat} covers ${overlap}.`);
          }
          console.log("Pinned main runtime build and Cloudflare route normalization verified.");
          NODE

      - name: Deploy rebound Discord preview runtime
        if: ${{ inputs.mode == 'activate-rebound-discord-preview' }}
        env:
          DZN_PULSE_ENABLED: "true"
          DZN_DISCORD_NOTIFICATIONS_ENABLED: "false"
          DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED: "false"
          DZN_APP_URL: https://dzn-network-discord-announcements-preview.pages.dev
          NEXT_PUBLIC_APP_URL: https://dzn-network-discord-announcements-preview.pages.dev
        run: |
          set -euo pipefail

          if [ "${ACTIVATE_PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
            echo "::error::Refusing to deploy production Pages project from activation mode."
            exit 1
          fi
          if [ "$(git -C runtime-main rev-parse HEAD)" != "${APPROVED_MAIN_RUNTIME_SHA}" ]; then
            echo "::error::Runtime checkout changed before activation deploy."
            exit 1
          fi
          if [ "${DZN_DISCORD_NOTIFICATIONS_ENABLED}" != "false" ] || [ "${DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED}" != "false" ]; then
            echo "::error::Discord flags must remain false for activation deployment."
            exit 1
          fi
          if [ -z "${OWNER_CONSOLE_CF_TOKEN:-${CLOUDFLARE_API_TOKEN:-}}" ]; then
            echo "::error::Missing Cloudflare API token for activation deployment."
            exit 1
          fi
          export CLOUDFLARE_API_TOKEN="${OWNER_CONSOLE_CF_TOKEN:-${CLOUDFLARE_API_TOKEN:-}}"

          DEPLOY_ROOT="${RUNNER_TEMP}/dzn-discord-preview-deploy"
          case "${DEPLOY_ROOT}" in
            "${RUNNER_TEMP}"/*) ;;
            *)
              echo "::error::Deployment root must stay inside RUNNER_TEMP."
              exit 1
              ;;
          esac
          rm -rf "${DEPLOY_ROOT}"
          mkdir -p "${DEPLOY_ROOT}"
          cp -R runtime-main/out "${DEPLOY_ROOT}/out"

          if find "${DEPLOY_ROOT}" -name wrangler.toml -o -name wrangler.json -o -name wrangler.jsonc -o -name .dev.vars -o -name .env | grep -q .; then
            echo "::error::Production or local Wrangler configuration is deploy-visible."
            find "${DEPLOY_ROOT}" -name wrangler.toml -o -name wrangler.json -o -name wrangler.jsonc -o -name .dev.vars -o -name .env
            exit 1
          fi
          if grep -R -E 'name[[:space:]]*=[[:space:]]*"dzn-network"|database_name[[:space:]]*=[[:space:]]*"dzn_network_db"|dzn_network_db' "${DEPLOY_ROOT}" >/tmp/dzn-preview-production-leak.txt 2>/dev/null; then
            echo "::error::Deployment-visible output contains production project or D1 configuration markers."
            cut -d: -f1 /tmp/dzn-preview-production-leak.txt | sort -u | sed 's#^#blocked file: #'
            exit 1
          fi

          cd "${DEPLOY_ROOT}"
          "${GITHUB_WORKSPACE}/runtime-main/node_modules/.bin/wrangler" pages deploy out \
            --project-name "${ACTIVATE_PREVIEW_PROJECT_NAME}" \
            --branch "${ACTIVATE_PREVIEW_PROJECT_BRANCH}" \
            --commit-hash "${APPROVED_MAIN_RUNTIME_SHA}" \
            --commit-message "Activate rebound Discord preview runtime ${APPROVED_MAIN_RUNTIME_SHA}" \
            | tee rebound-discord-preview-deploy.txt

          node <<'NODE'
          const fs = require("node:fs");
          const projectName = process.env.ACTIVATE_PREVIEW_PROJECT_NAME;
          const stableUrl = `https://${projectName}.pages.dev`;
          const text = fs.readFileSync("rebound-discord-preview-deploy.txt", "utf8");
          const urls = [...new Set((text.match(/https:\/\/[^\s"'<>]+?\.pages\.dev/g) ?? []).map((url) => url.replace(/[),.;]+$/, "")))];
          const immutableUrl = urls.find((url) => url !== stableUrl) ?? "";
          if (!immutableUrl) {
            throw new Error("Wrangler did not report a distinct immutable preview URL for the activation deployment.");
          }
          const deploymentId = immutableUrl.match(/^https:\/\/([^.]+)\./)?.[1] ?? "unknown";
          fs.appendFileSync(process.env.GITHUB_ENV, [
            `ACTIVATE_IMMUTABLE_PREVIEW_URL=${immutableUrl}`,
            `ACTIVATE_STABLE_PREVIEW_URL=${stableUrl}`,
            `ACTIVATE_DEPLOYMENT_ID=${deploymentId}`,
            "",
          ].join("\n"));
          console.log(`Rebound Discord preview deployment ID: ${deploymentId}`);
          console.log(`Rebound Discord preview immutable URL: ${immutableUrl}`);
          console.log(`Rebound Discord preview stable URL: ${stableUrl}`);
          NODE

          {
            echo ""
            echo "## Rebound Discord Preview Deployment"
            echo ""
            echo "- Preview Pages project: ${ACTIVATE_PREVIEW_PROJECT_NAME}"
            echo "- Preview project branch: ${ACTIVATE_PREVIEW_PROJECT_BRANCH}"
            echo "- Runtime commit: ${APPROVED_MAIN_RUNTIME_SHA}"
            echo "- Runtime tree: ${ACTIVATE_RUNTIME_TREE_SHA}"
            echo "- Deployment ID: ${ACTIVATE_DEPLOYMENT_ID:-unknown}"
            echo "- Immutable preview URL: ${ACTIVATE_IMMUTABLE_PREVIEW_URL:-unknown}"
            echo "- Stable preview URL: ${ACTIVATE_STABLE_PREVIEW_URL:-https://${ACTIVATE_PREVIEW_PROJECT_NAME}.pages.dev}"
            echo "- DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED: false"
            echo "- DZN_DISCORD_NOTIFICATIONS_ENABLED: false"
            echo "- Discord messages sent: false"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify activated rebound Discord preview
        if: ${{ inputs.mode == 'activate-rebound-discord-preview' }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.OWNER_CONSOLE_CF_TOKEN || process.env.CLOUDFLARE_API_TOKEN;
          const projectName = process.env.ACTIVATE_PREVIEW_PROJECT_NAME;
          const replacementId = process.env.ACTIVATE_REPLACEMENT_D1_DATABASE_ID;
          const oldName = process.env.ACTIVATE_OLD_PREVIEW_DB_NAME;
          const replacementName = process.env.ACTIVATE_REPLACEMENT_PREVIEW_DB_NAME;
          const productionProject = process.env.PRODUCTION_PAGES_PROJECT_NAME;
          const immutableUrl = process.env.ACTIVATE_IMMUTABLE_PREVIEW_URL;
          const stableUrl = process.env.ACTIVATE_STABLE_PREVIEW_URL || `https://${projectName}.pages.dev`;
          const productionUrl = "https://dzn-network.pages.dev";
          const forbiddenText = [
            "Error 1102",
            "Worker exceeded resource limits",
            "Minified React error #",
            "Owner console data could not be loaded",
            "Owner console error",
            "encrypted_token",
            "TOKEN_ENCRYPTION_KEY",
            "SESSION_SECRET",
          ];
          function fail(message) {
            console.error(String(message).replace(/[A-Za-z0-9_-]{48,}/g, "[redacted-token]"));
            process.exit(1);
          }
          function assert(condition, message) {
            if (!condition) fail(message);
          }
          function envValue(config, key) {
            const value = config?.env_vars?.[key];
            if (value && typeof value === "object") return String(value.value ?? "");
            return String(value ?? "");
          }
          async function cloudflare(path, init = {}) {
            const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const parsed = await response.json().catch(() => null);
            if (!response.ok || parsed?.success === false) {
              throw new Error(`Cloudflare read failed: ${response.status}`);
            }
            return parsed.result;
          }
          async function d1Query(sql) {
            if (!/^\s*(SELECT|PRAGMA)\b/i.test(sql)) throw new Error("Refusing non-read-only verification query.");
            const result = await cloudflare(`/d1/database/${encodeURIComponent(replacementId)}/query`, {
              method: "POST",
              body: JSON.stringify({ sql }),
            });
            const payload = Array.isArray(result) ? result : [result];
            return payload.flatMap((item) => item?.results ?? []);
          }
          async function fetchPath(base, path, expectedStatus, options = {}) {
            const response = await fetch(`${base}${path}`, {
              redirect: options.redirect ?? "manual",
              headers: { "User-Agent": "dzn-rebound-discord-preview-activation" },
            });
            const text = await response.text().catch(() => "");
            if (response.status !== expectedStatus) {
              throw new Error(`${base}${path} expected ${expectedStatus}, got ${response.status}`);
            }
            for (const marker of forbiddenText) {
              if (text.includes(marker)) throw new Error(`${base}${path} exposed forbidden marker ${marker}`);
            }
            return { response, text };
          }
          async function verifyBase(base) {
            await fetchPath(base, "/", 200);
            const owner = await fetchPath(base, "/owner", 302);
            const location = owner.response.headers.get("location") || "";
            assert(location.includes("/login"), `${base}/owner did not redirect to login.`);
            await fetchPath(base, "/api/owner/overview", 401);
            await fetchPath(base, "/api/owner/discord/overview", 401);
            await fetchPath(base, "/api/public/servers", 200);
            await fetchPath(base, "/api/public/home-stats", 200);
            await fetchPath(base, "/api/public/leaderboards", 200);
            await fetchPath(base, "/api/public/server-rail", 200);
            const pulse = await fetchPath(base, "/api/dzn-pulse/config", 200);
            const parsed = JSON.parse(pulse.text);
            assert(parsed.discordNotificationsEnabled === false, `${base}/api/dzn-pulse/config did not report discordNotificationsEnabled=false.`);
          }
          async function repeatedSamples(base) {
            for (const path of ["/owner", "/api/owner/overview", "/api/public/servers", "/api/public/home-stats", "/api/public/leaderboards"]) {
              for (let index = 0; index < 3; index += 1) {
                const expected = path === "/owner" ? 302 : path === "/api/owner/overview" ? 401 : 200;
                await fetchPath(base, path, expected);
              }
            }
          }
          void (async () => {
            assert(projectName !== productionProject, "Activation verification project is production.");
            const project = await cloudflare(`/pages/projects/${encodeURIComponent(projectName)}`);
            for (const environment of ["production", "preview"]) {
              const config = project?.deployment_configs?.[environment] ?? {};
              const db = config?.d1_databases?.DB;
              const dbId = String(db?.id ?? db?.database_id ?? db ?? "");
              assert(dbId === replacementId, `${environment} config DB binding does not point to replacement after deploy.`);
              assert(envValue(config, "DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED") === "false", `${environment} server announcements flag is not false after deploy.`);
              assert(envValue(config, "DZN_DISCORD_NOTIFICATIONS_ENABLED") === "false", `${environment} Discord notifications flag is not false after deploy.`);
            }
            const rowCountRows = await d1Query("SELECT COUNT(*) AS row_count FROM discord_announcement_posts;");
            const rowCount = Number(rowCountRows[0]?.row_count ?? NaN);
            assert(rowCount === 0, `discord_announcement_posts row count should remain 0, got ${rowCount}.`);
            await verifyBase(immutableUrl);
            await verifyBase(stableUrl);
            await repeatedSamples(stableUrl);
            await fetchPath(productionUrl, "/", 200);
            await fetchPath(productionUrl, "/owner", 302);
            await fetchPath(productionUrl, "/api/owner/overview", 401);
            console.log(`Activated rebound Discord preview verified: immutable=${immutableUrl} stable=${stableUrl}`);
            console.log(`Replacement DB ${replacementName} remains bound; old DB ${oldName} not used by project config.`);
          })().catch((error) => fail(error instanceof Error ? error.message : String(error)));
          NODE

      - name: Audit and repair rebound Discord preview configuration
        if: ${{ inputs.mode == 'repair-rebound-discord-preview' }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.OWNER_CONSOLE_CF_TOKEN || process.env.CLOUDFLARE_API_TOKEN;
          const projectName = process.env.REPAIR_PREVIEW_PROJECT_NAME;
          const replacementName = process.env.REPAIR_REPLACEMENT_PREVIEW_DB_NAME;
          const oldName = process.env.REPAIR_OLD_PREVIEW_DB_NAME;
          const oldExpectedMask = process.env.REPAIR_OLD_PREVIEW_DB_ID_MASK;
          const productionProject = process.env.PRODUCTION_PAGES_PROJECT_NAME;
          const productionName = process.env.DETECTED_PRODUCTION_D1_DATABASE_NAME || process.env.PRODUCTION_D1_DATABASE_NAME;
          const productionId = process.env.DETECTED_PRODUCTION_D1_DATABASE_ID || "";
          const repairAction = process.env.REPAIR_ACTION;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;

          if (!token || token.length <= 20) throw new Error("Missing Cloudflare preview token for repair mode.");

          function maskId(id) {
            return typeof id === "string" && id.length > 12 ? `${id.slice(0, 8)}...${id.slice(-4)}` : "unavailable";
          }

          function sanitize(value) {
            let text = String(value ?? "");
            for (const sensitive of [accountId, productionId, token]) {
              if (sensitive) text = text.split(sensitive).join("[redacted]");
            }
            return text
              .replace(/Bearer\s+[A-Za-z0-9._~+/=-]+/gi, "Bearer [redacted-token]")
              .replace(/\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b/gi, "[redacted-id]")
              .replace(/\b[0-9a-f]{32}\b/gi, "[redacted-id]")
              .replace(/[A-Za-z0-9_-]{48,}/g, "[redacted-token]")
              .replace(/(authorization|cookie|session|secret|token)\s*[:=]\s*[^\s,;]+/gi, "$1=[redacted]")
              .slice(0, 1200);
          }

          function fail(message) {
            console.error(sanitize(message));
            process.exit(1);
          }

          function appendSummary(lines) {
            if (summaryPath) fs.appendFileSync(summaryPath, `${lines.join("\n")}\n`);
          }

          function success(result) {
            return Boolean(result?.ok && result?.parsed?.success !== false);
          }

          function databaseId(database) {
            return String(database?.uuid ?? database?.id ?? database?.database_id ?? "");
          }

          async function cloudflare(endpointCategory, apiPath, init = {}, accountScoped = true) {
            const base = accountScoped
              ? `https://api.cloudflare.com/client/v4/accounts/${accountId}`
              : "https://api.cloudflare.com/client/v4";
            const response = await fetch(`${base}${apiPath}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const text = await response.text();
            let parsed;
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = { success: false, errors: [{ code: `http_${response.status}`, message: "non_json_response" }] };
            }
            return {
              ok: response.ok,
              status: response.status,
              parsed,
              endpointCategory,
              contentType: response.headers.get("content-type") || "unknown",
              bodyLength: text.length,
            };
          }

          function cloudflareError(result) {
            const first = Array.isArray(result?.parsed?.errors) ? result.parsed.errors[0] : null;
            return `${result?.status ?? "unknown"} ${first?.code ?? "unknown"} ${sanitize(first?.message ?? "unknown")}`;
          }

          function itemsFromResult(parsed, keys) {
            const result = parsed?.result;
            if (Array.isArray(result)) return result;
            for (const key of keys) {
              if (Array.isArray(result?.[key])) return result[key];
              if (Array.isArray(parsed?.[key])) return parsed[key];
            }
            return [];
          }

          function resultInfo(parsed) {
            return parsed?.result_info ?? parsed?.result?.result_info ?? {};
          }

          async function listPaginated(endpointCategory, basePath, keys) {
            const items = [];
            const perPage = 50;
            for (let page = 1; page <= 50; page += 1) {
              const result = await cloudflare(endpointCategory, `${basePath}?per_page=${perPage}&page=${page}`);
              if (!success(result)) fail(`${endpointCategory} failed: ${cloudflareError(result)}`);
              const pageItems = itemsFromResult(result.parsed, keys);
              items.push(...pageItems);
              const info = resultInfo(result.parsed);
              const totalPages = Number(info.total_pages ?? 0);
              if (totalPages > 0 && page >= totalPages) break;
              if (pageItems.length < perPage) break;
            }
            return items;
          }

          async function getProject(name) {
            const result = await cloudflare("pages-project-detail", `/pages/projects/${encodeURIComponent(name)}`);
            if (!success(result)) fail(`Could not read Pages project ${name}: ${cloudflareError(result)}`);
            return result.parsed?.result;
          }

          function envValue(config, key) {
            const value = config?.env_vars?.[key];
            if (value && typeof value === "object") return String(value.value ?? "");
            return String(value ?? "");
          }

          function collectD1Bindings(configValue, context) {
            const bindings = [];
            if (!configValue || typeof configValue !== "object") return bindings;
            if (Array.isArray(configValue)) {
              for (const value of configValue) {
                const id = String(value?.id ?? value?.database_id ?? "");
                const name = String(value?.database_name ?? value?.name ?? "");
                const binding = String(value?.binding ?? value?.name ?? "unnamed");
                if (id || name) bindings.push({ ...context, binding, id, name });
              }
              return bindings;
            }
            for (const [binding, value] of Object.entries(configValue)) {
              if (typeof value === "string") {
                bindings.push({ ...context, binding, id: value, name: "" });
              } else if (value && typeof value === "object") {
                bindings.push({
                  ...context,
                  binding,
                  id: String(value.id ?? value.database_id ?? ""),
                  name: String(value.database_name ?? value.name ?? ""),
                });
              }
            }
            return bindings.filter((binding) => binding.id || binding.name);
          }

          function projectD1Bindings(project, databasesById = new Map()) {
            const bindings = [];
            for (const environment of ["production", "preview"]) {
              const config = project?.deployment_configs?.[environment] ?? {};
              for (const binding of collectD1Bindings(config.d1_databases, {
                source: "pages",
                project: project?.name ?? "unknown",
                environment,
              })) {
                bindings.push({ ...binding, resolvedName: binding.name || databasesById.get(binding.id) || "unknown" });
              }
            }
            return bindings;
          }

          function bindingMatches(binding, name, id) {
            return binding.id === id || binding.name === name || binding.resolvedName === name;
          }

          function classifyBinding(binding, ids) {
            if (!binding?.id && !binding?.name) return "unknown";
            if (bindingMatches(binding, replacementName, ids.replacementId)) return "replacement preview D1";
            if (bindingMatches(binding, oldName, ids.oldId)) return "old stale preview D1";
            if (bindingMatches(binding, productionName, ids.productionId)) return "real production D1";
            return "unknown";
          }

          function latestDeployment(project) {
            const deployment = project?.latest_deployment ?? project?.canonical_deployment ?? {};
            const trigger = deployment.deployment_trigger?.metadata ?? deployment.source?.config ?? {};
            return {
              id: maskId(String(deployment.id ?? "")),
              url: String(deployment.url ?? deployment.aliases?.[0] ?? "unknown"),
              commit: String(trigger.commit_hash ?? trigger.commit ?? deployment.source?.config?.commit_hash ?? "unknown"),
              branch: String(trigger.branch ?? deployment.source?.config?.branch ?? "unknown"),
            };
          }

          function productionProjectSignature(project) {
            return projectD1Bindings(project)
              .filter((binding) => binding.binding === "DB")
              .map((binding) => `${binding.environment}:${binding.id || binding.name}`)
              .sort()
              .join("|");
          }

          function withFalseDiscordFlags(config) {
            const envVars = { ...(config?.env_vars ?? {}) };
            envVars.DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED = { type: "plain_text", value: "false" };
            envVars.DZN_DISCORD_NOTIFICATIONS_ENABLED = { type: "plain_text", value: "false" };
            return { ...(config ?? {}), env_vars: envVars };
          }

          function patchD1Binding(config, replacementId) {
            const currentD1 = config?.d1_databases && typeof config.d1_databases === "object" && !Array.isArray(config.d1_databases)
              ? { ...config.d1_databases }
              : {};
            return {
              ...withFalseDiscordFlags(config),
              d1_databases: {
                ...currentD1,
                DB: { id: replacementId },
              },
            };
          }

          function verifyProjectSafe(project, replacementId) {
            for (const environment of ["production", "preview"]) {
              const config = project?.deployment_configs?.[environment] ?? {};
              const db = config?.d1_databases?.DB;
              const dbId = String(db?.id ?? db?.database_id ?? db ?? "");
              if (dbId !== replacementId) fail(`${environment} config DB binding does not point to replacement after repair.`);
              if (envValue(config, "DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED") !== "false") fail(`${environment} server announcements flag is not false after repair.`);
              if (envValue(config, "DZN_DISCORD_NOTIFICATIONS_ENABLED") !== "false") fail(`${environment} Discord notifications flag is not false after repair.`);
            }
          }

          void (async () => {
            if (projectName !== "dzn-network-discord-announcements-preview") fail("Repair preview project constant mismatch.");
            if (projectName === productionProject) fail("Refusing to repair real production Pages project.");
            if (replacementName === productionName || oldName === productionName) fail("Refusing to repair using production D1 name.");

            const verify = await cloudflare("token-verify", "/user/tokens/verify", {}, false);
            if (!success(verify)) fail(`Cloudflare token verification failed: ${cloudflareError(verify)}`);

            const databases = await listPaginated("d1-database-list", "/d1/database", ["databases"]);
            const databasesById = new Map(databases.map((database) => [databaseId(database), String(database?.name ?? "unnamed")]));
            const oldDatabase = databases.find((database) => String(database?.name ?? "") === oldName);
            const replacementDatabase = databases.find((database) => String(database?.name ?? "") === replacementName);
            const productionDatabase = databases.find((database) => String(database?.name ?? "") === productionName);
            if (!oldDatabase) fail("Old stale preview D1 was not found.");
            if (!replacementDatabase) fail("Replacement preview D1 was not found.");
            const oldId = databaseId(oldDatabase);
            const replacementId = databaseId(replacementDatabase);
            const resolvedProductionId = productionId || databaseId(productionDatabase);
            const oldMask = maskId(oldId);
            const replacementMask = maskId(replacementId);
            if (oldMask !== oldExpectedMask) fail(`Old stale preview D1 masked ID changed; expected ${oldExpectedMask}, got ${oldMask}.`);
            if (oldId === resolvedProductionId || replacementId === resolvedProductionId) fail("Production D1 ID detected in repair path.");

            const project = await getProject(projectName);
            const productionProjectRecord = await getProject(productionProject);
            const productionSignature = productionProjectSignature(productionProjectRecord);
            const ids = { oldId, replacementId, productionId: resolvedProductionId };
            const bindings = projectD1Bindings(project, databasesById).filter((binding) => binding.binding === "DB");
            const productionBinding = bindings.find((binding) => binding.environment === "production");
            const previewBinding = bindings.find((binding) => binding.environment === "preview");
            const productionClassification = classifyBinding(productionBinding, ids);
            const previewClassification = classifyBinding(previewBinding, ids);
            const quarantined = productionClassification === "real production D1" || previewClassification === "real production D1";
            const latest = latestDeployment(project);

            for (const environment of ["production", "preview"]) {
              const config = project?.deployment_configs?.[environment] ?? {};
              console.log(`${environment} config DB binding classification: ${environment === "production" ? productionClassification : previewClassification}`);
              console.log(`${environment} config DB binding ID: ${maskId(String(config?.d1_databases?.DB?.id ?? config?.d1_databases?.DB?.database_id ?? config?.d1_databases?.DB ?? ""))}`);
              console.log(`${environment} DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED: ${envValue(config, "DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED") || "unset"}`);
              console.log(`${environment} DZN_DISCORD_NOTIFICATIONS_ENABLED: ${envValue(config, "DZN_DISCORD_NOTIFICATIONS_ENABLED") || "unset"}`);
            }
            console.log(`Repair action: ${repairAction}`);
            console.log(`Latest deployment ID: ${latest.id}`);
            console.log(`Latest immutable URL: ${sanitize(latest.url)}`);
            console.log(`Latest deployment commit: ${sanitize(latest.commit)}`);
            console.log(`Latest deployment branch: ${sanitize(latest.branch)}`);
            console.log(`Preview project quarantined: ${quarantined ? "yes" : "no"}`);
            console.log(`Route probes allowed before repair: no`);

            appendSummary([
              "## Rebound Discord Preview Repair",
              "",
              `- Repair action: ${repairAction}`,
              `- Preview project: ${projectName}`,
              `- Replacement preview D1: ${replacementName}`,
              `- Replacement preview D1 ID: ${replacementMask}`,
              `- Old stale preview D1: ${oldName}`,
              `- Old stale preview D1 ID: ${oldMask}`,
              `- Production config DB classification: ${productionClassification}`,
              `- Preview config DB classification: ${previewClassification}`,
              `- Preview quarantined: ${quarantined ? "yes" : "no"}`,
              `- Latest deployment ID: ${latest.id}`,
              `- Latest immutable URL: ${sanitize(latest.url)}`,
              `- Latest deployment commit: ${sanitize(latest.commit)}`,
              `- Latest deployment branch: ${sanitize(latest.branch)}`,
              "- Dry-run patches Pages: no",
              "- Dry-run deploys Pages: no",
              "- Dry-run route probes: no",
              "- Discord messages sent: false",
            ]);

            if (repairAction === "dry-run") {
              console.log("Rebound Discord preview repair dry-run completed. No Pages binding changed and no route probes were made.");
              return;
            }

            const productionBranch = String(project?.production_branch ?? "");
            if (!productionBranch) fail("Discord preview Pages project production_branch is not configured.");
            const patchPayload = {
              deployment_configs: {
                production: patchD1Binding(project.deployment_configs?.production ?? {}, replacementId),
                preview: patchD1Binding(project.deployment_configs?.preview ?? {}, replacementId),
              },
            };
            console.log(`Applying preview-only repair config patch: project=${projectName} replacement=${replacementMask}`);
            const patch = await cloudflare("pages-project-patch", `/pages/projects/${encodeURIComponent(projectName)}`, {
              method: "PATCH",
              body: JSON.stringify(patchPayload),
            });
            if (!success(patch)) fail(`Preview repair config patch failed: ${cloudflareError(patch)}`);
            const afterProject = await getProject(projectName);
            verifyProjectSafe(afterProject, replacementId);

            fs.appendFileSync(process.env.GITHUB_ENV, [
              `REPAIR_REPLACEMENT_D1_DATABASE_ID=${replacementId}`,
              `REPAIR_OLD_D1_DATABASE_ID=${oldId}`,
              `REPAIR_PREVIEW_PROJECT_BRANCH=${productionBranch}`,
              `REPAIR_PRODUCTION_PROJECT_SIGNATURE=${Buffer.from(productionSignature).toString("base64")}`,
              `REPAIR_PREVIEW_STABLE_URL=https://${projectName}.pages.dev`,
              "",
            ].join("\n"));
            appendSummary([
              "",
              "- Repair config patch result: success",
              "- Both preview project environments use replacement D1 before deploy: yes",
              "- Both Discord flags false before deploy: yes",
            ]);
          })().catch((error) => fail(error instanceof Error ? error.message : String(error)));
          NODE

      - name: Prepare pinned main runtime for rebound Discord preview repair
        if: ${{ inputs.mode == 'repair-rebound-discord-preview' && inputs.repair_action == 'apply' }}
        run: |
          set -euo pipefail

          git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main" --depth=1
          CURRENT_MAIN_SHA="$(git rev-parse origin/main)"
          if [ "${CURRENT_MAIN_SHA}" != "${APPROVED_MAIN_RUNTIME_SHA}" ]; then
            echo "::error::origin/main moved. Expected ${APPROVED_MAIN_RUNTIME_SHA}, got ${CURRENT_MAIN_SHA}."
            exit 1
          fi
          if [ -e runtime-main ]; then
            echo "::error::runtime-main checkout path already exists."
            exit 1
          fi
          git worktree add --detach runtime-main "${APPROVED_MAIN_RUNTIME_SHA}"
          RUNTIME_HEAD="$(git -C runtime-main rev-parse HEAD)"
          RUNTIME_TREE="$(git -C runtime-main rev-parse "HEAD^{tree}")"
          if [ "${RUNTIME_HEAD}" != "${APPROVED_MAIN_RUNTIME_SHA}" ]; then
            echo "::error::Pinned repair runtime checkout does not match approved main SHA."
            exit 1
          fi
          printf "REPAIR_RUNTIME_TREE_SHA=%s\n" "${RUNTIME_TREE}" >> "$GITHUB_ENV"
          {
            echo ""
            echo "## Rebound Discord Preview Repair Runtime"
            echo ""
            echo "- Workflow source branch: ${CANDIDATE_BRANCH}"
            echo "- Workflow source SHA: ${CANDIDATE_SHA}"
            echo "- Runtime source SHA: ${RUNTIME_HEAD}"
            echo "- Runtime source tree: ${RUNTIME_TREE}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build pinned main runtime for rebound Discord preview repair
        if: ${{ inputs.mode == 'repair-rebound-discord-preview' && inputs.repair_action == 'apply' }}
        working-directory: runtime-main
        env:
          DZN_PULSE_ENABLED: "true"
          DZN_DISCORD_NOTIFICATIONS_ENABLED: "false"
          DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED: "false"
          DZN_APP_URL: https://dzn-network-discord-announcements-preview.pages.dev
          NEXT_PUBLIC_APP_URL: https://dzn-network-discord-announcements-preview.pages.dev
        run: |
          set -euo pipefail

          npm ci
          npm run test:github-workflows
          npm run test:discord-server-announcements
          npm run test:owner-console
          npm run test
          npm run lint
          npm run build
          rm -rf .pages-functions
          mkdir -p .pages-functions
          ./node_modules/.bin/wrangler pages functions build functions \
            --outdir .pages-functions \
            --build-output-directory out \
            --output-routes-path out/_routes.json \
            --minify
          node scripts/patch-pages-routes.mjs
          test -s .pages-functions/index.js
          cp .pages-functions/index.js out/_worker.js
          test -s out/_worker.js
          cmp -s .pages-functions/index.js out/_worker.js
          git diff --check

          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const workerPath = "out/_worker.js";
          const functionsWorkerPath = ".pages-functions/index.js";
          const routesPath = "out/_routes.json";
          const routes = JSON.parse(fs.readFileSync(routesPath, "utf8"));
          const requiredIncludes = ["/api/*", "/owner", "/owner/*"];
          function uniqueRoutes(values) {
            return [...new Set((Array.isArray(values) ? values : []).filter((value) => typeof value === "string" && value.trim()).map((value) => value.trim()))];
          }
          function isSplat(route) {
            return typeof route === "string" && route.endsWith("/*");
          }
          function splatPrefix(route) {
            return route.slice(0, -1);
          }
          function normalizeRoutes(values) {
            const source = uniqueRoutes(values);
            const splats = source.filter(isSplat);
            const removed = [];
            const normalized = source.filter((route) => {
              for (const splat of splats) {
                if (route === splat) continue;
                if (route.startsWith(splatPrefix(splat))) {
                  removed.push({ route, coveredBy: splat });
                  return false;
                }
              }
              return true;
            }).sort();
            return { routes: normalized, removed };
          }
          function assertNoSplatOverlap(values, label) {
            const routes = uniqueRoutes(values);
            for (const splat of routes.filter(isSplat)) {
              const prefix = splatPrefix(splat);
              const overlap = routes.find((route) => route !== splat && route.startsWith(prefix));
              if (overlap) throw new Error(`${label} route overlap: ${splat} covers ${overlap}.`);
            }
          }
          const includeResult = normalizeRoutes([...(routes.include ?? []), ...requiredIncludes]);
          const excludeResult = normalizeRoutes(routes.exclude ?? []);
          const finalRoutes = {
            version: routes.version ?? 1,
            include: includeResult.routes,
            exclude: excludeResult.routes,
          };
          assertNoSplatOverlap(finalRoutes.include, "include");
          assertNoSplatOverlap(finalRoutes.exclude, "exclude");
          fs.writeFileSync(routesPath, `${JSON.stringify(finalRoutes, null, 2)}\n`);
          const include = finalRoutes.include;
          const exclude = finalRoutes.exclude;
          for (const route of requiredIncludes) {
            if (!include.includes(route)) throw new Error(`out/_routes.json missing ${route}.`);
          }
          if (!fs.statSync(functionsWorkerPath).size) throw new Error(".pages-functions/index.js is empty.");
          const workerBytes = fs.readFileSync(workerPath);
          const functionsWorkerBytes = fs.readFileSync(functionsWorkerPath);
          const workerHash = crypto.createHash("sha256").update(workerBytes).digest("hex");
          const functionsWorkerHash = crypto.createHash("sha256").update(functionsWorkerBytes).digest("hex");
          if (workerHash !== functionsWorkerHash) throw new Error("out/_worker.js does not match .pages-functions/index.js.");
          console.log("Repair pinned main runtime package summary:", JSON.stringify({
            workerByteSize: workerBytes.length,
            workerShaPrefix: workerHash.slice(0, 12),
            includeCount: include.length,
            excludeCount: exclude.length,
            hasApiWildcard: include.includes("/api/*"),
            hasOwner: include.includes("/owner"),
            hasOwnerWildcard: include.includes("/owner/*"),
            removedOverlappedIncludeRoutes: includeResult.removed.length,
            removedOverlappedExcludeRoutes: excludeResult.removed.length,
          }));
          NODE

      - name: Deploy repaired rebound Discord preview from isolated directory
        if: ${{ inputs.mode == 'repair-rebound-discord-preview' && inputs.repair_action == 'apply' }}
        env:
          DZN_PULSE_ENABLED: "true"
          DZN_DISCORD_NOTIFICATIONS_ENABLED: "false"
          DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED: "false"
        run: |
          set -euo pipefail

          if [ "${REPAIR_PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
            echo "::error::Refusing to deploy production Pages project from repair mode."
            exit 1
          fi
          if [ "$(git -C runtime-main rev-parse HEAD)" != "${APPROVED_MAIN_RUNTIME_SHA}" ]; then
            echo "::error::Runtime checkout changed before repair deploy."
            exit 1
          fi
          if [ "${DZN_DISCORD_NOTIFICATIONS_ENABLED}" != "false" ] || [ "${DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED}" != "false" ]; then
            echo "::error::Discord flags must remain false for repair deployment."
            exit 1
          fi
          if [ -z "${OWNER_CONSOLE_CF_TOKEN:-${CLOUDFLARE_API_TOKEN:-}}" ]; then
            echo "::error::Missing Cloudflare API token for repair deployment."
            exit 1
          fi
          export CLOUDFLARE_API_TOKEN="${OWNER_CONSOLE_CF_TOKEN:-${CLOUDFLARE_API_TOKEN:-}}"
          if [ ! -s runtime-main/out/_worker.js ]; then
            echo "::error::Compiled Pages Functions worker is missing from runtime-main/out."
            exit 1
          fi
          if [ ! -s runtime-main/out/_routes.json ]; then
            echo "::error::Cloudflare Pages routes are missing from runtime-main/out."
            exit 1
          fi

          DEPLOY_ROOT="${RUNNER_TEMP}/dzn-discord-preview-deploy"
          case "${DEPLOY_ROOT}" in
            "${RUNNER_TEMP}"/*) ;;
            *)
              echo "::error::Repair deployment root must stay inside RUNNER_TEMP."
              exit 1
              ;;
          esac
          rm -rf "${DEPLOY_ROOT}"
          mkdir -p "${DEPLOY_ROOT}"
          cp -R runtime-main/out "${DEPLOY_ROOT}/out"
          test -s "${DEPLOY_ROOT}/out/_worker.js"
          test -s "${DEPLOY_ROOT}/out/_routes.json"
          RUNTIME_WORKER_SHA="$(sha256sum runtime-main/out/_worker.js | awk '{print $1}')"
          DEPLOY_WORKER_SHA="$(sha256sum "${DEPLOY_ROOT}/out/_worker.js" | awk '{print $1}')"
          if [ "${RUNTIME_WORKER_SHA}" != "${DEPLOY_WORKER_SHA}" ]; then
            echo "::error::Isolated deploy worker does not match runtime-main/out/_worker.js."
            exit 1
          fi

          if find "${DEPLOY_ROOT}" -name wrangler.toml -o -name wrangler.json -o -name wrangler.jsonc -o -name .dev.vars -o -name .env | grep -q .; then
            echo "::error::Unapproved Wrangler or env configuration is deploy-visible."
            find "${DEPLOY_ROOT}" -name wrangler.toml -o -name wrangler.json -o -name wrangler.jsonc -o -name .dev.vars -o -name .env | sed 's#^#blocked config path: #'
            exit 1
          fi
          if [ "${REPAIR_PREVIEW_PROJECT_NAME}" != "dzn-network-discord-announcements-preview" ] || [ "${REPAIR_PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
            echo "::error::Repair deploy target is not the fixed preview Pages project."
            exit 1
          fi
          if [ -n "${DETECTED_PRODUCTION_D1_DATABASE_ID:-}" ] && grep -R -F "${DETECTED_PRODUCTION_D1_DATABASE_ID}" "${DEPLOY_ROOT}" >/tmp/dzn-repair-production-id-leak.txt 2>/dev/null; then
            echo "::error::Deployment-visible output contains the production D1 ID."
            cut -d: -f1 /tmp/dzn-repair-production-id-leak.txt | sort -u | sed 's#^#blocked file category: #'
            exit 1
          fi
          CONFIG_CANDIDATES="$(find "${DEPLOY_ROOT}" \( -name '*.toml' -o -name 'wrangler.json' -o -name 'wrangler.jsonc' -o -name '.dev.vars' -o -name '.env' \) -print)"
          if [ -n "${CONFIG_CANDIDATES}" ] && printf '%s\n' "${CONFIG_CANDIDATES}" | xargs grep -E 'name[[:space:]]*=[[:space:]]*"dzn-network"|database_name[[:space:]]*=[[:space:]]*"dzn_network_db"' >/tmp/dzn-repair-production-assignment-leak.txt 2>/dev/null; then
            echo "::error::Deployment-visible configuration contains production project or D1 assignment syntax."
            cut -d: -f1 /tmp/dzn-repair-production-assignment-leak.txt | sort -u | sed 's#^#blocked config category: #'
            exit 1
          fi
          echo "Deployment-visible worker and route package verified: workerShaPrefix=${DEPLOY_WORKER_SHA:0:12}"
          echo "Deployment-visible configuration scan passed."

          cd "${DEPLOY_ROOT}"
          "${GITHUB_WORKSPACE}/runtime-main/node_modules/.bin/wrangler" pages deploy out \
            --project-name "${REPAIR_PREVIEW_PROJECT_NAME}" \
            --branch "${REPAIR_PREVIEW_PROJECT_BRANCH}" \
            --commit-hash "${APPROVED_MAIN_RUNTIME_SHA}" \
            --commit-message "Repair rebound Discord preview runtime ${APPROVED_MAIN_RUNTIME_SHA}" \
            | tee repaired-rebound-discord-preview-deploy.txt

          node <<'NODE'
          const fs = require("node:fs");
          const projectName = process.env.REPAIR_PREVIEW_PROJECT_NAME;
          const stableUrl = `https://${projectName}.pages.dev`;
          const text = fs.readFileSync("repaired-rebound-discord-preview-deploy.txt", "utf8");
          const urls = [...new Set((text.match(/https:\/\/[^\s"'<>]+?\.pages\.dev/g) ?? []).map((url) => url.replace(/[),.;]+$/, "")))];
          const immutableUrl = urls.find((url) => url !== stableUrl) ?? "";
          if (!immutableUrl) throw new Error("Wrangler did not report a distinct immutable preview URL for the repair deployment.");
          const deploymentId = immutableUrl.match(/^https:\/\/([^.]+)\./)?.[1] ?? "unknown";
          fs.appendFileSync(process.env.GITHUB_ENV, [
            `REPAIR_IMMUTABLE_PREVIEW_URL=${immutableUrl}`,
            `REPAIR_STABLE_PREVIEW_URL=${stableUrl}`,
            `REPAIR_DEPLOYMENT_ID=${deploymentId}`,
            "",
          ].join("\n"));
          console.log(`Repair preview deployment ID: ${deploymentId}`);
          console.log(`Repair immutable preview URL: ${immutableUrl}`);
          console.log(`Repair stable preview URL: ${stableUrl}`);
          NODE

      - name: Verify repaired rebound Discord preview
        if: ${{ inputs.mode == 'repair-rebound-discord-preview' && inputs.repair_action == 'apply' }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.OWNER_CONSOLE_CF_TOKEN || process.env.CLOUDFLARE_API_TOKEN;
          const projectName = process.env.REPAIR_PREVIEW_PROJECT_NAME;
          const replacementName = process.env.REPAIR_REPLACEMENT_PREVIEW_DB_NAME;
          const oldName = process.env.REPAIR_OLD_PREVIEW_DB_NAME;
          const productionProject = process.env.PRODUCTION_PAGES_PROJECT_NAME;
          const productionName = process.env.DETECTED_PRODUCTION_D1_DATABASE_NAME || process.env.PRODUCTION_D1_DATABASE_NAME;
          const productionId = process.env.DETECTED_PRODUCTION_D1_DATABASE_ID || "";
          const replacementId = process.env.REPAIR_REPLACEMENT_D1_DATABASE_ID;
          const oldId = process.env.REPAIR_OLD_D1_DATABASE_ID;
          const expectedProductionSignature = Buffer.from(process.env.REPAIR_PRODUCTION_PROJECT_SIGNATURE || "", "base64").toString("utf8");
          const immutableUrl = process.env.REPAIR_IMMUTABLE_PREVIEW_URL;
          const stableUrl = process.env.REPAIR_STABLE_PREVIEW_URL || `https://${projectName}.pages.dev`;
          const productionUrl = "https://dzn-network.pages.dev";
          const forbiddenText = [
            "Error 1102",
            "Worker exceeded resource limits",
            "Minified React error #",
            "stack trace",
            "TOKEN_ENCRYPTION_KEY",
            "SESSION_SECRET",
            "encrypted_token",
          ];

          function fail(message) {
            console.error(String(message).replace(/[A-Za-z0-9_-]{48,}/g, "[redacted-token]"));
            process.exit(1);
          }
          function assert(condition, message) {
            if (!condition) fail(message);
          }
          function envValue(config, key) {
            const value = config?.env_vars?.[key];
            if (value && typeof value === "object") return String(value.value ?? "");
            return String(value ?? "");
          }
          function collectD1Bindings(configValue, context) {
            const bindings = [];
            if (!configValue || typeof configValue !== "object") return bindings;
            for (const [binding, value] of Object.entries(configValue)) {
              if (typeof value === "string") bindings.push({ ...context, binding, id: value, name: "" });
              else if (value && typeof value === "object") bindings.push({
                ...context,
                binding,
                id: String(value.id ?? value.database_id ?? ""),
                name: String(value.database_name ?? value.name ?? ""),
              });
            }
            return bindings.filter((binding) => binding.id || binding.name);
          }
          function projectD1Bindings(project) {
            const bindings = [];
            for (const environment of ["production", "preview"]) {
              const config = project?.deployment_configs?.[environment] ?? {};
              bindings.push(...collectD1Bindings(config.d1_databases, {
                project: project?.name ?? "unknown",
                environment,
              }));
            }
            return bindings;
          }
          function bindingMatches(binding, name, id) {
            return binding.id === id || binding.name === name;
          }
          function productionProjectSignature(project) {
            return projectD1Bindings(project)
              .filter((binding) => binding.binding === "DB")
              .map((binding) => `${binding.environment}:${binding.id || binding.name}`)
              .sort()
              .join("|");
          }
          function patchD1Binding(config, replacementId) {
            const currentD1 = config?.d1_databases && typeof config.d1_databases === "object" && !Array.isArray(config.d1_databases)
              ? { ...config.d1_databases }
              : {};
            const envVars = { ...(config?.env_vars ?? {}) };
            envVars.DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED = { type: "plain_text", value: "false" };
            envVars.DZN_DISCORD_NOTIFICATIONS_ENABLED = { type: "plain_text", value: "false" };
            return { ...(config ?? {}), env_vars: envVars, d1_databases: { ...currentD1, DB: { id: replacementId } } };
          }
          async function cloudflare(path, init = {}) {
            const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const parsed = await response.json().catch(() => null);
            if (!response.ok || parsed?.success === false) throw new Error(`Cloudflare API failed: ${response.status}`);
            return parsed.result;
          }
          async function getProject(name) {
            return await cloudflare(`/pages/projects/${encodeURIComponent(name)}`);
          }
          async function repatchAndFail(reason) {
            console.log(`PREVIEW_DEPLOY_CONFIGURATION_DRIFT: ${reason}`);
            const current = await getProject(projectName);
            await cloudflare(`/pages/projects/${encodeURIComponent(projectName)}`, {
              method: "PATCH",
              body: JSON.stringify({
                deployment_configs: {
                  production: patchD1Binding(current.deployment_configs?.production ?? {}, replacementId),
                  preview: patchD1Binding(current.deployment_configs?.preview ?? {}, replacementId),
                },
              }),
            });
            const repaired = await getProject(projectName);
            for (const environment of ["production", "preview"]) {
              const config = repaired?.deployment_configs?.[environment] ?? {};
              const db = config?.d1_databases?.DB;
              const dbId = String(db?.id ?? db?.database_id ?? db ?? "");
              assert(dbId === replacementId, `${environment} repatch did not restore replacement D1.`);
              assert(envValue(config, "DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED") === "false", `${environment} server announcements flag not false after drift repatch.`);
              assert(envValue(config, "DZN_DISCORD_NOTIFICATIONS_ENABLED") === "false", `${environment} Discord notifications flag not false after drift repatch.`);
            }
            fail("PREVIEW_DEPLOY_CONFIGURATION_DRIFT repaired on preview project; route probes skipped.");
          }
          async function d1Query(sql) {
            if (!/^\s*(SELECT|PRAGMA)\b/i.test(sql)) throw new Error("Refusing non-read-only verification query.");
            const result = await cloudflare(`/d1/database/${encodeURIComponent(replacementId)}/query`, {
              method: "POST",
              body: JSON.stringify({ sql }),
            });
            const payload = Array.isArray(result) ? result : [result];
            return payload.flatMap((item) => item?.results ?? []);
          }
          async function fetchSafe(base, path) {
            const response = await fetch(`${base}${path}`, {
              redirect: "manual",
              headers: {
                "User-Agent": "dzn-rebound-discord-preview-repair",
                "Cache-Control": "no-cache",
                Pragma: "no-cache",
              },
            });
            const text = await response.text().catch(() => "");
            for (const marker of forbiddenText) {
              if (text.includes(marker)) throw new Error(`${base}${path} exposed forbidden marker ${marker}`);
            }
            return {
              response,
              text,
              status: response.status,
              contentType: response.headers.get("content-type") || "unknown",
              bodyLength: text.length,
            };
          }
          async function fetchPath(base, path, expectedStatus) {
            const result = await fetchSafe(base, path);
            if (result.status !== expectedStatus) {
              throw new Error(`${base}${path} expected ${expectedStatus}, got ${result.status}; content-type=${result.contentType}; body-length=${result.bodyLength}`);
            }
            return result;
          }
          function statusSummary(result) {
            return `status=${result.status} content-type=${result.contentType} body-length=${result.bodyLength}`;
          }
          function wait(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }
          async function expectOwnerApi401(base, path) {
            const result = await fetchSafe(base, path);
            if (result.status === 404) {
              throw new Error(`PREVIEW_PAGES_FUNCTIONS_WORKER_MISSING: ${base}${path} returned 404; ${statusSummary(result)}`);
            }
            if (result.status === 500 || result.status === 503) {
              throw new Error(`PREVIEW_OWNER_API_RUNTIME_ERROR: ${base}${path} returned ${result.status}; ${statusSummary(result)}`);
            }
            if (result.status !== 401) {
              throw new Error(`${base}${path} expected 401, got ${result.status}; ${statusSummary(result)}`);
            }
            return result;
          }
          async function verifyBase(base) {
            let lastError = "";
            for (let attempt = 1; attempt <= 12; attempt += 1) {
              try {
                await fetchPath(base, "/", 200);
                const owner = await fetchSafe(base, "/owner");
                if (owner.status === 200) {
                  const ownerApi = await fetchSafe(base, "/api/owner/overview");
                  throw new Error(`PREVIEW_PAGES_FUNCTIONS_WORKER_MISSING: ${base}/owner returned 200 instead of 302; owner_api_${statusSummary(ownerApi)}`);
                }
                if (owner.status !== 302) {
                  throw new Error(`${base}/owner expected 302, got ${owner.status}; ${statusSummary(owner)}`);
                }
                const location = owner.response.headers.get("location") || "";
                assert(location.includes("/login"), `${base}/owner did not redirect to login.`);
                await expectOwnerApi401(base, "/api/owner/overview");
                await expectOwnerApi401(base, "/api/owner/discord/overview");
                await fetchPath(base, "/api/public/servers", 200);
                await fetchPath(base, "/api/public/home-stats", 200);
                await fetchPath(base, "/api/public/leaderboards", 200);
                await fetchPath(base, "/api/public/server-rail", 200);
                const pulse = await fetchPath(base, "/api/dzn-pulse/config", 200);
                const parsed = JSON.parse(pulse.text);
                assert(parsed.discordNotificationsEnabled === false, `${base}/api/dzn-pulse/config did not report discordNotificationsEnabled=false.`);
                if (attempt > 1) console.log(`${base} preview route verification passed on attempt ${attempt}.`);
                return;
              } catch (error) {
                lastError = error instanceof Error ? error.message : String(error);
                console.log(`Preview route verification attempt ${attempt}/12 failed for ${base}: ${lastError}`);
                if (attempt < 12) await wait(5000);
              }
            }
            fail(`Preview route verification failed after 12 attempts for ${base}: ${lastError}`);
          }
          void (async () => {
            assert(projectName !== productionProject, "Repair verification project is production.");
            const project = await getProject(projectName);
            const projectBindings = projectD1Bindings(project).filter((binding) => binding.binding === "DB");
            const oldProjectBindings = projectBindings.filter((binding) => bindingMatches(binding, oldName, oldId));
            const replacementProjectBindings = projectBindings.filter((binding) => bindingMatches(binding, replacementName, replacementId));
            for (const environment of ["production", "preview"]) {
              const config = project?.deployment_configs?.[environment] ?? {};
              const db = config?.d1_databases?.DB;
              const dbId = String(db?.id ?? db?.database_id ?? db ?? "");
              if (dbId !== replacementId) await repatchAndFail(`${environment} config DB binding drifted away from replacement.`);
              if (dbId === productionId || dbId === productionName) await repatchAndFail(`${environment} config DB binding drifted to production D1.`);
              if (envValue(config, "DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED") !== "false") await repatchAndFail(`${environment} server announcements flag drifted.`);
              if (envValue(config, "DZN_DISCORD_NOTIFICATIONS_ENABLED") !== "false") await repatchAndFail(`${environment} Discord notifications flag drifted.`);
            }
            if (oldProjectBindings.length !== 0) await repatchAndFail(`old D1 project-config bindings=${oldProjectBindings.length}`);
            if (replacementProjectBindings.length !== 2) await repatchAndFail(`replacement D1 project-config bindings=${replacementProjectBindings.length}`);
            const productionProjectRecord = await getProject(productionProject);
            assert(productionProjectSignature(productionProjectRecord) === expectedProductionSignature, "Real production Pages project D1 binding signature changed.");

            const rowCountRows = await d1Query("SELECT COUNT(*) AS row_count FROM discord_announcement_posts;");
            const rowCount = Number(rowCountRows[0]?.row_count ?? NaN);
            assert(rowCount === 0, `discord_announcement_posts row count should remain 0, got ${rowCount}.`);
            await verifyBase(immutableUrl);
            await verifyBase(stableUrl);
            await fetchPath(productionUrl, "/", 200);
            await fetchPath(productionUrl, "/owner", 302);
            await fetchPath(productionUrl, "/api/owner/overview", 401);
            console.log(`Repaired rebound Discord preview verified: immutable=${immutableUrl} stable=${stableUrl}`);
            console.log(`Replacement DB ${replacementName} active; old DB ${oldName} project-config bindings=0.`);
            console.log("Discord messages sent: false");
          })().catch((error) => fail(error instanceof Error ? error.message : String(error)));
          NODE

      - name: Resolve or create preview D1 database
        if: ${{ inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          case "${PREVIEW_DB_NAME}" in
            *owner_console_preview*) ;;
            *)
              echo "::error::Refusing D1 command for non-preview owner console database name."
              exit 1
              ;;
          esac

          node <<'NODE'
          const fs = require("node:fs");
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.OWNER_CONSOLE_CF_TOKEN;
          const previewName = process.env.PREVIEW_DB_NAME;
          const productionName = process.env.DETECTED_PRODUCTION_D1_DATABASE_NAME || process.env.PRODUCTION_D1_DATABASE_NAME;
          const productionId = process.env.DETECTED_PRODUCTION_D1_DATABASE_ID;
          const configuredLimit = Number(process.env.D1_ACCOUNT_DATABASE_LIMIT || "10");
          function maskId(id) {
            return typeof id === "string" && id.length > 12 ? `${id.slice(0, 8)}...${id.slice(-4)}` : "unavailable";
          }
          function sanitizeMessage(message) {
            return String(message ?? "")
              .replace(/\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b/gi, "[redacted-id]")
              .replace(/[A-Za-z0-9_-]{48,}/g, "[redacted-token]");
          }
          function isApprovedPreviewName(name) {
            return /^dzn_network_db_owner_console_preview_/.test(name)
              || /^dzn_network_db_discord_announcements_preview_/.test(name)
              || name === "dzn_network_db_discord_announcements_preview"
              || name === "dzn_network_db_discord_control_preview"
              || name === "dzn_network_db_discord_phase_2a_preview"
              || name === "dzn_network_db_server_lifecycle_preview"
              || name === "dzn_network_db_server_advertising_preview"
              || name === "dzn_network_db_dzn_pulse_preview";
          }
          function databaseId(database) {
            return database?.uuid ?? database?.id ?? "";
          }
          function cleanupCandidates(databases) {
            return databases
              .filter((item) => {
                const name = String(item?.name ?? "");
                const id = databaseId(item);
                return name !== productionName && id !== productionId && isApprovedPreviewName(name) && name !== previewName;
              })
              .map((item) => ({ name: item.name, id: maskId(databaseId(item)), created_at: item.created_at ?? item.created_on ?? "unknown" }));
          }
          async function api(path, init = {}) {
            const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const text = await response.text();
            let parsed;
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = { success: false, errors: [{ message: "Cloudflare API returned non-JSON response." }] };
            }
            if (!response.ok || parsed.success === false) {
              const message = parsed.errors?.map((error) => error.message).join("; ") || `HTTP ${response.status}`;
              throw new Error(message);
            }
            return parsed;
          }
          function writeCapacitySummary({ databases, database, candidates }) {
            const lines = [
              "## Preview D1 Capacity Preflight",
              "",
              `- Current D1 database count: ${databases.length}`,
              `- Configured D1 database limit: ${Number.isFinite(configuredLimit) ? configuredLimit : "unknown"}`,
              `- Requested preview D1: ${previewName}`,
              `- Requested preview D1 exists: ${database ? "yes" : "no"}`,
              `- Preview-only cleanup candidates requiring review: ${candidates.length}`,
              "- Production D1 protected by name and ID: yes",
              "- Automatic deletion: none",
            ];
            for (const candidate of candidates.slice(0, 10)) {
              lines.push(`- Candidate: ${candidate.name} (${candidate.id})`);
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join("\n")}\n`);
          }
          void (async () => {
            if (previewName === productionName) throw new Error("preview_db_name equals production database name.");
            const list = await api("/d1/database?per_page=100");
            const databases = Array.isArray(list.result) ? list.result : list.result?.databases ?? [];
            let database = databases.find((item) => item?.name === previewName);
            const candidates = cleanupCandidates(databases);
            console.log(`D1 database count: ${databases.length}`);
            console.log(`D1 database limit: ${Number.isFinite(configuredLimit) ? configuredLimit : "unknown"}`);
            console.log(`Requested preview D1 exists: ${database ? "yes" : "no"}`);
            console.log(`Preview-only cleanup candidates requiring review: ${candidates.length}`);
            for (const candidate of candidates.slice(0, 10)) {
              console.log(`Preview cleanup candidate: ${candidate.name} id=${candidate.id}`);
            }
            writeCapacitySummary({ databases, database, candidates });
            if (!database && Number.isFinite(configuredLimit) && databases.length >= configuredLimit) {
              console.error("PREVIEW_D1_CAPACITY_EXHAUSTED");
              console.error(`Requested preview D1 database ${previewName} does not exist and the account is at the configured D1 database limit.`);
              console.error("No preview migrations, seed, Pages configuration, deployment, or event creation were attempted.");
              process.exit(1);
            }
            if (!database) {
              try {
                database = (await api("/d1/database", {
                  method: "POST",
                  body: JSON.stringify({ name: previewName }),
                })).result;
              } catch (error) {
                const message = sanitizeMessage(error instanceof Error ? error.message : String(error));
                if (/System limit reached|databases per account/i.test(message)) {
                  console.error("PREVIEW_D1_CAPACITY_EXHAUSTED");
                  console.error(`Cloudflare rejected preview D1 creation for ${previewName}: ${message}`);
                  console.error("No preview migrations, seed, Pages configuration, deployment, or event creation were attempted.");
                  process.exit(1);
                }
                throw error;
              }
            } else {
              console.log(`Reusing existing preview D1 database: ${previewName} id=${maskId(databaseId(database))}`);
            }
            const previewId = database?.uuid ?? database?.id;
            if (!previewId) throw new Error("Could not resolve preview D1 database id.");
            if (previewId === productionId) throw new Error("Preview D1 database id equals production D1 database id.");
            fs.writeFileSync("owner-console-preview-d1.json", JSON.stringify({ name: previewName, id: previewId }, null, 2));
            fs.writeFileSync("wrangler.owner-console-preview.toml", [
              'name = "dzn-owner-console-preview-d1"',
              'compatibility_date = "2026-05-13"',
              "",
              "[[d1_databases]]",
              'binding = "DB"',
              `database_name = "${previewName}"`,
              `database_id = "${previewId}"`,
              "",
            ].join("\n"));
            fs.appendFileSync(process.env.GITHUB_ENV, `PREVIEW_D1_DATABASE_ID=${previewId}\n`);
            console.log(`::add-mask::${previewId}`);
            console.log(`Preview D1 database name: ${previewName}`);
            console.log(`Preview D1 database id: ${maskId(previewId)}`);
          })().catch((error) => {
            console.error(sanitizeMessage(error instanceof Error ? error.message : String(error)));
            process.exit(1);
          });
          NODE

      - name: Apply preview D1 migrations
        if: ${{ inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          case "${PREVIEW_DB_NAME}" in
            *owner_console_preview*) ;;
            *)
              echo "::error::Refusing migration for non-preview owner console database name."
              exit 1
              ;;
          esac
          if [ "${PREVIEW_D1_DATABASE_ID}" = "${DETECTED_PRODUCTION_D1_DATABASE_ID}" ]; then
            echo "::error::Refusing migration because preview D1 id equals production D1 id."
            exit 1
          fi

          npx wrangler d1 migrations apply DB --config wrangler.owner-console-preview.toml --remote | tee owner-console-preview-migrations.txt
          npx wrangler d1 execute DB --config wrangler.owner-console-preview.toml --remote --json --command "PRAGMA table_info(linked_servers);" > owner-console-linked-columns.json
          npx wrangler d1 execute DB --config wrangler.owner-console-preview.toml --remote --json --command "PRAGMA table_info(server_sync_state);" > owner-console-sync-columns.json
          npx wrangler d1 execute DB --config wrangler.owner-console-preview.toml --remote --json --command "PRAGMA table_info(server_build_stats);" > owner-console-build-stats-columns.json
          npx wrangler d1 execute DB --config wrangler.owner-console-preview.toml --remote --json --command "PRAGMA foreign_key_check;" > owner-console-preview-foreign-key-check.json

          node <<'NODE'
          const fs = require("node:fs");
          function rowsFromWranglerJson(path) {
            const parsed = JSON.parse(fs.readFileSync(path, "utf8"));
            const containers = Array.isArray(parsed) ? parsed : [parsed];
            return containers.flatMap((item) => item?.results ?? item?.result?.[0]?.results ?? item?.result?.results ?? []);
          }
          const linkedColumns = new Set(rowsFromWranglerJson("owner-console-linked-columns.json").map((row) => row.name));
          for (const name of ["lifecycle_status", "lifecycle_reason", "owner_action_required", "owner_action_reason", "latest_imported_event_at", "listing_visibility"]) {
            if (!linkedColumns.has(name)) {
              console.error(`linked_servers is missing ${name}.`);
              process.exit(1);
            }
          }
          const syncColumns = new Set(rowsFromWranglerJson("owner-console-sync-columns.json").map((row) => row.name));
          for (const name of ["next_metadata_check_at", "next_player_count_check_at", "next_adm_discovery_at", "next_adm_processing_at", "next_retry_after", "last_skip_reason"]) {
