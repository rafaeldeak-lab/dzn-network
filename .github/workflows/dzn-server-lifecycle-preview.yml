            ('388000000000000004', 'lifecycle-token-server', '388004', NULL, NULL, NULL, NULL, NULL, NULL, NULL, datetime('now', '+1 day'), 'skipped_token_needs_resave', CURRENT_TIMESTAMP),
            ('388000000000000005', 'lifecycle-final-server', '388005', NULL, NULL, NULL, datetime('now', '-1 minute'), datetime('now', '-1 minute'), datetime('now', '-1 minute'), datetime('now', '-1 minute'), NULL, NULL, CURRENT_TIMESTAMP),
            ('388000000000000006', 'lifecycle-degraded-server', '388006', NULL, NULL, NULL, datetime('now', '+2 hours'), datetime('now', '+2 hours'), datetime('now', '+2 hours'), datetime('now', '+2 hours'), datetime('now', '+2 hours'), 'skipped_backoff', CURRENT_TIMESTAMP),
            ('388000000000000007', 'lifecycle-upstream-server', '388007', NULL, NULL, NULL, datetime('now', '+3 hours'), datetime('now', '+3 hours'), datetime('now', '+3 hours'), datetime('now', '+3 hours'), datetime('now', '+3 hours'), 'skipped_backoff', CURRENT_TIMESTAMP),
            ('388000000000000008', 'lifecycle-stale-server', '388008', NULL, NULL, NULL, datetime('now', '+6 hours'), datetime('now', '+6 hours'), datetime('now', '+6 hours'), datetime('now', '+6 hours'), NULL, 'skipped_no_due_work', CURRENT_TIMESTAMP),
            ('388000000000000009', 'lifecycle-final-complete-server', '388009', NULL, NULL, NULL, NULL, NULL, NULL, NULL, NULL, 'skipped_final_sync_complete', CURRENT_TIMESTAMP),
            ('388000000000000010', 'lifecycle-nuketown-server', '18765761', NULL, NULL, NULL, datetime('now', '-1 minute'), datetime('now', '-1 minute'), datetime('now', '-1 minute'), datetime('now', '-1 minute'), NULL, NULL, CURRENT_TIMESTAMP),
            ('388000000000000011', 'lifecycle-pandora-server', '388011', NULL, NULL, NULL, datetime('now', '+3 hours'), datetime('now', '+3 hours'), datetime('now', '+3 hours'), datetime('now', '+3 hours'), datetime('now', '+3 hours'), 'skipped_backoff', CURRENT_TIMESTAMP),
