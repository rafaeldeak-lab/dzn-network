name = "dzn-adm-sync-worker"
main = "workers/adm-sync-worker.ts"
compatibility_date = "2026-05-13"

[triggers]
crons = ["* * * * *"]

[vars]
MOCK_NITRADO = "false"
DZN_APP_URL = "https://dzn-network.pages.dev"
ADM_MAX_FILES_PER_INVOCATION = "1"
ADM_MAX_UNREADABLE_RETRIES_PER_INVOCATION = "1"
ADM_MAX_READ_ATTEMPTS_PER_FILE = "1"
ADM_MAX_TOKENIZED_ATTEMPTS_PER_FILE = "1"
ADM_MAX_CHUNKED_READ_CHUNKS = "1"
ADM_MAX_IMPORT_LINES_PER_INVOCATION = "300"
ADM_MAX_D1_WRITE_BATCHES_PER_INVOCATION = "10"
ADM_MAX_DIAGNOSTIC_ROWS_PER_INVOCATION = "10"

[[d1_databases]]
binding = "DB"
database_name = "dzn_network_db"
database_id = "37515c66-2787-49e4-8568-a461517e975e"
