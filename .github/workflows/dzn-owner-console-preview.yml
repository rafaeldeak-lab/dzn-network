name: DZN Owner Console Preview

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Action to run
        required: true
        type: choice
        default: full-preview
        options:
          - full-preview
          - cleanup-preview-d1
          - rebind-preview-d1
          - repair-rebound-discord-preview
          - verify-existing-creator-governance-preview
          - event-platform-performance-preview
      confirm_preview_only:
        description: Must equal PREVIEW_ONLY
        required: false
        default: ""
      preview_db_name_to_delete:
        description: Exact stale preview D1 database name for cleanup mode
        required: false
        default: ""
      cleanup_action:
        description: Cleanup mode action
        required: false
        type: choice
        default: dry-run
        options:
          - dry-run
          - delete
      reviewed_preview_db_id_mask:
        description: Masked D1 database ID from the reviewed inventory, e.g. abcdef12...1234
        required: false
        default: ""
      confirm_preview_db_cleanup:
        description: Must equal APPROVE_STALE_PREVIEW_D1_CLEANUP for cleanup mode
        required: false
        default: ""
      rebind_action:
        description: Rebind mode action
        required: false
        type: choice
        default: dry-run
        options:
          - dry-run
          - apply
      confirm_preview_d1_rebind:
        description: Must equal APPROVE_PREVIEW_D1_REBIND for rebind mode
        required: false
        default: ""
      repair_action:
        description: Repair mode action
        required: false
        type: choice
        default: dry-run
        options:
          - dry-run
          - apply
      confirm_rebound_discord_preview_repair:
        description: Must equal APPROVE_REPAIR_REBOUND_DISCORD_PREVIEW for repair mode
        required: false
        default: ""
      confirm_existing_creator_governance_preview:
        description: Must equal VERIFY_EXISTING_CREATOR_GOVERNANCE_PREVIEW for existing preview verification mode
        required: false
        default: ""
      confirm_event_platform_performance_preview:
        description: Must equal APPROVE_EVENT_PLATFORM_PERFORMANCE_PREVIEW for Phase 2A performance preview mode
        required: false
        default: ""

concurrency:
  group: dzn-owner-console-preview-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  owner-console-preview:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PULSE_PREVIEW_TOKEN: ${{ secrets.CLOUDFLARE_PULSE_PREVIEW_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PREVIEW_D1_CLEANUP_TOKEN: ${{ secrets.CLOUDFLARE_PREVIEW_D1_CLEANUP_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      GITHUB_TOKEN: ${{ github.token }}
      DZN_PLATFORM_OWNER_DISCORD_IDS: "990000000000000101,990000000000000102"
      DZN_PLATFORM_CREATOR_DISCORD_ID: "990000000000000102"
      CANDIDATE_REF: ${{ github.ref }}
      CANDIDATE_BRANCH: ${{ github.ref_name }}
      CANDIDATE_SHA: ${{ github.sha }}
      MODE: ${{ inputs.mode }}
      CONFIRM_PREVIEW_ONLY: ${{ inputs.confirm_preview_only }}
      PREVIEW_PROJECT_NAME: dzn-network-owner-console-preview
      PREVIEW_DB_NAME: dzn_network_db_owner_console_preview
      PREVIEW_DB_NAME_TO_DELETE: ${{ inputs.preview_db_name_to_delete }}
      CLEANUP_ACTION: ${{ inputs.cleanup_action }}
      REVIEWED_PREVIEW_DB_ID_MASK: ${{ inputs.reviewed_preview_db_id_mask }}
      CONFIRM_PREVIEW_DB_CLEANUP: ${{ inputs.confirm_preview_db_cleanup }}
      REBIND_ACTION: ${{ inputs.rebind_action }}
      CONFIRM_PREVIEW_D1_REBIND: ${{ inputs.confirm_preview_d1_rebind }}
      REBIND_PREVIEW_PROJECT_NAME: dzn-network-discord-announcements-preview
      REBIND_OLD_PREVIEW_DB_NAME: dzn_network_db_discord_announcements_preview_alignment_ee8c812
      REBIND_OLD_PREVIEW_DB_ID_MASK: 44ef61d8...ef59
      REBIND_REPLACEMENT_PREVIEW_DB_NAME: dzn_network_db_discord_announcements_preview
      ACTIVATE_PREVIEW_PROJECT_NAME: dzn-network-discord-announcements-preview
      ACTIVATE_REPLACEMENT_PREVIEW_DB_NAME: dzn_network_db_discord_announcements_preview
      ACTIVATE_OLD_PREVIEW_DB_NAME: dzn_network_db_discord_announcements_preview_alignment_ee8c812
      ACTIVATE_OLD_PREVIEW_DB_ID_MASK: 44ef61d8...ef59
      APPROVED_MAIN_RUNTIME_SHA: a159571079dda1d8f0102718732008033cdfb763
      CONFIRM_REBOUND_DISCORD_PREVIEW_DEPLOY: ""
      REPAIR_ACTION: ${{ inputs.repair_action }}
      CONFIRM_REBOUND_DISCORD_PREVIEW_REPAIR: ${{ inputs.confirm_rebound_discord_preview_repair }}
      REPAIR_PREVIEW_PROJECT_NAME: dzn-network-discord-announcements-preview
      REPAIR_REPLACEMENT_PREVIEW_DB_NAME: dzn_network_db_discord_announcements_preview
      REPAIR_OLD_PREVIEW_DB_NAME: dzn_network_db_discord_announcements_preview_alignment_ee8c812
      REPAIR_OLD_PREVIEW_DB_ID_MASK: 44ef61d8...ef59
      CONFIRM_EXISTING_CREATOR_GOVERNANCE_PREVIEW: ${{ inputs.confirm_existing_creator_governance_preview }}
      EXISTING_CREATOR_GOVERNANCE_PREVIEW_PROJECT_NAME: dzn-network-owner-console-preview
      EXISTING_CREATOR_GOVERNANCE_PREVIEW_DB_NAME: dzn_network_db_owner_console_preview_creator_governance_0919c46
      EXISTING_CREATOR_GOVERNANCE_PREVIEW_EVENT_NAME: Creator Governance Preview Cup 0919c46
      EXISTING_CREATOR_GOVERNANCE_PREVIEW_EVENT_SLUG: creator-governance-preview-cup-0919c46
      CONFIRM_EVENT_PLATFORM_PERFORMANCE_PREVIEW: ${{ inputs.confirm_event_platform_performance_preview }}
      EVENT_PLATFORM_PERFORMANCE_PREVIEW_PROJECT_NAME: dzn-network-owner-console-preview
      EVENT_PLATFORM_PERFORMANCE_PREVIEW_DB_NAME: dzn_network_db_owner_console_preview_creator_governance_0919c46
      EVENT_PLATFORM_PERFORMANCE_PREVIEW_CONFIRMATION: APPROVE_EVENT_PLATFORM_PERFORMANCE_PREVIEW
      EVENT_PLATFORM_PERFORMANCE_PREVIEW_SEED_PREFIX: phase2a-preview-
      PRODUCTION_PAGES_PROJECT_NAME: dzn-network
      PRODUCTION_D1_DATABASE_NAME: dzn_network_db
      D1_ACCOUNT_DATABASE_LIMIT: "10"
      DZN_DISCORD_NOTIFICATIONS_ENABLED: "false"
      DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED: "false"
      DZN_PULSE_ENABLED: "true"
      PREVIEW_BASE_URL: https://dzn-network-owner-console-preview.pages.dev

    steps:
      - name: Checkout dispatched commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate preview-only inputs
        run: |
          set -euo pipefail

          if [ "${MODE}" != "rebind-preview-d1" ] && [ "${CONFIRM_PREVIEW_ONLY}" != "PREVIEW_ONLY" ]; then
            echo "::error::confirm_preview_only must equal PREVIEW_ONLY."
            exit 1
          fi
          if [ "${MODE}" = "rebind-preview-d1" ] && [ -n "${CONFIRM_PREVIEW_ONLY:-}" ] && [ "${CONFIRM_PREVIEW_ONLY}" != "PREVIEW_ONLY" ]; then
            echo "::error::confirm_preview_only, when provided for rebind-preview-d1 mode, must equal PREVIEW_ONLY."
            exit 1
          fi

          if [ -z "${CANDIDATE_BRANCH:-}" ] || [ -z "${CANDIDATE_SHA:-}" ] || [ -z "${CANDIDATE_REF:-}" ]; then
            echo "::error::Missing canonical GitHub workflow ref identity."
            exit 1
          fi
          case "${CANDIDATE_REF}" in
            refs/heads/feature/owner-console|refs/heads/feature/creator-only-event-governance|refs/heads/feature/event-platform-performance-foundation) ;;
            refs/heads/main|refs/heads/master|refs/heads/production)
              echo "::error::Owner console preview must never run from main, master, or production."
              exit 1
              ;;
            refs/tags/*)
              echo "::error::Owner console preview does not accept tag refs."
              exit 1
              ;;
            refs/pull/*)
              echo "::error::Owner console preview does not accept pull-request merge refs."
              exit 1
              ;;
            *)
              echo "::error::Owner console preview may only run from feature/owner-console, feature/creator-only-event-governance, or feature/event-platform-performance-foundation."
              exit 1
              ;;
          esac
          case "${CANDIDATE_BRANCH}" in
            feature/owner-console|feature/creator-only-event-governance|feature/event-platform-performance-foundation) ;;
            main|master|production)
              echo "::error::Owner console preview must never run from main, master, or production."
              exit 1
              ;;
            *)
              echo "::error::Owner console preview may only run from feature/owner-console, feature/creator-only-event-governance, or feature/event-platform-performance-foundation."
              exit 1
              ;;
          esac
          if [ "${CANDIDATE_BRANCH}" = "feature/event-platform-performance-foundation" ] && [ "${MODE}" != "event-platform-performance-preview" ]; then
            echo "::error::feature/event-platform-performance-foundation may only run event-platform-performance-preview mode."
            exit 1
          fi

          CHECKED_OUT_HEAD="$(git rev-parse HEAD)"
          if [ "${CHECKED_OUT_HEAD}" != "${CANDIDATE_SHA}" ]; then
            echo "::error::Checked-out commit does not match github.sha."
            exit 1
          fi
          CHECKED_OUT_TREE="$(git rev-parse "HEAD^{tree}")"
          git fetch origin "${CANDIDATE_BRANCH}:refs/remotes/origin/${CANDIDATE_BRANCH}" --depth=1
          REMOTE_FEATURE_HEAD="$(git rev-parse "origin/${CANDIDATE_BRANCH}")"
          if [ "${REMOTE_FEATURE_HEAD}" != "${CANDIDATE_SHA}" ]; then
            echo "::error::Selected workflow ref SHA is not the current remote branch head."
            exit 1
          fi

          CANDIDATE_SHORT_SHA="${CANDIDATE_SHA:0:7}"
          if ! [[ "${CANDIDATE_SHORT_SHA}" =~ ^[a-f0-9]{7}$ ]]; then
            echo "::error::github.sha does not produce a valid short SHA."
            exit 1
          fi
          if [ "${MODE}" = "verify-existing-creator-governance-preview" ]; then
            PREVIEW_DB_NAME="${EXISTING_CREATOR_GOVERNANCE_PREVIEW_DB_NAME}"
          elif [ "${MODE}" = "event-platform-performance-preview" ]; then
            PREVIEW_DB_NAME="${EVENT_PLATFORM_PERFORMANCE_PREVIEW_DB_NAME}"
          elif [ "${MODE}" = "full-preview" ] && [ "${CANDIDATE_BRANCH}" = "feature/creator-only-event-governance" ]; then
            PREVIEW_DB_NAME="dzn_network_db_owner_console_preview_creator_governance_${CANDIDATE_SHORT_SHA}"
          else
            PREVIEW_DB_NAME="dzn_network_db_owner_console_preview"
          fi

          if [ "${MODE}" = "verify-existing-creator-governance-preview" ]; then
            CREATOR_EVENT_NAME="${EXISTING_CREATOR_GOVERNANCE_PREVIEW_EVENT_NAME}"
          else
            CREATOR_EVENT_NAME="Creator Governance Preview Cup ${CANDIDATE_SHORT_SHA}"
          fi
          {
            printf "OWNER_CONSOLE_CANDIDATE_SHORT_SHA=%s\n" "$CANDIDATE_SHORT_SHA"
            printf "OWNER_CONSOLE_CANDIDATE_BRANCH=%s\n" "$CANDIDATE_BRANCH"
            printf "OWNER_CONSOLE_CANDIDATE_SHA=%s\n" "$CANDIDATE_SHA"
            printf "OWNER_CONSOLE_CANDIDATE_TREE_SHA=%s\n" "$CHECKED_OUT_TREE"
            printf "OWNER_CONSOLE_REMOTE_BRANCH_HEAD=%s\n" "$REMOTE_FEATURE_HEAD"
            printf "OWNER_CONSOLE_CREATOR_EVENT_NAME=%s\n" "$CREATOR_EVENT_NAME"
            printf "PREVIEW_DB_NAME=%s\n" "$PREVIEW_DB_NAME"
          } >> "$GITHUB_ENV"

          if [ "${MODE}" = "activate-rebound-discord-preview" ]; then
            echo "::error::ACTIVATION_MODE_DEPRECATED_USE_REPAIR_MODE"
            exit 1
          fi

          case "${MODE}" in
            full-preview|cleanup-preview-d1|rebind-preview-d1|repair-rebound-discord-preview|verify-existing-creator-governance-preview|event-platform-performance-preview) ;;
            *)
              echo "::error::Owner console preview only supports full-preview, cleanup-preview-d1, rebind-preview-d1, repair-rebound-discord-preview, verify-existing-creator-governance-preview, or event-platform-performance-preview mode."
              exit 1
              ;;
          esac

          if [ "${PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
            echo "::error::Preview Pages project must not equal the production Pages project."
            exit 1
          fi

          case "${PREVIEW_PROJECT_NAME}" in
            *owner*console*preview*|*owner-console-preview*) ;;
            *)
              echo "::error::Preview Pages project name must contain owner console preview."
              exit 1
              ;;
          esac

          if [ "${PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ]; then
            echo "::error::Preview D1 database must not equal production D1 database."
            exit 1
          fi

          case "${PREVIEW_DB_NAME}" in
            *owner_console_preview*) ;;
            *)
              echo "::error::Preview D1 database name must contain owner_console_preview."
              exit 1
              ;;
          esac
          if [ "${MODE}" = "full-preview" ] && [ "${CANDIDATE_BRANCH}" = "feature/creator-only-event-governance" ]; then
            case "${PREVIEW_DB_NAME}" in
              dzn_network_db_owner_console_preview_creator_governance_*) ;;
              *)
                echo "::error::feature/creator-only-event-governance requires derived preview DB name beginning with dzn_network_db_owner_console_preview_creator_governance_."
                exit 1
                ;;
            esac
            if [ "${PREVIEW_DB_NAME}" != "dzn_network_db_owner_console_preview_creator_governance_${CANDIDATE_SHORT_SHA}" ]; then
              echo "::error::feature/creator-only-event-governance derived preview DB name mismatch."
              exit 1
            fi
          fi
          if [ "${MODE}" = "verify-existing-creator-governance-preview" ]; then
            if [ "${CANDIDATE_BRANCH}" != "feature/creator-only-event-governance" ]; then
              echo "::error::verify-existing-creator-governance-preview mode may only run from feature/creator-only-event-governance."
              exit 1
            fi
            if [ "${CONFIRM_EXISTING_CREATOR_GOVERNANCE_PREVIEW}" != "VERIFY_EXISTING_CREATOR_GOVERNANCE_PREVIEW" ]; then
              echo "::error::confirm_existing_creator_governance_preview must equal VERIFY_EXISTING_CREATOR_GOVERNANCE_PREVIEW for verify-existing-creator-governance-preview mode."
              exit 1
            fi
            if [ "${EXISTING_CREATOR_GOVERNANCE_PREVIEW_PROJECT_NAME}" != "dzn-network-owner-console-preview" ]; then
              echo "::error::Existing creator-governance preview project constant mismatch."
              exit 1
            fi
            if [ "${EXISTING_CREATOR_GOVERNANCE_PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ] || [ "${PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ]; then
              echo "::error::Refusing existing creator-governance verification for production D1 database name."
              exit 1
            fi
            if [ "${EXISTING_CREATOR_GOVERNANCE_PREVIEW_EVENT_NAME}" != "Creator Governance Preview Cup 0919c46" ]; then
              echo "::error::Existing creator-governance preview event constant mismatch."
              exit 1
            fi
            if [ "${EXISTING_CREATOR_GOVERNANCE_PREVIEW_EVENT_SLUG}" != "creator-governance-preview-cup-0919c46" ]; then
              echo "::error::Existing creator-governance preview slug constant mismatch."
              exit 1
            fi
          fi
          if [ "${MODE}" = "event-platform-performance-preview" ]; then
            if [ "${CANDIDATE_BRANCH}" != "feature/event-platform-performance-foundation" ]; then
              echo "::error::event-platform-performance-preview mode may only run from feature/event-platform-performance-foundation."
              exit 1
            fi
            if [ "${CONFIRM_EVENT_PLATFORM_PERFORMANCE_PREVIEW}" != "${EVENT_PLATFORM_PERFORMANCE_PREVIEW_CONFIRMATION}" ]; then
              echo "::error::confirm_event_platform_performance_preview must equal APPROVE_EVENT_PLATFORM_PERFORMANCE_PREVIEW for event-platform-performance-preview mode."
              exit 1
            fi
            if [ "${EVENT_PLATFORM_PERFORMANCE_PREVIEW_PROJECT_NAME}" != "dzn-network-owner-console-preview" ]; then
              echo "::error::Event platform performance preview project constant mismatch."
              exit 1
            fi
            if [ "${PREVIEW_PROJECT_NAME}" != "${EVENT_PLATFORM_PERFORMANCE_PREVIEW_PROJECT_NAME}" ]; then
              echo "::error::Event platform performance preview must use the fixed owner-console preview project."
              exit 1
            fi
            if [ "${EVENT_PLATFORM_PERFORMANCE_PREVIEW_DB_NAME}" != "dzn_network_db_owner_console_preview_creator_governance_0919c46" ]; then
              echo "::error::Event platform performance preview database constant mismatch."
              exit 1
            fi
            if [ "${PREVIEW_DB_NAME}" != "${EVENT_PLATFORM_PERFORMANCE_PREVIEW_DB_NAME}" ]; then
              echo "::error::Event platform performance preview must use the fixed reusable preview D1."
              exit 1
            fi
            if [ "${EVENT_PLATFORM_PERFORMANCE_PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ]; then
              echo "::error::Refusing event platform performance preview for production D1 database name."
              exit 1
            fi
            if [ "${EVENT_PLATFORM_PERFORMANCE_PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
              echo "::error::Refusing event platform performance preview for production Pages project."
              exit 1
            fi
          fi

          if [ "${MODE}" = "cleanup-preview-d1" ]; then
            if [ "${CONFIRM_PREVIEW_DB_CLEANUP}" != "APPROVE_STALE_PREVIEW_D1_CLEANUP" ]; then
              echo "::error::confirm_preview_db_cleanup must equal APPROVE_STALE_PREVIEW_D1_CLEANUP for cleanup-preview-d1 mode."
              exit 1
            fi
            case "${CLEANUP_ACTION}" in
              dry-run|delete) ;;
              *)
                echo "::error::cleanup_action must be dry-run or delete."
                exit 1
                ;;
            esac
            if [ -z "${PREVIEW_DB_NAME_TO_DELETE:-}" ]; then
              echo "::error::preview_db_name_to_delete is required for cleanup-preview-d1 mode."
              exit 1
            fi
            if [ "${PREVIEW_DB_NAME_TO_DELETE}" = "${PRODUCTION_D1_DATABASE_NAME}" ]; then
              echo "::error::Refusing cleanup for production D1 database name."
              exit 1
            fi
            case "${PREVIEW_DB_NAME_TO_DELETE}" in
              *"*"*|*"?"*|*"["*|*"]"*|*" "*)
                echo "::error::preview_db_name_to_delete must be one exact database name, not a pattern or list."
                exit 1
                ;;
            esac
            case "${PREVIEW_DB_NAME_TO_DELETE}" in
              dzn_network_db_owner_console_preview_*|dzn_network_db_discord_announcements_preview_*|dzn_network_db_discord_control_preview|dzn_network_db_discord_phase_2a_preview|dzn_network_db_server_lifecycle_preview|dzn_network_db_server_advertising_preview|dzn_network_db_dzn_pulse_preview) ;;
              *)
                echo "::error::Refusing cleanup for database name without an approved DZN preview prefix."
                exit 1
                ;;
            esac
            if [ "${CLEANUP_ACTION}" = "delete" ]; then
              if ! [[ "${REVIEWED_PREVIEW_DB_ID_MASK}" =~ ^[a-fA-F0-9]{8}\.\.\.[a-fA-F0-9]{4}$ ]]; then
                echo "::error::delete cleanup requires reviewed_preview_db_id_mask in masked form, e.g. abcdef12...1234."
                exit 1
              fi
            fi
          fi
          if [ "${MODE}" = "rebind-preview-d1" ]; then
            if [ "${CANDIDATE_BRANCH}" != "feature/creator-only-event-governance" ]; then
              echo "::error::rebind-preview-d1 mode may only run from feature/creator-only-event-governance."
              exit 1
            fi
            case "${REBIND_ACTION}" in
              dry-run|apply) ;;
              *)
                echo "::error::rebind_action must be dry-run or apply."
                exit 1
                ;;
            esac
            if [ "${CONFIRM_PREVIEW_D1_REBIND}" != "APPROVE_PREVIEW_D1_REBIND" ]; then
              echo "::error::confirm_preview_d1_rebind must equal APPROVE_PREVIEW_D1_REBIND for rebind-preview-d1 mode."
              exit 1
            fi
            if [ "${REBIND_PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
              echo "::error::Refusing rebind for production Pages project."
              exit 1
            fi
            if [ "${REBIND_OLD_PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ] || [ "${REBIND_REPLACEMENT_PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ]; then
              echo "::error::Refusing rebind for production D1 database name."
              exit 1
            fi
          fi
          if [ "${MODE}" = "activate-rebound-discord-preview" ]; then
            if [ "${CANDIDATE_BRANCH}" != "feature/creator-only-event-governance" ]; then
              echo "::error::activate-rebound-discord-preview mode may only run from feature/creator-only-event-governance."
              exit 1
            fi
            if [ "${CONFIRM_REBOUND_DISCORD_PREVIEW_DEPLOY}" != "APPROVE_REBOUND_DISCORD_PREVIEW_DEPLOY" ]; then
              echo "::error::confirm_rebound_discord_preview_deploy must equal APPROVE_REBOUND_DISCORD_PREVIEW_DEPLOY for activate-rebound-discord-preview mode."
              exit 1
            fi
            if [ "${ACTIVATE_PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
              echo "::error::Refusing activation deploy for production Pages project."
              exit 1
            fi
            if [ "${ACTIVATE_REPLACEMENT_PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ] || [ "${ACTIVATE_OLD_PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ]; then
              echo "::error::Refusing activation deploy for production D1 database name."
              exit 1
            fi
            if ! [[ "${APPROVED_MAIN_RUNTIME_SHA}" =~ ^[a-f0-9]{40}$ ]]; then
              echo "::error::Approved main runtime SHA is malformed."
              exit 1
            fi
          fi
          if [ "${MODE}" = "repair-rebound-discord-preview" ]; then
            if [ "${CANDIDATE_BRANCH}" != "feature/creator-only-event-governance" ]; then
              echo "::error::repair-rebound-discord-preview mode may only run from feature/creator-only-event-governance."
              exit 1
            fi
            case "${REPAIR_ACTION}" in
              dry-run|apply) ;;
              *)
                echo "::error::repair_action must be dry-run or apply."
                exit 1
                ;;
            esac
            if [ "${CONFIRM_REBOUND_DISCORD_PREVIEW_REPAIR}" != "APPROVE_REPAIR_REBOUND_DISCORD_PREVIEW" ]; then
              echo "::error::confirm_rebound_discord_preview_repair must equal APPROVE_REPAIR_REBOUND_DISCORD_PREVIEW for repair-rebound-discord-preview mode."
              exit 1
            fi
            if [ "${REPAIR_PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
              echo "::error::Refusing repair for production Pages project."
              exit 1
            fi
            if [ "${REPAIR_REPLACEMENT_PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ] || [ "${REPAIR_OLD_PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ]; then
              echo "::error::Refusing repair for production D1 database name."
              exit 1
            fi
            if ! [[ "${APPROVED_MAIN_RUNTIME_SHA}" =~ ^[a-f0-9]{40}$ ]]; then
              echo "::error::Approved main runtime SHA is malformed."
              exit 1
            fi
          fi

          if [ "${DZN_DISCORD_NOTIFICATIONS_ENABLED}" != "false" ]; then
            echo "::error::DZN_DISCORD_NOTIFICATIONS_ENABLED must remain false."
            exit 1
          fi
          if [ "${DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED}" != "false" ]; then
            echo "::error::DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED must remain false."
            exit 1
          fi

          if [ -z "${DZN_PLATFORM_OWNER_DISCORD_IDS:-}" ]; then
            echo "::error::Missing DZN_PLATFORM_OWNER_DISCORD_IDS for owner console preview."
            exit 1
          fi
          echo "::add-mask::${DZN_PLATFORM_OWNER_DISCORD_IDS}"
          if [ -z "${DZN_PLATFORM_CREATOR_DISCORD_ID:-}" ]; then
            echo "::error::Missing fake DZN_PLATFORM_CREATOR_DISCORD_ID for creator-event-governance preview."
            exit 1
          fi
          echo "::add-mask::${DZN_PLATFORM_CREATOR_DISCORD_ID}"

          if [ -n "${CLOUDFLARE_PREVIEW_D1_CLEANUP_TOKEN:-}" ]; then
            echo "::add-mask::${CLOUDFLARE_PREVIEW_D1_CLEANUP_TOKEN}"
          fi
          if [ -n "${CLOUDFLARE_PULSE_PREVIEW_TOKEN:-}" ]; then
            echo "::add-mask::${CLOUDFLARE_PULSE_PREVIEW_TOKEN}"
          fi
          if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::add-mask::${CLOUDFLARE_API_TOKEN}"
          fi
          if [ "${MODE}" = "cleanup-preview-d1" ] || [ "${MODE}" = "rebind-preview-d1" ]; then
            if [ -z "${CLOUDFLARE_PREVIEW_D1_CLEANUP_TOKEN:-}" ] && [ -z "${CLOUDFLARE_PULSE_PREVIEW_TOKEN:-}" ] && [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
              echo "::error::Missing Cloudflare token source for ${MODE} mode."
              exit 1
            fi
          else
            CF_TOKEN="${CLOUDFLARE_PULSE_PREVIEW_TOKEN:-${CLOUDFLARE_API_TOKEN:-}}"
            if [ -z "${CF_TOKEN:-}" ]; then
              echo "::error::Missing CLOUDFLARE_PULSE_PREVIEW_TOKEN or CLOUDFLARE_API_TOKEN GitHub secret."
              exit 1
            fi
            if [ "${#CF_TOKEN}" -le 20 ]; then
              echo "::error::Cloudflare preview token is present but too short to be valid."
              exit 1
            fi
            {
              printf "OWNER_CONSOLE_CF_TOKEN=%s\n" "$CF_TOKEN"
              printf "CLOUDFLARE_API_TOKEN=%s\n" "$CF_TOKEN"
            } >> "$GITHUB_ENV"
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID GitHub secret or repository variable."
            exit 1
          fi
          if ! [[ "${CLOUDFLARE_ACCOUNT_ID}" =~ ^[a-fA-F0-9]{32}$ ]]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID does not look like a 32-character Cloudflare account id."
            exit 1
          fi

          if [ "${MODE}" = "full-preview" ]; then
            OWNER_PREVIEW_SESSION_SECRET="$(node -e "console.log(require('node:crypto').randomBytes(32).toString('base64url'))")"
            echo "::add-mask::$OWNER_PREVIEW_SESSION_SECRET"
            printf "OWNER_PREVIEW_SESSION_SECRET=%s\n" "$OWNER_PREVIEW_SESSION_SECRET" >> "$GITHUB_ENV"

            OWNER_PREVIEW_DISCORD_CLIENT_SECRET="$(node -e "console.log(require('node:crypto').randomBytes(32).toString('base64url'))")"
            echo "::add-mask::$OWNER_PREVIEW_DISCORD_CLIENT_SECRET"
            printf "OWNER_PREVIEW_DISCORD_CLIENT_SECRET=%s\n" "$OWNER_PREVIEW_DISCORD_CLIENT_SECRET" >> "$GITHUB_ENV"
          fi

          OWNER_PREVIEW_DISCORD_CLIENT_ID="990000000000000199"
          OWNER_PREVIEW_DISCORD_REDIRECT_URI="${PREVIEW_BASE_URL}/api/auth/discord/callback"
          if ! [[ "${OWNER_PREVIEW_DISCORD_CLIENT_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::Owner console preview Discord client id must be numeric."
            exit 1
          fi
          {
            printf "OWNER_PREVIEW_DISCORD_CLIENT_ID=%s\n" "$OWNER_PREVIEW_DISCORD_CLIENT_ID"
            printf "OWNER_PREVIEW_DISCORD_REDIRECT_URI=%s\n" "$OWNER_PREVIEW_DISCORD_REDIRECT_URI"
          } >> "$GITHUB_ENV"

          node <<'NODE'
          const fs = require("node:fs");
          const ownerIds = String(process.env.DZN_PLATFORM_OWNER_DISCORD_IDS ?? "")
            .split(",")
            .map((entry) => entry.trim())
            .filter((entry) => /^\d+$/.test(entry));
          if (ownerIds.length === 0) {
            console.error("Missing DZN_PLATFORM_OWNER_DISCORD_IDS for owner console preview.");
            process.exit(1);
          }
          const creatorId = String(process.env.DZN_PLATFORM_CREATOR_DISCORD_ID ?? "");
          if (!/^\d+$/.test(creatorId) || !ownerIds.includes(creatorId)) {
            console.error("Fake creator id must be numeric and included in the fake owner allowlist for preview.");
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `OWNER_CONSOLE_PREVIEW_OWNER_ID=${ownerIds[0]}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `OWNER_CONSOLE_PREVIEW_CREATOR_ID=${creatorId}\n`);

          const source = fs.readFileSync("wrangler.toml", "utf8");
          const name = source.match(/database_name\s*=\s*"([^"]+)"/)?.[1] ?? "";
          const id = source.match(/database_id\s*=\s*"([^"]+)"/)?.[1] ?? "";
          function maskId(id) {
            return typeof id === "string" && id.length > 12 ? `${id.slice(0, 8)}...${id.slice(-4)}` : "unavailable";
          }
          if (!name || !id) {
            console.error("Could not detect production D1 database name/id from wrangler.toml.");
            process.exit(1);
          }
          console.log(`::add-mask::${id}`);
          fs.appendFileSync(process.env.GITHUB_ENV, `DETECTED_PRODUCTION_D1_DATABASE_NAME=${name}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `DETECTED_PRODUCTION_D1_DATABASE_ID=${id}\n`);
          console.log(`Detected production D1 database name: ${name}`);
          console.log(`Detected production D1 database id: ${maskId(id)}`);
          NODE

          {
            echo "## DZN Owner Console Preview Guard"
            echo ""
            echo "- Mode: ${MODE}"
            echo "- Workflow ref: ${CANDIDATE_REF}"
            echo "- Workflow ref name: ${CANDIDATE_BRANCH}"
            echo "- Checked-out SHA: ${CHECKED_OUT_HEAD}"
            echo "- Checked-out tree: ${CHECKED_OUT_TREE}"
            echo "- Remote branch HEAD: ${REMOTE_FEATURE_HEAD}"
            echo "- Preview D1 database name: ${PREVIEW_DB_NAME}"
            echo "- Preview Pages project name: ${PREVIEW_PROJECT_NAME}"
            echo "- Cleanup mode: ${MODE}"
            if [ "${MODE}" = "cleanup-preview-d1" ]; then
              echo "- Cleanup action: ${CLEANUP_ACTION}"
              echo "- Cleanup target database: ${PREVIEW_DB_NAME_TO_DELETE}"
              echo "- Cleanup confirmation accepted: true"
            fi
            if [ "${MODE}" = "rebind-preview-d1" ]; then
              echo "- Rebind action: ${REBIND_ACTION}"
              echo "- Rebind preview Pages project: ${REBIND_PREVIEW_PROJECT_NAME}"
              echo "- Rebind old database: ${REBIND_OLD_PREVIEW_DB_NAME}"
              echo "- Rebind replacement database: ${REBIND_REPLACEMENT_PREVIEW_DB_NAME}"
              echo "- Rebind confirmation accepted: true"
              echo "- Rebind Pages deployment required after config patch: yes"
            fi
            if [ "${MODE}" = "activate-rebound-discord-preview" ]; then
              echo "- Activation preview Pages project: ${ACTIVATE_PREVIEW_PROJECT_NAME}"
              echo "- Activation replacement database: ${ACTIVATE_REPLACEMENT_PREVIEW_DB_NAME}"
              echo "- Activation former database: ${ACTIVATE_OLD_PREVIEW_DB_NAME}"
              echo "- Activation runtime source: ${APPROVED_MAIN_RUNTIME_SHA}"
              echo "- Activation confirmation accepted: true"
              echo "- Preview deployment will be performed only by activation mode: yes"
            fi
            if [ "${MODE}" = "repair-rebound-discord-preview" ]; then
              echo "- Repair action: ${REPAIR_ACTION}"
              echo "- Repair preview Pages project: ${REPAIR_PREVIEW_PROJECT_NAME}"
              echo "- Repair replacement database: ${REPAIR_REPLACEMENT_PREVIEW_DB_NAME}"
              echo "- Repair old database: ${REPAIR_OLD_PREVIEW_DB_NAME}"
              echo "- Repair runtime source: ${APPROVED_MAIN_RUNTIME_SHA}"
              echo "- Repair confirmation accepted: true"
              echo "- Repair dry-run mutates nothing: $([ "${REPAIR_ACTION}" = "dry-run" ] && echo yes || echo no)"
            fi
            if [ "${MODE}" = "verify-existing-creator-governance-preview" ]; then
              echo "- Existing preview verification project: ${EXISTING_CREATOR_GOVERNANCE_PREVIEW_PROJECT_NAME}"
              echo "- Existing preview verification database: ${EXISTING_CREATOR_GOVERNANCE_PREVIEW_DB_NAME}"
              echo "- Existing preview verification event: ${EXISTING_CREATOR_GOVERNANCE_PREVIEW_EVENT_NAME}"
              echo "- Existing preview verification slug: ${EXISTING_CREATOR_GOVERNANCE_PREVIEW_EVENT_SLUG}"
              echo "- Existing preview verification is read-only: true"
              echo "- Existing preview confirmation accepted: true"
            fi
            if [ "${MODE}" = "event-platform-performance-preview" ]; then
              echo "- Event platform performance preview project: ${EVENT_PLATFORM_PERFORMANCE_PREVIEW_PROJECT_NAME}"
              echo "- Event platform performance preview database: ${EVENT_PLATFORM_PERFORMANCE_PREVIEW_DB_NAME}"
              echo "- Event platform performance preview seed prefix: ${EVENT_PLATFORM_PERFORMANCE_PREVIEW_SEED_PREFIX}"
              echo "- Event platform performance preview confirmation accepted: true"
              echo "- D1 database creation/deletion path enabled: false"
              echo "- Only migration 0057 may be applied: true"
            fi
            echo "- Production Pages project name: ${PRODUCTION_PAGES_PROJECT_NAME}"
            echo "- DZN_PLATFORM_OWNER_DISCORD_IDS configured: true"
            echo "- DZN_PLATFORM_CREATOR_DISCORD_ID configured: true"
            echo "- Discord OAuth client id configured: true"
            echo "- Discord OAuth redirect URI: ${OWNER_PREVIEW_DISCORD_REDIRECT_URI}"
            echo "- DZN_PULSE_ENABLED: true"
            echo "- DZN_DISCORD_NOTIFICATIONS_ENABLED: false"
            echo "- DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED: false"
            echo "- Creator governance preview event name is SHA-scoped: true"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install
        if: ${{ inputs.mode == 'full-preview' || inputs.mode == 'verify-existing-creator-governance-preview' || inputs.mode == 'event-platform-performance-preview' }}
        run: npm ci

      - name: Verify existing creator-governance preview
        if: ${{ inputs.mode == 'verify-existing-creator-governance-preview' }}
        run: |
          set -euo pipefail

          if [ "${CONFIRM_EXISTING_CREATOR_GOVERNANCE_PREVIEW}" != "VERIFY_EXISTING_CREATOR_GOVERNANCE_PREVIEW" ]; then
            echo "::error::confirm_existing_creator_governance_preview must equal VERIFY_EXISTING_CREATOR_GOVERNANCE_PREVIEW."
            exit 1
          fi
          if [ "${EXISTING_CREATOR_GOVERNANCE_PREVIEW_PROJECT_NAME}" != "${PREVIEW_PROJECT_NAME}" ]; then
            echo "::error::Existing creator-governance preview project must match the owner-console preview project."
            exit 1
          fi
          if [ "${PREVIEW_DB_NAME}" != "${EXISTING_CREATOR_GOVERNANCE_PREVIEW_DB_NAME}" ]; then
            echo "::error::Existing creator-governance preview database constant mismatch."
            exit 1
          fi
          if [ "${PREVIEW_DB_NAME}" = "${DETECTED_PRODUCTION_D1_DATABASE_NAME}" ] || [ "${PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ]; then
            echo "::error::Refusing existing creator-governance verification for production D1 name."
            exit 1
          fi

          node <<'NODE'
          const fs = require("node:fs");
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.OWNER_CONSOLE_CF_TOKEN;
          const previewDbName = process.env.EXISTING_CREATOR_GOVERNANCE_PREVIEW_DB_NAME;
          const projectName = process.env.EXISTING_CREATOR_GOVERNANCE_PREVIEW_PROJECT_NAME;
          const productionId = process.env.DETECTED_PRODUCTION_D1_DATABASE_ID || "";
          const productionName = process.env.DETECTED_PRODUCTION_D1_DATABASE_NAME || process.env.PRODUCTION_D1_DATABASE_NAME;
          function maskId(id) {
            return typeof id === "string" && id.length > 12 ? `${id.slice(0, 8)}...${id.slice(-4)}` : "unavailable";
          }
          function sanitize(value) {
            let text = String(value ?? "");
            for (const sensitive of [accountId, productionId, token]) {
              if (sensitive) text = text.split(sensitive).join("[redacted]");
            }
            return text
              .replace(/Bearer\s+[A-Za-z0-9._~+/=-]+/gi, "Bearer [redacted-token]")
              .replace(/\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b/gi, "[redacted-id]")
              .replace(/[A-Za-z0-9_-]{48,}/g, "[redacted-token]")
              .replace(/(authorization|cookie|session|secret|token)\s*[:=]\s*[^\s,;]+/gi, "$1=[redacted]")
              .slice(0, 1000);
          }
          function fail(message) {
            console.error(sanitize(message));
            process.exit(1);
          }
          function databaseId(database) {
            return String(database?.uuid ?? database?.id ?? database?.database_id ?? "");
          }
          async function api(path) {
            const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
              headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
            });
            const text = await response.text();
            let parsed;
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = { success: false, errors: [{ code: `http_${response.status}`, message: "non_json_response" }] };
            }
            if (!response.ok || parsed?.success === false) {
              const first = Array.isArray(parsed?.errors) ? parsed.errors[0] : null;
              fail(`Cloudflare read failed status=${response.status} code=${first?.code ?? "unknown"} message=${first?.message ?? "unknown"}`);
            }
            return parsed.result;
          }
          function envValue(config, key) {
            const value = config?.env_vars?.[key];
            if (value && typeof value === "object") return String(value.value ?? "");
            return String(value ?? "");
          }
          function dbBindingId(config) {
            const db = config?.d1_databases?.DB;
            return String(db?.id ?? db?.database_id ?? db ?? "");
          }
          void (async () => {
            const d1Result = await api("/d1/database?per_page=50&page=1");
            const databases = Array.isArray(d1Result) ? d1Result : d1Result?.databases ?? [];
            const database = databases.find((entry) => String(entry?.name ?? "") === previewDbName);
            if (!database) fail("Exact existing creator-governance preview D1 was not found.");
            const previewId = databaseId(database);
            if (!previewId) fail("Exact existing creator-governance preview D1 id was not available.");
            if (previewDbName === productionName || previewId === productionId) fail("Existing creator-governance preview D1 matches production by name or id.");
            const project = await api(`/pages/projects/${encodeURIComponent(projectName)}`);
            for (const environment of ["production", "preview"]) {
              const config = project?.deployment_configs?.[environment] ?? {};
              const bindingId = dbBindingId(config);
              if (bindingId !== previewId) fail(`${environment} Pages config DB binding does not resolve to the existing creator-governance preview D1.`);
              if (envValue(config, "DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED") !== "false") fail(`${environment} server announcement flag is not false.`);
              if (envValue(config, "DZN_DISCORD_NOTIFICATIONS_ENABLED") !== "false") fail(`${environment} Discord notifications flag is not false.`);
            }
            fs.writeFileSync("wrangler.owner-console-preview.toml", [
              'name = "dzn-owner-console-preview-existing-verify"',
              'compatibility_date = "2026-05-13"',
              "",
              "[[d1_databases]]",
              'binding = "DB"',
              `database_name = ${JSON.stringify(previewDbName)}`,
              `database_id = ${JSON.stringify(previewId)}`,
              "",
            ].join("\n"));
            fs.appendFileSync(process.env.GITHUB_ENV, `PREVIEW_D1_DATABASE_ID=${previewId}\n`);
            console.log(`Existing creator-governance preview D1 resolved: ${previewDbName} id=${maskId(previewId)}`);
            console.log("Existing owner-console preview Pages bindings and Discord flags verified.");
          })().catch((error) => fail(error instanceof Error ? error.message : String(error)));
          NODE

          node <<'NODE'
          const fs = require("node:fs");
          const eventName = process.env.EXISTING_CREATOR_GOVERNANCE_PREVIEW_EVENT_NAME;
          if (eventName !== "Creator Governance Preview Cup 0919c46") {
            console.error("Existing creator-governance preview event constant mismatch.");
            process.exit(1);
          }
          function sql(value) {
            return `'${String(value).replaceAll("'", "''")}'`;
          }
          fs.writeFileSync("owner-console-creator-event-verify.sql", `
          SELECT
            e.id,
            e.name,
            e.slug,
            e.event_type,
            e.category,
            e.status,
            e.visibility,
            CASE WHEN e.created_by IS NOT NULL AND e.created_by != '' THEN 1 ELSE 0 END AS created_by_present,
            CASE WHEN EXISTS (SELECT 1 FROM users WHERE users.id = e.created_by) THEN 1 ELSE 0 END AS created_by_user_exists,
            ces.server_id AS hosting_server_id,
            ces.category AS registration_category,
            ces.approved,
            ces.seed,
            ls.competitive_enabled,
            ls.server_category AS host_category,
            (SELECT COUNT(*) FROM competitive_event_activity activity WHERE activity.event_id = e.id) AS activity_count,
            (SELECT activity.activity_type FROM competitive_event_activity activity WHERE activity.event_id = e.id ORDER BY activity.created_at DESC LIMIT 1) AS activity_type
          FROM competitive_events e
          LEFT JOIN competitive_event_servers ces ON ces.event_id = e.id
          LEFT JOIN linked_servers ls ON ls.id = ces.server_id
          WHERE e.name = ${sql(eventName)}
          ORDER BY e.created_at DESC;
          `);
          NODE

          VERIFY_SQL="$(cat owner-console-creator-event-verify.sql)"
          npx wrangler d1 execute DB \
            --config wrangler.owner-console-preview.toml \
            --remote \
            --json \
            --command "${VERIFY_SQL}" \
            > owner-console-creator-event-count.json \
            2> owner-console-creator-event-count.stderr.log
          npx wrangler d1 execute DB \
            --config wrangler.owner-console-preview.toml \
            --remote \
            --json \
            --command "PRAGMA foreign_key_check;" \
            > owner-console-creator-event-foreign-key-check.json \
            2> owner-console-creator-event-foreign-key-check.stderr.log

          node <<'NODE'
          const fs = require("node:fs");
          const previewBaseUrl = process.env.PREVIEW_BASE_URL;
          function sanitizeLine(value) {
            return String(value ?? "")
              .replace(/\uFEFF/g, "")
              .replace(/Bearer\s+[A-Za-z0-9._~+/=-]+/gi, "Bearer [redacted-token]")
              .replace(/\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b/gi, "[redacted-id]")
              .replace(/[A-Za-z0-9_-]{48,}/g, "[redacted-token]")
              .replace(/(authorization|cookie|session|secret|token)\s*[:=]\s*[^\s,;]+/gi, "$1=[redacted]")
              .slice(0, 240);
          }
          function parseWranglerJsonFile(path) {
            const buffer = fs.readFileSync(path);
            const raw = buffer.toString("utf8").replace(/^\uFEFF/, "");
            const trimmed = raw.trimStart();
            const first = trimmed[0] ?? "";
            const jsonStartFound = first === "[" || first === "{";
            if (!jsonStartFound) {
              const firstSafeLine = sanitizeLine(raw.split(/\r?\n/).find((line) => line.trim().length > 0) ?? "");
              console.error(`Malformed Wrangler JSON in ${path}: byteLength=${buffer.length}; jsonStartFound=false; firstSafeLine=${firstSafeLine}`);
              process.exit(1);
            }
            try {
              return JSON.parse(trimmed);
            } catch {
              const firstSafeLine = sanitizeLine(raw.split(/\r?\n/).find((line) => line.trim().length > 0) ?? "");
              console.error(`Malformed Wrangler JSON in ${path}: byteLength=${buffer.length}; jsonStartFound=true; firstSafeLine=${firstSafeLine}`);
              process.exit(1);
            }
          }
          function rowsFromWranglerJson(path) {
            const parsed = parseWranglerJsonFile(path);
            const containers = Array.isArray(parsed) ? parsed : [parsed];
            return containers.flatMap((item) => item?.results ?? item?.result?.[0]?.results ?? item?.result?.results ?? []);
          }
          function assert(condition, message) {
            if (!condition) {
              console.error(message);
              process.exit(1);
            }
          }
          async function fetchPath(path, expectedStatus) {
            const response = await fetch(`${previewBaseUrl}${path}`, {
              redirect: "manual",
              headers: { "User-Agent": "dzn-existing-creator-governance-preview-verify", "Cache-Control": "no-cache" },
            });
            const text = await response.text().catch(() => "");
            if (response.status !== expectedStatus) {
              console.error(`${path} expected ${expectedStatus}, got ${response.status}; content-type=${response.headers.get("content-type") || "unknown"}; body-length=${text.length}`);
              process.exit(1);
            }
            for (const marker of ["TOKEN_ENCRYPTION_KEY", "SESSION_SECRET", "encrypted_token", "Error 1102", "Worker exceeded resource limits"]) {
              if (text.includes(marker)) {
                console.error(`${path} exposed forbidden marker ${marker}.`);
                process.exit(1);
              }
            }
            return { response, text };
          }
          void (async () => {
            const owner = await fetchPath("/owner", 302);
            assert((owner.response.headers.get("location") || "").includes("/login"), "/owner did not redirect to login.");
            await fetchPath("/api/owner/overview", 401);
            await fetchPath("/api/owner/servers", 401);
            await fetchPath("/api/owner/audit-log", 401);
            await fetchPath("/api/owner/discord/overview", 401);
            await fetchPath("/", 200);
            await fetchPath("/events", 200);
            await fetchPath("/events/suggest", 200);
            await fetchPath("/api/public/servers", 200);
            await fetchPath("/api/public/home-stats", 200);
            await fetchPath("/api/public/leaderboards", 200);
            await fetchPath("/api/public/server-rail", 200);
            const pulse = await fetchPath("/api/dzn-pulse/config", 200);
            const pulseJson = JSON.parse(pulse.text);
            assert(pulseJson.discordNotificationsEnabled === false || pulseJson.config?.discordNotificationsEnabled === false, "discordNotificationsEnabled was not false.");

            const rows = rowsFromWranglerJson("owner-console-creator-event-count.json");
            assert(rows.length === 1, `Expected exactly one existing preview event row, got ${rows.length}.`);
            const row = rows[0] ?? {};
            const expected = {
              name: process.env.EXISTING_CREATOR_GOVERNANCE_PREVIEW_EVENT_NAME,
              slug: process.env.EXISTING_CREATOR_GOVERNANCE_PREVIEW_EVENT_SLUG,
              event_type: "community_cup",
              category: "deathmatch",
              hosting_server_id: "owner-console-nuketown",
              registration_category: "deathmatch",
              status: "registration_open",
              visibility: "public",
              approved: 1,
              seed: 1,
              competitive_enabled: 1,
              activity_count: 1,
              activity_type: "event_created",
              created_by_present: 1,
              created_by_user_exists: 1,
            };
            for (const [key, value] of Object.entries(expected)) {
              assert(row[key] === value, `Existing creator-governance preview event ${key} mismatch.`);
            }
            const fkRows = rowsFromWranglerJson("owner-console-creator-event-foreign-key-check.json");
            assert(fkRows.length === 0, "Existing creator-governance preview foreign_key_check returned rows.");
            console.log("Existing creator-governance preview verified read-only.");
          })().catch((error) => {
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          });
          NODE

          {
            echo "## Existing Creator Governance Preview Verification"
            echo ""
            echo "- Preview project: ${EXISTING_CREATOR_GOVERNANCE_PREVIEW_PROJECT_NAME}"
            echo "- Preview database: ${EXISTING_CREATOR_GOVERNANCE_PREVIEW_DB_NAME}"
            echo "- Preview event: ${EXISTING_CREATOR_GOVERNANCE_PREVIEW_EVENT_NAME}"
            echo "- Preview slug: ${EXISTING_CREATOR_GOVERNANCE_PREVIEW_EVENT_SLUG}"
            echo "- D1 create/delete/migration/seed: none"
            echo "- Pages deploy/patch/secrets: none"
            echo "- Application POST: none"
            echo "- Discord message: false"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Preflight event platform performance preview
        if: ${{ inputs.mode == 'event-platform-performance-preview' }}
        run: |
          set -euo pipefail

          mkdir -p dzn-event-platform-performance-preview
          if [ "${CANDIDATE_BRANCH}" != "feature/event-platform-performance-foundation" ]; then
            echo "::error::event-platform-performance-preview mode may only run from feature/event-platform-performance-foundation."
            exit 1
          fi
          if [ "${CONFIRM_EVENT_PLATFORM_PERFORMANCE_PREVIEW}" != "${EVENT_PLATFORM_PERFORMANCE_PREVIEW_CONFIRMATION}" ]; then
            echo "::error::confirm_event_platform_performance_preview must equal APPROVE_EVENT_PLATFORM_PERFORMANCE_PREVIEW."
            exit 1
          fi
          if [ "${EVENT_PLATFORM_PERFORMANCE_PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
            echo "::error::Refusing event platform performance preview for production Pages project."
            exit 1
          fi
          if [ "${EVENT_PLATFORM_PERFORMANCE_PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ] || [ "${EVENT_PLATFORM_PERFORMANCE_PREVIEW_DB_NAME}" = "${DETECTED_PRODUCTION_D1_DATABASE_NAME:-}" ]; then
            echo "::error::Refusing event platform performance preview for production D1 database name."
            exit 1
          fi
          if [ -z "${OWNER_CONSOLE_CF_TOKEN:-${CLOUDFLARE_API_TOKEN:-}}" ]; then
            echo "::error::Missing Cloudflare token for event platform performance preview."
            exit 1
          fi
          echo "::add-mask::owner-console-preview-owner-token"
          echo "::add-mask::owner-console-preview-creator-token"
          echo "::add-mask::owner-console-preview-non-owner-token"
          echo "::add-mask::dzn_session=owner-console-preview-owner-token"
          echo "::add-mask::dzn_session=owner-console-preview-creator-token"
          echo "::add-mask::dzn_session=owner-console-preview-non-owner-token"
          export CLOUDFLARE_API_TOKEN="${OWNER_CONSOLE_CF_TOKEN:-${CLOUDFLARE_API_TOKEN:-}}"

          node <<'NODE'
          const fs = require("node:fs");
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const projectName = process.env.EVENT_PLATFORM_PERFORMANCE_PREVIEW_PROJECT_NAME;
          const previewDbName = process.env.EVENT_PLATFORM_PERFORMANCE_PREVIEW_DB_NAME;
          const productionProjectName = process.env.PRODUCTION_PAGES_PROJECT_NAME;
          const productionDbName = process.env.DETECTED_PRODUCTION_D1_DATABASE_NAME || process.env.PRODUCTION_D1_DATABASE_NAME;
          const productionDbId = process.env.DETECTED_PRODUCTION_D1_DATABASE_ID || "";
          const branch = process.env.CANDIDATE_BRANCH;
          const sha = process.env.CANDIDATE_SHA;
          const runId = String(process.env.GITHUB_RUN_ID || "");
          const repository = process.env.GITHUB_REPOSITORY;
          const githubToken = process.env.GITHUB_TOKEN;
          const previewBaseUrl = process.env.PREVIEW_BASE_URL;

          function sanitizeFailureValue(value) {
            return String(value ?? "")
              .replace(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/gi, "[uuid]")
              .replace(/[A-Za-z0-9_\-]{64,}/g, "[redacted]")
              .slice(0, 500);
          }
          function writeFailureSummary(category, message, details = {}) {
            fs.mkdirSync(artifacts, { recursive: true });
            const safeDetails = {};
            for (const [key, value] of Object.entries(details)) {
              safeDetails[key] = sanitizeFailureValue(value);
            }
            fs.writeFileSync(`${artifacts}/failure-summary.json`, JSON.stringify({
              ok: false,
              category,
              message: sanitizeFailureValue(message),
              details: safeDetails,
              mode: "event-platform-performance-preview",
              branch: process.env.CANDIDATE_BRANCH,
              commit: process.env.CANDIDATE_SHA,
            }, null, 2));
          }
          function fail(message, details = {}) {
            writeFailureSummary(details.category || "PHASE2A_PREVIEW_VERIFICATION_FAILED", message, details);
            console.error(message);
            process.exit(1);
          }
          function maskId(id) {
            return typeof id === "string" && id.length > 12 ? `${id.slice(0, 8)}...${id.slice(-4)}` : "unavailable";
          }
          function unwrap(result) {
            if (!result.ok || result.parsed?.success === false) {
              const first = Array.isArray(result.parsed?.errors) ? result.parsed.errors[0] : null;
              fail(`Cloudflare read failed: status=${result.status}; code=${first?.code ?? "unknown"}; category=${String(first?.message ?? "Cloudflare API error").slice(0, 160)}`);
            }
            return result.parsed?.result;
          }
          async function cloudflare(path, init = {}) {
            const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const text = await response.text();
            let parsed;
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = { success: false, errors: [{ code: "non_json", message: "non-json Cloudflare response" }] };
            }
            return { ok: response.ok, status: response.status, parsed };
          }
          async function listD1Databases() {
            const rows = [];
            for (let page = 1; page <= 20; page += 1) {
              const result = await cloudflare(`/d1/database?per_page=50&page=${page}`);
              const body = unwrap(result);
              rows.push(...(Array.isArray(body) ? body : []));
              const info = result.parsed?.result_info;
              if (!info || Number(info.page || page) >= Number(info.total_pages || page)) break;
            }
            return rows;
          }
          function d1BindingId(config) {
            const db = config?.d1_databases?.DB;
            if (typeof db === "string") return db;
            return String(db?.id ?? db?.database_id ?? "");
          }
          function envValue(config, key) {
            const value = config?.env_vars?.[key];
            return typeof value === "object" && value ? String(value.value ?? "") : String(value ?? "");
          }
          function productionSignature(project) {
            const configs = project?.deployment_configs || {};
            return JSON.stringify({
              name: project?.name,
              productionBranch: project?.production_branch ?? null,
              productionDb: d1BindingId(configs.production || {}),
              previewDb: d1BindingId(configs.preview || {}),
            });
          }
          async function activePreviewRunsUsingReusableDb() {
            if (!repository || !githubToken) return [{ id: "unknown", status: "unknown", reason: "github-token-unavailable" }];
            const active = [];
            for (const status of ["queued", "in_progress"]) {
              const response = await fetch(`https://api.github.com/repos/${repository}/actions/runs?status=${status}&per_page=100`, {
                headers: {
                  Authorization: `Bearer ${githubToken}`,
                  Accept: "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                },
              });
              if (!response.ok) return [{ id: "unknown", status, reason: "github-actions-inventory-unavailable" }];
              const payload = await response.json();
              for (const run of payload.workflow_runs || []) {
                const id = String(run.id || "");
                if (id === runId) continue;
                if (run.name === "DZN Owner Console Preview" && ["queued", "in_progress"].includes(String(run.status))) {
                  active.push({ id, status: run.status, branch: run.head_branch || "unknown" });
                }
              }
            }
            return active;
          }

          void (async () => {
            if (projectName !== "dzn-network-owner-console-preview") fail("Event platform performance preview project constant mismatch.");
            if (previewDbName !== "dzn_network_db_owner_console_preview_creator_governance_0919c46") fail("Event platform performance preview DB constant mismatch.");
            if (projectName === productionProjectName) fail("Production Pages project selected for Phase 2A preview.");
            if (previewDbName === productionDbName) fail("Production D1 name selected for Phase 2A preview.");

            const databases = await listD1Databases();
            const previewDb = databases.find((db) => db.name === previewDbName);
            const productionDb = databases.find((db) => db.name === productionDbName) || { uuid: productionDbId, id: productionDbId, name: productionDbName };
            const previewId = String(previewDb?.uuid ?? previewDb?.id ?? "");
            const detectedProductionId = String(productionDb?.uuid ?? productionDb?.id ?? productionDbId ?? "");
            if (!previewDb || !previewId) fail("Fixed reusable Phase 2A preview D1 does not exist.");
            if (previewId === detectedProductionId || previewId === productionDbId) fail("Phase 2A preview D1 id equals production D1 id.");
