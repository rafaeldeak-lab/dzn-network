name: DZN ADM Cycle Watch

on:
  workflow_dispatch:
    inputs:
      watchMinutes:
        description: "Minutes to watch ADM state"
        required: false
        default: "90"
        type: string
  schedule:
    - cron: "23 */3 * * *"

jobs:
  adm-cycle-watch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Watch ADM cycle
        id: adm-watch
        env:
          DZN_APP_URL: ${{ vars.DZN_APP_URL }}
          DZN_CRON_SECRET: ${{ secrets.DZN_CRON_SECRET }}
          SYNC_CRON_SECRET: ${{ secrets.SYNC_CRON_SECRET }}
          AUTODEV_WATCH_MINUTES: ${{ inputs.watchMinutes || '90' }}
        run: |
          set +e
          npm run autodev:adm-watch
          code=$?
          echo "result=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Verify live ADM import evidence
        id: adm-live
        env:
          DZN_APP_URL: ${{ vars.DZN_APP_URL }}
          DZN_CRON_SECRET: ${{ secrets.DZN_CRON_SECRET }}
          SYNC_CRON_SECRET: ${{ secrets.SYNC_CRON_SECRET }}
        run: |
          set +e
          npm run verify:adm-live
          code=$?
          echo "result=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload AutoDev reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autodev-adm-cycle-watch-reports
          path: .autodev/reports
      - name: Create or update issue on failure
        if: always() && steps.adm-live.outputs.result != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run autodev:create-issue
      - name: Resolve ADM cycle watch result
        if: always()
        run: |
          echo "ADM watch result: ${{ steps.adm-watch.outputs.result }}"
          echo "Live evidence result: ${{ steps.adm-live.outputs.result }}"
          if [ "${{ steps.adm-live.outputs.result }}" != "0" ]; then
            echo "Protected ADM health/live evidence failed."
            exit 1
          fi
          if [ "${{ steps.adm-watch.outputs.result }}" != "0" ]; then
            echo "::warning::ADM watch did not complete, but protected live ADM evidence passed. Treating optional direct evidence as unavailable."
          fi
