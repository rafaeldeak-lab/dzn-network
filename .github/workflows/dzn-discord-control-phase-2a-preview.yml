name: DZN Discord Control Phase 2A Preview

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to preview
        default: feature/discord-control-phase-2a
        required: true
      mode:
        description: Action to run
        required: true
        type: choice
        options:
          - validate
          - provision-preview-db
          - deploy-preview
          - verify-preview
          - full-preview
      confirm_preview_only:
        description: Must equal PREVIEW_ONLY
        required: true
      preview_project_name:
        description: Preview Pages project
        required: true
        default: dzn-network-discord-phase-2a-preview
      preview_db_name:
        description: Preview D1 database name
        required: true
        default: dzn_network_db_discord_phase_2a_preview

concurrency:
  group: dzn-discord-control-phase-2a-preview-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  discord-control-phase-2a-preview:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PULSE_PREVIEW_TOKEN: ${{ secrets.CLOUDFLARE_PULSE_PREVIEW_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      DZN_PLATFORM_OWNER_DISCORD_IDS: ${{ secrets.DZN_PLATFORM_OWNER_DISCORD_IDS || vars.DZN_PLATFORM_OWNER_DISCORD_IDS }}
      INPUT_BRANCH: ${{ inputs.branch }}
      MODE: ${{ inputs.mode }}
      CONFIRM_PREVIEW_ONLY: ${{ inputs.confirm_preview_only }}
      PREVIEW_PROJECT_NAME: ${{ inputs.preview_project_name }}
      PREVIEW_DB_NAME: ${{ inputs.preview_db_name }}
      PRODUCTION_PAGES_PROJECT_NAME: dzn-network
      PRODUCTION_D1_DATABASE_NAME: dzn_network_db
      DZN_DISCORD_NOTIFICATIONS_ENABLED: "false"
      PREVIEW_BASE_URL: https://${{ inputs.preview_project_name }}.pages.dev
      PREVIEW_SESSION_SECRET: discord-phase-2a-preview-session-secret

    steps:
      - name: Checkout requested branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate preview-only guards
        run: |
          set -euo pipefail

          if [ "${CONFIRM_PREVIEW_ONLY}" != "PREVIEW_ONLY" ]; then
            echo "::error::confirm_preview_only must equal PREVIEW_ONLY."
            exit 1
          fi
          if [ "${INPUT_BRANCH}" != "feature/discord-control-phase-2a" ]; then
            echo "::error::Discord Control Phase 2A preview may only run against feature/discord-control-phase-2a."
            exit 1
          fi
          if [ "${INPUT_BRANCH}" = "main" ]; then
            echo "::error::Preview branch must never be main."
            exit 1
          fi
          if [ "${PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
            echo "::error::Preview Pages project must not equal production Pages project."
            exit 1
          fi
          case "${PREVIEW_PROJECT_NAME}" in
            *discord*preview*) ;;
            *)
              echo "::error::Preview Pages project name must contain discord and preview."
              exit 1
              ;;
          esac
          if [ "${PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ]; then
            echo "::error::Preview D1 database must not equal production D1 database."
            exit 1
          fi
          case "${PREVIEW_DB_NAME}" in
            *discord_phase_2a_preview*|*discord_control_preview*) ;;
            *)
              echo "::error::Preview D1 database name must contain discord_phase_2a_preview or discord_control_preview."
              exit 1
              ;;
          esac
          if [ "${DZN_DISCORD_NOTIFICATIONS_ENABLED}" != "false" ]; then
            echo "::error::DZN_DISCORD_NOTIFICATIONS_ENABLED must remain false."
            exit 1
          fi
          if [ -z "${DZN_PLATFORM_OWNER_DISCORD_IDS:-}" ]; then
            echo "::error::Missing DZN_PLATFORM_OWNER_DISCORD_IDS for Discord Control Phase 2A preview."
            exit 1
          fi
          echo "::add-mask::${DZN_PLATFORM_OWNER_DISCORD_IDS}"

          if [ "${MODE}" != "validate" ]; then
            CF_TOKEN="${CLOUDFLARE_PULSE_PREVIEW_TOKEN:-${CLOUDFLARE_API_TOKEN:-}}"
            if [ -z "${CF_TOKEN:-}" ]; then
              echo "::error::Missing CLOUDFLARE_PULSE_PREVIEW_TOKEN or CLOUDFLARE_API_TOKEN GitHub secret."
              exit 1
            fi
            if [ "${#CF_TOKEN}" -le 20 ]; then
              echo "::error::Cloudflare preview token is present but too short to be valid."
              exit 1
            fi
            echo "::add-mask::${CF_TOKEN}"
            {
              printf "DISCORD_PHASE_2A_CF_TOKEN=%s\n" "${CF_TOKEN}"
              printf "CLOUDFLARE_API_TOKEN=%s\n" "${CF_TOKEN}"
            } >> "$GITHUB_ENV"
            if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
              echo "::error::Missing CLOUDFLARE_ACCOUNT_ID GitHub secret or repository variable."
              exit 1
            fi
            if ! [[ "${CLOUDFLARE_ACCOUNT_ID}" =~ ^[a-fA-F0-9]{32}$ ]]; then
              echo "::error::CLOUDFLARE_ACCOUNT_ID does not look like a 32-character Cloudflare account id."
              exit 1
            fi
          fi

          test -f migrations/0055_discord_control_phase_2a.sql
          if grep -Ei "DROP\s+TABLE|DELETE\s+FROM|TRUNCATE|CREATE TABLE IF NOT EXISTS player_stats|ALTER TABLE\s+player_profiles" migrations/0055_discord_control_phase_2a.sql; then
            echo "::error::Discord Phase 2A migration must be additive-only."
            exit 1
          fi

          {
            echo "## DZN Discord Control Phase 2A Preview Guard"
            echo ""
            echo "- Branch: ${INPUT_BRANCH}"
            echo "- Preview Pages project: ${PREVIEW_PROJECT_NAME}"
            echo "- Preview D1 database: ${PREVIEW_DB_NAME}"
            echo "- DZN_DISCORD_NOTIFICATIONS_ENABLED: false"
            echo "- Owner allowlist configured: true"
            if [ "${MODE}" != "validate" ]; then
              if [ -n "${CLOUDFLARE_PULSE_PREVIEW_TOKEN:-}" ]; then
                echo "- Cloudflare token source: CLOUDFLARE_PULSE_PREVIEW_TOKEN"
              else
                echo "- Cloudflare token source: CLOUDFLARE_API_TOKEN fallback"
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install
        run: npm ci

      - name: Validate branch
        if: ${{ inputs.mode == 'validate' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail
          npm run lint
          npm run build
          npm run test
          npm run test:owner-console
          npm run test:github-workflows
          npm run test:public-access-gating
          npm run test:server-lifecycle-resource-control
          npm run test:server-advertising-packages
          git diff --check

      - name: Resolve or create preview D1
        if: ${{ inputs.mode == 'provision-preview-db' || inputs.mode == 'deploy-preview' || inputs.mode == 'verify-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const previewName = process.env.PREVIEW_DB_NAME;
          const productionName = process.env.PRODUCTION_D1_DATABASE_NAME;

          async function api(path, init = {}) {
            const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const parsed = await response.json().catch(() => null);
            if (!response.ok || parsed?.success === false) {
              throw new Error(parsed?.errors?.map((error) => error.message).join("; ") || `HTTP ${response.status}`);
            }
            return parsed;
          }

          void (async () => {
            if (previewName === productionName) throw new Error("preview_db_name equals production database name.");
            const list = await api("/d1/database?per_page=100");
            const databases = Array.isArray(list.result) ? list.result : list.result?.databases ?? [];
            let database = databases.find((item) => item?.name === previewName);
            if (!database) {
              database = (await api("/d1/database", {
                method: "POST",
                body: JSON.stringify({ name: previewName }),
              })).result;
            }
            const previewId = database?.uuid ?? database?.id;
            if (!previewId) throw new Error("Could not resolve preview D1 database id.");
            fs.writeFileSync("wrangler.discord-phase-2a-preview.toml", [
              'name = "dzn-discord-control-phase-2a-preview"',
              'compatibility_date = "2026-05-13"',
              "",
              "[[d1_databases]]",
              'binding = "DB"',
              `database_name = "${previewName}"`,
              `database_id = "${previewId}"`,
              "",
            ].join("\n"));
            fs.appendFileSync(process.env.GITHUB_ENV, `PREVIEW_D1_DATABASE_ID=${previewId}\n`);
            console.log(`Preview D1 database name: ${previewName}`);
            console.log(`Preview D1 database id: ${previewId}`);
          })().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE

      - name: Apply preview migrations through 0055
        if: ${{ inputs.mode == 'provision-preview-db' || inputs.mode == 'deploy-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail
          case "${PREVIEW_DB_NAME}" in
            *discord_phase_2a_preview*|*discord_control_preview*) ;;
            *)
              echo "::error::Refusing migration for non-preview Discord Phase 2A database name."
              exit 1
              ;;
          esac
          npx wrangler d1 migrations apply DB --config wrangler.discord-phase-2a-preview.toml --remote
          npx wrangler d1 execute DB --config wrangler.discord-phase-2a-preview.toml --remote --json --command "SELECT type, name FROM sqlite_master WHERE type IN ('table','index') ORDER BY name;" > discord-phase-2a-schema.json
          node <<'NODE'
          const fs = require("node:fs");
          const parsed = JSON.parse(fs.readFileSync("discord-phase-2a-schema.json", "utf8"));
          const rows = (Array.isArray(parsed) ? parsed : [parsed]).flatMap((item) => item?.results ?? item?.result?.[0]?.results ?? []);
          const names = new Set(rows.map((row) => row.name));
          for (const name of [
            "discord_channel_mappings",
            "discord_owner_audit_log",
            "idx_discord_channel_mappings_slot",
            "idx_discord_owner_audit_log_created_at",
          ]) {
            if (!names.has(name)) throw new Error(`Preview D1 schema missing ${name}.`);
          }
          console.log("Preview Discord Phase 2A schema verified through 0055.");
          NODE

      - name: Seed preview-only Discord control data
        if: ${{ inputs.mode == 'deploy-preview' || inputs.mode == 'verify-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const sessionSecret = process.env.PREVIEW_SESSION_SECRET;
          const ownerToken = "discord-phase-2a-owner-session";
          const nonOwnerToken = "discord-phase-2a-non-owner-session";
          const hmac = (value) => crypto.createHmac("sha256", sessionSecret).update(value).digest("base64url");
          const ownerIds = String(process.env.DZN_PLATFORM_OWNER_DISCORD_IDS || "").split(",").map((id) => id.trim()).filter((id) => /^\d+$/.test(id));
          const ownerDiscordId = ownerIds[0];
          if (!ownerDiscordId) throw new Error("DZN_PLATFORM_OWNER_DISCORD_IDS did not contain a numeric Discord ID.");
          let nonOwnerDiscordId = "333333333333333333";
          if (ownerIds.includes(nonOwnerDiscordId)) {
            nonOwnerDiscordId = "333333333333333334";
          }
          if (ownerIds.includes(nonOwnerDiscordId)) {
            throw new Error("Preview non-owner Discord ID unexpectedly appears in the platform owner allowlist.");
          }
          const sql = `
          INSERT INTO users (id, discord_id, username, avatar, created_at, updated_at)
          VALUES
            ('owner-preview-user', '${ownerDiscordId}', 'OwnerPreview', NULL, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('non-owner-preview-user', '${nonOwnerDiscordId}', 'NonOwnerPreview', NULL, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
          ON CONFLICT(id) DO UPDATE SET username = excluded.username, discord_id = excluded.discord_id, updated_at = CURRENT_TIMESTAMP;

          INSERT INTO sessions (id, user_id, session_token_hash, expires_at, created_at)
          VALUES
            ('owner-preview-session-row', 'owner-preview-user', '${hmac(ownerToken)}', datetime('now', '+7 days'), CURRENT_TIMESTAMP),
            ('non-owner-preview-session-row', 'non-owner-preview-user', '${hmac(nonOwnerToken)}', datetime('now', '+7 days'), CURRENT_TIMESTAMP)
          ON CONFLICT(id) DO UPDATE SET session_token_hash = excluded.session_token_hash, expires_at = excluded.expires_at;

          INSERT INTO discord_channel_mappings (
            id, slot, guild_id, guild_name, channel_id, channel_name, enabled,
            last_permission_status, last_permission_checked_at, last_permission_error, last_permission_json,
            created_by, updated_by, created_at, updated_at
          ) VALUES (
            'phase-2a-announcements-mapping', 'announcements', '288000000000000001', 'DZN Phase 2A Preview Guild',
            '288000000000000101', 'announcements', 1, 'ok', CURRENT_TIMESTAMP, NULL,
            '{"ok":true,"status":"ok","checkedAt":"preview","mode":"bot","canViewChannel":true,"canSendMessages":true,"canEmbedLinks":true,"canReadMessageHistory":true,"canAttachFiles":null,"missingPermissions":[],"warning":null,"channelName":"announcements","permissionSource":"preview"}',
            '${ownerDiscordId}', '${ownerDiscordId}', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP
          )
          ON CONFLICT(slot) DO UPDATE SET
            guild_id = excluded.guild_id,
            guild_name = excluded.guild_name,
            channel_id = excluded.channel_id,
            channel_name = excluded.channel_name,
            enabled = excluded.enabled,
            last_permission_status = excluded.last_permission_status,
            last_permission_checked_at = excluded.last_permission_checked_at,
            last_permission_error = excluded.last_permission_error,
            last_permission_json = excluded.last_permission_json,
            updated_by = excluded.updated_by,
            updated_at = CURRENT_TIMESTAMP;
          `;
          fs.writeFileSync("discord-phase-2a-preview-seed.sql", sql);
          fs.writeFileSync("discord-phase-2a-preview-cookies.json", JSON.stringify({
            ownerToken,
            nonOwnerToken,
            ownerDiscordId,
            nonOwnerDiscordId,
            ownerAllowlistConfigured: ownerIds.length > 0,
            nonOwnerAllowlistMember: ownerIds.includes(nonOwnerDiscordId),
          }, null, 2));
          NODE

          npx wrangler d1 execute DB --config wrangler.discord-phase-2a-preview.toml --remote --file discord-phase-2a-preview-seed.sql

      - name: Resolve or create preview Pages project
        if: ${{ inputs.mode == 'deploy-preview' || inputs.mode == 'verify-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const projectName = process.env.PREVIEW_PROJECT_NAME;
          const branch = process.env.INPUT_BRANCH;
          const previewBaseUrl = process.env.PREVIEW_BASE_URL;
          const previewDbName = process.env.PREVIEW_DB_NAME;
          const d1Id = process.env.PREVIEW_D1_DATABASE_ID;
          async function api(path, init = {}) {
            const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const parsed = await response.json().catch(() => null);
            if (!response.ok || parsed?.success === false) {
              throw new Error(parsed?.errors?.map((error) => error.message).join("; ") || `HTTP ${response.status}`);
            }
            return parsed;
          }
          function mergeConfig(config) {
            return {
              ...config,
              env_vars: {
                ...(config?.env_vars ?? {}),
                DZN_PULSE_ENABLED: { type: "plain_text", value: "true" },
                DZN_DISCORD_NOTIFICATIONS_ENABLED: { type: "plain_text", value: "false" },
                MOCK_AUTH: { type: "plain_text", value: "true" },
                DZN_APP_URL: { type: "plain_text", value: previewBaseUrl },
                NEXT_PUBLIC_APP_URL: { type: "plain_text", value: previewBaseUrl },
              },
              d1_databases: {
                ...(config?.d1_databases ?? {}),
                DB: { id: d1Id },
              },
            };
          }
          void (async () => {
            if (projectName === "dzn-network") throw new Error("Refusing production Pages project.");
            const getResponse = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}/pages/projects/${projectName}`, {
              headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
            });
            const getParsed = await getResponse.json().catch(() => null);
            let project = null;
            if (getResponse.status === 404) {
              project = (await api("/pages/projects", {
                method: "POST",
                body: JSON.stringify({ name: projectName, production_branch: branch }),
              })).result ?? null;
              console.log(`Created preview Pages project: ${projectName}`);
            } else if (!getResponse.ok || getParsed?.success === false) {
              throw new Error(getParsed?.errors?.map((error) => error.message).join("; ") || `HTTP ${getResponse.status}`);
            } else {
              project = getParsed?.result ?? null;
              console.log(`Reusing preview Pages project: ${projectName}`);
            }
            await api(`/pages/projects/${projectName}`, {
              method: "PATCH",
              body: JSON.stringify({
                production_branch: branch,
                deployment_configs: {
                  production: mergeConfig(project?.deployment_configs?.production ?? {}),
                  preview: mergeConfig(project?.deployment_configs?.preview ?? {}),
                },
              }),
            });
            fs.writeFileSync("wrangler.toml", [
              `name = ${JSON.stringify(projectName)}`,
              'compatibility_date = "2026-05-13"',
              'pages_build_output_dir = "out"',
              "",
              "[vars]",
              'DZN_PULSE_ENABLED = "true"',
              'DZN_DISCORD_NOTIFICATIONS_ENABLED = "false"',
              'MOCK_AUTH = "true"',
              `DZN_APP_URL = ${JSON.stringify(previewBaseUrl)}`,
              `NEXT_PUBLIC_APP_URL = ${JSON.stringify(previewBaseUrl)}`,
              "",
              "[[d1_databases]]",
              'binding = "DB"',
              `database_name = ${JSON.stringify(previewDbName)}`,
              `database_id = ${JSON.stringify(d1Id)}`,
              "",
            ].join("\n"));
            console.log(`Configured preview Pages project: ${projectName}`);
          })().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE

      - name: Configure preview owner auth secrets
        if: ${{ inputs.mode == 'deploy-preview' || inputs.mode == 'verify-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          printf "%s" "$DZN_PLATFORM_OWNER_DISCORD_IDS" | npx wrangler pages secret put DZN_PLATFORM_OWNER_DISCORD_IDS --project-name "${PREVIEW_PROJECT_NAME}"
          printf "%s" "$PREVIEW_SESSION_SECRET" | npx wrangler pages secret put SESSION_SECRET --project-name "${PREVIEW_PROJECT_NAME}"
          echo "Discord Control Phase 2A preview owner auth secrets configured."

      - name: Configure and deploy preview Pages project
        if: ${{ inputs.mode == 'deploy-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          DZN_PULSE_ENABLED=true DZN_DISCORD_NOTIFICATIONS_ENABLED=false MOCK_AUTH=true npm run build

          node <<'NODE'
          const fs = require("node:fs");
          const routesPath = "out/_routes.json";
          if (!fs.existsSync(routesPath)) {
            throw new Error("out/_routes.json was not generated for Pages Functions routing.");
          }
          const routes = JSON.parse(fs.readFileSync(routesPath, "utf8"));
          const include = Array.isArray(routes.include) ? routes.include : [];
          const hasOwnerRoute = include.some((route) => route === "/owner" || route === "/owner/*" || route === "/*");
          const hasOwnerApiRoute = include.some((route) => route === "/api/owner/*" || route === "/api/*" || route === "/*");
          if (!hasOwnerRoute) throw new Error("out/_routes.json does not include /owner or /owner/*.");
          if (!hasOwnerApiRoute) throw new Error("out/_routes.json does not include /api/owner/*.");
          console.log("Pages Functions routing includes /owner and /api/owner.");
          NODE

          npx wrangler pages deploy out --project-name "${PREVIEW_PROJECT_NAME}" --branch "${INPUT_BRANCH}" --commit-dirty=true | tee discord-phase-2a-preview-deploy.txt

          node <<'NODE'
          const fs = require("node:fs");
          const deployText = fs.readFileSync("discord-phase-2a-preview-deploy.txt", "utf8");
          const immutableUrl = deployText.match(/https:\/\/[^\s]+\.pages\.dev/)?.[0] ?? "";
          const stableUrl = `https://${process.env.PREVIEW_PROJECT_NAME}.pages.dev`;
          fs.writeFileSync("discord-phase-2a-preview-url.txt", `${stableUrl}\n`);
          if (immutableUrl) fs.writeFileSync("discord-phase-2a-preview-immutable-url.txt", `${immutableUrl}\n`);
          console.log(`Preview URL: ${stableUrl}`);
          if (immutableUrl) console.log(`Immutable preview URL: ${immutableUrl}`);
          NODE

      - name: Verify Discord Control Phase 2A preview
        if: ${{ inputs.mode == 'verify-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const base = process.env.PREVIEW_BASE_URL;
          const deployedBase = fs.existsSync("discord-phase-2a-preview-immutable-url.txt")
            ? fs.readFileSync("discord-phase-2a-preview-immutable-url.txt", "utf8").trim()
            : "";
          const verificationBase = deployedBase || base;
          const { ownerToken, nonOwnerToken } = JSON.parse(fs.readFileSync("discord-phase-2a-preview-cookies.json", "utf8"));
          const retryablePreviewStatuses = new Set([404, 522, 523, 524, 525, 526, 530]);
          const forbiddenText = ["Request failed: 503", "SERVER UNAVAILABLE", "Error 1102", "Worker exceeded resource limits", "Minified React error #"];

          function assert(condition, message) {
            if (!condition) {
              console.error(message);
              process.exit(1);
            }
          }
          const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          async function fetchOnce(path, init = {}) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 45000);
            try {
              return await fetch(`${verificationBase}${path}`, { ...init, signal: controller.signal, redirect: "manual" });
            } finally {
              clearTimeout(timeout);
            }
          }
          async function fetchWithRetry(path, init = {}, options = {}) {
            const attempts = options.attempts ?? 12;
            const waitMs = options.waitMs ?? 7500;
            let lastResponse = null;
            let lastError = null;
            for (let attempt = 1; attempt <= attempts; attempt += 1) {
              try {
                const response = await fetchOnce(path, init);
                lastResponse = response;
                console.log(`Discord Control Phase 2A preview route ${path} attempt ${attempt}/${attempts}: HTTP ${response.status}`);
                if (!retryablePreviewStatuses.has(response.status)) return response;
              } catch (error) {
                lastError = error;
                console.log(`Discord Control Phase 2A preview route ${path} attempt ${attempt}/${attempts}: ${error instanceof Error ? error.name : "fetch_error"}`);
              }
              if (attempt < attempts) await delay(waitMs);
            }
            if (lastResponse) return lastResponse;
            throw lastError ?? new Error(`Failed to fetch ${path}.`);
          }
          async function waitForPreview() {
            console.log(`Waiting for Discord Control Phase 2A preview readiness at ${verificationBase}`);
            const maxAttempts = 40;
            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              try {
                const response = await fetchOnce("/", { redirect: "manual" });
                const body = await response.text();
                console.log(`Preview readiness attempt ${attempt}/${maxAttempts}: HTTP ${response.status}`);
                if (response.status === 200 && !forbiddenText.some((snippet) => body.includes(snippet))) return;
                if (!retryablePreviewStatuses.has(response.status)) {
                  assert(response.status !== 503, "Preview readiness returned HTTP 503.");
                  assert(!body.includes("Error 1102"), "Preview readiness returned Error 1102.");
                }
              } catch (error) {
                console.log(`Preview readiness attempt ${attempt}/${maxAttempts}: ${error instanceof Error ? error.name : "fetch_error"}`);
              }
              if (attempt < maxAttempts) await delay(7500);
            }
            throw new Error("Preview site did not become ready.");
          }
          async function text(path, init = {}) {
            const response = await fetchWithRetry(path, init);
            const body = await response.text();
            for (const snippet of forbiddenText) {
              assert(!body.includes(snippet), `${path} contains forbidden runtime text: ${snippet}`);
            }
            return { response, body };
          }
          async function jsonRequest(path, init = {}) {
            const response = await fetchWithRetry(path, init);
            const raw = await response.text();
            let parsed = null;
            try { parsed = raw ? JSON.parse(raw) : null; } catch {}
            return { response, raw, parsed };
          }
          const ownerCookie = `dzn_session=${ownerToken}`;
          const nonOwnerCookie = `dzn_session=${nonOwnerToken}`;
          const ownerHeaders = { cookie: ownerCookie, "content-type": "application/json" };

          void (async () => {
            await waitForPreview();
            for (const path of ["/", "/servers", "/dashboard", "/dzn-pulse", "/api/public/servers", "/api/public/home-stats"]) {
              const result = await text(path, path.startsWith("/api/") ? {} : { headers: { cookie: ownerCookie } });
              assert(result.response.status === 200, `${path} returned HTTP ${result.response.status}.`);
            }
            assert((await text("/owner")).response.status === 302, "/owner logged-out should redirect safely.");
            assert((await text("/owner", { headers: { cookie: nonOwnerCookie } })).response.status === 403, "/owner non-owner should return 403.");
            assert((await text("/owner", { headers: { cookie: ownerCookie } })).response.status === 200, "/owner owner should return 200.");

            const overviewLoggedOut = await jsonRequest("/api/owner/discord/channel-mappings");
            assert(overviewLoggedOut.response.status === 401, "Logged-out channel mappings API should be 401.");
            const overviewNonOwner = await jsonRequest("/api/owner/discord/channel-mappings", { headers: { cookie: nonOwnerCookie } });
            assert(overviewNonOwner.response.status === 403, "Non-owner channel mappings API should be 403.");

            const mappings = await jsonRequest("/api/owner/discord/channel-mappings", { headers: ownerHeaders });
            assert(mappings.response.status === 200, `Owner channel mappings returned ${mappings.response.status}.`);
            const serialized = JSON.stringify(mappings.parsed ?? {});
            assert(!/DISCORD_BOT_TOKEN|DISCORD_CLIENT_SECRET|TOKEN_ENCRYPTION_KEY|SESSION_SECRET|webhooks\/|encrypted_token/i.test(serialized), "Owner mappings leaked secret-like data.");

            const invalid = await jsonRequest("/api/owner/discord/channel-mappings", {
              method: "POST",
              headers: ownerHeaders,
              body: JSON.stringify({ slot: "announcements", guildId: "bad", channelId: "bad" }),
            });
            assert(invalid.response.status === 400, "Invalid Discord IDs should be rejected.");

            const save = await jsonRequest("/api/owner/discord/channel-mappings", {
              method: "POST",
              headers: ownerHeaders,
              body: JSON.stringify({ slot: "announcements", guildId: "288000000000000001", guildName: "Preview Guild", channelId: "288000000000000101", channelName: "announcements" }),
            });
            assert(save.response.status === 200, `Save mapping returned ${save.response.status}.`);

            const noConfirm = await jsonRequest("/api/owner/discord/test-embed", {
              method: "POST",
              headers: ownerHeaders,
              body: JSON.stringify({ slot: "announcements", previewOnly: true }),
            });
            assert(noConfirm.response.status === 400, "Test embed should require SEND_TEST_EMBED confirmation.");

            const previewOnly = await jsonRequest("/api/owner/discord/test-embed", {
              method: "POST",
              headers: ownerHeaders,
              body: JSON.stringify({ slot: "announcements", type: "weekly_recap", confirmation: "SEND_TEST_EMBED", previewOnly: true }),
            });
            assert(previewOnly.response.status === 200, `Preview-only test embed returned ${previewOnly.response.status}.`);
            assert(previewOnly.parsed?.sent === false, "Preview-only test embed must not send.");
            assert(previewOnly.parsed?.autoPostingEnabled === false, "Test embed must not enable auto posting.");

            const audit = await jsonRequest("/api/owner/discord/audit-log", { headers: ownerHeaders });
            assert(audit.response.status === 200, `Discord audit log returned ${audit.response.status}.`);
            assert(JSON.stringify(audit.parsed ?? {}).includes("test_embed_preview_generated"), "Audit log should include test embed preview generation.");
            assert(!/DISCORD_BOT_TOKEN|DISCORD_CLIENT_SECRET|TOKEN_ENCRYPTION_KEY|SESSION_SECRET|webhooks\/|encrypted_token/i.test(JSON.stringify(audit.parsed ?? {})), "Audit log leaked secret-like data.");

            console.log("Discord Control Phase 2A preview checks passed. No automatic Discord messages were sent.");
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

          {
            echo "## DZN Discord Control Phase 2A Preview Result"
            echo ""
            echo "- Preview URL: ${PREVIEW_BASE_URL}"
            echo "- Channel mapping setup: passed"
            echo "- Owner API protection: passed"
            echo "- Test embed preview-only guard: passed"
            echo "- Auto posting enabled: false"
            echo "- DZN_DISCORD_NOTIFICATIONS_ENABLED: false"
          } >> "$GITHUB_STEP_SUMMARY"
