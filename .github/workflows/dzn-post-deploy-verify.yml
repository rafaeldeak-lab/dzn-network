name: DZN ADM Post Deploy Verify

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  post-deploy-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Wait for Cloudflare Pages propagation
        run: sleep 45
      - name: Production smoke
        id: smoke
        env:
          DZN_APP_URL: ${{ vars.DZN_APP_URL }}
          DZN_CRON_SECRET: ${{ secrets.DZN_CRON_SECRET }}
          SYNC_CRON_SECRET: ${{ secrets.SYNC_CRON_SECRET }}
        run: |
          set +e
          npm run autodev:production-smoke
          code=$?
          echo "result=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: ADM health snapshot
        id: adm
        env:
          DZN_APP_URL: ${{ vars.DZN_APP_URL }}
          DZN_CRON_SECRET: ${{ secrets.DZN_CRON_SECRET }}
          SYNC_CRON_SECRET: ${{ secrets.SYNC_CRON_SECRET }}
          AUTODEV_WATCH_MINUTES: "0"
        run: |
          set +e
          npm run autodev:adm-watch
          code=$?
          echo "result=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: ADM live import evidence
        id: adm-live
        env:
          DZN_APP_URL: ${{ vars.DZN_APP_URL }}
          DZN_CRON_SECRET: ${{ secrets.DZN_CRON_SECRET }}
          SYNC_CRON_SECRET: ${{ secrets.SYNC_CRON_SECRET }}
        run: |
          set +e
          npm run verify:adm-live
          code=$?
          echo "result=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload AutoDev reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autodev-post-deploy-reports
          path: .autodev/reports
      - name: Create or update issue on failure
        if: always() && (steps.smoke.outputs.result != '0' || steps.adm-live.outputs.result != '0')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run autodev:create-issue
      - name: Resolve post deploy verification result
        if: always()
        run: |
          echo "Production smoke result: ${{ steps.smoke.outputs.result }}"
          echo "ADM health snapshot result: ${{ steps.adm.outputs.result }}"
          echo "Live evidence result: ${{ steps.adm-live.outputs.result }}"
          if [ "${{ steps.smoke.outputs.result }}" != "0" ] || [ "${{ steps.adm-live.outputs.result }}" != "0" ]; then
            echo "Production smoke or protected live ADM evidence failed."
            exit 1
          fi
          if [ "${{ steps.adm.outputs.result }}" != "0" ]; then
            echo "::warning::ADM health snapshot did not complete, but production smoke and protected live ADM evidence passed. Treating optional direct evidence as unavailable."
          fi
