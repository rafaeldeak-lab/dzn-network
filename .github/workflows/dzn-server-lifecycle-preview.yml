            service_id = excluded.service_id,
            next_metadata_check_at = excluded.next_metadata_check_at,
            next_player_count_check_at = excluded.next_player_count_check_at,
            next_adm_discovery_at = excluded.next_adm_discovery_at,
            next_adm_processing_at = excluded.next_adm_processing_at,
            next_retry_after = excluded.next_retry_after,
