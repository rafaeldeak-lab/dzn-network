<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 190" role="img" aria-labelledby="title desc">
  <title id="title">DZN bullet tracer accent</title>
  <desc id="desc">Sharp brass projectile with orange tracer glow, ember trail, and spiral air ring.</desc>
  <defs>
    <radialGradient id="heat" cx="76%" cy="48%" r="55%">
      <stop offset="0" stop-color="#fb923c" stop-opacity=".9"/>
      <stop offset=".26" stop-color="#ef4444" stop-opacity=".36"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="casing" x1="135" x2="332" y1="0" y2="0">
      <stop offset="0" stop-color="#4b1f0d"/>
      <stop offset=".16" stop-color="#b76524"/>
      <stop offset=".38" stop-color="#ffd58a"/>
      <stop offset=".64" stop-color="#c56a22"/>
      <stop offset="1" stop-color="#2a1209"/>
    </linearGradient>
    <linearGradient id="tip" x1="306" x2="477" y1="95" y2="95">
      <stop offset="0" stop-color="#7c2d12"/>
      <stop offset=".32" stop-color="#f97316"/>
      <stop offset=".62" stop-color="#fff7c2"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="hotDrop" x="-40%" y="-80%" width="210%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#fb923c" flood-opacity=".82"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#ef4444" flood-opacity=".5"/>
    </filter>
    <filter id="ember" x="-200%" y="-200%" width="500%" height="500%">
