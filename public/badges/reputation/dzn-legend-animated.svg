<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 256 256">
  <title>DZN Legend animated</title>
  <defs>
    <linearGradient id="dzn-legend-metal" x1="42" y1="24" x2="214" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc" stop-opacity=".85"/>
      <stop offset=".22" stop-color="#facc15"/>
      <stop offset=".68" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="dzn-legend-glow" cx="50%" cy="46%" r="56%">
      <stop offset="0" stop-color="#facc15" stop-opacity=".72"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dzn-legend-shine" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".65"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
  </defs>
  <style>
    .glow-ring{animation:dznPulse 2.8s ease-in-out infinite;transform-origin:128px 128px}.shine{animation:dznSweep 3.4s ease-in-out infinite}.spark{opacity:0;animation:dznSpark 2.4s ease-in-out infinite}.s2{animation-delay:.6s}.s3{animation-delay:1.1s}.flicker{animation:dznFlicker 1.6s ease-in-out infinite}.float{animation:dznFloat 3s ease-in-out infinite}.crown-shine{animation:dznSweep 2.8s ease-in-out infinite}@keyframes dznPulse{0%,100%{opacity:.45;transform:scale(.96)}50%{opacity:.95;transform:scale(1.04)}}@keyframes dznSweep{0%{transform:translateX(-170px);opacity:0}35%{opacity:.85}75%,100%{transform:translateX(170px);opacity:0}}@keyframes dznSpark{0%,100%{opacity:0;transform:translateY(8px) scale(.7)}45%{opacity:1;transform:translateY(-8px) scale(1.1)}}@keyframes dznFlicker{0%,100%{opacity:.72}35%{opacity:1}55%{opacity:.45}75%{opacity:.95}}@keyframes dznFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}@media (prefers-reduced-motion: reduce){*{animation:none!important}}
  </style><circle class="spark s1" cx="72" cy="72" r="5" fill="#7c3aed"/><circle class="spark s2" cx="202" cy="108" r="4" fill="#facc15"/><circle class="spark s3" cx="176" cy="204" r="4" fill="#f8fafc"/>
  <circle class="glow-ring" cx="128" cy="128" r="108" fill="url(#dzn-legend-glow)" opacity=".7"/>
  <path d="M128 18 L222 64 V132 C222 188 184 226 128 242 C72 226 34 188 34 132 V64 Z" fill="#020617" stroke="url(#dzn-legend-metal)" stroke-width="10"/>
  <path d="M128 38 L202 74 V130 C202 178 172 208 128 222 C84 208 54 178 54 130 V74 Z" fill="rgba(15,23,42,.88)" stroke="#facc15" stroke-width="4" opacity=".96"/>
  <circle cx="128" cy="128" r="72" fill="rgba(2,6,23,.62)" stroke="#7c3aed" stroke-width="5" opacity=".9"/>
  <g class="float "><text x="128" y="148" text-anchor="middle" font-size="54" font-weight="900" fill="#facc15" stroke="#f8fafc" stroke-width="2">DZN</text><path d="M72 172 H184" stroke="#7c3aed" stroke-width="9" stroke-linecap="round"/></g>
  <rect class="shine crown-shine" x="-76" y="38" width="42" height="190" fill="url(#dzn-legend-shine)" transform="rotate(18 128 128)" opacity=".65"/>
</svg>
