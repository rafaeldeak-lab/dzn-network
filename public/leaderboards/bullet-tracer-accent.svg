    <ellipse cx="374" cy="95" rx="116" ry="30" stroke="#fb923c" stroke-opacity=".32" stroke-width="2"/>
  </g>
  <g filter="url(#hotDrop)" transform="translate(40 7) rotate(-6 260 95)">
    <path d="M136 69h206c28 0 55 10 78 26-23 16-50 26-78 26H136c-25 0-43-15-43-31s18-21 43-21z" fill="url(#casing)"/>
    <path d="M316 69c55 4 109 15 163 26-54 11-108 22-163 26 22-26 22-62 0-95z" fill="url(#tip)"/>
    <path d="M132 78h212c28 0 59 8 93 22-86-9-166-9-298-8-18 0-33 3-44 9 5-14 18-23 37-23z" fill="#fff7c2" opacity=".34"/>
