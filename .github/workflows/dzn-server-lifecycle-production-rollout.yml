name: DZN Server Lifecycle Production Rollout

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Approved lifecycle branch to deploy
        required: true
        default: feature/server-lifecycle-resource-control
      approved_commit:
        description: Exact feature branch commit SHA from the successful lifecycle preview run
        required: true
      approved_preview_run_url:
        description: Successful DZN Server Lifecycle Preview run URL for approved_commit
        required: true
      confirm_production_rollout:
        description: Must equal APPROVE_LIFECYCLE_ROLLOUT
        required: true
      production_db_name:
        description: Production D1 database name
        required: true
        default: dzn_network_db
      production_pages_project_name:
        description: Production Pages project name
        required: true
        default: dzn-network
      migration_name:
        description: Migration file to apply
        required: true
        default: 0054_server_lifecycle_resource_control.sql

concurrency:
  group: dzn-server-lifecycle-production-rollout
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  rollout:
    runs-on: ubuntu-latest
    env:
      APPROVED_BRANCH: feature/server-lifecycle-resource-control
      PRODUCTION_D1_DATABASE_ID: 37515c66-2787-49e4-8568-a461517e975e
      PRODUCTION_BASE_URL: https://dzn-network.pages.dev
      GITHUB_TOKEN: ${{ github.token }}
      CLOUDFLARE_SERVER_LIFECYCLE_PRODUCTION_TOKEN: ${{ secrets.CLOUDFLARE_SERVER_LIFECYCLE_PRODUCTION_TOKEN }}
      CLOUDFLARE_SERVER_ADVERTISING_PRODUCTION_TOKEN: ${{ secrets.CLOUDFLARE_SERVER_ADVERTISING_PRODUCTION_TOKEN }}
      CLOUDFLARE_PULSE_PRODUCTION_TOKEN: ${{ secrets.CLOUDFLARE_PULSE_PRODUCTION_TOKEN }}
      CLOUDFLARE_API_TOKEN_FALLBACK: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      DZN_CRON_SECRET: ${{ secrets.DZN_CRON_SECRET }}
      SYNC_CRON_SECRET: ${{ secrets.SYNC_CRON_SECRET }}
      DZN_DISCORD_NOTIFICATIONS_ENABLED: "false"

    steps:
      - name: Checkout approved feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate production rollout guards
        run: |
          set -euo pipefail

          if [ "${{ inputs.confirm_production_rollout }}" != "APPROVE_LIFECYCLE_ROLLOUT" ]; then
            echo "::error::confirm_production_rollout must equal APPROVE_LIFECYCLE_ROLLOUT."
            exit 1
          fi
          if [ -z "${{ inputs.branch }}" ]; then
            echo "::error::branch input must not be empty."
            exit 1
          fi
          if [ "${{ inputs.branch }}" != "${APPROVED_BRANCH}" ]; then
            echo "::error::Server lifecycle rollout may only deploy ${APPROVED_BRANCH}."
            exit 1
          fi
          APPROVED_COMMIT="${{ inputs.approved_commit }}"
          APPROVED_PREVIEW_RUN_URL="${{ inputs.approved_preview_run_url }}"
          if ! [[ "${APPROVED_COMMIT}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::approved_commit must be the exact 40-character SHA that passed DZN Server Lifecycle Preview."
            exit 1
          fi
          EXPECTED_PREVIEW_RUN_PREFIX="https://github.com/${GITHUB_REPOSITORY}/actions/runs/"
          case "${APPROVED_PREVIEW_RUN_URL}" in
            "${EXPECTED_PREVIEW_RUN_PREFIX}"*) ;;
            *)
              echo "::error::approved_preview_run_url must be a DZN Server Lifecycle Preview run URL in ${GITHUB_REPOSITORY}."
              exit 1
              ;;
          esac
          APPROVED_PREVIEW_RUN_ID="${APPROVED_PREVIEW_RUN_URL##*/}"
          if ! [[ "${APPROVED_PREVIEW_RUN_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::approved_preview_run_url must end with a numeric GitHub Actions run id."
            exit 1
          fi
          if [ "${{ inputs.production_db_name }}" != "dzn_network_db" ]; then
            echo "::error::production_db_name must equal dzn_network_db."
            exit 1
          fi
          if [ "${{ inputs.production_pages_project_name }}" != "dzn-network" ]; then
            echo "::error::production_pages_project_name must equal dzn-network."
            exit 1
          fi
          if [ "${{ inputs.migration_name }}" != "0054_server_lifecycle_resource_control.sql" ]; then
            echo "::error::migration_name must equal 0054_server_lifecycle_resource_control.sql."
            exit 1
          fi
          case "${{ inputs.production_db_name }}" in
            *preview*|*lifecycle_preview*|*server_lifecycle_preview*)
              echo "::error::Refusing preview D1 name for production rollout."
              exit 1
              ;;
          esac
          case "${{ inputs.production_pages_project_name }}" in
            *preview*)
              echo "::error::Refusing preview Pages project for production rollout."
              exit 1
              ;;
          esac
          if [ "${DZN_DISCORD_NOTIFICATIONS_ENABLED}" != "false" ]; then
            echo "::error::DZN_DISCORD_NOTIFICATIONS_ENABLED must remain false."
            exit 1
          fi

          git fetch origin main "${APPROVED_BRANCH}"
          if ! git cat-file -e "${APPROVED_COMMIT}^{commit}" 2>/dev/null; then
            echo "::error::Approved commit is not present on the selected branch; rerun preview for the current branch head."
            exit 1
          fi
          if ! git merge-base --is-ancestor "${APPROVED_COMMIT}" HEAD; then
            echo "::error::Approved commit is not present on the selected branch; rerun preview for the current branch head."
            exit 1
          fi
          ROLLOUT_COMMIT_SHA="$(git rev-parse HEAD)"
          if [ "${ROLLOUT_COMMIT_SHA}" != "${APPROVED_COMMIT}" ]; then
            echo "::error::Selected branch HEAD ${ROLLOUT_COMMIT_SHA} does not match preview-approved commit ${APPROVED_COMMIT}; rerun preview for the current branch head."
            exit 1
          fi
          echo "ROLLOUT_COMMIT_SHA=${ROLLOUT_COMMIT_SHA}" >> "$GITHUB_ENV"
          echo "APPROVED_PREVIEW_RUN_URL=${APPROVED_PREVIEW_RUN_URL}" >> "$GITHUB_ENV"

          APPROVED_COMMIT="${APPROVED_COMMIT}" APPROVED_PREVIEW_RUN_ID="${APPROVED_PREVIEW_RUN_ID}" node <<'NODE'
          (async () => {
            const token = process.env.GITHUB_TOKEN;
            if (!token) {
              throw new Error("GITHUB_TOKEN is unavailable for preview approval verification.");
            }
            const response = await fetch(`https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.APPROVED_PREVIEW_RUN_ID}`, {
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            });
            if (!response.ok) {
              throw new Error(`Could not verify approved preview run: GitHub API returned ${response.status}.`);
            }
            const run = await response.json();
            if (run.name !== "DZN Server Lifecycle Preview") {
              throw new Error(`Approved run is ${run.name || "unknown"}, not DZN Server Lifecycle Preview.`);
            }
            if (run.event !== "workflow_dispatch") {
              throw new Error("Approved preview run must be a manual workflow_dispatch run.");
            }
            if (run.conclusion !== "success") {
              throw new Error(`Approved preview run is not green; conclusion=${run.conclusion || "missing"}.`);
            }
            console.log(`Approved preview run verified: ${run.html_url}`);
          })().catch((error) => {
            console.error(`::error::${error.message}`);
            process.exit(1);
          });
          NODE

          ROLLOUT_CF_TOKEN=""
          ROLLOUT_CF_TOKEN_SOURCE=""
          if [ -n "${CLOUDFLARE_SERVER_LIFECYCLE_PRODUCTION_TOKEN:-}" ]; then
            ROLLOUT_CF_TOKEN="${CLOUDFLARE_SERVER_LIFECYCLE_PRODUCTION_TOKEN}"
            ROLLOUT_CF_TOKEN_SOURCE="CLOUDFLARE_SERVER_LIFECYCLE_PRODUCTION_TOKEN"
          elif [ -n "${CLOUDFLARE_SERVER_ADVERTISING_PRODUCTION_TOKEN:-}" ]; then
            ROLLOUT_CF_TOKEN="${CLOUDFLARE_SERVER_ADVERTISING_PRODUCTION_TOKEN}"
            ROLLOUT_CF_TOKEN_SOURCE="CLOUDFLARE_SERVER_ADVERTISING_PRODUCTION_TOKEN"
          elif [ -n "${CLOUDFLARE_PULSE_PRODUCTION_TOKEN:-}" ]; then
            ROLLOUT_CF_TOKEN="${CLOUDFLARE_PULSE_PRODUCTION_TOKEN}"
            ROLLOUT_CF_TOKEN_SOURCE="CLOUDFLARE_PULSE_PRODUCTION_TOKEN"
          elif [ -n "${CLOUDFLARE_API_TOKEN_FALLBACK:-}" ]; then
            ROLLOUT_CF_TOKEN="${CLOUDFLARE_API_TOKEN_FALLBACK}"
            ROLLOUT_CF_TOKEN_SOURCE="CLOUDFLARE_API_TOKEN"
          fi
          if [ -z "${ROLLOUT_CF_TOKEN:-}" ]; then
            echo "::error::Missing Cloudflare token. Provide CLOUDFLARE_SERVER_LIFECYCLE_PRODUCTION_TOKEN, CLOUDFLARE_SERVER_ADVERTISING_PRODUCTION_TOKEN, CLOUDFLARE_PULSE_PRODUCTION_TOKEN, or CLOUDFLARE_API_TOKEN."
            exit 1
          fi
          echo "::add-mask::${ROLLOUT_CF_TOKEN}"
          printf "CLOUDFLARE_API_TOKEN=%s\n" "${ROLLOUT_CF_TOKEN}" >> "$GITHUB_ENV"
          printf "LIFECYCLE_CF_TOKEN=%s\n" "${ROLLOUT_CF_TOKEN}" >> "$GITHUB_ENV"
          echo "ROLLOUT_CF_TOKEN_SOURCE=${ROLLOUT_CF_TOKEN_SOURCE}" >> "$GITHUB_ENV"

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID GitHub secret or repository variable."
            exit 1
          fi
          if ! [[ "${CLOUDFLARE_ACCOUNT_ID}" =~ ^[a-fA-F0-9]{32}$ ]]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID does not look like a 32-character Cloudflare account id."
            exit 1
          fi

          CRON_SECRET="${DZN_CRON_SECRET:-${SYNC_CRON_SECRET:-}}"
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Missing DZN_CRON_SECRET or SYNC_CRON_SECRET for protected production verification."
            exit 1
          fi
          echo "::add-mask::${CRON_SECRET}"
          printf "PROTECTED_CRON_SECRET=%s\n" "${CRON_SECRET}" >> "$GITHUB_ENV"
          if [ -n "${DZN_CRON_SECRET:-}" ]; then
            echo "PROTECTED_CRON_SECRET_SOURCE=DZN_CRON_SECRET" >> "$GITHUB_ENV"
          else
            echo "PROTECTED_CRON_SECRET_SOURCE=SYNC_CRON_SECRET" >> "$GITHUB_ENV"
          fi
          {
            echo "## DZN Server Lifecycle Production Rollout"
            echo "- Approved preview run: ${{ inputs.approved_preview_run_url }}"
            echo "- Branch: ${{ inputs.branch }}"
            echo "- Commit: ${ROLLOUT_COMMIT_SHA}"
            echo "- Production D1: ${{ inputs.production_db_name }}"
            echo "- Production Pages project: ${{ inputs.production_pages_project_name }}"
            echo "- Migration: ${{ inputs.migration_name }}"
            echo "- Cloudflare token source: ${ROLLOUT_CF_TOKEN_SOURCE:-selected}"
            echo "- Protected route secret source: ${PROTECTED_CRON_SECRET_SOURCE:-selected}"
            echo "- DZN_DISCORD_NOTIFICATIONS_ENABLED: false"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install
        run: npm ci

      - name: Confirm lifecycle implementation files
        run: |
          set -euo pipefail
          test -f migrations/0054_server_lifecycle_resource_control.sql
          test -f lib/server-lifecycle.ts
          test -f scripts/test-server-lifecycle-resource-control.ts
          grep -q "SERVER_LIFECYCLE_ACTIVE_ADM_STATUSES" functions/_lib/automation.ts
          grep -q "lifecycleWarningOnly" functions/api/autodev/adm-health.ts
          grep -q "Token needs re-save" components/onboarding/dashboard.tsx

      - name: Final local checks
        run: |
          set -euo pipefail
          npm run lint
          DZN_PULSE_ENABLED=true DZN_DISCORD_NOTIFICATIONS_ENABLED=false npm run build
          npm run test
          npm run test:metadata-sync-runner
          npm run test:automation-schedulers
          npm run test:public-access-gating
          npm run test:server-advertising-packages
          npm run test:server-lifecycle-resource-control
          npm run test:github-workflows
          git diff --check

      - name: Review migration 0054 safety
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("node:fs");
          const path = `migrations/${process.env.MIGRATION_NAME}`;
          const source = fs.readFileSync(path, "utf8");
          const withoutComments = source
            .split(/\r?\n/)
            .filter((line) => !line.trim().startsWith("--"))
            .join("\n");
          const destructive = /\b(DROP|TRUNCATE)\b|DELETE\s+FROM/i.test(withoutComments);
          if (destructive) {
            throw new Error("Migration 0054 contains destructive SQL.");
          }
          const mutatesProtected = /\b(INSERT|UPDATE|DELETE)\b[\s\S]*(player_profiles|kill_events|player_events|adm_raw_events|server_stats|leaderboard|server_wars|subscriptions)/i.test(withoutComments);
          if (mutatesProtected) {
            throw new Error("Migration 0054 rewrites protected historical/stat tables.");
          }
          const statements = withoutComments.split(";").map((part) => part.trim()).filter(Boolean);
          for (const statement of statements) {
            const additiveAlter = /^ALTER\s+TABLE\s+(linked_servers|server_sync_state)\s+ADD\s+COLUMN\s+/i.test(statement);
            const createIndex = /^CREATE\s+INDEX\s+IF\s+NOT\s+EXISTS\s+/i.test(statement);
            if (!additiveAlter && !createIndex) {
              throw new Error(`Migration 0054 contains unsupported statement: ${statement.slice(0, 120)}`);
            }
          }
          console.log("Migration 0054 is additive-only.");
          NODE
        env:
          MIGRATION_NAME: ${{ inputs.migration_name }}

      - name: Confirm production D1 identity
        run: |
          set -euo pipefail

          D1_LIST="$(npx wrangler d1 list --json)"
          D1_LIST="${D1_LIST}" node <<'NODE'
          const list = JSON.parse(process.env.D1_LIST || "[]");
          const db = list.find((entry) => entry.name === "dzn_network_db");
          if (!db) {
            throw new Error("Production D1 database dzn_network_db was not found.");
          }
          if (db.uuid !== process.env.PRODUCTION_D1_DATABASE_ID) {
            throw new Error("Production D1 database id mismatch.");
          }
          console.log(`Production D1 verified: ${db.name} (${db.uuid})`);
          NODE

      - name: Create production D1 Time Travel bookmark
        run: |
          set -euo pipefail

          BOOKMARK_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          npx wrangler d1 time-travel info "${{ inputs.production_db_name }}" \
            --timestamp "${BOOKMARK_TIMESTAMP}" \
            --json > d1-time-travel-before-0054.json

          node <<'NODE'
          const fs = require("node:fs");
          const payload = JSON.parse(fs.readFileSync("d1-time-travel-before-0054.json", "utf8"));
          const info = Array.isArray(payload) ? payload[0] : payload;
          const bookmark = info?.bookmark || info?.result?.bookmark || info?.bookmarks?.[0]?.bookmark || null;
          if (!bookmark) {
            throw new Error("Cloudflare did not return a D1 Time Travel bookmark.");
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `D1_BACKUP_BOOKMARK=${bookmark}\n`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `- Production D1 backup/bookmark: ${bookmark}\n`);
          console.log(`Production D1 Time Travel bookmark created: ${bookmark}`);
          NODE

      - name: Inspect production rows before migration
        run: |
          set -euo pipefail

          npx wrangler d1 execute "${{ inputs.production_db_name }}" --remote --json \
            --command "PRAGMA table_info(linked_servers);" \
            > lifecycle-linked-columns-before.json
          npx wrangler d1 execute "${{ inputs.production_db_name }}" --remote --json \
            --command "PRAGMA table_info(server_sync_state);" \
            > lifecycle-sync-columns-before.json
          npx wrangler d1 execute "${{ inputs.production_db_name }}" --remote --json \
            --command "SELECT 'linked_servers' AS table_name, COUNT(*) AS row_count FROM linked_servers UNION ALL SELECT 'server_sync_state', COUNT(*) FROM server_sync_state;" \
            > lifecycle-counts-before.json

          node <<'NODE'
          const fs = require("node:fs");
          function rows(path) {
            const parsed = JSON.parse(fs.readFileSync(path, "utf8"));
            return Array.isArray(parsed) ? parsed.flatMap((entry) => entry.results || []) : [];
          }
          const linkedColumns = new Set(rows("lifecycle-linked-columns-before.json").map((row) => row.name));
          const syncColumns = new Set(rows("lifecycle-sync-columns-before.json").map((row) => row.name));
          const linkedRequiredBefore0054 = ["id"];
          for (const column of linkedRequiredBefore0054) {
            if (!linkedColumns.has(column)) {
              throw new Error(`Pre-migration linked_servers schema is missing required column ${column}.`);
            }
          }
          if (syncColumns.size === 0) {
            throw new Error("Pre-migration server_sync_state schema could not be inspected.");
          }

          const required0054LinkedColumns = [
            "lifecycle_status",
            "lifecycle_reason",
            "lifecycle_updated_at",
            "owner_action_required",
            "owner_action_reason",
            "stale_since",
            "expired_detected_at",
            "final_sync_attempted_at",
            "final_sync_completed_at",
            "final_sync_result",
            "final_adm_filename",
            "latest_imported_event_at",
            "auto_archive_after",
          ];
          const required0054SyncColumns = [
            "next_metadata_check_at",
            "next_player_count_check_at",
            "next_adm_discovery_at",
            "next_adm_processing_at",
            "next_retry_after",
            "last_skip_reason",
          ];
          const all0054ColumnsPresent = required0054LinkedColumns.every((column) => linkedColumns.has(column)) &&
            required0054SyncColumns.every((column) => syncColumns.has(column));
          fs.appendFileSync(process.env.GITHUB_ENV, `LIFECYCLE_0054_COLUMNS_PRESENT=${all0054ColumnsPresent ? "yes" : "no"}\n`);

          const optionalSelectColumns = [
            "id",
            "public_slug",
            "nitrado_service_id",
            "status",
            "listing_visibility",
            "server_name",
            "display_name",
            "hostname",
            "nitrado_service_name",
          ];
          const selectList = optionalSelectColumns
            .map((column) => linkedColumns.has(column) ? column : `NULL AS ${column}`)
            .join(", ");
          const whereParts = [];
          if (linkedColumns.has("nitrado_service_id")) {
            whereParts.push("CAST(nitrado_service_id AS TEXT) IN ('18765761','900002')");
          }
          const nameSearchColumns = ["server_name", "display_name", "hostname", "nitrado_service_name"].filter((column) => linkedColumns.has(column));
          if (nameSearchColumns.length > 0) {
            whereParts.push(`lower(COALESCE(${nameSearchColumns.join(", ")}, '')) LIKE '%pandora%'`);
          }
          const whereClause = whereParts.length > 0 ? whereParts.join(" OR ") : "1 = 0";
          const orderColumn = linkedColumns.has("nitrado_service_id") ? "nitrado_service_id, id" : "id";
          fs.writeFileSync("lifecycle-key-rows-before.sql", `SELECT ${selectList} FROM linked_servers WHERE ${whereClause} ORDER BY ${orderColumn};`);

          const linkedColumnList = [...linkedColumns].sort();
          const syncColumnList = [...syncColumns].sort();
          console.log(`Pre-migration linked_servers columns: ${linkedColumnList.join(", ")}`);
          console.log(`Pre-migration server_sync_state columns: ${syncColumnList.join(", ")}`);
          console.log(`Lifecycle 0054 columns already present: ${all0054ColumnsPresent}`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `- Pre-migration linked_servers columns: ${linkedColumnList.join(", ")}\n`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `- Pre-migration server_sync_state columns: ${syncColumnList.join(", ")}\n`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `- Lifecycle 0054 columns already present before migration: ${all0054ColumnsPresent}\n`);
          NODE

          npx wrangler d1 execute "${{ inputs.production_db_name }}" --remote --json \
            --file lifecycle-key-rows-before.sql \
            > lifecycle-key-rows-before.json

      - name: Apply only migration 0054 if needed
        run: |
          set -euo pipefail

          npx wrangler d1 execute "${{ inputs.production_db_name }}" --remote --json \
            --command "SELECT name FROM d1_migrations ORDER BY id;" > d1-applied-migrations.json

          node <<'NODE'
          const fs = require("node:fs");
          const appliedPayload = JSON.parse(fs.readFileSync("d1-applied-migrations.json", "utf8"));
          const appliedRows = Array.isArray(appliedPayload) ? appliedPayload.flatMap((entry) => entry.results || []) : [];
          const applied = new Set(appliedRows.map((row) => row.name));
          const local = fs.readdirSync("migrations").filter((name) => name.endsWith(".sql")).sort();
          const pending = local.filter((name) => !applied.has(name));
          const allowed = "0054_server_lifecycle_resource_control.sql";
          const unexpected = pending.filter((name) => name !== allowed);
          if (unexpected.length > 0) {
            throw new Error(`Unexpected pending production D1 migrations: ${unexpected.join(", ")}`);
          }
          const schemaAlreadyHas0054 = process.env.LIFECYCLE_0054_COLUMNS_PRESENT === "yes";
          const shouldApply = pending.includes(allowed) && !schemaAlreadyHas0054;
          fs.writeFileSync("d1-pending-0054.txt", shouldApply ? "yes" : "no");
          console.log(`Pending migration 0054: ${pending.includes(allowed) ? "yes" : "no"}`);
          console.log(`Lifecycle 0054 schema already present: ${schemaAlreadyHas0054 ? "yes" : "no"}`);
          NODE

          if [ "$(cat d1-pending-0054.txt)" = "yes" ]; then
            npx wrangler d1 migrations apply "${{ inputs.production_db_name }}" --remote
            echo "- Migration 0054: applied" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${LIFECYCLE_0054_COLUMNS_PRESENT:-no}" = "yes" ]; then
            echo "- Migration 0054: already applied by schema" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Migration 0054: already applied" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Verify production schema after migration
        run: |
          set -euo pipefail

          npx wrangler d1 execute "${{ inputs.production_db_name }}" --remote --json \
            --command "PRAGMA table_info(linked_servers);" > lifecycle-linked-columns-after.json
          npx wrangler d1 execute "${{ inputs.production_db_name }}" --remote --json \
            --command "PRAGMA table_info(server_sync_state);" > lifecycle-sync-columns-after.json
          npx wrangler d1 execute "${{ inputs.production_db_name }}" --remote --json \
            --command "SELECT name FROM sqlite_master WHERE type='index' AND name IN ('idx_linked_servers_lifecycle_status','idx_linked_servers_lifecycle_visibility','idx_linked_servers_owner_action','idx_server_sync_state_metadata_due','idx_server_sync_state_player_count_due','idx_server_sync_state_lifecycle_retry') ORDER BY name;" > lifecycle-indexes-after.json
          npx wrangler d1 execute "${{ inputs.production_db_name }}" --remote --json \
            --command "PRAGMA foreign_key_check;" > lifecycle-foreign-key-check-after.json
          npx wrangler d1 execute "${{ inputs.production_db_name }}" --remote --json \
            --command "SELECT id, public_slug, nitrado_service_id, status, listing_visibility, lifecycle_status FROM linked_servers WHERE nitrado_service_id IN ('18765761','900002') OR lower(COALESCE(server_name,'')) LIKE '%pandora%' ORDER BY nitrado_service_id, id;" > lifecycle-key-rows-after.json
          npx wrangler d1 execute "${{ inputs.production_db_name }}" --remote --json \
            --command "SELECT 'linked_servers' AS table_name, COUNT(*) AS row_count FROM linked_servers UNION ALL SELECT 'server_sync_state', COUNT(*) FROM server_sync_state;" > lifecycle-counts-after.json

          node <<'NODE'
          const fs = require("node:fs");
          function rows(path) {
            const parsed = JSON.parse(fs.readFileSync(path, "utf8"));
            return Array.isArray(parsed) ? parsed.flatMap((entry) => entry.results || []) : [];
          }
          const linkedColumns = new Set(rows("lifecycle-linked-columns-after.json").map((row) => row.name));
          const requiredLinked = [
            "lifecycle_status",
            "lifecycle_reason",
            "lifecycle_updated_at",
            "owner_action_required",
            "owner_action_reason",
            "stale_since",
            "expired_detected_at",
            "final_sync_attempted_at",
            "final_sync_completed_at",
            "final_sync_result",
            "final_adm_filename",
            "latest_imported_event_at",
            "auto_archive_after",
          ];
          for (const column of requiredLinked) {
            if (!linkedColumns.has(column)) throw new Error(`Missing linked_servers.${column}`);
          }
          const syncColumns = new Set(rows("lifecycle-sync-columns-after.json").map((row) => row.name));
          for (const column of ["next_metadata_check_at", "next_player_count_check_at", "next_adm_discovery_at", "next_adm_processing_at", "next_retry_after", "last_skip_reason"]) {
            if (!syncColumns.has(column)) throw new Error(`Missing server_sync_state.${column}`);
          }
          const indexes = new Set(rows("lifecycle-indexes-after.json").map((row) => row.name));
          for (const index of ["idx_linked_servers_lifecycle_status", "idx_linked_servers_lifecycle_visibility", "idx_linked_servers_owner_action", "idx_server_sync_state_metadata_due", "idx_server_sync_state_player_count_due", "idx_server_sync_state_lifecycle_retry"]) {
            if (!indexes.has(index)) throw new Error(`Missing lifecycle index ${index}`);
          }
          if (rows("lifecycle-foreign-key-check-after.json").length > 0) {
            throw new Error("PRAGMA foreign_key_check returned violations.");
          }
          const beforeCounts = rows("lifecycle-counts-before.json");
          const afterCounts = rows("lifecycle-counts-after.json");
          const countFor = (list, table) => list.find((row) => row.table_name === table)?.row_count;
          for (const table of ["linked_servers", "server_sync_state"]) {
            if (countFor(beforeCounts, table) !== countFor(afterCounts, table)) {
              throw new Error(`Unexpected row count change for ${table}`);
            }
          }
          const afterRows = rows("lifecycle-key-rows-after.json");
          if (!afterRows.some((row) => String(row.nitrado_service_id) === "18765761")) {
            throw new Error("NukeTown row missing after migration.");
          }
          if (!afterRows.some((row) => String(row.nitrado_service_id) === "900002")) {
            throw new Error("Warlords row missing after migration.");
          }
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, "- Production lifecycle schema verification: passed\n");
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `- Key server rows inspected: ${afterRows.length}\n`);
          console.log("Production lifecycle schema verification passed.");
          NODE

      - name: Deploy production Pages from approved commit
        run: |
          set -euo pipefail

          DZN_PULSE_ENABLED=true DZN_DISCORD_NOTIFICATIONS_ENABLED=false npm run build
          npx wrangler pages deploy out \
            --project-name "${{ inputs.production_pages_project_name }}" \
            --branch main \
            --commit-hash "${ROLLOUT_COMMIT_SHA}" \
            --commit-message "Deploy server lifecycle resource control" \
            --commit-dirty=true \
            | tee lifecycle-production-pages-deploy.txt

          DEPLOY_URL="$(grep -Eo 'https://[a-zA-Z0-9.-]+\.pages\.dev' lifecycle-production-pages-deploy.txt | head -n 1 || true)"
          if [ -z "${DEPLOY_URL:-}" ]; then
            DEPLOY_URL="${PRODUCTION_BASE_URL}"
          fi
          echo "PRODUCTION_DEPLOY_URL=${DEPLOY_URL}" >> "$GITHUB_ENV"
          {
            echo "- Production stable URL: ${PRODUCTION_BASE_URL}"
            echo "- Production deployment URL: ${DEPLOY_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify ADM Worker secrets before deploy
        run: |
          set -euo pipefail

          node <<'NODE'
          (async () => {
            const token = process.env.LIFECYCLE_CF_TOKEN;
            const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
            async function api(path) {
              const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
                headers: { Authorization: `Bearer ${token}` },
              });
              const parsed = await response.json().catch(() => ({}));
              if (!response.ok || parsed.success === false) {
                throw new Error(parsed.errors?.map((error) => error.message).join("; ") || `Cloudflare API ${response.status}`);
              }
              return parsed.result ?? [];
            }
            const secrets = await api("/workers/scripts/dzn-adm-sync-worker/secrets");
            const names = new Set(secrets.map((secret) => secret.name));
            for (const required of ["TOKEN_ENCRYPTION_KEY", "DZN_CRON_SECRET"]) {
              if (!names.has(required)) {
                throw new Error(`ADM Worker missing required secret ${required}`);
              }
            }
            console.log("ADM Worker required secrets are configured.");
          })().catch((error) => {
            console.error(`::error::${error.message}`);
            process.exit(1);
          });
          NODE

      - name: Deploy ADM Worker
        run: |
          set -euo pipefail
          npx wrangler deploy --config wrangler.adm-sync.toml | tee lifecycle-adm-worker-deploy.txt
          echo "- ADM Worker deploy: completed" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify production lifecycle rollout
        run: |
          set -euo pipefail

          sleep 20

          node <<'NODE'
          const fs = require("node:fs");
          (async () => {
            const base = process.env.PRODUCTION_BASE_URL;
            const cronSecret = process.env.PROTECTED_CRON_SECRET;
            const forbidden = [
              "Request failed: 503",
              "SERVER UNAVAILABLE",
              "Error 1102",
              "Worker exceeded resource limits",
              "Minified React error #",
            ];
            async function request(path, init = {}) {
              const controller = new AbortController();
              const timeout = setTimeout(() => controller.abort(), 45000);
              try {
                const response = await fetch(`${base}${path}`, {
                  redirect: "follow",
                  headers: { "User-Agent": "dzn-lifecycle-production-rollout", ...(init.headers ?? {}) },
                  ...init,
                  signal: controller.signal,
                });
                const text = await response.text();
                return { response, text };
              } finally {
                clearTimeout(timeout);
              }
            }
            async function expect(path, statuses = [200], tries = 3) {
              let lastStatus = 0;
              for (let attempt = 1; attempt <= tries; attempt += 1) {
                const { response, text } = await request(path);
                lastStatus = response.status;
                if (!statuses.includes(response.status)) {
                  if (attempt === tries) throw new Error(`${path} returned HTTP ${response.status}, expected ${statuses.join("/")}`);
                  await new Promise((resolve) => setTimeout(resolve, 5000));
                  continue;
                }
                for (const marker of forbidden) {
                  if (text.includes(marker)) throw new Error(`${path} contained runtime marker ${marker}`);
                }
                return { status: response.status, text };
              }
              throw new Error(`${path} failed with HTTP ${lastStatus}`);
            }
            async function json(path, statuses = [200], tries = 3) {
              const result = await expect(path, statuses, tries);
              try {
                return JSON.parse(result.text || "{}");
              } catch {
                throw new Error(`${path} did not return JSON`);
              }
            }
            async function protectedPost(path, body) {
              const result = await request(path, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "x-dzn-cron-secret": cronSecret,
                  "x-sync-cron-secret": cronSecret,
                  "x-cron-secret": cronSecret,
                  Authorization: `Bearer ${cronSecret}`,
                },
                body: JSON.stringify(body ?? {}),
              });
              if (![200, 202].includes(result.response.status)) {
                throw new Error(`${path} protected verification returned HTTP ${result.response.status}: ${result.text.slice(0, 200)}`);
              }
              for (const marker of forbidden) {
                if (result.text.includes(marker)) throw new Error(`${path} contained runtime marker ${marker}`);
              }
              return result.text;
            }

            await expect("/", [200], 5);
            await expect("/servers", [200], 5);
            await expect("/dzn-pulse", [200], 5);
            await expect("/dashboard", [200], 3);
            await expect("/api/public/server-rail", [200], 10);
            await expect("/api/public/servers", [200], 10);
            await expect("/api/public/home-stats", [200], 10);
            await expect("/api/public/leaderboards", [200], 10);
            await expect("/api/public/leaderboards/advanced", [200], 10);
            await expect("/api/public/server-wars", [200], 10);

            const pulse = await json("/api/dzn-pulse/config", [200], 6);
            if (pulse.dznPulseEnabled !== true) throw new Error("DZN Pulse is not enabled.");
            if (pulse.discordNotificationsEnabled !== false) throw new Error("DZN Discord Pulse delivery is not false.");

            const servers = await json("/api/public/servers", [200], 5);
            const serverText = JSON.stringify(servers);
            if (serverText.includes("warlords") || serverText.includes("900002")) {
              throw new Error("Warlords appears in public active server surfaces.");
            }

            const rail = await json("/api/public/server-rail", [200], 5);
            const railText = JSON.stringify(rail);
            if (railText.includes("warlords") || railText.includes("900002")) {
              throw new Error("Warlords appears in public server rail.");
            }

            await protectedPost("/api/autodev/adm-health", { source: "lifecycle-rollout", max_servers: 5 });
            await protectedPost("/api/sync/metadata/run", { source: "lifecycle-rollout", cron: "github-actions", max_servers: 3, deadline_ms: 8000 });
            await protectedPost("/api/cron/server-wars/refresh", { source: "lifecycle-rollout", max_events: 1, max_finalizations: 1, max_challenge_expirations: 5, deadline_ms: 5000 });
            await protectedPost("/api/sync/discord-posts/run", { source: "lifecycle-rollout", cron: "github-actions", max_jobs: 3, deadline_ms: 5000 });

            const protectedRoutes = [
              "/api/dzn-pulse/summary",
              "/api/dzn-pulse/notifications/unread-count",
              "/api/dzn-pulse/notifications",
              "/api/dzn-pulse/event-popups",
            ];
            for (const path of protectedRoutes) {
              await expect(path, [401, 403], 3);
            }

            fs.writeFileSync("lifecycle-production-route-results.txt", [
              "public routes: passed",
              "pulse config: enabled=true discord=false",
              "warlords public exclusion: passed",
              "protected scheduler endpoints: passed",
              "logged-out pulse protection: passed",
            ].join("\n"));
            console.log("Production lifecycle rollout verification passed.");
          })().catch((error) => {
            console.error(`::error::${error.message}`);
            process.exit(1);
          });
          NODE

          {
            echo "### Production verification"
            sed 's/^/- /' lifecycle-production-route-results.txt
          } >> "$GITHUB_STEP_SUMMARY"
