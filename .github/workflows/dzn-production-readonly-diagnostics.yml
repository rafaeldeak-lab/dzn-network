name: DZN Production Read-Only Diagnostics

on:
  workflow_dispatch:
    inputs:
      confirm_read_only:
        description: Must equal RUN_READ_ONLY_PRODUCTION_DIAGNOSTICS
        required: true
      production_pages_project_name:
        description: Production Cloudflare Pages project
        required: true
        default: dzn-network
      production_db_name:
        description: Production D1 database
        required: true
        default: dzn_network_db
      production_base_url:
        description: Stable production base URL
        required: true
        default: https://dzn-network.pages.dev
      approved_runtime_commit:
        description: Approved Discord-announcements runtime commit
        required: true
        default: 37eff56e39c670160d5c16168509c2bbf93fecc0
      feature_branch:
        description: Discord server announcements feature branch
        required: true
        default: feature/discord-server-announcements

concurrency:
  group: dzn-production-readonly-diagnostics
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    env:
      INPUT_CONFIRM_READ_ONLY: ${{ inputs.confirm_read_only }}
      PRODUCTION_PAGES_PROJECT_NAME: ${{ inputs.production_pages_project_name }}
      PRODUCTION_D1_DATABASE_NAME: ${{ inputs.production_db_name }}
      PRODUCTION_BASE_URL: ${{ inputs.production_base_url }}
      APPROVED_RUNTIME_COMMIT: ${{ inputs.approved_runtime_commit }}
      FEATURE_BRANCH: ${{ inputs.feature_branch }}
      CLOUDFLARE_DISCORD_SERVER_ANNOUNCEMENTS_PRODUCTION_TOKEN: ${{ secrets.CLOUDFLARE_DISCORD_SERVER_ANNOUNCEMENTS_PRODUCTION_TOKEN }}
      CLOUDFLARE_SERVER_ADVERTISING_PRODUCTION_TOKEN: ${{ secrets.CLOUDFLARE_SERVER_ADVERTISING_PRODUCTION_TOKEN }}
      CLOUDFLARE_PULSE_PRODUCTION_TOKEN: ${{ secrets.CLOUDFLARE_PULSE_PRODUCTION_TOKEN }}
      CLOUDFLARE_SERVER_LIFECYCLE_PRODUCTION_TOKEN: ${{ secrets.CLOUDFLARE_SERVER_LIFECYCLE_PRODUCTION_TOKEN }}
      CLOUDFLARE_API_TOKEN_FALLBACK: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate read-only guard
        run: |
          set -euo pipefail

          if [ "${INPUT_CONFIRM_READ_ONLY}" != "RUN_READ_ONLY_PRODUCTION_DIAGNOSTICS" ]; then
            echo "::error::confirm_read_only must equal RUN_READ_ONLY_PRODUCTION_DIAGNOSTICS."
            exit 1
          fi
          if [ "${PRODUCTION_PAGES_PROJECT_NAME}" != "dzn-network" ]; then
            echo "::error::production_pages_project_name must equal dzn-network."
            exit 1
          fi
          if [ "${PRODUCTION_D1_DATABASE_NAME}" != "dzn_network_db" ]; then
            echo "::error::production_db_name must equal dzn_network_db."
            exit 1
          fi
          case "${PRODUCTION_PAGES_PROJECT_NAME}" in
            *preview*|*Preview*|*PREVIEW*)
              echo "::error::Refusing preview Pages project."
              exit 1
              ;;
          esac
          case "${PRODUCTION_D1_DATABASE_NAME}" in
            *preview*|*Preview*|*PREVIEW*)
              echo "::error::Refusing preview D1 database."
              exit 1
              ;;
          esac
          case "${PRODUCTION_BASE_URL}" in
            https://dzn-network.pages.dev|https://dzn-network.pages.dev/)
              ;;
            *)
              echo "::error::production_base_url must be the stable DZN production Pages URL."
              exit 1
              ;;
          esac

          DIAGNOSTIC_CF_TOKEN=""
          DIAGNOSTIC_CF_TOKEN_SOURCE=""
          if [ -n "${CLOUDFLARE_DISCORD_SERVER_ANNOUNCEMENTS_PRODUCTION_TOKEN:-}" ]; then
            DIAGNOSTIC_CF_TOKEN="${CLOUDFLARE_DISCORD_SERVER_ANNOUNCEMENTS_PRODUCTION_TOKEN}"
            DIAGNOSTIC_CF_TOKEN_SOURCE="CLOUDFLARE_DISCORD_SERVER_ANNOUNCEMENTS_PRODUCTION_TOKEN"
          elif [ -n "${CLOUDFLARE_SERVER_ADVERTISING_PRODUCTION_TOKEN:-}" ]; then
            DIAGNOSTIC_CF_TOKEN="${CLOUDFLARE_SERVER_ADVERTISING_PRODUCTION_TOKEN}"
            DIAGNOSTIC_CF_TOKEN_SOURCE="CLOUDFLARE_SERVER_ADVERTISING_PRODUCTION_TOKEN"
          elif [ -n "${CLOUDFLARE_PULSE_PRODUCTION_TOKEN:-}" ]; then
            DIAGNOSTIC_CF_TOKEN="${CLOUDFLARE_PULSE_PRODUCTION_TOKEN}"
            DIAGNOSTIC_CF_TOKEN_SOURCE="CLOUDFLARE_PULSE_PRODUCTION_TOKEN"
          elif [ -n "${CLOUDFLARE_SERVER_LIFECYCLE_PRODUCTION_TOKEN:-}" ]; then
            DIAGNOSTIC_CF_TOKEN="${CLOUDFLARE_SERVER_LIFECYCLE_PRODUCTION_TOKEN}"
            DIAGNOSTIC_CF_TOKEN_SOURCE="CLOUDFLARE_SERVER_LIFECYCLE_PRODUCTION_TOKEN"
          elif [ -n "${CLOUDFLARE_API_TOKEN_FALLBACK:-}" ]; then
            DIAGNOSTIC_CF_TOKEN="${CLOUDFLARE_API_TOKEN_FALLBACK}"
            DIAGNOSTIC_CF_TOKEN_SOURCE="CLOUDFLARE_API_TOKEN"
          fi

          if [ -z "${DIAGNOSTIC_CF_TOKEN:-}" ]; then
            echo "::error::Missing Cloudflare read credential."
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

          echo "::add-mask::${DIAGNOSTIC_CF_TOKEN}"
          printf "CLOUDFLARE_API_TOKEN=%s\n" "${DIAGNOSTIC_CF_TOKEN}" >> "$GITHUB_ENV"
          printf "DIAGNOSTIC_CF_TOKEN_SOURCE=%s\n" "${DIAGNOSTIC_CF_TOKEN_SOURCE}" >> "$GITHUB_ENV"
          mkdir -p diagnostics-artifact
          {
            echo "{"
            echo "  \"readOnlyGuard\": true,"
            echo "  \"pagesProject\": \"${PRODUCTION_PAGES_PROJECT_NAME}\","
            echo "  \"d1Database\": \"${PRODUCTION_D1_DATABASE_NAME}\","
            echo "  \"stableUrl\": \"${PRODUCTION_BASE_URL%/}\","
            echo "  \"cloudflareTokenSource\": \"${DIAGNOSTIC_CF_TOKEN_SOURCE}\""
            echo "}"
          } > diagnostics-artifact/guard.json

      - name: Install
        run: npm ci

      - name: Run local repository checks
        run: |
          set +e
          mkdir -p diagnostics-artifact
          node <<'NODE'
          const { spawnSync } = require("node:child_process");
          const { writeFileSync } = require("node:fs");
          const commands = [
            ["npm", ["run", "test:github-workflows"]],
            ["npm", ["run", "test:discord-server-announcements"]],
            ["npm", ["run", "test:owner-console"]],
            ["npm", ["run", "test"]],
            ["npm", ["run", "lint"]],
            ["npm", ["run", "build"]],
            ["git", ["diff", "--check"]],
          ];
          const results = [];
          for (const [command, args] of commands) {
            const label = [command, ...args].join(" ");
            console.log(`Running ${label}`);
            const started = Date.now();
            const result = spawnSync(command, args, { stdio: "inherit", shell: process.platform === "win32" });
            results.push({
              command: label,
              status: result.status,
              signal: result.signal,
              ok: result.status === 0,
              durationMs: Date.now() - started,
            });
          }
          writeFileSync("diagnostics-artifact/local-checks.json", `${JSON.stringify(results, null, 2)}\n`);
          const failed = results.filter((result) => !result.ok);
          if (failed.length) {
            console.log(`Local checks failed: ${failed.map((result) => result.command).join(", ")}`);
          }
          NODE

      - name: Cloudflare Pages read-only inspection
        run: |
          set -euo pipefail
          node <<'NODE'
          const { writeFileSync } = require("node:fs");

          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const projectName = process.env.PRODUCTION_PAGES_PROJECT_NAME;
          const stableUrl = String(process.env.PRODUCTION_BASE_URL || "").replace(/\/+$/, "");
          const approvedCommit = process.env.APPROVED_RUNTIME_COMMIT;
          const requiredEnvKeys = [
            "DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED",
            "DZN_DISCORD_NOTIFICATIONS_ENABLED",
            "DZN_PLATFORM_OWNER_DISCORD_IDS",
            "SESSION_SECRET",
            "DISCORD_CLIENT_ID",
            "DISCORD_CLIENT_SECRET",
            "DISCORD_REDIRECT_URI",
            "DISCORD_BOT_TOKEN",
            "DZN_DISCORD_ADVERT_CHANNEL_ID",
            "DZN_DISCORD_SHOWCASE_CHANNEL_ID",
          ];

          function sanitize(value) {
            if (value == null) return value;
            return String(value)
              .replace(/[A-Za-z0-9_-]{24,}\.[A-Za-z0-9_-]{6,}\.[A-Za-z0-9_-]{20,}/g, "[redacted-token]")
              .replace(/\b\d{8,32}\b/g, "[redacted-id]")
              .replace(/Bearer\s+[A-Za-z0-9_.-]+/gi, "Bearer [redacted]")
              .slice(0, 400);
          }
          async function cf(path) {
            const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
              headers: { authorization: `Bearer ${token}`, "content-type": "application/json" },
            });
            const parsed = await response.json().catch(() => null);
            if (!response.ok || parsed?.success === false) {
              throw new Error(`Cloudflare read failed for ${path}: status=${response.status} ${sanitize(parsed?.errors?.[0]?.message ?? "")}`);
            }
            return parsed.result;
          }
          function envVars(config) {
            return config?.env_vars && typeof config.env_vars === "object" ? config.env_vars : {};
          }
          function d1Databases(config) {
            return config?.d1_databases && typeof config.d1_databases === "object" ? config.d1_databases : {};
          }
          function commitHash(deployment) {
            return deployment?.deployment_trigger?.metadata?.commit_hash
              ?? deployment?.source?.config?.commit_hash
              ?? deployment?.commit_hash
              ?? null;
          }
          function deploymentUrl(deployment) {
            return deployment?.url
              ?? deployment?.aliases?.find((alias) => typeof alias === "string" && alias.includes(".pages.dev"))
              ?? null;
          }
          function summarizeDeployment(deployment) {
            return {
              id: deployment?.id ?? null,
              url: deploymentUrl(deployment),
              commitHash: commitHash(deployment),
              createdOn: deployment?.created_on ?? deployment?.createdOn ?? null,
              modifiedOn: deployment?.modified_on ?? deployment?.modifiedOn ?? null,
              latestStage: deployment?.latest_stage?.name ?? deployment?.latest_stage?.status ?? null,
              status: deployment?.latest_stage?.status ?? deployment?.status ?? null,
              environment: deployment?.environment ?? deployment?.env ?? null,
            };
          }

          void (async () => {
            const project = await cf(`/pages/projects/${encodeURIComponent(projectName)}`);
            const listed = await cf(`/pages/projects/${encodeURIComponent(projectName)}/deployments?env=production&per_page=25`);
            const allDeployments = Array.isArray(listed) ? listed : Array.isArray(listed?.result) ? listed.result : [];
            const productionDeployments = allDeployments
              .filter((deployment) => String(deployment?.environment ?? deployment?.env ?? "production") === "production")
              .slice(0, 10);
            const latestProduction = productionDeployments[0] ?? project?.latest_deployment ?? project?.canonical_deployment ?? null;
            const productionConfig = project?.deployment_configs?.production ?? {};
            const projectEnvVars = envVars(productionConfig);
            const envPresence = Object.fromEntries(requiredEnvKeys.map((key) => [key, Object.hasOwn(projectEnvVars, key)]));
            const projectSummary = {
              projectExists: true,
              projectName: project?.name ?? projectName,
              productionBranch: project?.production_branch ?? null,
              stableProductionUrl: stableUrl,
              latestProductionDeployment: summarizeDeployment(latestProduction),
              latestDeploymentCommitEqualsApprovedRuntime: commitHash(latestProduction) === approvedCommit,
              stableProductionAppearsOlderThanApprovedRuntime: commitHash(latestProduction) ? commitHash(latestProduction) !== approvedCommit : null,
              deploymentConfigHasD1Binding: Object.keys(d1Databases(productionConfig)).length > 0,
              deploymentConfigHasFunctionsRuntimeConfig: Boolean(productionConfig?.compatibility_date || productionConfig?.compatibility_flags || project?.build_config || project?.functions_config),
              productionEnvPresence: envPresence,
              recentProductionDeployments: productionDeployments.map(summarizeDeployment),
            };
            writeFileSync("diagnostics-artifact/pages.json", `${JSON.stringify(projectSummary, null, 2)}\n`);
            console.log(`Pages project inspected: ${projectSummary.projectName}`);
            console.log(`Latest production deployment: ${projectSummary.latestProductionDeployment.id ?? "unknown"}`);
          })().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE

      - name: Probe stable and immutable routes
        run: |
          set -euo pipefail
          node <<'NODE'
          const { readFileSync, writeFileSync } = require("node:fs");
          const crypto = require("node:crypto");

          const stableUrl = String(process.env.PRODUCTION_BASE_URL || "").replace(/\/+$/, "");
          const pages = JSON.parse(readFileSync("diagnostics-artifact/pages.json", "utf8"));
          const deployments = pages.recentProductionDeployments ?? [];
          const requiredPaths = [
            { path: "/", expected: 200, important: false },
            { path: "/owner", expected: 302, important: false },
            { path: "/api/owner/overview", expected: 401, important: true },
            { path: "/api/owner/discord/overview", expected: 401, important: false },
            { path: "/api/owner/servers", expected: 401, important: false },
            { path: "/api/owner/audit-log", expected: 401, important: false },
            { path: "/servers", expected: 200, important: false },
            { path: "/dzn-pulse", expected: 200, important: false },
            { path: "/api/public/servers", expected: 200, important: true },
            { path: "/api/public/home-stats", expected: 200, important: true },
            { path: "/api/public/leaderboards", expected: 200, important: true },
            { path: "/api/public/server-rail", expected: 200, important: false },
            { path: "/api/dzn-pulse/config", expected: 200, important: true },
          ];
          const forbidden = [
            "Worker exceeded resource limits",
            "Error 1102",
            "503",
            "Minified React error #",
            "Owner console data could not be loaded",
            "Owner console error",
            "internal stack trace",
            "Cloudflare token",
            "Discord bot token",
          ];
          function sanitizeBody(body) {
            return String(body ?? "")
              .replace(/\s+/g, " ")
              .replace(/[A-Za-z0-9_-]{24,}\.[A-Za-z0-9_-]{6,}\.[A-Za-z0-9_-]{20,}/g, "[redacted-token]")
              .replace(/\b\d{8,32}\b/g, "[redacted-id]")
              .replace(/Bearer\s+[A-Za-z0-9_.-]+/gi, "Bearer [redacted]")
              .replace(/secret[^<\s"]{0,120}/gi, "secret[redacted]")
              .slice(0, 320);
          }
          function classifyUrl(url) {
            if (url === stableUrl) return "stable";
            return "immutable";
          }
          async function delay(ms) {
            await new Promise((resolve) => setTimeout(resolve, ms));
          }
          async function probe(baseUrl, route, attempt) {
            const started = Date.now();
            let response = null;
            let body = "";
            let error = "";
            try {
              response = await fetch(`${baseUrl}${route.path}`, {
                redirect: "manual",
                headers: { "user-agent": "dzn-production-readonly-diagnostics/1.0" },
              });
              body = await response.text();
            } catch (caught) {
              error = caught instanceof Error ? caught.message : String(caught);
            }
            const markers = forbidden.filter((marker) => body.includes(marker));
            const status = response?.status ?? 0;
            if (status === 503 && !markers.includes("status-503")) markers.push("status-503");
            return {
              baseUrl,
              baseKind: classifyUrl(baseUrl),
              path: route.path,
              attempt,
              expected: route.expected,
              status,
              ok: status === route.expected && markers.length === 0,
              redirectLocation: sanitizeBody(response?.headers?.get("location") ?? ""),
              responseTimeMs: Date.now() - started,
              cfRay: sanitizeBody(response?.headers?.get("cf-ray") ?? ""),
              server: sanitizeBody(response?.headers?.get("server") ?? ""),
              contentType: sanitizeBody(response?.headers?.get("content-type") ?? ""),
              forbiddenMarkers: markers,
              errorPreview: status >= 400 || error ? sanitizeBody(error || body) : "",
              bodyHash: body ? crypto.createHash("sha256").update(body).digest("hex") : null,
            };
          }
          function average(values) {
            const nums = values.filter((value) => Number.isFinite(value));
            return nums.length ? Math.round(nums.reduce((sum, value) => sum + value, 0) / nums.length) : 0;
          }
          function summarize(results) {
            const groups = new Map();
            for (const result of results) {
              const key = `${result.baseUrl} ${result.path}`;
              if (!groups.has(key)) groups.set(key, []);
              groups.get(key).push(result);
            }
            return [...groups.values()].map((rows) => ({
              baseUrl: rows[0].baseUrl,
              baseKind: rows[0].baseKind,
              path: rows[0].path,
              expected: rows[0].expected,
              attempts: rows.length,
              statuses: [...new Set(rows.map((row) => row.status))],
              averageResponseTimeMs: average(rows.map((row) => row.responseTimeMs)),
              forbiddenMarkers: [...new Set(rows.flatMap((row) => row.forbiddenMarkers))],
              result: rows.every((row) => row.ok) ? "PASS" : rows.some((row) => row.ok) ? "FLAKY" : "FAIL",
            }));
          }
          function routeHealth(summaryRows, baseUrl) {
            const ownerRows = summaryRows.filter((row) => row.baseUrl === baseUrl && ["/owner", "/api/owner/overview", "/api/owner/servers", "/api/owner/audit-log", "/api/owner/discord/overview"].includes(row.path));
            const publicRows = summaryRows.filter((row) => row.baseUrl === baseUrl && ["/api/public/servers", "/api/public/home-stats", "/api/public/leaderboards", "/api/public/server-rail", "/api/dzn-pulse/config"].includes(row.path));
            return {
              ownerHealth: ownerRows.every((row) => row.result === "PASS") ? "PASS" : ownerRows.some((row) => row.result === "PASS") ? "PARTIAL" : "FAIL",
              publicApiHealth: publicRows.every((row) => row.result === "PASS") ? "PASS" : publicRows.some((row) => row.result === "PASS") ? "PARTIAL" : "FAIL",
            };
          }
          void (async () => {
            const urls = [...new Set([stableUrl, ...deployments.map((deployment) => deployment.url).filter(Boolean)])];
            const results = [];
            for (const baseUrl of urls) {
              for (const route of requiredPaths) {
                const attempts = route.important ? 5 : 1;
                for (let attempt = 1; attempt <= attempts; attempt += 1) {
                  results.push(await probe(baseUrl, route, attempt));
                  if (attempt < attempts) await delay(350);
                }
              }
            }
            const summary = summarize(results);
            const rootStable = results.find((row) => row.baseUrl === stableUrl && row.path === "/");
            const latestUrl = deployments[0]?.url ?? null;
            const rootLatest = latestUrl ? results.find((row) => row.baseUrl === latestUrl && row.path === "/") : null;
            const deploymentComparison = deployments.map((deployment) => ({
              deploymentId: deployment.id,
              commitHash: deployment.commitHash,
              immutableUrl: deployment.url,
              ...routeHealth(summary, deployment.url),
              status: deployment.status,
            }));
            const firstOperational = deploymentComparison.find((deployment) => deployment.ownerHealth === "PASS" && deployment.publicApiHealth === "PASS") ?? null;
            const stableFailures = summary.filter((row) => row.baseKind === "stable" && row.result !== "PASS");
            const immutableFailurePaths = new Set(summary.filter((row) => row.baseKind === "immutable" && row.result !== "PASS").map((row) => row.path));
            const immutableFailuresByCommit = deploymentComparison
              .map((deployment) => {
                const failedPaths = summary
                  .filter((row) => row.baseUrl === deployment.immutableUrl && row.result !== "PASS")
                  .map((row) => row.path);
                return {
                  deploymentId: deployment.deploymentId,
                  commitHash: deployment.commitHash,
                  failedPaths,
                };
              })
              .filter((entry) => entry.failedPaths.length > 0);
            const report = {
              stableUrl,
              latestImmutableUrl: latestUrl,
              stableRootHashMatchesLatestImmutableRoot: Boolean(rootStable?.bodyHash && rootLatest?.bodyHash && rootStable.bodyHash === rootLatest.bodyHash),
              requestResults: results.map(({ bodyHash, ...rest }) => rest),
              routeSummary: summary,
              deploymentComparison,
              currentStableHealth: routeHealth(summary, stableUrl),
              lastKnownHealthyDeployment: firstOperational,
              classification: {
                stableDomainOnlyFailures: stableFailures.length > 0 && stableFailures.every((row) => !immutableFailurePaths.has(row.path)),
                presentOnImmutableDeploymentsToo: summary.some((row) => row.baseKind === "immutable" && row.result !== "PASS"),
                intermittentAcrossDeployments: summary.some((row) => row.result === "FLAKY"),
                failurePathsByImmutableDeploymentCommit: immutableFailuresByCommit,
                likelyPagesRoutingRelated: summary.some((row) => row.path === "/owner" && row.statuses.includes(404)),
                likelyWorkerResourceLimitRelated: summary.some((row) => row.forbiddenMarkers.includes("Worker exceeded resource limits") || row.forbiddenMarkers.includes("status-503")),
              },
            };
            writeFileSync("diagnostics-artifact/route-probes.json", `${JSON.stringify(report, null, 2)}\n`);
            console.log(`Route probes complete for ${urls.length} base URLs.`);
          })().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE

      - name: D1 read-only verification
        run: |
          set -euo pipefail
          npx wrangler d1 list --json > diagnostics-artifact/d1-list.json
          npx wrangler d1 execute "${PRODUCTION_D1_DATABASE_NAME}" --remote --json \
            --command "SELECT name FROM d1_migrations ORDER BY id;" > diagnostics-artifact/d1-migrations.json
          npx wrangler d1 execute "${PRODUCTION_D1_DATABASE_NAME}" --remote --json \
            --command "SELECT name FROM d1_migrations WHERE name = '0056_discord_server_announcements.sql';" > diagnostics-artifact/d1-migration-0056.json
          npx wrangler d1 execute "${PRODUCTION_D1_DATABASE_NAME}" --remote --json \
            --command "PRAGMA table_info(discord_announcement_posts);" > diagnostics-artifact/d1-announcement-columns.json
          npx wrangler d1 execute "${PRODUCTION_D1_DATABASE_NAME}" --remote --json \
            --command "SELECT name FROM sqlite_master WHERE type = 'index' AND name LIKE 'idx_discord_announcement_posts_%' ORDER BY name;" > diagnostics-artifact/d1-announcement-indexes.json
          npx wrangler d1 execute "${PRODUCTION_D1_DATABASE_NAME}" --remote --json \
            --command "SELECT COUNT(*) AS row_count FROM discord_announcement_posts;" > diagnostics-artifact/d1-announcement-row-count.json

          node <<'NODE'
          const { readdirSync, readFileSync, writeFileSync, unlinkSync } = require("node:fs");
          function parse(path) {
            return JSON.parse(readFileSync(path, "utf8"));
          }
          function rows(path) {
            const parsed = parse(path);
            return (Array.isArray(parsed) ? parsed : [parsed]).flatMap((entry) => entry?.results ?? entry?.result?.[0]?.results ?? []);
          }
          const requiredColumns = ["id", "server_id", "event_type", "channel_id", "message_id", "thread_id", "dedupe_key", "status", "failure_reason", "created_at", "updated_at"];
          const requiredIndexes = ["idx_discord_announcement_posts_server_event_created", "idx_discord_announcement_posts_event_status_created", "idx_discord_announcement_posts_status_updated"];
          const dbList = parse("diagnostics-artifact/d1-list.json");
          const dbEntries = Array.isArray(dbList) ? dbList : dbList?.result ?? [];
          const database = dbEntries.find((entry) => entry?.name === process.env.PRODUCTION_D1_DATABASE_NAME) ?? null;
          const migrations = rows("diagnostics-artifact/d1-migrations.json").map((row) => row.name).filter(Boolean);
          const localMigrations = readdirSync("migrations").filter((name) => name.endsWith(".sql")).sort();
          const pendingLocalMigrations = localMigrations.filter((name) => !migrations.includes(name));
          const columns = rows("diagnostics-artifact/d1-announcement-columns.json").map((row) => row.name).filter(Boolean);
          const indexes = rows("diagnostics-artifact/d1-announcement-indexes.json").map((row) => row.name).filter(Boolean);
          const rowCount = Number(rows("diagnostics-artifact/d1-announcement-row-count.json")[0]?.row_count ?? -1);
          const summary = {
            databaseIdentityConfirmed: Boolean(database),
            databaseName: database?.name ?? process.env.PRODUCTION_D1_DATABASE_NAME,
            migration0056Applied: rows("diagnostics-artifact/d1-migration-0056.json").some((row) => row.name === "0056_discord_server_announcements.sql"),
            migrationCount: migrations.length,
            pendingLocalMigrations,
            noUnexpectedPendingMigrationForIntendedRuntime: pendingLocalMigrations.length === 0,
            announcementTableColumns: Object.fromEntries(requiredColumns.map((column) => [column, columns.includes(column)])),
            announcementIndexes: Object.fromEntries(requiredIndexes.map((index) => [index, indexes.includes(index)])),
            announcementRowCount: rowCount,
            rollbackIndicated: false,
            d1MutationPerformedByDiagnostics: false,
          };
          writeFileSync("diagnostics-artifact/d1-summary.json", `${JSON.stringify(summary, null, 2)}\n`);
          for (const file of [
            "d1-list.json",
            "d1-migrations.json",
            "d1-migration-0056.json",
            "d1-announcement-columns.json",
            "d1-announcement-indexes.json",
            "d1-announcement-row-count.json",
          ]) {
            unlinkSync(`diagnostics-artifact/${file}`);
          }
          console.log(`D1 read-only verification complete for ${summary.databaseName}.`);
          NODE

      - name: Repository and workflow state
        run: |
          set -euo pipefail
          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const { readFileSync, writeFileSync } = require("node:fs");
          function git(args) {
            return execFileSync("git", args, { encoding: "utf8" }).trim();
          }
          function gitOk(args) {
            try {
              execFileSync("git", args, { stdio: "ignore" });
              return true;
            } catch {
              return false;
            }
          }
          const workflowPath = ".github/workflows/dzn-discord-server-announcements-production-rollout.yml";
          const workflow = readFileSync(workflowPath, "utf8");
          const latestWorkflowCommit = git(["log", "-1", "--format=%H %s", "--", workflowPath]);
          const routeNormalizationPresent = workflow.includes("normalizeRoutes([...(routes.include ?? []), ...requiredIncludes])");
          const removesChildRoutes = workflow.includes("route.startsWith(splatPrefix(splat))") && workflow.includes("removedOverlappedIncludeRoutes");
          const rejectsOverlaps = workflow.includes("assertNoSplatOverlap(finalRoutes.include, \"include\")") && workflow.includes("assertNoSplatOverlap(finalRoutes.exclude, \"exclude\")");
          const summary = {
            originMainHead: git(["rev-parse", "origin/main"]),
            featureBranchHead: git(["rev-parse", `origin/${process.env.FEATURE_BRANCH}`]),
            approvedRuntimeCommit: process.env.APPROVED_RUNTIME_COMMIT,
            approvedRuntimeCommitAncestorOfFeatureBranch: gitOk(["merge-base", "--is-ancestor", process.env.APPROVED_RUNTIME_COMMIT, `origin/${process.env.FEATURE_BRANCH}`]),
            latestProductionRolloutWorkflowCommit: latestWorkflowCommit,
            productionRolloutRouteNormalizationPresent: routeNormalizationPresent,
            routeNormalizationRemovesSpecificApiRulesWhenApiWildcardExists: removesChildRoutes,
            finalRoutesValidationRejectsWildcardChildOverlaps: rejectsOverlaps,
          };
          writeFileSync("diagnostics-artifact/repository-state.json", `${JSON.stringify(summary, null, 2)}\n`);
          console.log("Repository state collected.");
          NODE

      - name: Local Functions bundle and route inspection
        run: |
          set -euo pipefail
          rm -rf .pages-functions-diagnostics
          npx wrangler pages functions build functions \
            --outdir .pages-functions-diagnostics \
            --build-output-directory out \
            --output-routes-path out/_routes.json \
            --minify
          node <<'NODE'
          const { existsSync, readFileSync, readdirSync, statSync, writeFileSync } = require("node:fs");
          const { join } = require("node:path");
          function walk(dir) {
            if (!existsSync(dir)) return [];
            return readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const path = join(dir, entry.name);
              return entry.isDirectory() ? walk(path) : [path];
            });
          }
          function uniqueRoutes(values) {
            return [...new Set((Array.isArray(values) ? values : []).filter((value) => typeof value === "string" && value.trim()).map((value) => value.trim()))];
          }
          function isSplat(route) {
            return route.endsWith("/*");
          }
          function splatPrefix(route) {
            return route.slice(0, -1);
          }
          function overlaps(values) {
            const routes = uniqueRoutes(values);
            const found = [];
            for (const splat of routes.filter(isSplat)) {
              const prefix = splatPrefix(splat);
              for (const route of routes) {
                if (route !== splat && route.startsWith(prefix)) found.push({ splat, route });
              }
            }
            return found;
          }
          function normalizeRoutes(values) {
            const source = uniqueRoutes(values);
            const splats = source.filter(isSplat);
            const removed = [];
            const normalized = source.filter((route) => {
              for (const splat of splats) {
                if (route === splat) continue;
                if (route.startsWith(splatPrefix(splat))) {
                  removed.push({ route, coveredBy: splat });
                  return false;
                }
              }
              return true;
            }).sort();
            return { routes: normalized, removed };
          }
          function importsFor(path) {
            if (!existsSync(path)) return [];
            const source = readFileSync(path, "utf8");
            return [...source.matchAll(/^\s*import\s+[\s\S]*?\s+from\s+["']([^"']+)["'];/gm)].map((match) => match[1]);
          }
          const routes = JSON.parse(readFileSync("out/_routes.json", "utf8"));
          const requiredIncludes = ["/api/*", "/owner", "/owner/*"];
          const includeWithWildcard = uniqueRoutes([...(routes.include ?? []), ...requiredIncludes]);
          const normalized = normalizeRoutes(includeWithWildcard);
          const functionFiles = walk("functions").filter((path) => path.endsWith(".ts"));
          const bundleFiles = walk(".pages-functions-diagnostics");
          const bundleBytes = bundleFiles.reduce((total, path) => total + statSync(path).size, 0);
          const ownerPublicRoutes = [
            "functions/api/owner/overview.ts",
            "functions/api/owner/servers.ts",
            "functions/api/owner/audit-log.ts",
            "functions/api/owner/discord/overview.ts",
            "functions/api/public/servers.ts",
            "functions/api/public/home-stats.ts",
            "functions/api/public/leaderboards.ts",
            "functions/api/public/server-rail.ts",
          ];
          const importSummary = Object.fromEntries(ownerPublicRoutes.map((path) => [path, importsFor(path)]));
          const largeSourceFiles = functionFiles
            .map((path) => ({ path, bytes: statSync(path).size }))
            .filter((entry) => entry.bytes > 120000)
            .sort((a, b) => b.bytes - a.bytes)
            .slice(0, 20);
          const summary = {
            workerBundleBytes: bundleBytes,
            workerBundleMegabytes: Number((bundleBytes / 1024 / 1024).toFixed(3)),
            functionsSourceRouteFiles: functionFiles.length,
            rawRoutesIncludeCount: uniqueRoutes(routes.include ?? []).length,
            rawRoutesExcludeCount: uniqueRoutes(routes.exclude ?? []).length,
            routesAfterWildcardIncludeCount: includeWithWildcard.length,
            routesAfterWildcardOverlapCount: overlaps(includeWithWildcard).length,
            normalizedRoutesIncludeCount: normalized.routes.length,
            normalizedRoutesOverlapCount: overlaps(normalized.routes).length,
            normalizedRemovedRouteCount: normalized.removed.length,
            apiWildcardMakesAllApiFunctionsUseWorker: normalized.routes.includes("/api/*"),
            staticPublicPagesExcludedFromFunctions: !normalized.routes.includes("/*") && !normalized.routes.includes("/servers") && !normalized.routes.includes("/dzn-pulse"),
            broadApiWildcardNecessary: "Intended production route coverage uses /api/* so all API functions enter the Pages Functions Worker; raw Wrangler output also lists individual API routes.",
            routeNormalizationCouldReduceRoutingOverhead: normalized.removed.length > 0,
            currentBundleNearCloudflareLimit: bundleBytes > 8 * 1024 * 1024,
            confirmedFindings: [
              `Local Functions bundle is ${Number((bundleBytes / 1024 / 1024).toFixed(3))} MB.`,
              `Raw Functions routes include ${uniqueRoutes(routes.include ?? []).length} include entries.`,
              `Adding /api/* before normalization creates ${overlaps(includeWithWildcard).length} wildcard-child overlaps.`,
              `Normalization removes ${normalized.removed.length} covered route entries and leaves ${overlaps(normalized.routes).length} overlaps.`,
            ],
            hypotheses: [
              "Stable 503 responses are consistent with runtime CPU/resource pressure if route probes show Worker limit pages.",
              "Stable /owner 404 is consistent with missing or stale Pages Functions routing if immutable deployments show correct 302 behavior.",
            ],
            importSummary,
            largeSourceFiles,
          };
          writeFileSync("diagnostics-artifact/worker-bundle-routes.json", `${JSON.stringify(summary, null, 2)}\n`);
          console.log(`Worker bundle summary written: ${summary.workerBundleMegabytes} MB.`);
          NODE

      - name: Generate sanitized diagnostic report
        if: always()
        run: |
          node <<'NODE'
          const { existsSync, readFileSync, writeFileSync, mkdirSync } = require("node:fs");
          mkdirSync("diagnostics-artifact", { recursive: true });
          function readJson(path, fallback = null) {
            if (!existsSync(path)) return fallback;
            return JSON.parse(readFileSync(path, "utf8"));
          }
          function statusFromBoolean(value) {
            return value ? "YES" : value === false ? "NO" : "UNKNOWN";
          }
          const pages = readJson("diagnostics-artifact/pages.json", {});
          const routes = readJson("diagnostics-artifact/route-probes.json", {});
          const d1 = readJson("diagnostics-artifact/d1-summary.json", {});
          const repo = readJson("diagnostics-artifact/repository-state.json", {});
          const bundle = readJson("diagnostics-artifact/worker-bundle-routes.json", {});
          const localChecks = readJson("diagnostics-artifact/local-checks.json", []);
          const stable = pages.latestProductionDeployment ?? {};
          const stableRouteHealth = routes.currentStableHealth ?? {};
          const routeFailures = (routes.routeSummary ?? []).filter((row) => row.result !== "PASS");
          const localFailures = localChecks.filter((check) => !check.ok);
          const d1Ok = d1.databaseIdentityConfirmed === true
            && d1.migration0056Applied === true
            && d1.announcementRowCount === 0
            && Object.values(d1.announcementTableColumns ?? {}).every(Boolean)
            && Object.values(d1.announcementIndexes ?? {}).every(Boolean);
          const stableHealthy = stableRouteHealth.ownerHealth === "PASS" && stableRouteHealth.publicApiHealth === "PASS";
          const overall = !pages.projectExists || localFailures.length || !d1Ok || !stableHealthy ? "FAIL" : "PASS";
          const envPresence = pages.productionEnvPresence ?? {};
          const lines = [];
          lines.push("# DZN Production Read-Only Diagnostics");
          lines.push("");
          lines.push("## A. OVERALL STATUS");
          lines.push(overall);
          lines.push("");
          lines.push("## B. CURRENT STABLE DEPLOYMENT");
          lines.push(`- ID: ${stable.id ?? "unknown"}`);
          lines.push(`- URL: ${pages.stableProductionUrl ?? process.env.PRODUCTION_BASE_URL ?? "unknown"}`);
          lines.push(`- Commit: ${stable.commitHash ?? "unknown"}`);
          lines.push(`- Health: owner=${stableRouteHealth.ownerHealth ?? "UNKNOWN"}, publicApi=${stableRouteHealth.publicApiHealth ?? "UNKNOWN"}`);
          lines.push("");
          lines.push("## C. RECENT DEPLOYMENT COMPARISON");
          lines.push("| Deployment | Commit | Immutable URL | Owner health | Public API health | Status |");
          lines.push("|---|---|---|---|---|---|");
          for (const deployment of routes.deploymentComparison ?? []) {
            lines.push(`| ${deployment.deploymentId ?? "unknown"} | ${deployment.commitHash ?? "unknown"} | ${deployment.immutableUrl ?? "unknown"} | ${deployment.ownerHealth ?? "UNKNOWN"} | ${deployment.publicApiHealth ?? "UNKNOWN"} | ${deployment.status ?? "unknown"} |`);
          }
          lines.push("");
          lines.push("## D. PRODUCTION ROUTE RESULTS");
          lines.push("| Endpoint | Attempts | Statuses | Average response time | Forbidden marker | Result |");
          lines.push("|---|---:|---|---:|---|---|");
          for (const row of (routes.routeSummary ?? []).filter((entry) => entry.baseKind === "stable")) {
            lines.push(`| ${row.path} | ${row.attempts} | ${(row.statuses ?? []).join(", ")} | ${row.averageResponseTimeMs ?? 0} ms | ${(row.forbiddenMarkers ?? []).join(", ") || "none"} | ${row.result} |`);
          }
          lines.push("");
          lines.push("## E. D1 RESULTS");
          lines.push(`- DB identity: ${statusFromBoolean(d1.databaseIdentityConfirmed)}`);
          lines.push(`- migration 0056: ${statusFromBoolean(d1.migration0056Applied)}`);
          lines.push(`- table columns: ${Object.values(d1.announcementTableColumns ?? {}).every(Boolean) ? "PASS" : "FAIL"}`);
          lines.push(`- indexes: ${Object.values(d1.announcementIndexes ?? {}).every(Boolean) ? "PASS" : "FAIL"}`);
          lines.push(`- row count: ${d1.announcementRowCount ?? "unknown"}`);
          lines.push(`- mutation confirmation: no production D1 mutation performed by this workflow`);
          lines.push("");
          lines.push("## F. FEATURE FLAG STATUS");
          lines.push(`- DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED configured: ${statusFromBoolean(envPresence.DZN_DISCORD_SERVER_ANNOUNCEMENTS_ENABLED)}`);
          lines.push(`- DZN_DISCORD_NOTIFICATIONS_ENABLED configured: ${statusFromBoolean(envPresence.DZN_DISCORD_NOTIFICATIONS_ENABLED)}`);
          lines.push(`- DZN_PLATFORM_OWNER_DISCORD_IDS configured: ${statusFromBoolean(envPresence.DZN_PLATFORM_OWNER_DISCORD_IDS)}`);
          lines.push(`- SESSION_SECRET configured: ${statusFromBoolean(envPresence.SESSION_SECRET)}`);
          lines.push(`- DISCORD_CLIENT_ID configured: ${statusFromBoolean(envPresence.DISCORD_CLIENT_ID)}`);
          lines.push(`- DISCORD_CLIENT_SECRET configured: ${statusFromBoolean(envPresence.DISCORD_CLIENT_SECRET)}`);
          lines.push(`- DISCORD_REDIRECT_URI configured: ${statusFromBoolean(envPresence.DISCORD_REDIRECT_URI)}`);
          lines.push(`- DISCORD_BOT_TOKEN configured: ${statusFromBoolean(envPresence.DISCORD_BOT_TOKEN)}`);
          lines.push(`- DZN_DISCORD_ADVERT_CHANNEL_ID configured: ${statusFromBoolean(envPresence.DZN_DISCORD_ADVERT_CHANNEL_ID)}`);
          lines.push(`- DZN_DISCORD_SHOWCASE_CHANNEL_ID configured: ${statusFromBoolean(envPresence.DZN_DISCORD_SHOWCASE_CHANNEL_ID)}`);
          lines.push("");
          lines.push("## G. WORKER RESOURCE FINDINGS");
          lines.push("### Confirmed findings");
          for (const finding of bundle.confirmedFindings ?? []) lines.push(`- ${finding}`);
          lines.push("### Likely causes");
          for (const item of bundle.hypotheses ?? []) lines.push(`- ${item}`);
          lines.push("### Unknowns");
          lines.push("- Exact Cloudflare CPU attribution requires Cloudflare runtime logs, which this workflow does not request or mutate.");
          lines.push("");
          lines.push("## H. CURRENT BLOCKER");
          lines.push(routeFailures.length ? `Stable route failures remain: ${routeFailures.filter((row) => row.baseKind === "stable").map((row) => `${row.path}=${row.result}`).join(", ") || "see immutable route comparison"}.` : "No current route blocker found.");
          lines.push("");
          lines.push("## I. LAST KNOWN HEALTHY DEPLOYMENT");
          lines.push(routes.lastKnownHealthyDeployment ? `${routes.lastKnownHealthyDeployment.deploymentId} ${routes.lastKnownHealthyDeployment.commitHash ?? ""}` : "Not identified by this run.");
          lines.push("");
          lines.push("## J. SAFE RECOVERY OPTIONS");
          lines.push("1. Restore or promote a known healthy existing immutable deployment after manual approval.");
          lines.push("2. Run the corrected guarded Pages runtime rollout after this diagnostics report is reviewed.");
          lines.push("3. Preview, test, and then deploy a resource-reduction fix if route failures exist on every recent deployment.");
          lines.push("");
          lines.push("## K. EXACT NEXT ACTION");
          lines.push("Review the uploaded diagnostics artifact and choose one recovery option; this workflow does not execute recovery.");
          lines.push("");
          lines.push("## Safety Confirmation");
          lines.push("- no production deploy");
          lines.push("- no production migration");
          lines.push("- no production D1 write");
          lines.push("- no D1 rollback");
          lines.push("- no secret update");
          lines.push("- no Discord message");
          lines.push("- no ADM/Nitrado call");
          lines.push("- no production data modification");
          lines.push("");
          lines.push("## Repository State");
          lines.push(`- origin/main HEAD: ${repo.originMainHead ?? "unknown"}`);
          lines.push(`- feature branch HEAD: ${repo.featureBranchHead ?? "unknown"}`);
          lines.push(`- approved runtime commit ancestor of feature branch: ${statusFromBoolean(repo.approvedRuntimeCommitAncestorOfFeatureBranch)}`);
          lines.push(`- production rollout workflow latest commit: ${repo.latestProductionRolloutWorkflowCommit ?? "unknown"}`);
          lines.push(`- route normalization present: ${statusFromBoolean(repo.productionRolloutRouteNormalizationPresent)}`);
          lines.push(`- wildcard child routes removed: ${statusFromBoolean(repo.routeNormalizationRemovesSpecificApiRulesWhenApiWildcardExists)}`);
          lines.push(`- overlap validation present: ${statusFromBoolean(repo.finalRoutesValidationRejectsWildcardChildOverlaps)}`);
          writeFileSync("diagnostics-artifact/final-report.md", `${lines.join("\n")}\n`);
          console.log(lines.join("\n"));
          NODE

      - name: Upload sanitized diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dzn-production-readonly-diagnostics
          path: diagnostics-artifact/
          if-no-files-found: error
