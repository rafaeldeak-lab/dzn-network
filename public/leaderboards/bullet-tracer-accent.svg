    <ellipse cx="135" cy="95" rx="20" ry="30" fill="#2a1209" opacity=".82"/>
    <ellipse cx="142" cy="95" rx="9" ry="19" fill="#c27931" opacity=".9"/>
    <path d="M190 71c-12 22-12 54 0 76M228 71c-12 22-12 54 0 76M270 71c-12 22-12 54 0 76" fill="none" stroke="#2f140c" stroke-width="8" opacity=".76"/>
    <path d="M205 72c-6 24-6 50 0 74M246 72c-6 24-6 50 0 74" fill="none" stroke="#ffe0a3" stroke-width="3" opacity=".62"/>
