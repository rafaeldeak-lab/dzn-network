name: DZN Discord Control Preview

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to preview
        default: feature/discord-control-centre
        required: true
      mode:
        description: Action to run
        required: true
        type: choice
        default: full-preview
        options:
          - full-preview
      confirm_preview_only:
        description: Must equal PREVIEW_ONLY
        required: true
      preview_project_name:
        description: Dedicated preview Pages project
        required: true
        default: dzn-network-discord-control-preview
      preview_db_name:
        description: Preview D1 database name
        required: true
        default: dzn_network_db_discord_control_preview

concurrency:
  group: dzn-discord-control-preview-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  discord-control-preview:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PULSE_PREVIEW_TOKEN: ${{ secrets.CLOUDFLARE_PULSE_PREVIEW_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      DZN_PLATFORM_OWNER_DISCORD_IDS: ${{ secrets.DZN_PLATFORM_OWNER_DISCORD_IDS || vars.DZN_PLATFORM_OWNER_DISCORD_IDS }}
      DZN_DISCORD_CONTROL_PREVIEW_DISCORD_CLIENT_ID: ${{ vars.DZN_DISCORD_CONTROL_PREVIEW_DISCORD_CLIENT_ID || vars.DZN_OWNER_CONSOLE_PREVIEW_DISCORD_CLIENT_ID || vars.DZN_PULSE_PREVIEW_DISCORD_CLIENT_ID }}
      DZN_DISCORD_CONTROL_PREVIEW_DISCORD_CLIENT_SECRET: ${{ secrets.DZN_DISCORD_CONTROL_PREVIEW_DISCORD_CLIENT_SECRET || secrets.DZN_OWNER_CONSOLE_PREVIEW_DISCORD_CLIENT_SECRET || secrets.DZN_PULSE_PREVIEW_DISCORD_CLIENT_SECRET }}
      INPUT_BRANCH: ${{ inputs.branch }}
      MODE: ${{ inputs.mode }}
      CONFIRM_PREVIEW_ONLY: ${{ inputs.confirm_preview_only }}
      PREVIEW_PROJECT_NAME: ${{ inputs.preview_project_name }}
      PREVIEW_DB_NAME: ${{ inputs.preview_db_name }}
      PRODUCTION_PAGES_PROJECT_NAME: dzn-network
      PRODUCTION_D1_DATABASE_NAME: dzn_network_db
      DZN_DISCORD_NOTIFICATIONS_ENABLED: "false"
      DZN_PULSE_ENABLED: "true"
      PREVIEW_BASE_URL: https://${{ inputs.preview_project_name }}.pages.dev

    steps:
      - name: Checkout requested branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate preview-only inputs
        run: |
          set -euo pipefail

          if [ "${CONFIRM_PREVIEW_ONLY}" != "PREVIEW_ONLY" ]; then
            echo "::error::confirm_preview_only must equal PREVIEW_ONLY."
            exit 1
          fi
          if [ "${MODE}" != "full-preview" ]; then
            echo "::error::Discord Control preview only supports full-preview mode."
            exit 1
          fi
          if [ "${INPUT_BRANCH}" != "feature/discord-control-centre" ]; then
            echo "::error::Discord Control preview may only run against feature/discord-control-centre."
            exit 1
          fi
          if [ "${INPUT_BRANCH}" = "main" ]; then
            echo "::error::Preview branch must never be main."
            exit 1
          fi
          if [ "${PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
            echo "::error::Preview Pages project must not equal production Pages project."
            exit 1
          fi
          case "${PREVIEW_PROJECT_NAME}" in
            *discord*control*preview*|*discord-control-preview*) ;;
            *)
              echo "::error::Preview Pages project name must contain discord control preview."
              exit 1
              ;;
          esac
          if [ "${PREVIEW_DB_NAME}" = "${PRODUCTION_D1_DATABASE_NAME}" ]; then
            echo "::error::Preview D1 database must not equal production D1 database."
            exit 1
          fi
          case "${PREVIEW_DB_NAME}" in
            *discord_control_preview*) ;;
            *)
              echo "::error::Preview D1 database name must contain discord_control_preview."
              exit 1
              ;;
          esac
          if [ "${DZN_DISCORD_NOTIFICATIONS_ENABLED}" != "false" ]; then
            echo "::error::DZN_DISCORD_NOTIFICATIONS_ENABLED must remain false."
            exit 1
          fi
          if [ -z "${DZN_PLATFORM_OWNER_DISCORD_IDS:-}" ]; then
            echo "::error::Missing DZN_PLATFORM_OWNER_DISCORD_IDS for Discord Control preview."
            exit 1
          fi
          echo "::add-mask::${DZN_PLATFORM_OWNER_DISCORD_IDS}"

          CF_TOKEN="${CLOUDFLARE_PULSE_PREVIEW_TOKEN:-${CLOUDFLARE_API_TOKEN:-}}"
          if [ -z "${CF_TOKEN:-}" ]; then
            echo "::error::Missing CLOUDFLARE_PULSE_PREVIEW_TOKEN or CLOUDFLARE_API_TOKEN GitHub secret."
            exit 1
          fi
          if [ "${#CF_TOKEN}" -le 20 ]; then
            echo "::error::Cloudflare preview token is present but too short to be valid."
            exit 1
          fi
          echo "::add-mask::$CF_TOKEN"
          {
            printf "DISCORD_CONTROL_CF_TOKEN=%s\n" "$CF_TOKEN"
            printf "CLOUDFLARE_API_TOKEN=%s\n" "$CF_TOKEN"
          } >> "$GITHUB_ENV"

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::Missing CLOUDFLARE_ACCOUNT_ID GitHub secret or repository variable."
            exit 1
          fi
          if ! [[ "${CLOUDFLARE_ACCOUNT_ID}" =~ ^[a-fA-F0-9]{32}$ ]]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID does not look like a 32-character Cloudflare account id."
            exit 1
          fi

          PREVIEW_SESSION_SECRET="$(node -e "console.log(require('node:crypto').randomBytes(32).toString('base64url'))")"
          echo "::add-mask::$PREVIEW_SESSION_SECRET"
          printf "DISCORD_CONTROL_PREVIEW_SESSION_SECRET=%s\n" "$PREVIEW_SESSION_SECRET" >> "$GITHUB_ENV"

          DISCORD_CONTROL_PREVIEW_CLIENT_ID="${DZN_DISCORD_CONTROL_PREVIEW_DISCORD_CLIENT_ID:-1504270029795885178}"
          DISCORD_CONTROL_PREVIEW_REDIRECT_URI="${PREVIEW_BASE_URL}/api/auth/discord/callback"
          if ! [[ "${DISCORD_CONTROL_PREVIEW_CLIENT_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::Discord Control preview Discord client id must be numeric."
            exit 1
          fi
          if [ "${DISCORD_CONTROL_PREVIEW_CLIENT_ID}" != "1504270029795885178" ]; then
            echo "::error::Discord Control preview must use DISCORD_CLIENT_ID=1504270029795885178."
            exit 1
          fi
          if [ -z "${DZN_DISCORD_CONTROL_PREVIEW_DISCORD_CLIENT_SECRET:-}" ]; then
            echo "::error::Missing DZN_DISCORD_CONTROL_PREVIEW_DISCORD_CLIENT_SECRET, DZN_OWNER_CONSOLE_PREVIEW_DISCORD_CLIENT_SECRET, or DZN_PULSE_PREVIEW_DISCORD_CLIENT_SECRET for Discord Control preview OAuth."
            exit 1
          fi
          echo "::add-mask::$DZN_DISCORD_CONTROL_PREVIEW_DISCORD_CLIENT_SECRET"
          {
            printf "DISCORD_CONTROL_PREVIEW_CLIENT_ID=%s\n" "$DISCORD_CONTROL_PREVIEW_CLIENT_ID"
            printf "DISCORD_CONTROL_PREVIEW_REDIRECT_URI=%s\n" "$DISCORD_CONTROL_PREVIEW_REDIRECT_URI"
          } >> "$GITHUB_ENV"

          node <<'NODE'
          const fs = require("node:fs");
          const ownerIds = String(process.env.DZN_PLATFORM_OWNER_DISCORD_IDS ?? "")
            .split(",")
            .map((entry) => entry.trim())
            .filter((entry) => /^\d+$/.test(entry));
          if (ownerIds.length === 0) {
            console.error("Missing DZN_PLATFORM_OWNER_DISCORD_IDS for Discord Control preview.");
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `DISCORD_CONTROL_PREVIEW_OWNER_ID=${ownerIds[0]}\n`);
          const source = fs.readFileSync("wrangler.toml", "utf8");
          const name = source.match(/database_name\s*=\s*"([^"]+)"/)?.[1] ?? "";
          const id = source.match(/database_id\s*=\s*"([^"]+)"/)?.[1] ?? "";
          if (!name || !id) {
            console.error("Could not detect production D1 database name/id from wrangler.toml.");
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `DETECTED_PRODUCTION_D1_DATABASE_NAME=${name}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `DETECTED_PRODUCTION_D1_DATABASE_ID=${id}\n`);
          console.log(`Detected production D1 database name: ${name}`);
          console.log(`Detected production D1 database id: ${id}`);
          NODE

          {
            echo "## DZN Discord Control Preview Guard"
            echo ""
            echo "- Branch: ${INPUT_BRANCH}"
            echo "- Preview D1 database name: ${PREVIEW_DB_NAME}"
            echo "- Preview Pages project name: ${PREVIEW_PROJECT_NAME}"
            echo "- DZN_PLATFORM_OWNER_DISCORD_IDS configured: true"
            echo "- DISCORD_CLIENT_ID: ${DISCORD_CONTROL_PREVIEW_CLIENT_ID}"
            echo "- DISCORD_REDIRECT_URI: ${DISCORD_CONTROL_PREVIEW_REDIRECT_URI}"
            echo "- DZN_APP_URL: ${PREVIEW_BASE_URL}"
            echo "- NEXT_PUBLIC_APP_URL: ${PREVIEW_BASE_URL}"
            echo "- DZN_PULSE_ENABLED: true"
            echo "- DZN_DISCORD_NOTIFICATIONS_ENABLED: false"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install and validate branch
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm run build
          npm run test
          npm run test:owner-console
          npm run test:github-workflows
          npm run test:public-access-gating
          npm run test:server-lifecycle-resource-control
          npm run test:server-advertising-packages
          git diff --check

      - name: Resolve or create preview D1 database
        run: |
          set -euo pipefail
          case "${PREVIEW_DB_NAME}" in
            *discord_control_preview*) ;;
            *)
              echo "::error::Refusing D1 command for non-preview Discord Control database name."
              exit 1
              ;;
          esac

          node <<'NODE'
          const fs = require("node:fs");
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.DISCORD_CONTROL_CF_TOKEN;
          const previewName = process.env.PREVIEW_DB_NAME;
          const productionName = process.env.DETECTED_PRODUCTION_D1_DATABASE_NAME || process.env.PRODUCTION_D1_DATABASE_NAME;
          const productionId = process.env.DETECTED_PRODUCTION_D1_DATABASE_ID;
          async function api(path, init = {}) {
            const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const text = await response.text();
            const parsed = text ? JSON.parse(text) : {};
            if (!response.ok || parsed.success === false) {
              const message = parsed.errors?.map((error) => error.message).join("; ") || `HTTP ${response.status}`;
              throw new Error(message);
            }
            return parsed;
          }
          void (async () => {
            if (previewName === productionName) throw new Error("preview_db_name equals production database name.");
            const list = await api("/d1/database?per_page=100");
            const databases = Array.isArray(list.result) ? list.result : list.result?.databases ?? [];
            let database = databases.find((item) => item?.name === previewName);
            if (!database) {
              database = (await api("/d1/database", {
                method: "POST",
                body: JSON.stringify({ name: previewName }),
              })).result;
            }
            const previewId = database?.uuid ?? database?.id;
            if (!previewId) throw new Error("Could not resolve preview D1 database id.");
            if (previewId === productionId) throw new Error("Preview D1 database id equals production D1 database id.");
            fs.writeFileSync("wrangler.discord-control-preview.toml", [
              'name = "dzn-discord-control-preview-d1"',
              'compatibility_date = "2026-05-13"',
              "",
              "[[d1_databases]]",
              'binding = "DB"',
              `database_name = "${previewName}"`,
              `database_id = "${previewId}"`,
              "",
            ].join("\n"));
            fs.appendFileSync(process.env.GITHUB_ENV, `PREVIEW_D1_DATABASE_ID=${previewId}\n`);
            console.log(`Preview D1 database name: ${previewName}`);
            console.log(`Preview D1 database id: ${previewId}`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Apply preview D1 migrations
        run: |
          set -euo pipefail
          case "${PREVIEW_DB_NAME}" in
            *discord_control_preview*) ;;
            *)
              echo "::error::Refusing migration for non-preview Discord Control database name."
              exit 1
              ;;
          esac
          if [ "${PREVIEW_D1_DATABASE_ID}" = "${DETECTED_PRODUCTION_D1_DATABASE_ID}" ]; then
            echo "::error::Refusing migration because preview D1 id equals production D1 id."
            exit 1
          fi
          npx wrangler d1 migrations apply DB --config wrangler.discord-control-preview.toml --remote
          npx wrangler d1 execute DB --config wrangler.discord-control-preview.toml --remote --json --command "PRAGMA foreign_key_check;" > discord-control-preview-foreign-key-check.json
          node <<'NODE'
          const fs = require("node:fs");
          const parsed = JSON.parse(fs.readFileSync("discord-control-preview-foreign-key-check.json", "utf8"));
          const containers = Array.isArray(parsed) ? parsed : [parsed];
          const rows = containers.flatMap((item) => item?.results ?? item?.result?.[0]?.results ?? item?.result?.results ?? []);
          if (rows.length > 0) {
            console.error("Preview D1 foreign_key_check returned rows.");
            process.exit(1);
          }
          console.log("Discord Control preview D1 schema verified.");
          NODE

      - name: Seed preview-only Discord control data
        run: |
          set -euo pipefail
          case "${PREVIEW_DB_NAME}" in
            *discord_control_preview*) ;;
            *)
              echo "::error::Refusing preview seed for non-preview Discord Control database name."
              exit 1
              ;;
          esac
          if [ "${PREVIEW_D1_DATABASE_ID}" = "${DETECTED_PRODUCTION_D1_DATABASE_ID}" ]; then
            echo "::error::Refusing seed because preview D1 id equals production D1 id."
            exit 1
          fi

          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const ownerDiscordId = process.env.DISCORD_CONTROL_PREVIEW_OWNER_ID;
          const sessionSecret = process.env.DISCORD_CONTROL_PREVIEW_SESSION_SECRET;
          const ownerToken = "discord-control-preview-owner-token";
          const nonOwnerToken = "discord-control-preview-non-owner-token";
          function hmac(value) {
            return crypto.createHmac("sha256", sessionSecret).update(value).digest("base64url");
          }
          function sql(value) {
            if (value === null || value === undefined) return "NULL";
            return `'${String(value).replaceAll("'", "''")}'`;
          }
          const expires = "2099-01-01T00:00:00.000Z";
          const statements = `
          INSERT INTO users (id, discord_id, username, avatar, created_at, updated_at)
          VALUES
            ('discord-control-platform-owner', ${sql(ownerDiscordId)}, 'DiscordControlOwner', NULL, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('discord-control-non-owner-user', '999000000000000501', 'DiscordControlNonOwner', NULL, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('discord-control-server-owner', '999000000000000502', 'DiscordControlServerOwner', NULL, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
          ON CONFLICT(id) DO UPDATE SET discord_id = excluded.discord_id, username = excluded.username, updated_at = CURRENT_TIMESTAMP;

          DELETE FROM sessions WHERE id IN ('discord-control-owner-session', 'discord-control-non-owner-session');
          INSERT INTO sessions (id, user_id, session_token_hash, expires_at, created_at)
          VALUES
            ('discord-control-owner-session', 'discord-control-platform-owner', ${sql(hmac(ownerToken))}, ${sql(expires)}, CURRENT_TIMESTAMP),
            ('discord-control-non-owner-session', 'discord-control-non-owner-user', ${sql(hmac(nonOwnerToken))}, ${sql(expires)}, CURRENT_TIMESTAMP);

          INSERT INTO discord_guilds (id, guild_id, owner_user_id, name, icon, icon_url, permissions, is_owner, created_at, updated_at)
          VALUES
            ('discord-control-guild-row', 'discord-control-preview-guild', 'discord-control-server-owner', 'DZN Discord Control Preview Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
          ON CONFLICT(guild_id) DO UPDATE SET name = excluded.name, owner_user_id = excluded.owner_user_id, updated_at = CURRENT_TIMESTAMP;

          INSERT INTO linked_servers (
            id, user_id, guild_id, discord_guild_id, nitrado_service_id, nitrado_service_name, server_name, server_type,
            status, public_slug, listing_visibility, lifecycle_status, lifecycle_reason, lifecycle_updated_at,
            owner_action_required, owner_action_reason, latest_imported_event_at, created_at, updated_at
          )
          VALUES
            ('discord-control-nuketown', 'discord-control-server-owner', 'discord-control-preview-guild', 'discord-control-guild-row', '18765761', 'NukeTown DEATHMATCH', 'NukeTown DEATHMATCH', 'DEATHMATCH',
             'live', 'discord-control-nuketown', 'public', 'active_live', 'healthy_active_sync', CURRENT_TIMESTAMP, 0, NULL, '2026-07-01T18:05:22.000Z', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
          ON CONFLICT(id) DO UPDATE SET server_name = excluded.server_name, status = excluded.status, public_slug = excluded.public_slug, lifecycle_status = excluded.lifecycle_status, updated_at = CURRENT_TIMESTAMP;

          INSERT INTO server_sync_state (id, guild_id, current_player_count, max_player_count, server_online, server_status, status_data_freshness, created_at, updated_at)
          VALUES ('discord-control-nuketown-sync', 'discord-control-preview-guild', 1, 10, 1, 'online', 'nitrado_live', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
          ON CONFLICT(guild_id) DO UPDATE SET current_player_count = excluded.current_player_count, max_player_count = excluded.max_player_count, server_status = excluded.server_status, updated_at = CURRENT_TIMESTAMP;

          INSERT INTO server_posting_destinations (
            id, guild_id, post_type, discord_channel_id, discord_webhook_url, enabled, required_feature, min_plan_key, created_by_discord_id, created_at, updated_at
          )
          VALUES
            ('discord-control-destination-announcements', 'discord-control-preview-guild', 'new_server_added', 'discord-control-announcements', NULL, 1, 'discord_auto_posts', 'free', ${sql(ownerDiscordId)}, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('discord-control-destination-weekly', 'discord-control-preview-guild', 'weekly_network_recap', 'discord-control-recaps', NULL, 0, 'discord_auto_posts', 'pro', ${sql(ownerDiscordId)}, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
          ON CONFLICT(guild_id, post_type) DO UPDATE SET discord_channel_id = excluded.discord_channel_id, enabled = excluded.enabled, updated_at = CURRENT_TIMESTAMP;

          INSERT INTO server_posting_state (
            id, guild_id, post_type, discord_channel_id, discord_message_id, last_posted_at, last_edited_at, last_payload_hash, last_error, created_at, updated_at
          )
          VALUES
            ('discord-control-post-state', 'discord-control-preview-guild', 'new_server_added', 'discord-control-announcements', NULL, NULL, CURRENT_TIMESTAMP, 'preview-hash', NULL, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
          ON CONFLICT(guild_id, post_type, discord_channel_id) DO UPDATE SET last_edited_at = excluded.last_edited_at, last_error = excluded.last_error, updated_at = CURRENT_TIMESTAMP;
          `;
          fs.writeFileSync("discord-control-preview-seed.sql", statements);
          fs.appendFileSync(process.env.GITHUB_ENV, `DISCORD_CONTROL_OWNER_COOKIE=dzn_session=${ownerToken}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `DISCORD_CONTROL_NON_OWNER_COOKIE=dzn_session=${nonOwnerToken}\n`);
          NODE

          npx wrangler d1 execute DB --config wrangler.discord-control-preview.toml --remote --file discord-control-preview-seed.sql
          echo "Discord Control preview seed completed."

      - name: Resolve or create preview Pages project
        run: |
          set -euo pipefail
          if [ "${PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
            echo "::error::Refusing to resolve Discord Control preview against production Pages project."
            exit 1
          fi
          case "${PREVIEW_PROJECT_NAME}" in
            *discord*control*preview*|*discord-control-preview*) ;;
            *)
              echo "::error::Refusing non-preview Discord Control Pages project name."
              exit 1
              ;;
          esac
          if [ "${PREVIEW_D1_DATABASE_ID}" = "${DETECTED_PRODUCTION_D1_DATABASE_ID}" ]; then
            echo "::error::Refusing preview Pages project configuration because preview D1 id equals production D1 id."
            exit 1
          fi

          node <<'NODE'
          const fs = require("node:fs");
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.DISCORD_CONTROL_CF_TOKEN;
          const projectName = process.env.PREVIEW_PROJECT_NAME;
          const branch = process.env.INPUT_BRANCH;
          const previewBaseUrl = process.env.PREVIEW_BASE_URL;
          const previewDiscordClientId = process.env.DISCORD_CONTROL_PREVIEW_CLIENT_ID;
          const previewDiscordRedirectUri = process.env.DISCORD_CONTROL_PREVIEW_REDIRECT_URI;
          const d1Id = process.env.PREVIEW_D1_DATABASE_ID;
          const previewDbName = process.env.PREVIEW_DB_NAME;
          async function api(path, init = {}) {
            const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const text = await response.text();
            const parsed = text ? JSON.parse(text) : {};
            return { ok: response.ok, status: response.status, parsed };
          }
          function fail(result, fallback) {
            const errors = result?.parsed?.errors;
            console.error(Array.isArray(errors) ? errors.map((error) => `[${error.code ?? "unknown"}] ${error.message}`).join("; ") : fallback);
            process.exit(1);
          }
          function mergeConfig(config) {
            return {
              ...config,
              env_vars: {
                ...(config?.env_vars ?? {}),
                DZN_PULSE_ENABLED: { type: "plain_text", value: "true" },
                DZN_DISCORD_NOTIFICATIONS_ENABLED: { type: "plain_text", value: "false" },
                DZN_APP_URL: { type: "plain_text", value: previewBaseUrl },
                NEXT_PUBLIC_APP_URL: { type: "plain_text", value: previewBaseUrl },
                DISCORD_CLIENT_ID: { type: "plain_text", value: previewDiscordClientId },
                DISCORD_REDIRECT_URI: { type: "plain_text", value: previewDiscordRedirectUri },
              },
              d1_databases: {
                ...(config?.d1_databases ?? {}),
                DB: { id: d1Id },
              },
            };
          }
          void (async () => {
            const get = await api(`/pages/projects/${projectName}`);
            let project = null;
            if (get.status === 404) {
              const created = await api("/pages/projects", {
                method: "POST",
                body: JSON.stringify({ name: projectName, production_branch: branch }),
              });
              if (!created.ok || created.parsed.success === false) fail(created, "Failed to create preview Pages project.");
              project = created.parsed.result ?? null;
              console.log(`Created preview Pages project: ${projectName}`);
            } else if (!get.ok || get.parsed.success === false) {
              fail(get, "Failed to read preview Pages project.");
            } else {
              project = get.parsed.result ?? null;
              console.log(`Reusing preview Pages project: ${projectName}`);
            }
            const patched = await api(`/pages/projects/${projectName}`, {
              method: "PATCH",
              body: JSON.stringify({
                production_branch: branch,
                deployment_configs: {
                  production: mergeConfig(project?.deployment_configs?.production ?? {}),
                  preview: mergeConfig(project?.deployment_configs?.preview ?? {}),
                },
              }),
            });
            if (!patched.ok || patched.parsed.success === false) fail(patched, "Failed to configure preview Pages project.");
            fs.writeFileSync("wrangler.toml", [
              `name = ${JSON.stringify(projectName)}`,
              'compatibility_date = "2026-05-13"',
              'pages_build_output_dir = "out"',
              "",
              "[vars]",
              'DZN_PULSE_ENABLED = "true"',
              'DZN_DISCORD_NOTIFICATIONS_ENABLED = "false"',
              `DZN_APP_URL = ${JSON.stringify(previewBaseUrl)}`,
              `NEXT_PUBLIC_APP_URL = ${JSON.stringify(previewBaseUrl)}`,
              `DISCORD_CLIENT_ID = ${JSON.stringify(previewDiscordClientId)}`,
              `DISCORD_REDIRECT_URI = ${JSON.stringify(previewDiscordRedirectUri)}`,
              "",
              "[[d1_databases]]",
              'binding = "DB"',
              `database_name = ${JSON.stringify(previewDbName)}`,
              `database_id = ${JSON.stringify(d1Id)}`,
              "",
            ].join("\n"));
            console.log(`Configured preview Pages project: ${projectName}`);
          })().catch((error) => {
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          });
          NODE

      - name: Configure preview owner secrets
        run: |
          set -euo pipefail
          printf "%s" "$DZN_PLATFORM_OWNER_DISCORD_IDS" | npx wrangler pages secret put DZN_PLATFORM_OWNER_DISCORD_IDS --project-name "${PREVIEW_PROJECT_NAME}"
          printf "%s" "$DISCORD_CONTROL_PREVIEW_SESSION_SECRET" | npx wrangler pages secret put SESSION_SECRET --project-name "${PREVIEW_PROJECT_NAME}"
          printf "%s" "$DZN_DISCORD_CONTROL_PREVIEW_DISCORD_CLIENT_SECRET" | npx wrangler pages secret put DISCORD_CLIENT_SECRET --project-name "${PREVIEW_PROJECT_NAME}"
          echo "Discord Control preview owner and OAuth secrets configured."

      - name: Deploy preview Pages project
        run: |
          set -euo pipefail
          if [ "${PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
            echo "::error::Refusing to deploy Discord Control preview to production Pages project."
            exit 1
          fi
          if [ "${PREVIEW_D1_DATABASE_ID}" = "${DETECTED_PRODUCTION_D1_DATABASE_ID}" ]; then
            echo "::error::Refusing preview deploy because preview D1 id equals production D1 id."
            exit 1
          fi
          DZN_PULSE_ENABLED=true \
          DZN_DISCORD_NOTIFICATIONS_ENABLED=false \
          DZN_APP_URL="${PREVIEW_BASE_URL}" \
          NEXT_PUBLIC_APP_URL="${PREVIEW_BASE_URL}" \
          DISCORD_CLIENT_ID="${DISCORD_CONTROL_PREVIEW_CLIENT_ID}" \
          DISCORD_REDIRECT_URI="${DISCORD_CONTROL_PREVIEW_REDIRECT_URI}" \
          npm run build
          npx wrangler pages deploy out \
            --project-name "${PREVIEW_PROJECT_NAME}" \
            --branch "${INPUT_BRANCH}" \
            --commit-dirty=true \
            | tee discord-control-pages-deploy.txt
          echo "${PREVIEW_BASE_URL}" > discord-control-preview-url.txt
          echo "Preview URL: ${PREVIEW_BASE_URL}"

      - name: Verify Discord Control preview
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const base = fs.readFileSync("discord-control-preview-url.txt", "utf8").trim();
          const ownerCookie = process.env.DISCORD_CONTROL_OWNER_COOKIE;
          const nonOwnerCookie = process.env.DISCORD_CONTROL_NON_OWNER_COOKIE;
          const ownerDiscordId = process.env.DISCORD_CONTROL_PREVIEW_OWNER_ID;
          const expectedDiscordClientId = process.env.DISCORD_CONTROL_PREVIEW_CLIENT_ID;
          const expectedDiscordRedirectUri = process.env.DISCORD_CONTROL_PREVIEW_REDIRECT_URI;
          const retryableStatuses = new Set([522, 523, 524, 525, 526, 530]);
          const forbiddenText = ["Request failed: 503", "SERVER UNAVAILABLE", "Error 1102", "Worker exceeded resource limits", "Minified React error #"];
          const forbiddenSecrets = ["encrypted_token", "token_iv", "token_auth_tag", "DISCORD_BOT_TOKEN", "TOKEN_ENCRYPTION_KEY", "SESSION_SECRET", "DZN_PLATFORM_OWNER_DISCORD_IDS", ownerDiscordId].filter(Boolean);
          function assert(condition, message) {
            if (!condition) {
              console.error(message);
              process.exit(1);
            }
          }
          function delay(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }
          async function fetchOnce(path, init = {}) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 45000);
            try {
              return await fetch(`${base}${path}`, { ...init, signal: controller.signal });
            } finally {
              clearTimeout(timeout);
            }
          }
          async function fetchWithRetry(path, init = {}, attempts = 40) {
            let lastResponse = null;
            let lastError = null;
            for (let attempt = 1; attempt <= attempts; attempt += 1) {
              try {
                const response = await fetchOnce(path, init);
                lastResponse = response;
                console.log(`Discord Control preview ${path} attempt ${attempt}/${attempts}: HTTP ${response.status}`);
                if (!retryableStatuses.has(response.status)) return response;
              } catch (error) {
                lastError = error;
                console.log(`Discord Control preview ${path} attempt ${attempt}/${attempts}: ${error instanceof Error ? error.name : "fetch_error"}`);
              }
              if (attempt < attempts) await delay(7500);
            }
            if (lastResponse) return lastResponse;
            throw lastError ?? new Error(`Failed to fetch ${path}.`);
          }
          async function expectStatus(path, expected, init = {}) {
            const response = await fetchWithRetry(path, init);
            const body = await response.text();
            assert(response.status === expected, `${path} returned HTTP ${response.status}, expected ${expected}.`);
            for (const snippet of forbiddenText) assert(!body.includes(snippet), `${path} contains forbidden runtime text: ${snippet}`);
            for (const secret of forbiddenSecrets) assert(!body.includes(secret), `${path} leaked forbidden owner/secret value.`);
            return body;
          }
          async function expectJson(path, cookie, expected, init = {}) {
            const body = await expectStatus(path, expected, {
              ...init,
              headers: { ...(init.headers ?? {}), ...(cookie ? { cookie } : {}) },
              redirect: "manual",
            });
            try {
              return body ? JSON.parse(body) : null;
            } catch {
              return null;
            }
          }
          void (async () => {
            await expectStatus("/", 200);
            const discordStart = await fetchWithRetry("/api/auth/discord/start?returnTo=%2Fowner", { redirect: "manual" });
            assert(discordStart.status === 302, `/api/auth/discord/start?returnTo=%2Fowner returned HTTP ${discordStart.status}, expected 302.`);
            const discordLocation = discordStart.headers.get("location") ?? "";
            assert(discordLocation.startsWith("https://discord.com/oauth2/authorize"), "Discord auth start did not redirect to Discord.");
            const discordAuthorize = new URL(discordLocation);
            assert(discordAuthorize.searchParams.get("client_id") === expectedDiscordClientId, "Discord auth start used the wrong preview client id.");
            assert(discordAuthorize.searchParams.get("redirect_uri") === expectedDiscordRedirectUri, "Discord auth start used the wrong preview callback URL.");

            const loggedOutOwner = await fetchWithRetry("/owner", { redirect: "manual" });
            assert([302, 401, 403].includes(loggedOutOwner.status), `/owner logged-out returned ${loggedOutOwner.status}.`);
            await expectStatus("/owner", 403, { headers: { cookie: nonOwnerCookie }, redirect: "manual" });
            await expectStatus("/owner", 200, { headers: { cookie: ownerCookie }, redirect: "manual" });

            for (const path of ["/api/owner/discord/overview", "/api/owner/discord/post-types", "/api/owner/discord/channels", "/api/owner/discord/templates"]) {
              await expectJson(path, "", 401);
              await expectJson(path, nonOwnerCookie, 403);
              await expectJson(path, ownerCookie, 200);
            }
            const overview = await expectJson("/api/owner/discord/overview", ownerCookie, 200);
            assert(overview?.overview?.discordNotificationsEnabled === false, "Discord notifications must remain false.");
            assert(typeof overview?.overview?.botTokenPresent === "boolean", "Bot token status must be boolean only.");

            await expectJson("/api/owner/discord/preview-embed", "", 401, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ type: "weekly_recap" }) });
            await expectJson("/api/owner/discord/preview-embed", nonOwnerCookie, 403, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ type: "weekly_recap" }) });
            const preview = await expectJson("/api/owner/discord/preview-embed", ownerCookie, 200, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ type: "server_wars_event" }) });
            assert(preview?.sent === false, "Preview embed endpoint must not send Discord messages.");
            assert(preview?.preview?.previewOnly === true, "Preview embed response must be marked preview-only.");
            assert(preview?.preview?.type === "server_wars_event", "Preview embed returned the wrong sample type.");

            await expectStatus("/api/public/servers", 200);
            await expectStatus("/dashboard", 200);
            await expectStatus("/dzn-pulse", 200);
            const pulseConfig = await expectJson("/api/dzn-pulse/config", "", 200);
            assert(pulseConfig?.dznPulseEnabled === true || pulseConfig?.config?.dznPulseEnabled === true, "DZN Pulse should remain enabled.");
            assert(pulseConfig?.discordNotificationsEnabled === false || pulseConfig?.config?.discordNotificationsEnabled === false, "Discord delivery must remain disabled.");
            console.log("Discord Control preview verification passed.");
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

          {
            echo "## DZN Discord Control Preview Result"
            echo ""
            echo "- Preview URL: ${PREVIEW_BASE_URL}"
            echo "- Preview D1 database name: ${PREVIEW_DB_NAME}"
            echo "- /owner auth protection: passed"
            echo "- Discord owner APIs auth protection: passed"
            echo "- Preview embed endpoint: preview-only, not sent"
            echo "- Discord OAuth authorize start: passed"
            echo "- DZN_DISCORD_NOTIFICATIONS_ENABLED: false"
            echo "- Production D1 writes: none"
            echo "- Production Pages deploy: none"
          } >> "$GITHUB_STEP_SUMMARY"
