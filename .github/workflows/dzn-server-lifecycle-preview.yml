name: DZN Server Lifecycle Preview

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to preview
        default: feature/server-lifecycle-resource-control
        required: true
      mode:
        description: Action to run
        required: true
        type: choice
        options:
          - validate
          - provision-preview-db
          - deploy-preview
          - verify-preview
          - full-preview
      confirm_preview_only:
        description: Must equal PREVIEW_ONLY
        required: true
      preview_db_name:
        description: Preview D1 database name
        required: true
        default: dzn_network_db_server_lifecycle_preview
      preview_project_name:
        description: Dedicated preview Pages project
        required: true
        default: dzn-network-server-lifecycle-preview

concurrency:
  group: dzn-server-lifecycle-preview-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

jobs:
  server-lifecycle-preview:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PULSE_PREVIEW_TOKEN: ${{ secrets.CLOUDFLARE_PULSE_PREVIEW_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      INPUT_BRANCH: ${{ inputs.branch }}
      MODE: ${{ inputs.mode }}
      CONFIRM_PREVIEW_ONLY: ${{ inputs.confirm_preview_only }}
      PREVIEW_DB_NAME: ${{ inputs.preview_db_name }}
      PREVIEW_PROJECT_NAME: ${{ inputs.preview_project_name }}
      PRODUCTION_PAGES_PROJECT_NAME: dzn-network
      DZN_DISCORD_NOTIFICATIONS_ENABLED: "false"
      PREVIEW_BASE_URL: https://${{ inputs.preview_project_name }}.pages.dev

    steps:
      - name: Checkout requested branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate preview-only inputs
        run: |
          set -euo pipefail

          if [ "${CONFIRM_PREVIEW_ONLY}" != "PREVIEW_ONLY" ]; then
            echo "::error::confirm_preview_only must equal PREVIEW_ONLY."
            exit 1
          fi

          if [ "${INPUT_BRANCH}" != "feature/server-lifecycle-resource-control" ]; then
            echo "::error::Server lifecycle preview may only run against feature/server-lifecycle-resource-control."
            exit 1
          fi

          if [ "${INPUT_BRANCH}" = "main" ]; then
            echo "::error::Preview branch must never be main."
            exit 1
          fi

          if [ "${PREVIEW_PROJECT_NAME}" = "${PRODUCTION_PAGES_PROJECT_NAME}" ]; then
            echo "::error::Preview Pages project must not equal the production Pages project."
            exit 1
          fi

          case "${PREVIEW_DB_NAME}" in
            *lifecycle_preview*|*server_lifecycle_preview*) ;;
            *)
              echo "::error::Preview D1 database name must contain lifecycle_preview or server_lifecycle_preview."
              exit 1
              ;;
          esac

          if [ "${DZN_DISCORD_NOTIFICATIONS_ENABLED}" != "false" ]; then
            echo "::error::DZN_DISCORD_NOTIFICATIONS_ENABLED must remain false."
            exit 1
          fi

          if [ "${MODE}" != "validate" ]; then
            CF_TOKEN="${CLOUDFLARE_PULSE_PREVIEW_TOKEN:-${CLOUDFLARE_API_TOKEN:-}}"
            if [ -z "${CF_TOKEN:-}" ]; then
              echo "::error::Missing CLOUDFLARE_PULSE_PREVIEW_TOKEN or CLOUDFLARE_API_TOKEN GitHub secret."
              exit 1
            fi
            echo "::add-mask::$CF_TOKEN"
            if [ "${#CF_TOKEN}" -le 20 ]; then
              echo "::error::Cloudflare preview token is present but too short to be valid."
              exit 1
            fi
            {
              printf "SERVER_LIFECYCLE_CF_TOKEN=%s\n" "$CF_TOKEN"
              printf "CLOUDFLARE_API_TOKEN=%s\n" "$CF_TOKEN"
            } >> "$GITHUB_ENV"

            if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
              echo "::error::Missing CLOUDFLARE_ACCOUNT_ID GitHub secret or repository variable."
              exit 1
            fi
            if ! [[ "${CLOUDFLARE_ACCOUNT_ID}" =~ ^[a-fA-F0-9]{32}$ ]]; then
              echo "::error::CLOUDFLARE_ACCOUNT_ID does not look like a 32-character Cloudflare account id."
              exit 1
            fi
          fi

          node <<'NODE'
          const fs = require("node:fs");
          const source = fs.readFileSync("wrangler.toml", "utf8");
          const name = source.match(/database_name\s*=\s*"([^"]+)"/)?.[1] ?? "";
          const id = source.match(/database_id\s*=\s*"([^"]+)"/)?.[1] ?? "";
          if (!name || !id) {
            console.error("Could not detect production D1 database name/id from wrangler.toml.");
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_ENV, `PRODUCTION_D1_DATABASE_NAME=${name}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `PRODUCTION_D1_DATABASE_ID=${id}\n`);
          console.log(`Detected production D1 database name: ${name}`);
          console.log(`Detected production D1 database id: ${id}`);
          NODE

          {
            echo "## DZN Server Lifecycle Preview Guard"
            echo ""
            echo "- Mode: ${MODE}"
            echo "- Branch: ${INPUT_BRANCH}"
            echo "- Preview D1 database name: ${PREVIEW_DB_NAME}"
            echo "- Preview Pages project name: ${PREVIEW_PROJECT_NAME}"
            echo "- Production Pages project name: ${PRODUCTION_PAGES_PROJECT_NAME}"
            echo "- DZN_DISCORD_NOTIFICATIONS_ENABLED: false"
            if [ "${MODE}" != "validate" ]; then
              if [ -n "${CLOUDFLARE_PULSE_PREVIEW_TOKEN:-}" ]; then
                echo "- Cloudflare token source: CLOUDFLARE_PULSE_PREVIEW_TOKEN"
              else
                echo "- Cloudflare token source: CLOUDFLARE_API_TOKEN fallback"
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install
        run: npm ci

      - name: Validate branch
        if: ${{ inputs.mode == 'validate' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail
          npm run lint
          npm run build
          npm run test
          npm run test:metadata-sync-runner
          npm run test:automation-schedulers
          npm run test:public-access-gating
          npm run test:server-advertising-packages
          npm run test:server-lifecycle-resource-control
          git diff --check

      - name: Diagnose Cloudflare preview auth
        if: ${{ inputs.mode == 'provision-preview-db' || inputs.mode == 'deploy-preview' || inputs.mode == 'verify-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail
          echo "Wrangler version: $(npx wrangler --version)"
          echo "GitHub ref: ${GITHUB_REF_NAME}"
          echo "Selected branch: ${INPUT_BRANCH}"
          echo "Preview D1 database name: ${PREVIEW_DB_NAME}"
          echo "Preview Pages project name: ${PREVIEW_PROJECT_NAME}"
          echo "Cloudflare preview token present: yes"

          node <<'NODE'
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.SERVER_LIFECYCLE_CF_TOKEN;
          function maskId(id) {
            return typeof id === "string" && id.length > 12 ? `${id.slice(0, 8)}...${id.slice(-4)}` : "unavailable";
          }
          function category(errors) {
            const first = Array.isArray(errors) ? errors[0] : null;
            return {
              code: first?.code ?? "unknown",
              message: first?.message ? String(first.message).replace(/[A-Za-z0-9_-]{20,}/g, "[redacted]") : "unknown",
            };
          }
          async function cloudflare(path) {
            const response = await fetch(`https://api.cloudflare.com/client/v4${path}`, {
              headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
            });
            const text = await response.text();
            let parsed;
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = { success: false, errors: [{ code: `http_${response.status}`, message: "non_json_response" }] };
            }
            return { response, parsed };
          }
          void (async () => {
            const verify = await cloudflare("/user/tokens/verify");
            if (!verify.response.ok || verify.parsed.success !== true) {
              const error = category(verify.parsed.errors);
              console.log(`Cloudflare token verify success=false code=${error.code} category=${error.message}`);
              console.error("Cloudflare token invalid or expired.");
              process.exit(1);
            }
            console.log("Cloudflare token verify success=true");
            const d1 = await cloudflare(`/accounts/${accountId}/d1/database?per_page=100`);
            if (!d1.response.ok || d1.parsed.success !== true) {
              const error = category(d1.parsed.errors);
              console.log(`Cloudflare D1 list success=false code=${error.code} category=${error.message}`);
              console.error("Cloudflare token lacks D1/account permission.");
              process.exit(1);
            }
            const databases = Array.isArray(d1.parsed.result) ? d1.parsed.result : d1.parsed.result?.databases ?? [];
            console.log("Cloudflare D1 list success=true");
            for (const database of databases) {
              console.log(`D1 database: ${database?.name ?? "unnamed"} id=${maskId(database?.uuid ?? database?.id ?? "")}`);
            }
          })().catch((error) => {
            console.error(error?.message ?? "Cloudflare auth diagnostic failed.");
            process.exit(1);
          });
          NODE

      - name: Resolve or create preview D1 database
        if: ${{ inputs.mode == 'provision-preview-db' || inputs.mode == 'deploy-preview' || inputs.mode == 'verify-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          case "${PREVIEW_DB_NAME}" in
            *lifecycle_preview*|*server_lifecycle_preview*) ;;
            *)
              echo "::error::Refusing D1 command for non-preview lifecycle database name."
              exit 1
              ;;
          esac

          node <<'NODE'
          const fs = require("node:fs");
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.SERVER_LIFECYCLE_CF_TOKEN;
          const previewName = process.env.PREVIEW_DB_NAME;
          const productionName = process.env.PRODUCTION_D1_DATABASE_NAME;
          const productionId = process.env.PRODUCTION_D1_DATABASE_ID;
          async function api(path, init = {}) {
            const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            });
            const text = await response.text();
            let parsed;
            try {
              parsed = text ? JSON.parse(text) : {};
            } catch {
              parsed = { success: false, errors: [{ message: "Cloudflare API returned non-JSON response." }] };
            }
            if (!response.ok || parsed.success === false) {
              const message = parsed.errors?.map((error) => error.message).join("; ") || `HTTP ${response.status}`;
              throw new Error(message);
            }
            return parsed;
          }
          void (async () => {
            if (previewName === productionName) throw new Error("preview_db_name equals production database name.");
            const list = await api("/d1/database?per_page=100");
            const databases = Array.isArray(list.result) ? list.result : list.result?.databases ?? [];
            let database = databases.find((item) => item?.name === previewName);
            if (!database) {
              database = (await api("/d1/database", {
                method: "POST",
                body: JSON.stringify({ name: previewName }),
              })).result;
            }
            const previewId = database?.uuid ?? database?.id;
            if (!previewId) throw new Error("Could not resolve preview D1 database id.");
            if (previewId === productionId) throw new Error("Preview D1 database id equals production D1 database id.");
            fs.writeFileSync("server-lifecycle-preview-d1.json", JSON.stringify({ name: previewName, id: previewId }, null, 2));
            fs.writeFileSync("wrangler.server-lifecycle-preview.toml", [
              'name = "dzn-server-lifecycle-preview-d1"',
              'compatibility_date = "2026-05-13"',
              "",
              "[[d1_databases]]",
              'binding = "DB"',
              `database_name = "${previewName}"`,
              `database_id = "${previewId}"`,
              "",
            ].join("\n"));
            fs.appendFileSync(process.env.GITHUB_ENV, `PREVIEW_D1_DATABASE_ID=${previewId}\n`);
            console.log(`Preview D1 database name: ${previewName}`);
            console.log(`Preview D1 database id: ${previewId}`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Apply and verify preview D1 migrations through 0054
        if: ${{ inputs.mode == 'provision-preview-db' || inputs.mode == 'deploy-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          case "${PREVIEW_DB_NAME}" in
            *lifecycle_preview*|*server_lifecycle_preview*) ;;
            *)
              echo "::error::Refusing migration for non-preview lifecycle database name."
              exit 1
              ;;
          esac
          if [ "${PREVIEW_D1_DATABASE_ID}" = "${PRODUCTION_D1_DATABASE_ID}" ]; then
            echo "::error::Refusing migration because preview D1 id equals production D1 id."
            exit 1
          fi

          test -f migrations/0054_server_lifecycle_resource_control.sql
          npx wrangler d1 migrations apply DB --config wrangler.server-lifecycle-preview.toml --remote | tee server-lifecycle-preview-migrations.txt
          npx wrangler d1 execute DB --config wrangler.server-lifecycle-preview.toml --remote --json --command "PRAGMA table_info(linked_servers);" > lifecycle-linked-server-columns.json
          npx wrangler d1 execute DB --config wrangler.server-lifecycle-preview.toml --remote --json --command "PRAGMA table_info(server_sync_state);" > lifecycle-sync-state-columns.json
          npx wrangler d1 execute DB --config wrangler.server-lifecycle-preview.toml --remote --json --command "SELECT name FROM sqlite_master WHERE type='index' AND name LIKE '%lifecycle%' ORDER BY name;" > lifecycle-preview-indexes.json
          npx wrangler d1 execute DB --config wrangler.server-lifecycle-preview.toml --remote --json --command "PRAGMA foreign_key_check;" > lifecycle-preview-foreign-key-check.json

          node <<'NODE'
          const fs = require("node:fs");
          function rowsFromWranglerJson(path) {
            const parsed = JSON.parse(fs.readFileSync(path, "utf8"));
            const containers = Array.isArray(parsed) ? parsed : [parsed];
            return containers.flatMap((item) => item?.results ?? item?.result?.[0]?.results ?? item?.result?.results ?? []);
          }
          const linkedColumns = new Set(rowsFromWranglerJson("lifecycle-linked-server-columns.json").map((row) => row.name));
          for (const name of [
            "lifecycle_status",
            "lifecycle_reason",
            "lifecycle_updated_at",
            "owner_action_required",
            "owner_action_reason",
            "final_sync_attempted_at",
            "final_sync_completed_at",
            "latest_imported_event_at",
          ]) {
            if (!linkedColumns.has(name)) {
              console.error(`linked_servers is missing ${name}.`);
              process.exit(1);
            }
          }
          const syncColumns = new Set(rowsFromWranglerJson("lifecycle-sync-state-columns.json").map((row) => row.name));
          for (const name of [
            "next_metadata_check_at",
            "next_player_count_check_at",
            "next_adm_discovery_at",
            "next_adm_processing_at",
            "next_retry_after",
            "last_skip_reason",
          ]) {
            if (!syncColumns.has(name)) {
              console.error(`server_sync_state is missing ${name}.`);
              process.exit(1);
            }
          }
          const indexes = new Set(rowsFromWranglerJson("lifecycle-preview-indexes.json").map((row) => row.name));
          if (!indexes.has("idx_linked_servers_lifecycle_status")) {
            console.error("Preview D1 is missing idx_linked_servers_lifecycle_status.");
            process.exit(1);
          }
          const fkRows = rowsFromWranglerJson("lifecycle-preview-foreign-key-check.json");
          if (fkRows.length > 0) {
            console.error("Preview D1 foreign_key_check returned rows.");
            process.exit(1);
          }
          console.log("Preview D1 server lifecycle schema verified through 0054.");
          NODE

      - name: Seed preview-only lifecycle data
        if: ${{ inputs.mode == 'deploy-preview' || inputs.mode == 'verify-preview' || inputs.mode == 'full-preview' }}
        run: |
          set -euo pipefail

          case "${PREVIEW_DB_NAME}" in
            *lifecycle_preview*|*server_lifecycle_preview*) ;;
            *)
              echo "::error::Refusing preview seed for non-preview lifecycle database name."
              exit 1
              ;;
          esac
          if [ "${PREVIEW_D1_DATABASE_ID}" = "${PRODUCTION_D1_DATABASE_ID}" ]; then
            echo "::error::Refusing preview seed because preview D1 id equals production D1 id."
            exit 1
          fi

          cat > server-lifecycle-preview-data.sql <<'SQL'
          INSERT INTO users (id, discord_id, username, avatar, created_at, updated_at)
          VALUES ('lifecycle-preview-owner', 'lifecycle-preview-owner', 'LifecyclePreviewOwner', NULL, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
          ON CONFLICT(id) DO UPDATE SET username = excluded.username, updated_at = CURRENT_TIMESTAMP;

          INSERT INTO discord_guilds (id, guild_id, owner_user_id, name, icon, icon_url, permissions, is_owner, created_at, updated_at)
          VALUES
            ('lifecycle-active-guild-row', '388000000000000001', 'lifecycle-preview-owner', 'Lifecycle Active Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-archived-guild-row', '388000000000000002', 'lifecycle-preview-owner', 'Lifecycle Archived Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-legacy-guild-row', '388000000000000003', 'lifecycle-preview-owner', 'Lifecycle Legacy Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-token-guild-row', '388000000000000004', 'lifecycle-preview-owner', 'Lifecycle Token Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-final-guild-row', '388000000000000005', 'lifecycle-preview-owner', 'Lifecycle Final Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-degraded-guild-row', '388000000000000006', 'lifecycle-preview-owner', 'Lifecycle Degraded Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-upstream-guild-row', '388000000000000007', 'lifecycle-preview-owner', 'Lifecycle Upstream Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-stale-guild-row', '388000000000000008', 'lifecycle-preview-owner', 'Lifecycle Stale Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-final-complete-guild-row', '388000000000000009', 'lifecycle-preview-owner', 'Lifecycle Final Complete Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-nuketown-guild-row', '388000000000000010', 'lifecycle-preview-owner', 'NukeTown Lifecycle Preview Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-pandora-guild-row', '388000000000000011', 'lifecycle-preview-owner', 'PANDORA Lifecycle Preview Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-warlords-guild-row', '388000000000000012', 'lifecycle-preview-owner', 'Warlords Lifecycle Preview Guild', NULL, NULL, '8', 1, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
          ON CONFLICT(guild_id) DO UPDATE SET owner_user_id = excluded.owner_user_id, name = excluded.name, updated_at = CURRENT_TIMESTAMP;

          INSERT INTO linked_servers (
            id, user_id, guild_id, server_id, name, server_name, server_ip, server_port, public_slug,
            status, listing_visibility, lifecycle_status, lifecycle_reason, lifecycle_updated_at,
            owner_action_required, owner_action_reason, service_id, server_category, created_at, updated_at
          )
          VALUES
            ('lifecycle-active-server', 'lifecycle-preview-owner', '388000000000000001', '388000000000000001', 'Lifecycle Active', 'Lifecycle Active', '127.0.0.1', 2302, 'lifecycle-active',
              'live', 'public', 'active_live', 'preview_active', CURRENT_TIMESTAMP, 0, NULL, '388001', 'deathmatch', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-archived-server', 'lifecycle-preview-owner', '388000000000000002', '388000000000000002', 'Lifecycle Archived', 'Lifecycle Archived', '127.0.0.1', 2302, 'lifecycle-archived',
              'archived', 'hidden', 'archived_hidden', 'owner_archived_preview', CURRENT_TIMESTAMP, 0, NULL, '388002', 'deathmatch', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-legacy-server', 'lifecycle-preview-owner', '388000000000000003', '388000000000000003', 'Lifecycle Legacy', 'Lifecycle Legacy', '127.0.0.1', 2302, 'lifecycle-legacy',
              'inactive', 'public', 'legacy_offline', 'preview_legacy', CURRENT_TIMESTAMP, 0, NULL, '388003', 'deathmatch', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-token-server', 'lifecycle-preview-owner', '388000000000000004', '388000000000000004', 'Lifecycle Token Needs Resave', 'Lifecycle Token Needs Resave', '127.0.0.1', 2302, 'lifecycle-token',
              'live', 'public', 'token_needs_resave', 'token_decrypt_failed', CURRENT_TIMESTAMP, 1, 'Re-save Nitrado token', '388004', 'deathmatch', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-final-server', 'lifecycle-preview-owner', '388000000000000005', '388000000000000005', 'Lifecycle Final Sync', 'Lifecycle Final Sync', '127.0.0.1', 2302, 'lifecycle-final',
              'live', 'public', 'final_sync_pending', 'service_expired_final_sync', CURRENT_TIMESTAMP, 0, NULL, '388005', 'deathmatch', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-degraded-server', 'lifecycle-preview-owner', '388000000000000006', '388000000000000006', 'Lifecycle Degraded', 'Lifecycle Degraded', '127.0.0.1', 2302, 'lifecycle-degraded',
              'live', 'public', 'active_degraded', 'preview_backoff', CURRENT_TIMESTAMP, 0, NULL, '388006', 'deathmatch', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-upstream-server', 'lifecycle-preview-owner', '388000000000000007', '388000000000000007', 'Lifecycle Nitrado Upstream', 'Lifecycle Nitrado Upstream', '127.0.0.1', 2302, 'lifecycle-upstream',
              'live', 'public', 'nitrado_upstream_down', 'nitrado_upstream_retry', CURRENT_TIMESTAMP, 0, NULL, '388007', 'deathmatch', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-stale-server', 'lifecycle-preview-owner', '388000000000000008', '388000000000000008', 'Lifecycle Stale Monitoring', 'Lifecycle Stale Monitoring', '127.0.0.1', 2302, 'lifecycle-stale',
              'live', 'public', 'stale_monitoring', 'reduced_frequency_preview', CURRENT_TIMESTAMP, 0, NULL, '388008', 'deathmatch', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-final-complete-server', 'lifecycle-preview-owner', '388000000000000009', '388000000000000009', 'Lifecycle Final Complete', 'Lifecycle Final Complete', '127.0.0.1', 2302, 'lifecycle-final-complete',
              'inactive', 'public', 'final_sync_complete', 'final_sync_complete_preview', CURRENT_TIMESTAMP, 0, NULL, '388009', 'deathmatch', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-nuketown-server', 'lifecycle-preview-owner', '388000000000000010', '388000000000000010', 'NukeTown Lifecycle Preview', 'NukeTown Lifecycle Preview', '95.156.250.131', 12000, 'lifecycle-nuketown',
              'live', 'public', 'active_live', 'preview_nuketown_active', CURRENT_TIMESTAMP, 0, NULL, '18765761', 'deathmatch', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-pandora-server', 'lifecycle-preview-owner', '388000000000000011', '388000000000000011', 'PANDORA Lifecycle Preview', 'PANDORA Lifecycle Preview', '127.0.0.1', 2302, 'lifecycle-pandora',
              'live', 'public', 'nitrado_upstream_down', 'preview_pandora_recoverable', CURRENT_TIMESTAMP, 0, NULL, '388011', 'survival', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
            ('lifecycle-warlords-server', 'lifecycle-preview-owner', '388000000000000012', '388000000000000012', 'Warlords PvP Lifecycle Preview', 'Warlords PvP Lifecycle Preview', '127.0.0.1', 2302, 'lifecycle-warlords',
              'archived', 'hidden', 'archived_hidden', 'preview_fake_test_archived', CURRENT_TIMESTAMP, 0, NULL, '900002', 'deathmatch', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
          ON CONFLICT(id) DO UPDATE SET
            status = excluded.status,
            listing_visibility = excluded.listing_visibility,
            lifecycle_status = excluded.lifecycle_status,
            lifecycle_reason = excluded.lifecycle_reason,
            lifecycle_updated_at = CURRENT_TIMESTAMP,
            owner_action_required = excluded.owner_action_required,
            owner_action_reason = excluded.owner_action_reason,
            updated_at = CURRENT_TIMESTAMP;

          INSERT INTO server_public_cache (guild_id, server_name, name, current_players, max_players, last_seen_at, updated_at)
